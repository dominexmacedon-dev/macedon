<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QR Code Generator Python Video</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1020;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter, Arial;
}

/* FRAME */
.video-frame{
    width:390px;
    height:690px;
    background:#111827;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    border:2px solid #1e293b;
    box-shadow:0 0 45px rgba(0,0,0,.75);
}

/* TOP BAR */
.top{
    height:60px;
    background:#0f172a;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:700;
    font-size:16px;
}

/* INTRO SCREEN */
.intro{
    position:absolute;
    inset:0;
    background:#0b1020;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    color:white;
    animation:fadeOut 1s ease forwards;
    animation-delay:3.5s;
}

.intro h1{
    font-size:20px;
    margin-bottom:10px;
}

.intro p{
    font-size:13px;
    color:#94a3b8;
}

@keyframes fadeOut{
    to{opacity:0; visibility:hidden;}
}

/* EDITOR */
.editor{
    padding:18px;
    font-family:'Fira Code', monospace;
    font-size:14px;
    line-height:1.7;
    color:white;
    height:100%;
    overflow:hidden;
}

/* LINE NUMBERS */
.line{
    display:flex;
}

.num{
    width:28px;
    color:#64748b;
    text-align:right;
    margin-right:10px;
    user-select:none;
}

/* PYTHON COLORS */
.keyword{ color:#ff79c6; }
.import{ color:#8be9fd; }
.string{ color:#f1fa8c; }
.function{ color:#50fa7b; }
.comment{ color:#6272a4; }
.operator{ color:#ffb86c; }

/* CURSOR */
.cursor{
    display:inline-block;
    width:8px;
    height:15px;
    background:white;
    margin-left:2px;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

/* RUN BUTTON */
.run-btn{
    position:absolute;
    right:18px;
    bottom:18px;
    background:#22c55e;
    color:white;
    border:none;
    padding:12px 22px;
    border-radius:12px;
    font-weight:700;
    transition:.3s;
}

.run-btn.clicked{
    transform:scale(.9);
    background:#16a34a;
}

/* TERMINAL */
.terminal{
    margin-top:10px;
    background:#020617;
    border:1px solid #1e293b;
    border-radius:10px;
    padding:12px;
}

.out{
    opacity:0;
    animation:show .05s forwards;
    font-size:13px;
    margin-bottom:4px;
    color:#a5f3fc;
}

@keyframes show{
    to{opacity:1;}
}

.hidden{ display:none; }

</style>
</head>

<body>

<div class="video-frame">

    <div class="top">Python QR Code Generator</div>

    <!-- INTRO SCENE -->
    <div class="intro" id="intro">
        <h1>Generating QR Code with Python</h1>
        <p>Written by Dominex Macedon</p>
    </div>

    <!-- CODE SCENE -->
    <div class="editor" id="editor"></div>

    <button class="run-btn" id="runBtn">Run</button>

</div>

<script>

const editor = document.getElementById("editor");
const runBtn = document.getElementById("runBtn");
const intro = document.getElementById("intro");

/* =========================
   SCENE 1 - CODE WRITING
========================= */

const code = [

`<span class="import">import</span> qrcode`,
`<span class="comment"># QR Code Generator</span>`,
``,
`data = <span class="string">"https://example.com"</span>`,
`img = qrcode.make(data)`,
`img.save(<span class="string">"qr.png"</span>)`,
``,
`<span class="comment"># Done</span>`

];

let i = 0;

setTimeout(writeCode, 3800); // after intro disappears

function writeCode(){

    if(i >= code.length){
        setTimeout(scene2, 700);
        return;
    }

    const row = document.createElement("div");
    row.className = "line";

    const num = document.createElement("div");
    num.className = "num";
    num.innerText = i + 1;

    const text = document.createElement("div");

    let html = code[i];
    let j = 0;

    function type(){

        if(j <= html.length){

            text.innerHTML =
            html.substring(0,j) + '<span class="cursor"></span>';

            j++;

            setTimeout(type, 10);

        }else{
            text.innerHTML = html;
            i++;
            setTimeout(writeCode, 90);
        }
    }

    row.appendChild(num);
    row.appendChild(text);
    editor.appendChild(row);

    type();
}

/* =========================
   SCENE 2 - RUN BUTTON
========================= */

function scene2(){

    runBtn.classList.add("clicked");

    setTimeout(() => {
        runBtn.classList.remove("clicked");
        scene3();
    }, 450);
}

/* =========================
   SCENE 3 - OUTPUT
========================= */

function scene3(){

    editor.innerHTML = "";

    const terminal = document.createElement("div");
    terminal.className = "terminal";

    const lines = [
        "Loading qrcode module...",
        "Encoding data...",
        "Generating matrix...",
        "Saving QR image...",
        "QR Code generated successfully"
    ];

    let k = 0;

    function print(){

        if(k >= lines.length) return;

        const d = document.createElement("div");
        d.className = "out";
        d.innerText = lines[k];

        terminal.appendChild(d);

        k++;
        setTimeout(print, 500);
    }

    editor.appendChild(terminal);
    print();
}

</script>

</body>
</html>
