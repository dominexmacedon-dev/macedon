<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Python Countdown Timer Video</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1020;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter;
}

/* FRAME */
.frame{
    width:390px;
    height:690px;
    background:#111827;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    border:2px solid #1e293b;
}

/* TOP BAR */
.top{
    height:60px;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:700;
    border-bottom:1px solid #1e293b;
}

/* EDITOR AREA (FIXED) */
.editor{
    height:630px;
    padding:16px;
    font-family:'Fira Code', monospace;
    font-size:14px;
    color:white;
    overflow:hidden;
}

/* LINE */
.line{
    display:flex;
}

.num{
    width:28px;
    color:#64748b;
    text-align:right;
    margin-right:10px;
}

/* COLORS */
.kw{ color:#ff79c6; }
.fn{ color:#50fa7b; }
.str{ color:#f1fa8c; }
.cm{ color:#6272a4; }

/* CURSOR */
.cursor{
    width:8px;
    height:15px;
    background:white;
    display:inline-block;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

/* COMMENT BOX */
.commentBox{
    background:#0f172a;
    border:1px solid #334155;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
    font-size:13px;
    color:#cbd5e1;
}

/* RUN BUTTON (SEPARATE SCENE ONLY) */
.runBtn{
    position:absolute;
    right:70px;
    bottom:140px;
    background:#22c55e;
    color:white;
    border:none;
    padding:12px 22px;
    border-radius:12px;
    font-weight:700;
    opacity:0;
    transition:.3s;
}

/* MOUSE CURSOR */
.mouse{
    position:absolute;
    width:26px;
    height:26px;
    background:white;
    clip-path:polygon(0 0, 0 100%, 30% 70%, 50% 100%, 60% 90%, 40% 60%, 100% 60%);
    opacity:0;
    pointer-events:none;
}

/* CLICK EFFECT */
.click{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    border:2px solid white;
    opacity:0;
}

/* TERMINAL */
.terminal{
    background:#020617;
    border:1px solid #1e293b;
    border-radius:10px;
    padding:12px;
    height:520px;
    overflow:hidden;
}

.prompt{
    color:#34d399;
    font-size:13px;
    margin-bottom:8px;
}

.log{
    font-size:13px;
    color:#a5f3fc;
    margin-bottom:3px;
    opacity:0;
    animation:show .05s forwards;
}

@keyframes show{
    to{opacity:1;}
}

.timer{
    font-size:48px;
    font-weight:800;
    color:#fbbf24;
    text-align:center;
}

.center{
    display:flex;
    flex-direction:column;
    justify-content:center;
    height:100%;
}

</style>
</head>

<body>

<div class="frame">

    <div class="top">Python Countdown Timer</div>

    <div class="editor" id="editor"></div>

    <!-- RUN BUTTON (ONLY IN CLICK SCENE) -->
    <button class="runBtn" id="runBtn">Run</button>

    <!-- MOUSE -->
    <div class="mouse" id="mouse"></div>

    <div class="click" id="click"></div>

</div>

<script>

const editor = document.getElementById("editor");
const runBtn = document.getElementById("runBtn");
const mouse = document.getElementById("mouse");
const clickFx = document.getElementById("click");

/* =========================
   SCENE 1 - CODE + COMMENT
========================= */

const code = [
`<span class="kw">import</span> time`,
``,
`<span class="kw">def</span> <span class="fn">countdown</span>(n):`,
`    <span class="kw">while</span> n > 0:`,
`        <span class="fn">print</span>(n)`,
`        time.sleep(1)`,
`        n -= 1`,
``,
`countdown(5)`
];

let i = 0;

setTimeout(startCode, 1500);

function startCode(){
    typeCode();
    showComment();
}

function typeCode(){

    if(i >= code.length){
        setTimeout(scene2, 800);
        return;
    }

    const row = document.createElement("div");
    row.className = "line";

    const num = document.createElement("div");
    num.className = "num";
    num.innerText = i + 1;

    const text = document.createElement("div");

    let html = code[i];
    let j = 0;

    function type(){

        if(j <= html.length){
            text.innerHTML =
            html.substring(0,j) + '<span class="cursor"></span>';
            j++;
            setTimeout(type, 7);
        }else{
            text.innerHTML = html;
            i++;
            setTimeout(typeCode, 50);
        }
    }

    row.appendChild(num);
    row.appendChild(text);
    editor.appendChild(row);

    type();
}

/* COMMENT BOX */
function showComment(){

    const box = document.createElement("div");
    box.className = "commentBox";

    box.innerHTML =
    "This function counts down from 5 to 1 using a loop and delay.";

    editor.appendChild(box);
}

/* =========================
   SCENE 2 - MOUSE CLICK RUN
========================= */

function scene2(){

    runBtn.style.opacity = 1;

    setTimeout(() => {

        mouse.style.opacity = 1;

        mouse.style.left = "220px";
        mouse.style.top = "430px";

        setTimeout(() => {

            mouse.style.left = "250px";
            mouse.style.top = "520px";

            setTimeout(() => {

                clickFx.style.left = "260px";
                clickFx.style.top = "530px";
                clickFx.style.opacity = 1;

                runBtn.style.transform = "scale(.9)";
                runBtn.style.background = "#16a34a";

                setTimeout(() => {
                    scene3();
                }, 500);

            }, 700);

        }, 700);

    }, 500);
}

/* =========================
   SCENE 3 - TERMINAL
========================= */

function scene3(){

    editor.innerHTML = "";

    runBtn.style.display = "none";
    mouse.style.display = "none";
    clickFx.style.display = "none";

    const terminal = document.createElement("div");
    terminal.className = "terminal";

    const prompt = document.createElement("div");
    prompt.className = "prompt";
    prompt.innerText = "$ python countdown.py";

    terminal.appendChild(prompt);

    const logs = document.createElement("div");

    const center = document.createElement("div");
    center.className = "center";

    const timer = document.createElement("div");
    timer.className = "timer";

    center.appendChild(timer);

    terminal.appendChild(logs);
    terminal.appendChild(center);

    editor.appendChild(terminal);

    let n = 5;

    function tick(){

        if(n < 0) return;

        timer.innerText = n;

        const log = document.createElement("div");
        log.className = "log";
        log.innerText = "> " + n;

        logs.appendChild(log);

        n--;

        setTimeout(tick, 600);
    }

    tick();
}

</script>

</body>
</html>
