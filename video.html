<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator Coding Video</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#07111f;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter;
}

/* FRAME */

.frame{
    width:390px;
    height:690px;
    background:#111827;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    border:2px solid #1e293b;
    box-shadow:0 0 60px rgba(0,0,0,.75);
}

/* TOP */

.top{
    height:60px;
    background:#0f172a;
    border-bottom:1px solid #1e293b;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:700;
    letter-spacing:.4px;
}

/* INTRO */

.intro{
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at top,#2563eb33,transparent 35%),
    linear-gradient(135deg,#020617,#0f172a,#111827);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:100;
    animation:fadeOut 1s ease forwards;
    animation-delay:3s;
}

.intro h1{
    color:white;
    font-size:30px;
    font-weight:800;
    margin-bottom:12px;
}

.intro p{
    color:#94a3b8;
    font-size:14px;
    letter-spacing:.4px;
}

@keyframes fadeOut{
    to{
        opacity:0;
        visibility:hidden;
    }
}

/* EDITOR */

.editor{
    padding:16px;
    height:630px;
    overflow:hidden;
    font-family:'Fira Code', monospace;
    color:white;
    font-size:13px;
    position:relative;
}

/* CODE LINE */

.line{
    display:flex;
}

.num{
    width:30px;
    color:#64748b;
    text-align:right;
    margin-right:12px;
    user-select:none;
}

/* CODE COLORS */

.tag{ color:#ff79c6; }
.attr{ color:#8be9fd; }
.value{ color:#f1fa8c; }
.comment{ color:#6272a4; }
.keyword{ color:#c084fc; }
.func{ color:#50fa7b; }

/* CURSOR */

.cursor{
    width:8px;
    height:15px;
    background:white;
    display:inline-block;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

/* THINKING COMMENT */

.thought{
    position:absolute;
    left:16px;
    bottom:25px;
    width:330px;
    background:#0f172a;
    border:1px solid #334155;
    border-radius:16px;
    padding:14px;
    color:#cbd5e1;
    line-height:1.7;
    font-size:13px;
    opacity:0;
    transform:translateY(20px);
    transition:.5s;
}

.thought.show{
    opacity:1;
    transform:translateY(0);
}

/* RUN SCENE */

.runScene{
    position:absolute;
    inset:0;
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
}

/* RUN BUTTON */

.runBtn{
    background:#22c55e;
    color:white;
    border:none;
    padding:14px 30px;
    border-radius:14px;
    font-size:18px;
    font-weight:700;
    box-shadow:0 0 30px rgba(34,197,94,.35);
    transition:.2s;
}

.runBtn.press{
    transform:scale(.9);
}

/* MOUSE */

.mouse{
    position:absolute;
    width:24px;
    height:24px;
    background:white;
    clip-path:polygon(0 0, 0 100%, 30% 70%, 50% 100%, 60% 90%, 40% 60%, 100% 60%);
    opacity:0;
}

/* CALCULATOR */

.calcWrap{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.calculator{
    width:300px;
    background:#0f172a;
    border-radius:26px;
    padding:18px;
    box-shadow:0 0 50px rgba(0,0,0,.55);
}

/* SCREEN */

.screen{
    height:90px;
    background:#020617;
    border-radius:16px;
    margin-bottom:18px;
    display:flex;
    justify-content:flex-end;
    align-items:flex-end;
    padding:16px;
    color:white;
    font-size:34px;
    font-weight:700;
    overflow:hidden;
}

/* BUTTONS */

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

.btn{
    height:58px;
    border-radius:14px;
    background:#1e293b;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    font-weight:700;
    transition:.15s;
}

.orange{
    background:#f97316;
}

.green{
    background:#22c55e;
}

.btn.press{
    transform:scale(.88);
    filter:brightness(1.15);
}

</style>
</head>

<body>

<div class="frame">

    <div class="top">
        Calculator Project
    </div>

    <!-- INTRO -->

    <div class="intro">
        <h1>Calculator</h1>
        <p>by Dominex Macedon</p>
    </div>

    <!-- EDITOR -->

    <div class="editor" id="editor">

        <div class="thought" id="thought"></div>

    </div>

    <!-- RUN SCENE -->

    <div class="runScene" id="runScene">

        <button class="runBtn" id="runBtn">
            Run Project
        </button>

        <div class="mouse" id="mouse"></div>

    </div>

</div>

<script>

const editor = document.getElementById("editor");
const thought = document.getElementById("thought");

const runScene = document.getElementById("runScene");
const runBtn = document.getElementById("runBtn");
const mouse = document.getElementById("mouse");

/* =========================
   CODE
========================= */

const code = [

`<span class="comment">&lt;!-- HTML --&gt;</span>`,
`<span class="tag">&lt;div</span> <span class="attr">class</span>=<span class="value">"calculator"</span><span class="tag">&gt;</span>`,
`   <span class="tag">&lt;input</span> <span class="attr">id</span>=<span class="value">"screen"</span><span class="tag">&gt;</span>`,
`<span class="tag">&lt;/div&gt;</span>`,
``,
`<span class="comment">/* CSS */</span>`,
`.calculator {`,
`   background: #111827;`,
`   border-radius: 20px;`,
`}`,
``,
`<span class="comment">// JavaScript</span>`,
`<span class="keyword">function</span> <span class="func">press</span>(value){`,
`   screen.value += value`,
`}`

];

let i = 0;

const thoughts = [

"First, let's create the calculator structure using HTML.",
"Now styling the calculator to make it modern and clean.",
"Finally, JavaScript will control the button interactions."

];

let thoughtIndex = 0;

setTimeout(typeCode,3500);

/* =========================
   TYPE CODE
========================= */

function typeCode(){

    if(i >= code.length){

        setTimeout(showRunScene,1800);
        return;
    }

    if(i === 0){
        showThought(thoughts[0]);
    }

    if(i === 5){
        showThought(thoughts[1]);
    }

    if(i === 11){
        showThought(thoughts[2]);
    }

    const row = document.createElement("div");

    row.className = "line";

    const num = document.createElement("div");

    num.className = "num";

    num.innerText = i + 1;

    const text = document.createElement("div");

    let html = code[i];

    let j = 0;

    function type(){

        if(j <= html.length){

            text.innerHTML =
            html.substring(0,j) +
            '<span class="cursor"></span>';

            j++;

            setTimeout(type,6);

        }else{

            text.innerHTML = html;

            i++;

            setTimeout(typeCode,45);
        }
    }

    row.appendChild(num);

    row.appendChild(text);

    editor.insertBefore(row,thought);

    type();
}

/* =========================
   THOUGHT BOX
========================= */

function showThought(text){

    thought.innerHTML = text;

    thought.classList.add("show");

    setTimeout(() => {
        thought.classList.remove("show");
    },2200);
}

/* =========================
   RUN SCENE
========================= */

function showRunScene(){

    editor.style.display = "none";

    runScene.style.opacity = 1;

    runScene.style.pointerEvents = "auto";

    mouse.style.opacity = 1;

    mouse.style.left = "120px";

    mouse.style.top = "420px";

    setTimeout(() => {

        mouse.style.transition = "1s ease";

        mouse.style.left = "195px";

        mouse.style.top = "315px";

        setTimeout(() => {

            runBtn.classList.add("press");

            setTimeout(showCalculator,500);

        },1000);

    },500);
}

/* =========================
   CALCULATOR
========================= */

function showCalculator(){

    runScene.innerHTML = `

    <div class="calcWrap">

        <div class="calculator">

            <div class="screen" id="screen"></div>

            <div class="buttons">

                <div class="btn">7</div>
                <div class="btn">8</div>
                <div class="btn">9</div>
                <div class="btn orange">+</div>

                <div class="btn">4</div>
                <div class="btn">5</div>
                <div class="btn">6</div>
                <div class="btn orange">-</div>

                <div class="btn">1</div>
                <div class="btn">2</div>
                <div class="btn">3</div>
                <div class="btn orange">×</div>

                <div class="btn">0</div>
                <div class="btn">.</div>
                <div class="btn green">=</div>
                <div class="btn orange">÷</div>

            </div>

        </div>

    </div>

    `;

    autoTest();
}

/* =========================
   AUTO TEST
========================= */

function autoTest(){

    const screen = document.getElementById("screen");

    const buttons = document.querySelectorAll(".btn");

    const sequence = [

        ["7","7"],
        ["+","7+"],
        ["3","7+3"],
        ["=","10"]

    ];

    let i = 0;

    function clickNext(){

        if(i >= sequence.length) return;

        const [key,result] = sequence[i];

        buttons.forEach(btn => {

            if(btn.innerText === key){

                btn.classList.add("press");

                setTimeout(() => {

                    btn.classList.remove("press");

                },180);
            }
        });

        screen.innerText = result;

        i++;

        setTimeout(clickNext,700);
    }

    clickNext();
}

</script>

</body>
</html>
