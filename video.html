<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Python Coding Animation</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050b16;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

/* FRAME */

.frame{
    width:390px;
    height:690px;
    background:#0f172a;
    border-radius:30px;
    overflow:hidden;
    position:relative;
    border:1px solid #1e293b;

    box-shadow:
    0 0 50px rgba(0,0,0,.7);
}

/* LIGHT */

.light{
    position:absolute;
    width:240px;
    height:240px;
    background:#2563eb;
    border-radius:50%;
    filter:blur(100px);
    opacity:.12;
    top:-80px;
    left:-80px;
}

/* FILES */

.files{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    gap:18px;
}

.file{
    width:270px;
    height:72px;

    background:#111827;

    border:1px solid #1e293b;
    border-radius:20px;

    display:flex;
    align-items:center;

    padding:0 22px;

    color:white;
    font-size:15px;
    font-weight:600;

    opacity:0;
    transform:translateY(20px);

    transition:.5s;
}

.file.show{
    opacity:1;
    transform:translateY(0);
}

.file.active{
    border-color:#2563eb;
    background:#172554;
}

/* ICONS */

.icon{
    width:16px;
    height:16px;
    border-radius:4px;
    margin-right:16px;
}

.py{
    background:linear-gradient(135deg,#38bdf8,#facc15);
}

.txt{
    background:#64748b;
}

.json{
    background:#22c55e;
}

/* MOUSE */

.mouse{
    position:absolute;

    width:24px;
    height:24px;

    background:white;

    clip-path:polygon(
        0 0,
        0 100%,
        30% 72%,
        48% 100%,
        58% 92%,
        40% 60%,
        100% 60%
    );

    opacity:0;

    z-index:100;

    transition:
    left .8s ease,
    top .8s ease,
    transform .15s ease;

    filter:drop-shadow(0 0 6px rgba(255,255,255,.5));
}

.mouse.click{
    transform:scale(.82);
}

/* EDITOR */

.editor{
    position:absolute;
    inset:0;

    background:#0b1220;

    display:none;
    flex-direction:column;
}

.editor.show{
    display:flex;
}

/* TOPBAR */

.topbar{
    height:56px;

    background:#111827;

    border-bottom:1px solid #1e293b;

    display:flex;
    align-items:center;

    padding:0 18px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    margin-right:6px;
}

.red{
    background:#ef4444;
}

.yellow{
    background:#facc15;
}

.green{
    background:#22c55e;
}

.filename{
    color:#e2e8f0;
    font-size:14px;
    font-weight:600;
    margin-left:12px;
}

/* CODE */

.code{
    flex:1;

    padding:18px;

    overflow:hidden;

    font-family:'Fira Code', monospace;
    font-size:11.8px;
    line-height:1.8;

    color:white;
}

.line{
    display:flex;
}

.num{
    width:34px;
    color:#475569;
    text-align:right;
    margin-right:14px;
    user-select:none;
}

/* COLORS */

.keyword{
    color:#c084fc;
}

.func{
    color:#4ade80;
}

.string{
    color:#facc15;
}

.comment{
    color:#64748b;
}

.variable{
    color:#38bdf8;
}

.number{
    color:#fb7185;
}

/* CURSOR */

.cursor{
    width:8px;
    height:14px;

    background:white;

    display:inline-block;

    margin-left:2px;

    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* THOUGHT */

.thought{
    position:absolute;

    left:18px;
    bottom:18px;

    width:352px;

    background:#111827;

    border:1px solid #334155;

    border-radius:18px;

    padding:14px;

    color:#cbd5e1;

    font-size:12px;
    line-height:1.7;

    opacity:0;

    transform:translateY(20px);

    transition:.4s;

    z-index:120;
}

.thought.show{
    opacity:1;
    transform:translateY(0);
}

/* RUN SCREEN */

.runScreen{
    position:absolute;
    inset:0;

    background:#0f172a;

    display:none;

    justify-content:center;
    align-items:center;
    flex-direction:column;

    gap:26px;
}

.runScreen.show{
    display:flex;
}

/* BUTTON */

.runBtn{
    width:180px;
    height:68px;

    border:none;
    border-radius:20px;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    color:white;

    font-size:20px;
    font-weight:700;

    transition:.15s;
}

.runBtn.press{
    transform:scale(.92);
}

/* TERMINAL */

.terminal{
    width:320px;
    height:200px;

    background:#020617;

    border:1px solid #1e293b;

    border-radius:20px;

    overflow:hidden;

    display:none;
    flex-direction:column;
}

.terminal.show{
    display:flex;
}

.terminalTop{
    height:42px;

    background:#111827;

    border-bottom:1px solid #1e293b;

    display:flex;
    align-items:center;

    padding:0 14px;
}

.termBody{
    flex:1;

    padding:16px;

    font-family:'Fira Code', monospace;

    color:#4ade80;

    font-size:13px;

    line-height:1.9;

    white-space:pre-line;
}

/* OUTPUT */

.output{
    opacity:0;
    animation:fade .4s ease forwards;
}

@keyframes fade{
    to{
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="light"></div>

<div class="frame">

    <!-- FILES -->

    <div class="files" id="files">

        <div class="file" id="txtFile">
            <div class="icon txt"></div>
            readme.txt
        </div>

        <div class="file" id="jsonFile">
            <div class="icon json"></div>
            config.json
        </div>

        <div class="file" id="pyFile">
            <div class="icon py"></div>
            calculator.py
        </div>

    </div>

    <!-- MOUSE -->

    <div class="mouse" id="mouse"></div>

    <!-- EDITOR -->

    <div class="editor" id="editor">

        <div class="topbar">

            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>

            <div class="filename">
                calculator.py
            </div>

        </div>

        <div class="code" id="code"></div>

    </div>

    <!-- RUN -->

    <div class="runScreen" id="runScreen">

        <button class="runBtn" id="runBtn">
            Run Python
        </button>

        <div class="terminal" id="terminal">

            <div class="terminalTop">

                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>

            </div>

            <div class="termBody" id="termBody"></div>

        </div>

    </div>

    <!-- THOUGHT -->

    <div class="thought" id="thought"></div>

</div>

<script>

/* ELEMENTS */

const txtFile = document.getElementById("txtFile");
const jsonFile = document.getElementById("jsonFile");
const pyFile = document.getElementById("pyFile");

const files = document.getElementById("files");

const mouse = document.getElementById("mouse");

const editor = document.getElementById("editor");

const codeBox = document.getElementById("code");

const thought = document.getElementById("thought");

const runScreen = document.getElementById("runScreen");

const runBtn = document.getElementById("runBtn");

const terminal = document.getElementById("terminal");

const termBody = document.getElementById("termBody");

/* FILE SHOW */

setTimeout(()=>{
    txtFile.classList.add("show");
},300);

setTimeout(()=>{
    jsonFile.classList.add("show");
},700);

setTimeout(()=>{
    pyFile.classList.add("show");
},1100);

/* CLICK PY FILE */

setTimeout(()=>{

    mouse.style.opacity = "1";

    mouse.style.left = "95px";
    mouse.style.top = "300px";

    setTimeout(()=>{

        mouse.style.left = "165px";
        mouse.style.top = "408px";

        setTimeout(()=>{

            mouse.classList.add("click");

            pyFile.classList.add("active");

            setTimeout(()=>{

                mouse.classList.remove("click");

                openEditor();

            },180);

        },900);

    },400);

},2400);

/* OPEN EDITOR */

function openEditor(){

    showThought(
        "Writing Python calculator logic..."
    );

    setTimeout(()=>{

        files.style.display = "none";

        mouse.style.opacity = "0";

        editor.classList.add("show");

        startTyping();

    },700);
}

/* PYTHON CODE */

const code = [

`<span class="comment"># Python Calculator</span>`,

`<span class="keyword">def</span> <span class="func">add</span>(a, b):`,
`    <span class="keyword">return</span> a + b`,
``,

`<span class="keyword">def</span> <span class="func">multiply</span>(a, b):`,
`    <span class="keyword">return</span> a * b`,
``,

`<span class="variable">result</span> = multiply(<span class="number">7</span>, <span class="number">8</span>)`,
`print(<span class="string">"Result:"</span>, result)`

];

let lineIndex = 0;

/* TYPE */

function startTyping(){

    typeLine();
}

function typeLine(){

    if(lineIndex >= code.length){

        showThought(
            "Python script completed successfully."
        );

        setTimeout(showRunScreen,1800);

        return;
    }

    const row = document.createElement("div");

    row.className = "line";

    const num = document.createElement("div");

    num.className = "num";

    num.innerText = lineIndex + 1;

    const text = document.createElement("div");

    let html = code[lineIndex];

    let i = 0;

    function typeChar(){

        if(i <= html.length){

            text.innerHTML =
            html.substring(0,i) +
            '<span class="cursor"></span>';

            i++;

            setTimeout(typeChar,2);

        }else{

            text.innerHTML = html;

            lineIndex++;

            codeBox.scrollTop =
            codeBox.scrollHeight;

            setTimeout(typeLine,30);
        }
    }

    row.appendChild(num);

    row.appendChild(text);

    codeBox.appendChild(row);

    typeChar();
}

/* RUN SCREEN */

function showRunScreen(){

    editor.style.display = "none";

    runScreen.classList.add("show");

    mouse.style.opacity = "1";

    mouse.style.left = "110px";
    mouse.style.top = "520px";

    setTimeout(()=>{

        mouse.style.left = "185px";
        mouse.style.top = "290px";

        setTimeout(()=>{

            mouse.classList.add("click");

            runBtn.classList.add("press");

            setTimeout(()=>{

                mouse.classList.remove("click");

                showOutput();

            },180);

        },800);

    },400);
}

/* OUTPUT */

function showOutput(){

    terminal.classList.add("show");

    setTimeout(()=>{

        typeOutput();

    },500);
}

const outputs = [

"> python calculator.py",
"",
"Running calculator...",
"",
"7 × 8 = 56",
"",
"Program executed successfully"

];

let outputIndex = 0;

function typeOutput(){

    if(outputIndex >= outputs.length){
        return;
    }

    const line = document.createElement("div");

    line.className = "output";

    line.innerText = outputs[outputIndex];

    termBody.appendChild(line);

    outputIndex++;

    setTimeout(typeOutput,450);
}

/* THOUGHT */

function showThought(text){

    thought.innerHTML = text;

    thought.classList.add("show");

    setTimeout(()=>{

        thought.classList.remove("show");

    },2500);
}

</script>

</body>
</html>
