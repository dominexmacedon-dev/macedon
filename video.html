<!-- Save as video.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Video Animation</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1020;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* VIDEO FRAME */

.video-frame{
    width:390px;
    height:690px;
    background:#111827;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    box-shadow:0 0 40px rgba(0,0,0,.7);
    border:2px solid #1e293b;
}

/* TOP */

.top{
    height:58px;
    background:#0f172a;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 20px;
    color:white;
    font-family:Arial;
    font-size:18px;
    font-weight:bold;
}

/* EDITOR */

.editor{
    position:relative;
    height:560px;
    padding:24px;
    overflow:hidden;
    font-family:'Fira Code', monospace;
    font-size:15px;
    line-height:1.8;
    color:white;
}

/* PYTHON COLORS */

.keyword{ color:#ff79c6; }
.function{ color:#50fa7b; }
.string{ color:#f1fa8c; }
.number{ color:#bd93f9; }
.comment{ color:#6272a4; }
.import{ color:#8be9fd; }
.operator{ color:#ffb86c; }

/* CODE LINES */

.line{
    white-space:pre;
}

/* CURSOR */

.cursor{
    display:inline-block;
    width:10px;
    height:18px;
    background:white;
    margin-left:2px;
    animation:blink .8s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* RUN BUTTON */

.run-btn{
    position:absolute;
    right:20px;
    bottom:95px;
    background:#22c55e;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 0 20px rgba(34,197,94,.4);
}

/* CLICK EFFECT */

.run-btn.clicked{
    transform:scale(.9);
    background:#16a34a;
}

/* FOOTER */

.footer{
    position:absolute;
    bottom:0;
    width:100%;
    height:70px;
    background:#0f172a;
    border-top:1px solid #1e293b;
    display:flex;
    justify-content:center;
    align-items:center;
}

.export{
    background:#ef4444;
    color:white;
    border:none;
    padding:14px 28px;
    border-radius:12px;
    font-size:15px;
    font-weight:bold;
    opacity:0;
    transition:1s;
}

.export.show{
    opacity:1;
}

/* OUTPUT */

.output{
    margin-top:12px;
}

.output-line{
    animation:fadeIn .3s forwards;
    opacity:0;
}

@keyframes fadeIn{
    to{
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="video-frame">

    <div class="top">
        Python Program
    </div>

    <div class="editor" id="editor"></div>

    <button class="run-btn" id="runBtn">
        Run
    </button>

    <div class="footer">
        <button class="export" id="exportBtn">
            Export to MP4
        </button>
    </div>

</div>

<script>

/* -----------------------------
   SCENE 1 : WRITING CODE
------------------------------*/

const editor = document.getElementById("editor");

const codeLines = [

`<span class="import">import</span> <span class="function">time</span>`,
`<span class="import">import</span> <span class="function">random</span>`,
``,
`<span class="keyword">def</span> <span class="function">duplicate_text</span>():`,
`    <span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">50</span>):`,
`        color <span class="operator">=</span> random.choice([`,
`            <span class="string">"red"</span>,`,
`            <span class="string">"blue"</span>,`,
`            <span class="string">"green"</span>,`,
`            <span class="string">"yellow"</span>`,
`        ])`,
``,
`        <span class="function">print</span>(`,
`            <span class="string">"I love programming"</span>,`,
`            color`,
`        )`,
``,
`<span class="function">duplicate_text</span>()`,
``,
`<span class="comment"># program ready</span>`

];

let lineIndex = 0;

function typeLines(){

    if(lineIndex >= codeLines.length){

        setTimeout(scene2, 800);
        return;
    }

    const line = document.createElement("div");
    line.className = "line";
    editor.appendChild(line);

    let html = codeLines[lineIndex];
    let charIndex = 0;

    function typeChar(){

        if(charIndex <= html.length){

            line.innerHTML = html.substring(0, charIndex) +
            '<span class="cursor"></span>';

            charIndex++;

            setTimeout(typeChar, 12);

        }else{

            line.innerHTML = html;

            lineIndex++;

            setTimeout(typeLines, 120);
        }
    }

    typeChar();

    editor.scrollTop = editor.scrollHeight;
}

typeLines();

/* -----------------------------
   SCENE 2 : CLICK RUN BUTTON
------------------------------*/

function scene2(){

    const runBtn = document.getElementById("runBtn");

    runBtn.classList.add("clicked");

    setTimeout(() => {

        runBtn.classList.remove("clicked");

        scene3();

    }, 500);
}

/* -----------------------------
   SCENE 3 : EXECUTION OUTPUT
------------------------------*/

function scene3(){

    const output = document.createElement("div");
    output.className = "output";

    editor.appendChild(output);

    const colors = [
        "red",
        "blue",
        "green",
        "yellow",
        "purple"
    ];

    let count = 0;

    function printOutput(){

        if(count >= 18){

            showExport();
            return;
        }

        const line = document.createElement("div");
        line.className = "output-line";

        const color = colors[count % colors.length];

        line.innerHTML =
        `<span class="string">I love programming</span> <span style="color:${color}">${color}</span>`;

        output.appendChild(line);

        editor.scrollTop = editor.scrollHeight;

        count++;

        setTimeout(printOutput, 180);
    }

    printOutput();
}

/* -----------------------------
   EXPORT BUTTON
------------------------------*/

function showExport(){

    document
    .getElementById("exportBtn")
    .classList.add("show");
}

</script>

</body>
</html>
