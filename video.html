<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Python Countdown Timer Video</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1020;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter;
}

/* FRAME */
.frame{
    width:390px;
    height:690px;
    background:#111827;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    border:2px solid #1e293b;
    box-shadow:0 0 45px rgba(0,0,0,.7);
}

/* TOP */
.top{
    height:60px;
    background:#0f172a;
    border-bottom:1px solid #1e293b;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:700;
}

/* EDITOR (FIXED HEIGHT — NO EXPAND) */
.editor{
    height:560px;   /* FIXED */
    padding:16px;
    font-family:'Fira Code', monospace;
    font-size:14px;
    color:white;
    overflow:hidden;
}

/* LINE */
.line{
    display:flex;
}

.num{
    width:28px;
    color:#64748b;
    margin-right:10px;
    text-align:right;
}

/* COLORS */
.kw{ color:#ff79c6; }
.fn{ color:#50fa7b; }
.str{ color:#f1fa8c; }
.cm{ color:#6272a4; }

/* CURSOR */
.cursor{
    width:8px;
    height:15px;
    background:white;
    display:inline-block;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

/* RUN BUTTON */
.run{
    position:absolute;
    right:16px;
    bottom:16px;
    background:#22c55e;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:12px;
    font-weight:700;
}

.run.clicked{
    transform:scale(.9);
    background:#16a34a;
}

/* TERMINAL (FIXED PANEL) */
.terminal{
    background:#020617;
    border:1px solid #1e293b;
    border-radius:10px;
    padding:12px;
    height:420px;          /* FIXED AREA */
    overflow:hidden;      /* NO EXPAND */
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
}

/* LOG */
.log{
    font-size:13px;
    color:#a5f3fc;
    margin-bottom:4px;
    opacity:0;
    animation:show .05s forwards;
}

@keyframes show{
    to{opacity:1;}
}

/* TIMER DISPLAY */
.timer{
    margin-top:10px;
    font-size:22px;
    font-weight:700;
    color:#fbbf24;
    text-align:center;
}

/* CENTER SCREEN */
.center{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100%;
}

/* SMALL LABEL */
.label{
    margin-top:10px;
    color:#94a3b8;
    font-size:13px;
}

</style>
</head>

<body>

<div class="frame">

    <div class="top">Python Countdown Timer</div>

    <div class="editor" id="editor"></div>

    <button class="run" id="runBtn">Run</button>

</div>

<script>

const editor = document.getElementById("editor");
const runBtn = document.getElementById("runBtn");

/* =========================
   SCENE 1 - CODE
========================= */

const code = [
`<span class="kw">import</span> time`,
``,
`<span class="kw">def</span> <span class="fn">countdown</span>(n):`,
`    <span class="kw">while</span> n > 0:`,
`        <span class="fn">print</span>(n)`,
`        time.sleep(1)`,
`        n -= 1`,
``,
`countdown(5)`
];

let i = 0;

setTimeout(typeCode, 1500);

function typeCode(){

    if(i >= code.length){
        setTimeout(scene2, 600);
        return;
    }

    const row = document.createElement("div");
    row.className = "line";

    const num = document.createElement("div");
    num.className = "num";
    num.innerText = i + 1;

    const text = document.createElement("div");

    let html = code[i];
    let j = 0;

    function type(){

        if(j <= html.length){

            text.innerHTML =
            html.substring(0,j) + '<span class="cursor"></span>';

            j++;
            setTimeout(type, 8);

        }else{
            text.innerHTML = html;
            i++;
            setTimeout(typeCode, 70);
        }
    }

    row.appendChild(num);
    row.appendChild(text);
    editor.appendChild(row);

    type();
}

/* =========================
   SCENE 2 - RUN
========================= */

function scene2(){

    runBtn.classList.add("clicked");

    setTimeout(() => {
        runBtn.classList.remove("clicked");
        scene3();
    }, 300);
}

/* =========================
   SCENE 3 - TERMINAL TIMER
========================= */

function scene3(){

    editor.innerHTML = "";

    const terminal = document.createElement("div");
    terminal.className = "terminal";

    const logs = document.createElement("div");

    terminal.appendChild(logs);

    editor.appendChild(terminal);

    const center = document.createElement("div");
    center.className = "center";

    const timer = document.createElement("div");
    timer.className = "timer";

    const label = document.createElement("div");
    label.className = "label";

    label.innerText = "Countdown Running...";

    center.appendChild(timer);
    center.appendChild(label);

    terminal.appendChild(center);

    let n = 5;

    function tick(){

        if(n < 0){
            label.innerText = "Finished";
            timer.innerText = "Done";
            return;
        }

        timer.innerText = n;

        const log = document.createElement("div");
        log.className = "log";
        log.innerText = "T = " + n;

        logs.appendChild(log);

        n--;

        setTimeout(tick, 900);
    }

    tick();
}

</script>

</body>
</html>
