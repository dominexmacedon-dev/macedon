<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#030712;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

/* BG */

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    z-index:0;
}

body::before{
    width:320px;
    height:320px;
    background:#2563eb;
    top:-120px;
    left:-120px;
    opacity:.15;
}

body::after{
    width:280px;
    height:280px;
    background:#7c3aed;
    right:-100px;
    bottom:-100px;
    opacity:.14;
}

/* FRAME */

.frame{
    width:390px;
    height:690px;
    background:#0f172a;
    border-radius:34px;
    overflow:hidden;
    position:relative;
    border:1px solid #1e293b;
    box-shadow:
    0 0 60px rgba(0,0,0,.7),
    inset 0 0 30px rgba(255,255,255,.03);
}

/* MESSAGE */

.message{
    position:absolute;
    top:18px;
    left:18px;
    right:18px;
    text-align:center;
    color:#cbd5e1;
    font-size:12px;
    opacity:0;
    transition:.5s ease;
    z-index:20;
}

.message.show{
    opacity:1;
}

/* FILES */

.files{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:18px;
}

.file{
    width:285px;
    height:72px;
    border-radius:22px;
    background:#111827;
    border:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 22px;
    color:white;
    font-weight:600;
    opacity:0;
    transform:translateY(20px);
    transition:.7s ease;
    position:relative;
    overflow:hidden;
}

.file.show{
    opacity:1;
    transform:translateY(0);
}

.file::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.08),
        transparent
    );
    transform:translateX(-120%);
}

.file.show::before{
    animation:shine 1.8s linear;
}

@keyframes shine{
    to{
        transform:translateX(250%);
    }
}

.file.active{
    border-color:#4f46e5;
    background:#1e1b4b;
    box-shadow:
    0 0 35px rgba(79,70,229,.35);
}

.icon{
    width:18px;
    height:18px;
    border-radius:5px;
    margin-right:16px;
}

.txt{
    background:#64748b;
}

.json{
    background:#22c55e;
}

.py{
    background:linear-gradient(135deg,#38bdf8,#facc15);
}

/* MOUSE */

.mouse{
    position:absolute;
    width:24px;
    height:24px;
    background:white;
    clip-path:polygon(
        0 0,
        0 100%,
        30% 72%,
        48% 100%,
        58% 92%,
        40% 60%,
        100% 60%
    );
    z-index:100;
    opacity:0;
    pointer-events:none;
    transition:
    left 1s cubic-bezier(.2,.9,.2,1),
    top 1s cubic-bezier(.2,.9,.2,1),
    transform .15s ease,
    opacity .3s ease;
    filter:drop-shadow(0 0 10px rgba(255,255,255,.55));
}

/* EDITOR */

.editor{
    position:absolute;
    inset:0;
    background:#0b1220;
    display:none;
    flex-direction:column;
}

.editor.show{
    display:flex;
}

/* TOPBAR */

.topbar{
    height:56px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 18px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    margin-right:6px;
}

.red{background:#ef4444;}
.yellow{background:#facc15;}
.green{background:#22c55e;}

.filename{
    margin-left:12px;
    color:#e2e8f0;
    font-size:14px;
    font-weight:600;
}

/* CODE */

.code{
    flex:1;
    padding:18px;
    overflow:hidden;
    font-family:'Fira Code', monospace;
    font-size:12px;
    line-height:1.9;
    color:white;
}

.line{
    display:flex;
    opacity:0;
    transform:translateY(8px);
    animation:lineIn .25s ease forwards;
}

@keyframes lineIn{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.num{
    width:34px;
    color:#475569;
    text-align:right;
    margin-right:14px;
    user-select:none;
}

.keyword{
    color:#c084fc;
}

.func{
    color:#4ade80;
}

.string{
    color:#facc15;
}

.variable{
    color:#38bdf8;
}

.number{
    color:#fb7185;
}

.comment{
    color:#64748b;
}

/* RUN */

.runScreen{
    position:absolute;
    inset:0;
    background:#0f172a;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:26px;
}

.runScreen.show{
    display:flex;
}

.runBtn{
    width:200px;
    height:70px;
    border:none;
    border-radius:22px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    font-size:21px;
    font-weight:700;
    box-shadow:
    0 0 30px rgba(79,70,229,.35);
    transition:.15s ease;
}

.runBtn.press{
    transform:scale(.92);
}

/* TERMINAL */

.terminal{
    width:325px;
    height:220px;
    background:#020617;
    border:1px solid #1e293b;
    border-radius:22px;
    overflow:hidden;
    display:none;
    flex-direction:column;
}

.terminal.show{
    display:flex;
}

.terminalTop{
    height:40px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 14px;
}

.termBody{
    flex:1;
    padding:16px;
    font-family:'Fira Code', monospace;
    color:#4ade80;
    font-size:13px;
    line-height:1.9;
    white-space:pre-line;
    opacity:0;
    animation:fade .4s ease forwards;
}

@keyframes fade{
    to{
        opacity:1;
    }
}

/* SUBSCRIBE */

.subscribeBox{
    position:absolute;
    left:18px;
    right:18px;
    bottom:22px;
    height:86px;
    background:rgba(17,24,39,.96);
    border:1px solid #334155;
    border-radius:24px;
    display:flex;
    align-items:center;
    padding:0 16px;
    opacity:0;
    transform:translateY(30px);
    transition:.45s ease;
}

.subscribeBox.show{
    opacity:1;
    transform:translateY(0);
}

.profile{
    width:54px;
    height:54px;
    border-radius:50%;
    object-fit:cover;
    margin-right:14px;
    border:2px solid #334155;
}

.channel{
    flex:1;
}

.channelName{
    color:white;
    font-weight:700;
    font-size:15px;
}

.handle{
    color:#94a3b8;
    font-size:12px;
    margin-top:3px;
}

.subscribeBtn{
    width:118px;
    height:44px;
    border:none;
    border-radius:14px;
    background:#ff0000;
    color:white;
    font-weight:700;
    font-size:14px;
    transition:.15s ease;
}

.subscribeBtn.subscribed{
    background:#27272a;
}

</style>
</head>

<body>

<div class="frame">

    <div class="message" id="message">
        Building a Python Shop Program...
    </div>

    <!-- FILES -->

    <div class="files" id="files">

        <div class="file" id="txtFile">
            <div class="icon txt"></div>
            products.txt
        </div>

        <div class="file" id="jsonFile">
            <div class="icon json"></div>
            shop-data.json
        </div>

        <div class="file" id="pyFile">
            <div class="icon py"></div>
            shop.py
        </div>

    </div>

    <!-- MOUSE -->

    <div class="mouse" id="mouse"></div>

    <!-- EDITOR -->

    <div class="editor" id="editor">

        <div class="topbar">

            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>

            <div class="filename">
                shop.py
            </div>

        </div>

        <div class="code" id="code"></div>

    </div>

    <!-- RUN -->

    <div class="runScreen" id="runScreen">

        <button class="runBtn" id="runBtn">
            Run Program
        </button>

        <div class="terminal" id="terminal">

            <div class="terminalTop">

                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>

            </div>

            <div class="termBody" id="termBody"></div>

        </div>

    </div>

    <!-- SUBSCRIBE -->

    <div class="subscribeBox" id="subscribeBox">

        <img
            src="dominex-macedon.png"
            class="profile"
        >

        <div class="channel">

            <div class="channelName">
                Dominex Macedon
            </div>

            <div class="handle">
                @DominexMacedon
            </div>

        </div>

        <button class="subscribeBtn" id="subscribeBtn">
            Subscribe
        </button>

    </div>

</div>

<script>

/* ELEMENTS */

const txtFile = document.getElementById("txtFile");
const jsonFile = document.getElementById("jsonFile");
const pyFile = document.getElementById("pyFile");

const mouse = document.getElementById("mouse");

const files = document.getElementById("files");

const editor = document.getElementById("editor");

const codeBox = document.getElementById("code");

const runScreen = document.getElementById("runScreen");

const runBtn = document.getElementById("runBtn");

const terminal = document.getElementById("terminal");

const termBody = document.getElementById("termBody");

const subscribeBox =
document.getElementById("subscribeBox");

const subscribeBtn =
document.getElementById("subscribeBtn");

const message =
document.getElementById("message");

/* FILES */

setTimeout(()=>{
    txtFile.classList.add("show");
},400);

setTimeout(()=>{
    jsonFile.classList.add("show");
},950);

setTimeout(()=>{
    pyFile.classList.add("show");
},1500);

setTimeout(()=>{
    message.classList.add("show");
},1700);

/* MOUSE */

function moveMouseTo(element,x,y){

    const rect = element.getBoundingClientRect();

    const frameRect =
    document.querySelector(".frame")
    .getBoundingClientRect();

    mouse.style.left =
    (rect.left - frameRect.left + x) + "px";

    mouse.style.top =
    (rect.top - frameRect.top + y) + "px";
}

function clickMouse(callback){

    mouse.style.transform = "scale(.75)";

    setTimeout(()=>{

        mouse.style.transform = "scale(1)";

        if(callback) callback();

    },180);
}

/* OPEN FILE */

setTimeout(()=>{

    mouse.style.opacity = "1";

    moveMouseTo(pyFile,120,36);

    setTimeout(()=>{

        clickMouse(()=>{

            pyFile.classList.add("active");

            setTimeout(openEditor,500);

        });

    },1200);

},2800);

/* EDITOR */

function openEditor(){

    files.style.display = "none";

    editor.classList.add("show");

    mouse.style.opacity = "0";

    typeCode();
}

/* CODE */

const code = [

`<span class="comment"># Python Shop Program</span>`,

`<span class="variable">products</span> = [<span class="string">"Keyboard"</span>, <span class="string">"Mouse"</span>, <span class="string">"Laptop"</span>]`,

`<span class="keyword">for</span> item <span class="keyword">in</span> products:`,

`    print(<span class="string">"Product:"</span>, item)`,

`print(<span class="string">"Shop Loaded Successfully"</span>)`

];

function typeCode(){

    code.forEach((line,index)=>{

        setTimeout(()=>{

            const row =
            document.createElement("div");

            row.className = "line";

            row.innerHTML = `
                <div class="num">${index + 1}</div>
                <div>${line}</div>
            `;

            codeBox.appendChild(row);

        },index * 260);

    });

    setTimeout(showRunScreen,2200);
}

/* RUN */

function showRunScreen(){

    editor.style.display = "none";

    runScreen.classList.add("show");

    mouse.style.opacity = "1";

    setTimeout(()=>{

        moveMouseTo(runBtn,100,35);

        setTimeout(()=>{

            clickMouse(()=>{

                runBtn.classList.add("press");

                setTimeout(showOutput,450);

            });

        },1200);

    },500);
}

/* OUTPUT */

function showOutput(){

    terminal.classList.add("show");

    setTimeout(()=>{

        termBody.innerHTML = `

> python shop.py

Loading products...

Product: Keyboard
Product: Mouse
Product: Laptop

Shop Loaded Successfully

`;

    },500);

    setTimeout(showSubscribe,2600);
}

/* SUBSCRIBE */

function showSubscribe(){

    subscribeBox.classList.add("show");

    setTimeout(()=>{

        moveMouseTo(subscribeBtn,62,22);

        setTimeout(()=>{

            clickMouse(()=>{

                subscribeBtn.innerText =
                "Subscribed";

                subscribeBtn.classList
                .add("subscribed");

            });

        },1200);

    },700);
}

</script>

</body>
</html>
