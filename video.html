<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Coding Animation</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    radial-gradient(circle at top left,#1e3a8a22,transparent 30%),
    radial-gradient(circle at bottom right,#7c3aed22,transparent 30%),
    #030712;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

/* BACKGROUND GLOW */

.bgGlow1,
.bgGlow2,
.bgGlow3{
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    animation:floatGlow 8s ease-in-out infinite;
}

.bgGlow1{
    width:320px;
    height:320px;
    background:#2563eb;
    top:-120px;
    left:-100px;
    opacity:.18;
}

.bgGlow2{
    width:300px;
    height:300px;
    background:#7c3aed;
    right:-100px;
    bottom:-120px;
    opacity:.16;
    animation-delay:2s;
}

.bgGlow3{
    width:240px;
    height:240px;
    background:#06b6d4;
    top:40%;
    left:40%;
    opacity:.08;
    animation-delay:4s;
}

@keyframes floatGlow{
    50%{
        transform:translateY(-20px) scale(1.08);
    }
}

/* FRAME */

.frame{
    width:390px;
    height:690px;
    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,.02),
        rgba(255,255,255,.01)
    ),
    #0f172a;
    border-radius:36px;
    overflow:hidden;
    position:relative;
    border:1px solid rgba(255,255,255,.06);
    box-shadow:
    0 0 100px rgba(0,0,0,.85),
    inset 0 0 40px rgba(255,255,255,.03),
    0 0 0 1px rgba(255,255,255,.03);
}

/* FILES */

.files{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:22px;
    z-index:10;
}

.file{
    width:285px;
    height:76px;
    border-radius:24px;
    background:rgba(17,24,39,.92);
    border:1px solid rgba(255,255,255,.06);
    display:flex;
    align-items:center;
    padding:0 24px;
    color:white;
    font-weight:600;
    font-size:15px;
    position:relative;
    overflow:hidden;
    opacity:0;
    transform:
    translateY(35px)
    scale(.82)
    rotateX(15deg);

    backdrop-filter:blur(18px);

    box-shadow:
    0 12px 35px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,255,255,.04);
}

.file.show{
    animation:fileShow .85s cubic-bezier(.18,.89,.32,1.28) forwards;
}

@keyframes fileShow{
    0%{
        opacity:0;
        transform:
        translateY(35px)
        scale(.82)
        rotateX(15deg);
    }

    60%{
        opacity:1;
        transform:
        translateY(-6px)
        scale(1.03);
    }

    100%{
        opacity:1;
        transform:
        translateY(0)
        scale(1);
    }
}

/* SHINE */

.file::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    linear-gradient(
        115deg,
        transparent 20%,
        rgba(255,255,255,.12) 50%,
        transparent 80%
    );

    transform:translateX(-140%);
}

.file.show::before{
    animation:shine 1.5s linear;
}

@keyframes shine{
    to{
        transform:translateX(250%);
    }
}

/* ACTIVE FILE */

.file.active{
    border-color:#6366f1;
    background:
    linear-gradient(
        135deg,
        rgba(99,102,241,.22),
        rgba(124,58,237,.18)
    ),
    rgba(30,27,75,.95);

    box-shadow:
    0 0 50px rgba(99,102,241,.45),
    0 20px 45px rgba(79,70,229,.25),
    inset 0 0 25px rgba(255,255,255,.04);

    transform:scale(1.04);
}

/* ICONS */

.icon{
    width:18px;
    height:18px;
    border-radius:5px;
    margin-right:16px;
    box-shadow:0 0 14px rgba(255,255,255,.15);
}

.py{
    background:linear-gradient(
        135deg,
        #38bdf8,
        #facc15
    );
}

.txt{
    background:#64748b;
}

.json{
    background:#22c55e;
}

/* MOUSE */

.mouse{
    position:absolute;
    width:26px;
    height:26px;
    background:white;

    clip-path:polygon(
        0 0,
        0 100%,
        30% 72%,
        48% 100%,
        58% 92%,
        40% 60%,
        100% 60%
    );

    z-index:200;

    opacity:0;

    transition:
    left .9s cubic-bezier(.22,1,.36,1),
    top .9s cubic-bezier(.22,1,.36,1),
    transform .18s ease,
    opacity .4s ease;

    filter:
    drop-shadow(0 0 8px rgba(255,255,255,.6))
    drop-shadow(0 0 20px rgba(255,255,255,.35));
}

/* CLICK EFFECT */

.mouse.click{
    transform:scale(.78);
}

.mousePulse{
    position:absolute;
    width:20px;
    height:20px;
    border:2px solid rgba(255,255,255,.75);
    border-radius:50%;
    pointer-events:none;
    z-index:190;
    opacity:0;
}

.mousePulse.show{
    animation:pulse .55s ease;
}

@keyframes pulse{
    0%{
        opacity:1;
        transform:scale(.3);
    }

    100%{
        opacity:0;
        transform:scale(2.6);
    }
}

/* EDITOR */

.editor{
    position:absolute;
    inset:0;
    background:#0b1220;
    display:none;
    flex-direction:column;
    animation:editorOpen .6s ease;
}

.editor.show{
    display:flex;
}

@keyframes editorOpen{
    from{
        opacity:0;
        transform:scale(1.04);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

/* TOPBAR */

.topbar{
    height:60px;
    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,.03),
        rgba(255,255,255,.01)
    ),
    #111827;

    border-bottom:1px solid rgba(255,255,255,.06);

    display:flex;
    align-items:center;
    padding:0 18px;

    box-shadow:
    inset 0 -1px 0 rgba(255,255,255,.03);
}

.dot{
    width:11px;
    height:11px;
    border-radius:50%;
    margin-right:7px;
    box-shadow:0 0 12px rgba(255,255,255,.15);
}

.red{
    background:#ef4444;
}

.yellow{
    background:#facc15;
}

.green{
    background:#22c55e;
}

.filename{
    color:#f1f5f9;
    font-size:14px;
    font-weight:600;
    margin-left:14px;
    letter-spacing:.3px;
}

/* CODE */

.code{
    flex:1;
    padding:20px;
    overflow:hidden;
    font-family:'Fira Code', monospace;
    font-size:11.8px;
    line-height:1.85;
    color:white;
    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,.015),
        transparent
    );
}

.line{
    display:flex;
    animation:lineFade .25s ease;
}

@keyframes lineFade{
    from{
        opacity:0;
        transform:translateY(6px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.num{
    width:36px;
    color:#475569;
    text-align:right;
    margin-right:14px;
    user-select:none;
}

/* COLORS */

.keyword{
    color:#c084fc;
}

.func{
    color:#4ade80;
}

.string{
    color:#facc15;
}

.comment{
    color:#64748b;
}

.variable{
    color:#38bdf8;
}

.number{
    color:#fb7185;
}

/* CURSOR */

.cursor{
    width:8px;
    height:15px;
    background:white;
    display:inline-block;
    margin-left:2px;
    border-radius:2px;
    animation:blink .7s infinite;
    box-shadow:0 0 8px rgba(255,255,255,.6);
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* THOUGHT */

.thought{
    position:absolute;
    left:18px;
    bottom:18px;
    width:352px;

    background:
    linear-gradient(
        135deg,
        rgba(30,41,59,.92),
        rgba(17,24,39,.94)
    );

    border:1px solid rgba(255,255,255,.08);

    border-radius:20px;

    padding:15px;

    color:#dbeafe;

    font-size:12px;
    line-height:1.8;

    opacity:0;

    transform:
    translateY(30px)
    scale(.96);

    transition:.45s;

    z-index:250;

    backdrop-filter:blur(18px);

    box-shadow:
    0 10px 35px rgba(0,0,0,.35);
}

.thought.show{
    opacity:1;
    transform:
    translateY(0)
    scale(1);
}

/* RUN SCREEN */

.runScreen{
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at top,#1e3a8a22,transparent 35%),
    #0f172a;

    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:34px;
}

.runScreen.show{
    display:flex;
    animation:fadeIn .5s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
    }

    to{
        opacity:1;
    }
}

/* RUN BUTTON */

.runBtn{
    width:210px;
    height:78px;
    border:none;
    border-radius:26px;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    color:white;

    font-size:22px;
    font-weight:800;
    letter-spacing:.5px;

    cursor:pointer;

    box-shadow:
    0 0 45px rgba(99,102,241,.5),
    0 20px 40px rgba(79,70,229,.28);

    transition:
    transform .18s ease,
    box-shadow .25s ease;
}

.runBtn:hover{
    transform:translateY(-3px);
}

.runBtn.press{
    transform:scale(.9);

    box-shadow:
    0 0 25px rgba(99,102,241,.35);
}

/* TERMINAL */

.terminal{
    width:325px;
    height:215px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,.015),
        transparent
    ),
    #020617;

    border:1px solid rgba(255,255,255,.06);

    border-radius:24px;

    overflow:hidden;

    display:none;
    flex-direction:column;

    box-shadow:
    0 20px 45px rgba(0,0,0,.45),
    inset 0 0 25px rgba(255,255,255,.02);

    transform:translateY(20px);
    opacity:0;
}

.terminal.show{
    display:flex;
    animation:terminalShow .6s ease forwards;
}

@keyframes terminalShow{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.terminalTop{
    height:44px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,.03),
        rgba(255,255,255,.01)
    ),
    #111827;

    border-bottom:1px solid rgba(255,255,255,.05);

    display:flex;
    align-items:center;

    padding:0 14px;
}

.termBody{
    flex:1;

    padding:18px;

    font-family:'Fira Code', monospace;

    color:#4ade80;

    font-size:13px;

    line-height:1.9;

    white-space:pre-line;
}

/* OUTPUT */

.output{
    opacity:0;
    animation:fadeUp .45s ease forwards;
    text-shadow:0 0 10px rgba(74,222,128,.18);
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(12px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* SCAN EFFECT */

.terminal::after{
    content:"";
    position:absolute;
    inset:0;

    background:
    linear-gradient(
        rgba(255,255,255,.015) 50%,
        transparent 50%
    );

    background-size:100% 4px;

    pointer-events:none;

    opacity:.2;
}

</style>
</head>

<body>

<div class="bgGlow1"></div>
<div class="bgGlow2"></div>

<div class="frame">

    <!-- FILES -->

    <div class="files" id="files">

        <div class="file" id="txtFile">
            <div class="icon txt"></div>
            readme.txt
        </div>

        <div class="file" id="jsonFile">
            <div class="icon json"></div>
            config.json
        </div>

        <div class="file" id="pyFile">
            <div class="icon py"></div>
            calculator.py
        </div>

    </div>

    <!-- MOUSE -->

    <div class="mouse" id="mouse"></div>

    <!-- EDITOR -->

    <div class="editor" id="editor">

        <div class="topbar">

            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>

            <div class="filename">
                calculator.py
            </div>

        </div>

        <div class="code" id="code"></div>

    </div>

    <!-- RUN -->

    <div class="runScreen" id="runScreen">

        <button class="runBtn" id="runBtn">
            Run Python
        </button>

        <div class="terminal" id="terminal">

            <div class="terminalTop">

                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>

            </div>

            <div class="termBody" id="termBody"></div>

        </div>

    </div>

    <!-- THOUGHT -->

    <div class="thought" id="thought"></div>

</div>

<script>

const txtFile = document.getElementById("txtFile");
const jsonFile = document.getElementById("jsonFile");
const pyFile = document.getElementById("pyFile");

const files = document.getElementById("files");

const mouse = document.getElementById("mouse");

const editor = document.getElementById("editor");

const codeBox = document.getElementById("code");

const thought = document.getElementById("thought");

const runScreen = document.getElementById("runScreen");

const runBtn = document.getElementById("runBtn");

const terminal = document.getElementById("terminal");

const termBody = document.getElementById("termBody");

/* =========================
   PREMIUM MOUSE SYSTEM
========================= */

function moveMouseTo(element, duration = 1000, callback){

    const rect = element.getBoundingClientRect();

    const frameRect =
    document.querySelector(".frame")
    .getBoundingClientRect();

    const x =
    rect.left - frameRect.left +
    rect.width / 2 - 12;

    const y =
    rect.top - frameRect.top +
    rect.height / 2 - 12;

    mouse.style.transition =
    `${duration}ms cubic-bezier(.22,1,.36,1)`;

    mouse.style.left = `${x}px`;

    mouse.style.top = `${y}px`;

    if(callback){

        setTimeout(callback, duration);
    }
}

/* =========================
   CLICK EFFECT
========================= */

function clickEffect(element){

    mouse.style.transform =
    "scale(.72)";

    element.style.transform =
    "scale(.97)";

    setTimeout(()=>{

        mouse.style.transform =
        "scale(1)";

        element.style.transform = "";

    },180);
}

/* =========================
   FILE APPEAR
========================= */

setTimeout(()=>{

    txtFile.classList.add("show");

},300);

setTimeout(()=>{

    jsonFile.classList.add("show");

},700);

setTimeout(()=>{

    pyFile.classList.add("show");

},1100);

/* =========================
   CLICK PY FILE
========================= */

setTimeout(()=>{

    mouse.style.opacity = "1";

    moveMouseTo(pyFile,1200,()=>{

        clickEffect(pyFile);

        pyFile.classList.add("active");

        setTimeout(()=>{

            openEditor();

        },500);

    });

},2400);

/* =========================
   OPEN EDITOR
========================= */

function openEditor(){

    showThought(
        "Creating Python calculator logic with clean and optimized functions."
    );

    setTimeout(()=>{

        files.style.display = "none";

        mouse.style.opacity = "0";

        editor.classList.add("show");

        startTyping();

    },700);
}

/* =========================
   PYTHON CODE
========================= */

const code = [

`<span class="comment"># Python Calculator</span>`,

`<span class="keyword">def</span> <span class="func">add</span>(a, b):`,
`    <span class="keyword">return</span> a + b`,
``,

`<span class="keyword">def</span> <span class="func">subtract</span>(a, b):`,
`    <span class="keyword">return</span> a - b`,
``,

`<span class="keyword">def</span> <span class="func">multiply</span>(a, b):`,
`    <span class="keyword">return</span> a * b`,
``,

`<span class="keyword">def</span> <span class="func">divide</span>(a, b):`,
`    <span class="keyword">if</span> b == <span class="number">0</span>:`,
`        <span class="keyword">return</span> <span class="string">"Cannot divide by zero"</span>`,
`    <span class="keyword">return</span> a / b`,
``,

`<span class="comment"># Example Calculation</span>`,

`<span class="variable">result</span> = multiply(<span class="number">7</span>, <span class="number">8</span>)`,
`print(<span class="string">"Result:"</span>, result)`

];

let lineIndex = 0;

/* =========================
   START TYPING
========================= */

function startTyping(){

    typeLine();
}

/* =========================
   TYPE LINE
========================= */

function typeLine(){

    if(lineIndex >= code.length){

        showThought(
            "Python script completed successfully. Running program now."
        );

        setTimeout(()=>{

            showRunScreen();

        },2200);

        return;
    }

    const row =
    document.createElement("div");

    row.className = "line";

    const num =
    document.createElement("div");

    num.className = "num";

    num.innerText =
    lineIndex + 1;

    const text =
    document.createElement("div");

    let html =
    code[lineIndex];

    let i = 0;

    function typeChar(){

        if(i <= html.length){

            text.innerHTML =
            html.substring(0,i) +
            '<span class="cursor"></span>';

            i++;

            setTimeout(typeChar,2);

        }else{

            text.innerHTML = html;

            lineIndex++;

            codeBox.scrollTop =
            codeBox.scrollHeight;

            setTimeout(typeLine,18);
        }
    }

    row.appendChild(num);

    row.appendChild(text);

    codeBox.appendChild(row);

    typeChar();
}

/* =========================
   SHOW RUN SCREEN
========================= */

function showRunScreen(){

    editor.style.display = "none";

    runScreen.classList.add("show");

    mouse.style.opacity = "1";

    setTimeout(()=>{

        moveMouseTo(runBtn,1200,()=>{

            clickEffect(runBtn);

            runBtn.classList.add("press");

            setTimeout(()=>{

                showOutput();

            },350);

        });

    },500);
}

/* =========================
   SHOW OUTPUT
========================= */

function showOutput(){

    terminal.classList.add("show");

    setTimeout(()=>{

        typeOutput();

    },500);
}

/* =========================
   TERMINAL OUTPUT
========================= */

const outputs = [

"> python calculator.py",
"",
"Running calculator...",
"",
"7 × 8 = 56",
"",
"Program executed successfully"

];

let outputIndex = 0;

function typeOutput(){

    if(outputIndex >= outputs.length)
    return;

    const line =
    document.createElement("div");

    line.className = "output";

    line.innerText =
    outputs[outputIndex];

    termBody.appendChild(line);

    termBody.scrollTop =
    termBody.scrollHeight;

    outputIndex++;

    setTimeout(typeOutput,500);
}

/* =========================
   THOUGHT BOX
========================= */

function showThought(text){

    thought.innerHTML = text;

    thought.classList.add("show");

    setTimeout(()=>{

        thought.classList.remove("show");

    },3000);
}

</script>

</body>
</html>
