<!-- Save as video.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Video Export</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-capture@2.1.1/dist/canvas-capture.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1020;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial;
}

/* EXPORT BUTTON */

.export-top{
    position:fixed;
    top:20px;
    right:20px;
    z-index:9999;
}

#exportBtn{
    background:#ef4444;
    color:white;
    border:none;
    padding:14px 24px;
    border-radius:14px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    opacity:.4;
    pointer-events:none;
    transition:.4s;
}

#exportBtn.ready{
    opacity:1;
    pointer-events:auto;
}

/* VIDEO FRAME */

.video-frame{
    width:390px;
    height:690px;
    background:#111827;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    border:2px solid #1e293b;
    box-shadow:0 0 40px rgba(0,0,0,.7);
}

/* TOP BAR */

.top{
    height:58px;
    background:#0f172a;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 20px;
    color:white;
    font-size:18px;
    font-weight:bold;
}

/* EDITOR */

.editor{
    height:100%;
    padding:24px;
    overflow:hidden;
    font-family:'Fira Code', monospace;
    font-size:15px;
    line-height:1.8;
    color:white;
}

/* PYTHON COLORS */

.keyword{ color:#ff79c6; }
.function{ color:#50fa7b; }
.string{ color:#f1fa8c; }
.number{ color:#bd93f9; }
.comment{ color:#6272a4; }
.import{ color:#8be9fd; }
.operator{ color:#ffb86c; }

/* LINES */

.line{
    white-space:pre;
}

/* CURSOR */

.cursor{
    display:inline-block;
    width:10px;
    height:18px;
    background:white;
    margin-left:2px;
    animation:blink .8s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* RUN BUTTON */

.run-btn{
    position:absolute;
    right:20px;
    bottom:20px;
    background:#22c55e;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 0 20px rgba(34,197,94,.4);
}

/* AUTO CLICK */

.run-btn.clicked{
    transform:scale(.9);
    background:#16a34a;
}

/* OUTPUT */

.output{
    margin-top:12px;
}

.output-line{
    opacity:0;
    animation:fade .3s forwards;
}

@keyframes fade{
    to{
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="export-top">
    <button id="exportBtn">
        Export MP4
    </button>
</div>

<div class="video-frame" id="videoFrame">

    <div class="top">
        Python Program
    </div>

    <div class="editor" id="editor"></div>

    <button class="run-btn" id="runBtn">
        Run
    </button>

</div>

<script>

const editor = document.getElementById("editor");

const codeLines = [

`<span class="import">import</span> <span class="function">time</span>`,
`<span class="import">import</span> <span class="function">random</span>`,
``,
`<span class="keyword">def</span> <span class="function">duplicate_text</span>():`,
`    <span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">50</span>):`,
`        color <span class="operator">=</span> random.choice([`,
`            <span class="string">"red"</span>,`,
`            <span class="string">"blue"</span>,`,
`            <span class="string">"green"</span>,`,
`            <span class="string">"yellow"</span>`,
`        ])`,
``,
`        <span class="function">print</span>(`,
`            <span class="string">"I love programming"</span>,`,
`            color`,
`        )`,
``,
`<span class="function">duplicate_text</span>()`,
``,
`<span class="comment"># ready to execute</span>`

];

let lineIndex = 0;

/* -------------------------
   SCENE 1
--------------------------*/

function typeLines(){

    if(lineIndex >= codeLines.length){

        setTimeout(scene2, 1000);
        return;
    }

    const line = document.createElement("div");
    line.className = "line";

    editor.appendChild(line);

    let html = codeLines[lineIndex];
    let charIndex = 0;

    function typeChar(){

        if(charIndex <= html.length){

            line.innerHTML =
            html.substring(0, charIndex) +
            '<span class="cursor"></span>';

            charIndex++;

            setTimeout(typeChar, 10);

        }else{

            line.innerHTML = html;

            lineIndex++;

            setTimeout(typeLines, 120);
        }
    }

    typeChar();

    editor.scrollTop = editor.scrollHeight;
}

typeLines();

/* -------------------------
   SCENE 2
--------------------------*/

function scene2(){

    const runBtn = document.getElementById("runBtn");

    runBtn.classList.add("clicked");

    setTimeout(() => {

        runBtn.classList.remove("clicked");

        scene3();

    }, 500);
}

/* -------------------------
   SCENE 3
--------------------------*/

function scene3(){

    const output = document.createElement("div");

    output.className = "output";

    editor.appendChild(output);

    const colors = [
        "red",
        "blue",
        "green",
        "yellow",
        "purple"
    ];

    let count = 0;

    function printOutput(){

        if(count >= 20){

            readyExport();
            return;
        }

        const line = document.createElement("div");

        line.className = "output-line";

        const c = colors[count % colors.length];

        line.innerHTML =
        `<span class="string">I love programming</span> <span style="color:${c}">${c}</span>`;

        output.appendChild(line);

        editor.scrollTop = editor.scrollHeight;

        count++;

        setTimeout(printOutput, 150);
    }

    printOutput();
}

/* -------------------------
   EXPORT READY
--------------------------*/

function readyExport(){

    document
    .getElementById("exportBtn")
    .classList.add("ready");
}

/* -------------------------
   EXPORT VIDEO
--------------------------*/

document
.getElementById("exportBtn")
.addEventListener("click", async () => {

    const btn = document.getElementById("exportBtn");

    btn.innerText = "Recording...";

    const stream = document
    .getElementById("videoFrame")
    .captureStream(30);

    const recorder = new MediaRecorder(stream, {
        mimeType: "video/webm"
    });

    const chunks = [];

    recorder.ondataavailable = e => {
        if(e.data.size > 0){
            chunks.push(e.data);
        }
    };

    recorder.onstop = () => {

        const blob = new Blob(chunks, {
            type: "video/webm"
        });

        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");

        a.href = url;

        a.download = "python-video.webm";

        a.click();

        URL.revokeObjectURL(url);

        btn.innerText = "Export MP4";
    };

    recorder.start();

    setTimeout(() => {

        recorder.stop();

    }, 10000);

});

</script>

</body>
</html>
