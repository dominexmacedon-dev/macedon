<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Python Countdown Timer Video</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1020;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter;
}

/* FRAME */
.frame{
    width:390px;
    height:690px;
    background:#111827;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    border:2px solid #1e293b;
}

/* TOP */
.top{
    height:60px;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:700;
    border-bottom:1px solid #1e293b;
}

/* INTRO */
.intro{
    position:absolute;
    inset:0;
    background:#0b1020;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
    z-index:10;
}

.intro h1{
    font-size:20px;
    margin-bottom:8px;
}

.intro p{
    font-size:13px;
    color:#94a3b8;
}

/* EDITOR */
.editor{
    height:630px;
    padding:16px;
    font-family:'Fira Code', monospace;
    font-size:14px;
    color:white;
    overflow:hidden;
}

/* LINE */
.line{
    display:flex;
}

.num{
    width:28px;
    color:#64748b;
    margin-right:10px;
    text-align:right;
}

/* COLORS */
.kw{ color:#ff79c6; }
.fn{ color:#50fa7b; }
.str{ color:#f1fa8c; }

/* CURSOR */
.cursor{
    width:8px;
    height:15px;
    background:white;
    display:inline-block;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

/* RUN BUTTON (ONLY AFTER CODE) */
.runBtn{
    position:absolute;
    right:16px;
    bottom:16px;
    background:#22c55e;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:12px;
    font-weight:700;
    opacity:0;
    pointer-events:none;
    transition:.3s;
}

.runBtn.show{
    opacity:1;
    pointer-events:auto;
}

/* TERMINAL (FIXED) */
.terminal{
    background:#020617;
    border:1px solid #1e293b;
    border-radius:10px;
    padding:12px;
    height:520px;
    overflow:hidden;
}

/* PROMPT */
.prompt{
    color:#34d399;
    font-size:13px;
    margin-bottom:8px;
}

/* LOG */
.log{
    font-size:13px;
    color:#a5f3fc;
    margin-bottom:3px;
    opacity:0;
    animation:show .05s forwards;
}

@keyframes show{
    to{opacity:1;}
}

/* TIMER */
.timer{
    font-size:48px;
    font-weight:800;
    color:#fbbf24;
    text-align:center;
}

.center{
    display:flex;
    flex-direction:column;
    justify-content:center;
    height:100%;
}

</style>
</head>

<body>

<div class="frame">

    <div class="top">Python Countdown Timer</div>

    <!-- INTRO -->
    <div class="intro" id="intro">
        <h1>Countdown Timer with Python</h1>
        <p>Learn how loops power real-time execution</p>
    </div>

    <div class="editor" id="editor"></div>

    <!-- RUN BUTTON -->
    <button class="runBtn" id="runBtn">Run</button>

</div>

<script>

const editor = document.getElementById("editor");
const intro = document.getElementById("intro");
const runBtn = document.getElementById("runBtn");

/* =========================
   SCENE 1 - CODE WRITING
========================= */

const code = [
`<span class="kw">import</span> time`,
``,
`<span class="kw">def</span> <span class="fn">countdown</span>(n):`,
`    <span class="kw">while</span> n > 0:`,
`        <span class="fn">print</span>(n)`,
`        time.sleep(1)`,
`        n -= 1`,
``,
`countdown(5)`
];

let i = 0;

setTimeout(startCode, 2500);

function startCode(){
    intro.style.display = "none";
    typeCode();
}

function typeCode(){

    if(i >= code.length){
        runBtn.classList.add("show");
        return;
    }

    const row = document.createElement("div");
    row.className = "line";

    const num = document.createElement("div");
    num.className = "num";
    num.innerText = i + 1;

    const text = document.createElement("div");

    let html = code[i];
    let j = 0;

    function type(){

        if(j <= html.length){

            text.innerHTML =
            html.substring(0,j) + '<span class="cursor"></span>';

            j++;
            setTimeout(type, 8);

        }else{
            text.innerHTML = html;
            i++;
            setTimeout(typeCode, 60);
        }
    }

    row.appendChild(num);
    row.appendChild(text);
    editor.appendChild(row);

    type();
}

/* =========================
   RUN CLICK (REAL DEMO)
========================= */

runBtn.addEventListener("click", () => {
    runBtn.classList.remove("show");
    scene3();
});

/* AUTO DEMO CLICK (optional for video timing) */
setTimeout(() => {
    runBtn.click();
}, 9000);

/* =========================
   SCENE 3 - TERMINAL
========================= */

function scene3(){

    editor.innerHTML = "";

    const terminal = document.createElement("div");
    terminal.className = "terminal";

    const prompt = document.createElement("div");
    prompt.className = "prompt";
    prompt.innerText = "$ python timer.py";

    terminal.appendChild(prompt);

    const logs = document.createElement("div");

    const center = document.createElement("div");
    center.className = "center";

    const timer = document.createElement("div");
    timer.className = "timer";

    center.appendChild(timer);

    terminal.appendChild(logs);
    terminal.appendChild(center);

    editor.appendChild(terminal);

    let n = 5;

    function tick(){

        if(n < 0) return;

        timer.innerText = n;

        const log = document.createElement("div");
        log.className = "log";
        log.innerText = "> " + n;

        logs.appendChild(log);

        n--;

        setTimeout(tick, 700);
    }

    tick();
}

</script>

</body>
</html>
