<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Python Coding Video</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/ccapture.js-npmfixed@1.1.0/build/CCapture.all.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1020;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial;
}

/* EXPORT */

.export-box{
    position:fixed;
    top:20px;
    right:20px;
    z-index:9999;
}

#exportBtn{
    background:#ef4444;
    color:white;
    border:none;
    padding:14px 26px;
    border-radius:14px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    opacity:0;
    pointer-events:none;
    transition:.4s;
}

#exportBtn.ready{
    opacity:1;
    pointer-events:auto;
}

/* VIDEO */

.video-frame{
    width:390px;
    height:690px;
    background:#111827;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    border:2px solid #1e293b;
    box-shadow:0 0 40px rgba(0,0,0,.7);
}

/* TOP */

.top{
    height:58px;
    background:#0f172a;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 20px;
    color:white;
    font-size:18px;
    font-weight:bold;
}

/* EDITOR */

.editor{
    padding:24px;
    height:100%;
    overflow:hidden;
    font-family:'Fira Code', monospace;
    font-size:15px;
    line-height:1.7;
    color:white;
}

/* COLORS */

.keyword{ color:#ff79c6; }
.function{ color:#50fa7b; }
.string{ color:#f1fa8c; }
.number{ color:#bd93f9; }
.comment{ color:#6272a4; }
.import{ color:#8be9fd; }
.operator{ color:#ffb86c; }

/* LINES */

.line{
    white-space:pre;
}

/* CURSOR */

.cursor{
    display:inline-block;
    width:10px;
    height:18px;
    background:white;
    margin-left:2px;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* RUN BUTTON */

.run-btn{
    position:absolute;
    right:20px;
    bottom:20px;
    width:62px;
    height:62px;
    border:none;
    border-radius:50%;
    background:#22c55e;
    color:white;
    font-size:24px;
    box-shadow:0 0 25px rgba(34,197,94,.4);
    transition:.2s;
}

.run-btn.clicked{
    transform:scale(.82);
    background:#16a34a;
}

/* TERMINAL */

.terminal{
    margin-top:16px;
    background:#020617;
    border-radius:10px;
    padding:14px;
    border:1px solid #1e293b;
}

.terminal-line{
    font-size:14px;
    margin-bottom:4px;
    opacity:0;
    animation:show .08s forwards;
}

@keyframes show{
    to{
        opacity:1;
    }
}

.red{ color:#ff4d4d; }
.blue{ color:#4da6ff; }
.green{ color:#57ff57; }
.yellow{ color:#ffe14d; }
.purple{ color:#d26bff; }

</style>
</head>

<body>

<div class="export-box">
    <button id="exportBtn">
        Export Video
    </button>
</div>

<div class="video-frame" id="videoFrame">

    <div class="top">
        Python Program
    </div>

    <div class="editor" id="editor"></div>

    <button class="run-btn" id="runBtn">
        <i class="fa-solid fa-play"></i>
    </button>

</div>

<script>

/* =========================
   ELEMENTS
========================= */

const editor = document.getElementById("editor");
const runBtn = document.getElementById("runBtn");
const exportBtn = document.getElementById("exportBtn");

/* =========================
   PYTHON CODE
========================= */

const codeLines = [

`<span class="import">import</span> <span class="function">time</span>`,
`<span class="import">import</span> <span class="function">random</span>`,
``,
`<span class="keyword">def</span> <span class="function">duplicate_text</span>():`,
`    <span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">100</span>):`,
`        color <span class="operator">=</span> random.choice([`,
`            <span class="string">"red"</span>,`,
`            <span class="string">"blue"</span>,`,
`            <span class="string">"green"</span>,`,
`            <span class="string">"yellow"</span>,`,
`            <span class="string">"purple"</span>`,
`        ])`,
``,
`        <span class="function">print</span>(`,
`            <span class="string">"I love programming"</span>`,
`        )`,
``,
`<span class="function">duplicate_text</span>()`,
``,
`<span class="comment"># ready</span>`

];

let lineIndex = 0;

/* =========================
   SCENE 1
   WRITING CODE
========================= */

function typeLines(){

    if(lineIndex >= codeLines.length){

        setTimeout(scene2, 700);
        return;
    }

    const line = document.createElement("div");

    line.className = "line";

    editor.appendChild(line);

    let html = codeLines[lineIndex];
    let charIndex = 0;

    function typeChar(){

        if(charIndex <= html.length){

            line.innerHTML =
            html.substring(0, charIndex) +
            '<span class="cursor"></span>';

            charIndex++;

            setTimeout(typeChar, 8);

        }else{

            line.innerHTML = html;

            lineIndex++;

            setTimeout(typeLines, 70);
        }
    }

    typeChar();

    editor.scrollTop = editor.scrollHeight;
}

typeLines();

/* =========================
   SCENE 2
   BUTTON CLICK
========================= */

function scene2(){

    runBtn.classList.add("clicked");

    setTimeout(() => {

        runBtn.classList.remove("clicked");

        scene3();

    }, 250);
}

/* =========================
   SCENE 3
   OUTPUT TERMINAL
========================= */

function scene3(){

    const terminal = document.createElement("div");

    terminal.className = "terminal";

    editor.appendChild(terminal);

    const colors = [
        "red",
        "blue",
        "green",
        "yellow",
        "purple"
    ];

    let i = 0;

    function printFast(){

        if(i >= 80){

            exportBtn.classList.add("ready");
            return;
        }

        const line = document.createElement("div");

        const c = colors[i % colors.length];

        line.className =
        `terminal-line ${c}`;

        line.innerText =
        "I love programming";

        terminal.appendChild(line);

        editor.scrollTop = editor.scrollHeight;

        i++;

        setTimeout(printFast, 18);
    }

    printFast();
}

/* =========================
   EXPORT VIDEO
========================= */

exportBtn.addEventListener("click", () => {

    exportBtn.innerText = "Recording...";

    const capturer = new CCapture({
        format: "webm",
        framerate: 60,
        verbose: false
    });

    const frame = document.getElementById("videoFrame");

    let recording = true;

    capturer.start();

    function capture(){

        if(!recording) return;

        capturer.capture(frame);

        requestAnimationFrame(capture);
    }

    capture();

    setTimeout(() => {

        recording = false;

        capturer.stop();

        capturer.save();

        exportBtn.innerText = "Export Video";

    }, 10000);

});

</script>

</body>
</html>
