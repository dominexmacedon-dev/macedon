<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QR Python Video</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1020;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter;
}

/* FRAME */
.frame{
    width:390px;
    height:690px;
    background:#111827;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    border:2px solid #1e293b;
}

/* TOP */
.top{
    height:60px;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:700;
    border-bottom:1px solid #1e293b;
}

/* EDITOR */
.editor{
    padding:16px;
    font-family:'Fira Code', monospace;
    font-size:14px;
    color:white;
    line-height:1.7;
    height:100%;
    overflow:hidden;
}

/* LINE */
.line{
    display:flex;
}

.num{
    width:28px;
    color:#64748b;
    margin-right:10px;
    text-align:right;
}

/* COLORS */
.imp{ color:#8be9fd; }
.kw{ color:#ff79c6; }
.str{ color:#f1fa8c; }
.cm{ color:#6272a4; }

/* CURSOR */
.cursor{
    width:8px;
    height:15px;
    background:white;
    display:inline-block;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

/* RUN BUTTON */
.run{
    position:absolute;
    right:16px;
    bottom:16px;
    background:#22c55e;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:12px;
    font-weight:700;
}

.run.clicked{
    transform:scale(.9);
    background:#16a34a;
}

/* TERMINAL */
.term{
    background:#020617;
    border:1px solid #1e293b;
    border-radius:10px;
    padding:12px;
    margin-top:10px;
}

.log{
    font-size:13px;
    color:#a5f3fc;
    opacity:0;
    animation:show .04s forwards;
}

@keyframes show{
    to{opacity:1;}
}

/* QR AREA */
.qrBox{
    margin-top:18px;
    display:flex;
    flex-direction:column;
    align-items:center;
    animation:pop .4s ease;
}

@keyframes pop{
    from{transform:scale(.6);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

#qrcode{
    background:white;
    padding:10px;
    border-radius:12px;
}

.file{
    margin-top:10px;
    color:#94a3b8;
    font-size:13px;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="frame">

    <div class="top">Python QR Code Generator</div>

    <div class="editor" id="editor"></div>

    <button class="run" id="runBtn">Run</button>

</div>

<script>

const editor = document.getElementById("editor");
const runBtn = document.getElementById("runBtn");

/* =========================
   SCENE 1 - CODE WRITING
========================= */

const code = [
`<span class="imp">import</span> qrcode`,
`<span class="cm"># QR generator</span>`,
``,
`data = <span class="str">"https://example.com"</span>`,
`img = qrcode.make(data)`,
`img.save(<span class="str">"qr.png"</span>)`,
``,
`<span class="cm"># ready</span>`
];

let i = 0;

setTimeout(typeCode, 2000);

function typeCode(){

    if(i >= code.length){
        setTimeout(scene2, 600);
        return;
    }

    const row = document.createElement("div");
    row.className = "line";

    const num = document.createElement("div");
    num.className = "num";
    num.innerText = i + 1;

    const text = document.createElement("div");

    let html = code[i];
    let j = 0;

    function type(){

        if(j <= html.length){

            text.innerHTML =
            html.substring(0,j) + '<span class="cursor"></span>';

            j++;

            setTimeout(type, 8);

        }else{
            text.innerHTML = html;
            i++;
            setTimeout(typeCode, 70);
        }
    }

    row.appendChild(num);
    row.appendChild(text);
    editor.appendChild(row);

    type();
}

/* =========================
   SCENE 2 - RUN
========================= */

function scene2(){

    runBtn.classList.add("clicked");

    setTimeout(() => {
        runBtn.classList.remove("clicked");
        scene3();
    }, 300);
}

/* =========================
   SCENE 3 - TERMINAL + QR
========================= */

function scene3(){

    editor.innerHTML = "";

    const term = document.createElement("div");
    term.className = "term";

    const logs = [
        "Importing qrcode module...",
        "Encoding data...",
        "Generating QR matrix...",
        "Saving file qr.png..."
    ];

    let k = 0;

    function print(){

        if(k >= logs.length){
            setTimeout(showQR, 500);
            return;
        }

        const d = document.createElement("div");
        d.className = "log";
        d.innerText = logs[k];

        term.appendChild(d);

        k++;
        setTimeout(print, 300);
    }

    editor.appendChild(term);
    print();
}

/* =========================
   FINAL QR DISPLAY
========================= */

function showQR(){

    editor.innerHTML = "";

    const box = document.createElement("div");
    box.className = "qrBox";

    const qrDiv = document.createElement("div");
    qrDiv.id = "qrcode";

    new QRCode(qrDiv, {
        text: "https://example.com",
        width: 160,
        height: 160
    });

    const label = document.createElement("div");
    label.className = "file";
    label.innerText = "qr.png";

    box.appendChild(qrDiv);
    box.appendChild(label);

    editor.appendChild(box);
}

</script>

</body>
</html>
