<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>video.html</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

/* PREMIUM BG */

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    z-index:0;
}

body::before{
    width:340px;
    height:340px;
    background:#2563eb;
    top:-140px;
    left:-120px;
    opacity:.18;
}

body::after{
    width:320px;
    height:320px;
    background:#7c3aed;
    right:-120px;
    bottom:-120px;
    opacity:.16;
}

/* FRAME */

.frame{
    width:390px;
    height:690px;
    background:#0f172a;
    border-radius:34px;
    overflow:hidden;
    position:relative;
    border:1px solid #1e293b;
    box-shadow:
    0 0 70px rgba(0,0,0,.75),
    inset 0 0 35px rgba(255,255,255,.03);
}

/* HEADER */

.header{
    position:absolute;
    top:28px;
    left:24px;
    right:24px;
    text-align:center;
    z-index:5;
    opacity:0;
    transform:translateY(15px);
    animation:fadeTop .8s ease forwards;
}

.match{
    color:white;
    font-size:34px;
    font-weight:800;
    line-height:1.15;
    letter-spacing:-1px;
}

.sub{
    margin-top:10px;
    color:#94a3b8;
    font-size:13px;
    letter-spacing:.4px;
}

@keyframes fadeTop{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* VS SECTION */

.vsWrap{
    position:absolute;
    top:160px;
    left:0;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:24px;
}

/* TEAM CARD */

.team{
    width:140px;
    height:180px;
    border-radius:28px;
    background:rgba(17,24,39,.95);
    border:1px solid #1e293b;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
    opacity:0;
    transform:translateY(30px);
    animation:cardIn .9s ease forwards;
    backdrop-filter:blur(12px);
}

.team.right{
    animation-delay:.25s;
}

@keyframes cardIn{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.team::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.08),
        transparent
    );
    transform:translateX(-150%);
    animation:shine 4s linear infinite;
}

@keyframes shine{
    to{
        transform:translateX(250%);
    }
}

/* LOGOS */

.logo{
    width:82px;
    height:82px;
    object-fit:contain;
    filter:drop-shadow(0 0 18px rgba(255,255,255,.15));
    animation:float 3s ease-in-out infinite;
}

.right .logo{
    animation-delay:.6s;
}

@keyframes float{
    50%{
        transform:translateY(-6px);
    }
}

.teamName{
    margin-top:16px;
    color:white;
    font-size:15px;
    font-weight:700;
    text-align:center;
}

/* VS */

.vs{
    color:white;
    font-size:26px;
    font-weight:800;
    opacity:0;
    transform:scale(.7);
    animation:vsIn .7s ease forwards;
    animation-delay:.45s;
}

@keyframes vsIn{
    to{
        opacity:1;
        transform:scale(1);
    }
}

/* TIME CARD */

.timeCard{
    position:absolute;
    left:24px;
    right:24px;
    top:410px;
    height:92px;
    border-radius:26px;
    background:rgba(17,24,39,.96);
    border:1px solid #1e293b;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    opacity:0;
    transform:translateY(25px);
    animation:fadeCard .9s ease forwards;
    animation-delay:.9s;
}

@keyframes fadeCard{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.timeTitle{
    color:#94a3b8;
    font-size:12px;
    letter-spacing:.5px;
}

.time{
    margin-top:8px;
    color:white;
    font-size:28px;
    font-weight:800;
    letter-spacing:-1px;
}

.uk{
    margin-top:4px;
    color:#38bdf8;
    font-size:12px;
    font-weight:600;
}

/* PREDICTION */

.predict{
    position:absolute;
    left:24px;
    right:24px;
    bottom:120px;
    height:95px;
    border-radius:28px;
    background:linear-gradient(
        135deg,
        rgba(37,99,235,.18),
        rgba(124,58,237,.18)
    );
    border:1px solid rgba(99,102,241,.35);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    opacity:0;
    transform:translateY(20px);
    animation:fadeCard .9s ease forwards;
    animation-delay:1.35s;
}

.predictTitle{
    color:#cbd5e1;
    font-size:12px;
    letter-spacing:.4px;
}

.predictText{
    margin-top:10px;
    font-size:26px;
    font-weight:800;
    color:#60a5fa;
    text-shadow:0 0 22px rgba(96,165,250,.4);
}

/* GLOW PULSE */

.glow{
    position:absolute;
    width:160px;
    height:160px;
    border-radius:50%;
    background:rgba(37,99,235,.18);
    filter:blur(70px);
    top:180px;
    left:110px;
    animation:pulse 3s ease-in-out infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.15);
        opacity:.7;
    }
}

</style>
</head>

<body>

<div class="frame">

    <div class="glow"></div>

    <!-- HEADER -->

    <div class="header">

        <div class="match">
            Man City<br>
            VS<br>
            Crystal Palace
        </div>

        <div class="sub">
            Tonight • UK Time
        </div>

    </div>

    <!-- VS -->

    <div class="vsWrap">

        <!-- MAN CITY -->

        <div class="team left">

            <img
                class="logo"
                src="https://upload.wikimedia.org/wikipedia/en/e/eb/Manchester_City_FC_badge.svg"
            >

            <div class="teamName">
                Manchester City
            </div>

        </div>

        <!-- VS -->

        <div class="vs">
            VS
        </div>

        <!-- PALACE -->

        <div class="team right">

            <img
                class="logo"
                src="https://upload.wikimedia.org/wikipedia/en/a/a2/Crystal_Palace_FC_logo_%282022%29.svg"
            >

            <div class="teamName">
                Crystal Palace
            </div>

        </div>

    </div>

    <!-- TIME -->

    <div class="timeCard">

        <div class="timeTitle">
            MATCH STARTS
        </div>

        <div class="time">
            7:00 PM
        </div>

        <div class="uk">
            United Kingdom Time
        </div>

    </div>

    <!-- PREDICTION -->

    <div class="predict">

        <div class="predictTitle">
            PREDICTION
        </div>

        <div class="predictText">
            Man City Will Win 💙
        </div>

    </div>

</div>

</body>
</html>
