<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

/* BACKGROUND */

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
}

body::before{
    width:340px;
    height:340px;
    background:#2563eb;
    top:-120px;
    left:-120px;
    opacity:.16;
}

body::after{
    width:320px;
    height:320px;
    background:#7c3aed;
    right:-120px;
    bottom:-120px;
    opacity:.15;
}

/* FRAME */

.frame{
    width:390px;
    height:690px;
    background:#0f172a;
    border-radius:34px;
    overflow:hidden;
    position:relative;
    border:1px solid #1e293b;
    box-shadow:
    0 0 70px rgba(0,0,0,.7),
    inset 0 0 30px rgba(255,255,255,.03);
}

/* FILES */

.files{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:18px;
}

.file{
    width:280px;
    height:72px;
    border-radius:22px;
    background:#111827;
    border:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 22px;
    color:white;
    font-weight:600;
    position:relative;
    overflow:hidden;
    opacity:0;
    transform:translateY(18px) scale(.94);
    transition:.45s ease;
}

.file.show{
    opacity:1;
    transform:translateY(0) scale(1);
}

.file.active{
    border-color:#6366f1;
    background:#1e1b4b;
    box-shadow:
    0 0 35px rgba(99,102,241,.35);
}

.file::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.08),
        transparent
    );
    transform:translateX(-120%);
}

.file.show::before{
    animation:shine 1.1s linear;
}

@keyframes shine{
    to{
        transform:translateX(250%);
    }
}

.icon{
    width:18px;
    height:18px;
    border-radius:5px;
    margin-right:16px;
}

.py{
    background:linear-gradient(135deg,#38bdf8,#facc15);
}

.json{
    background:#22c55e;
}

.txt{
    background:#64748b;
}

/* MOUSE */

.mouse{
    position:absolute;
    width:24px;
    height:24px;
    background:white;
    clip-path:polygon(
        0 0,
        0 100%,
        30% 72%,
        48% 100%,
        58% 92%,
        40% 60%,
        100% 60%
    );
    z-index:300;
    opacity:0;
    pointer-events:none;
    transition:
    left .7s cubic-bezier(.22,1,.36,1),
    top .7s cubic-bezier(.22,1,.36,1),
    transform .15s ease,
    opacity .25s ease;
    filter:
    drop-shadow(0 0 8px rgba(255,255,255,.6))
    drop-shadow(0 0 20px rgba(255,255,255,.25));
}

.mouse::after{
    content:"";
    position:absolute;
    width:34px;
    height:34px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,.4);
    left:-6px;
    top:-6px;
    opacity:0;
}

.mouse.click::after{
    animation:ripple .4s ease;
}

@keyframes ripple{
    from{
        transform:scale(.5);
        opacity:1;
    }
    to{
        transform:scale(1.8);
        opacity:0;
    }
}

/* EDITOR */

.editor{
    position:absolute;
    inset:0;
    background:#0b1220;
    display:none;
    flex-direction:column;
}

.editor.show{
    display:flex;
}

.topbar{
    height:56px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 18px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    margin-right:6px;
}

.red{background:#ef4444;}
.yellow{background:#facc15;}
.green{background:#22c55e;}

.filename{
    margin-left:12px;
    color:#e2e8f0;
    font-size:14px;
    font-weight:600;
}

.code{
    flex:1;
    padding:18px;
    overflow:hidden;
    font-family:'Fira Code', monospace;
    font-size:12px;
    line-height:1.8;
    color:white;
}

.line{
    display:flex;
    opacity:0;
    transform:translateY(6px);
    animation:lineShow .16s ease forwards;
}

@keyframes lineShow{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.num{
    width:34px;
    text-align:right;
    margin-right:14px;
    color:#475569;
    user-select:none;
}

.keyword{color:#c084fc;}
.func{color:#4ade80;}
.string{color:#facc15;}
.variable{color:#38bdf8;}
.number{color:#fb7185;}
.comment{color:#64748b;}

/* OUTPUT SCREEN */

.outputScreen{
    position:absolute;
    inset:0;
    background:#0f172a;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:22px;
}

.outputScreen.show{
    display:flex;
}

.runBtn{
    width:190px;
    height:70px;
    border:none;
    border-radius:22px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    font-size:21px;
    font-weight:700;
    box-shadow:
    0 0 35px rgba(99,102,241,.35);
    transition:.12s ease;
}

.runBtn.press{
    transform:scale(.92);
}

/* TERMINAL */

.terminal{
    width:320px;
    height:220px;
    background:#020617;
    border-radius:22px;
    border:1px solid #1e293b;
    overflow:hidden;
    display:none;
    flex-direction:column;
    box-shadow:
    0 0 30px rgba(0,0,0,.45);
}

.terminal.show{
    display:flex;
}

.terminalTop{
    height:40px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 14px;
}

.termBody{
    flex:1;
    padding:16px;
    font-family:'Fira Code', monospace;
    color:#4ade80;
    font-size:13px;
    line-height:1.7;
    white-space:pre-line;
    opacity:0;
    transform:translateY(8px);
    transition:.2s ease;
}

.termBody.show{
    opacity:1;
    transform:translateY(0);
}

/* CHANNEL CARD */

.channel{
    position:absolute;
    inset:0;
    background:#020617;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
}

.channel.show{
    display:flex;
}

.channelCard{
    width:330px;
    background:#111827;
    border:1px solid #1e293b;
    border-radius:28px;
    padding:26px;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    overflow:hidden;
    opacity:0;
    transform:translateY(20px) scale(.92);
    animation:cardShow .7s cubic-bezier(.22,1,.36,1) forwards;
    box-shadow:
    0 0 50px rgba(99,102,241,.22);
}

@keyframes cardShow{
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

.channelCard::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.05),
        transparent
    );
    animation:cardLight 3s linear infinite;
}

@keyframes cardLight{
    from{
        transform:translateX(-120%);
    }
    to{
        transform:translateX(220%);
    }
}

.avatar{
    width:96px;
    height:96px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #334155;
    box-shadow:
    0 0 30px rgba(99,102,241,.35);
    z-index:2;
}

.channelName{
    color:white;
    font-size:22px;
    font-weight:800;
    margin-top:18px;
    z-index:2;
}

.channelHandle{
    color:#94a3b8;
    font-size:14px;
    margin-top:6px;
    z-index:2;
}

.subscribeText{
    color:#cbd5e1;
    text-align:center;
    line-height:1.7;
    margin-top:20px;
    font-size:14px;
    z-index:2;
}

.subscribeBtn{
    width:190px;
    height:58px;
    border:none;
    border-radius:18px;
    margin-top:24px;
    background:linear-gradient(135deg,#ef4444,#dc2626);
    color:white;
    font-size:18px;
    font-weight:700;
    box-shadow:
    0 0 30px rgba(239,68,68,.35);
    transition:.15s ease;
    z-index:2;
}

.subscribeBtn.press{
    transform:scale(.92);
}

.thank{
    margin-top:18px;
    color:#4ade80;
    font-weight:600;
    opacity:0;
    transform:translateY(6px);
    transition:.25s ease;
    z-index:2;
}

.thank.show{
    opacity:1;
    transform:translateY(0);
}

</style>
</head>

<body>

<div class="frame">

    <!-- FILES -->

    <div class="files" id="files">

        <div class="file" id="txtFile">
            <div class="icon txt"></div>
            readme.txt
        </div>

        <div class="file" id="jsonFile">
            <div class="icon json"></div>
            products.json
        </div>

        <div class="file" id="pyFile">
            <div class="icon py"></div>
            shop.py
        </div>

    </div>

    <!-- MOUSE -->

    <div class="mouse" id="mouse"></div>

    <!-- EDITOR -->

    <div class="editor" id="editor">

        <div class="topbar">

            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>

            <div class="filename">
                shop.py
            </div>

        </div>

        <div class="code" id="code"></div>

    </div>

    <!-- RUN -->

    <div class="outputScreen" id="outputScreen">

        <button class="runBtn" id="runBtn">
            Run Program
        </button>

        <div class="terminal" id="terminal">

            <div class="terminalTop">

                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>

            </div>

            <div class="termBody" id="termBody"></div>

        </div>

    </div>

    <!-- CHANNEL -->

    <div class="channel" id="channel">

        <div class="channelCard">

            <img
                src="dominex-macedon.png"
                class="avatar"
            >

            <div class="channelName">
                Dominex Macedon
            </div>

            <div class="channelHandle">
                @DominexMacedon
            </div>

            <div class="subscribeText">
                Thanks for watching this Python Shop Program demo.<br>
                Subscribe for more premium coding videos.
            </div>

            <button class="subscribeBtn" id="subscribeBtn">
                Subscribe
            </button>

            <div class="thank" id="thank">
                ✓ Thank you for subscribing
            </div>

        </div>

    </div>

</div>

<script>

/* ELEMENTS */

const mouse = document.getElementById("mouse");

const frame = document.querySelector(".frame");

const pyFile = document.getElementById("pyFile");

const files = document.getElementById("files");

const editor = document.getElementById("editor");

const codeBox = document.getElementById("code");

const outputScreen = document.getElementById("outputScreen");

const runBtn = document.getElementById("runBtn");

const terminal = document.getElementById("terminal");

const termBody = document.getElementById("termBody");

const channel = document.getElementById("channel");

const subscribeBtn =
document.getElementById("subscribeBtn");

const thank =
document.getElementById("thank");

/* FILES */

setTimeout(()=>{
    document.getElementById("txtFile")
    .classList.add("show");
},200);

setTimeout(()=>{
    document.getElementById("jsonFile")
    .classList.add("show");
},450);

setTimeout(()=>{
    pyFile.classList.add("show");
},700);

/* MOUSE MOVE */

function moveMouseTo(element){

    const rect =
    element.getBoundingClientRect();

    const frameRect =
    frame.getBoundingClientRect();

    mouse.style.left =
    rect.left - frameRect.left +
    rect.width * 0.52 + "px";

    mouse.style.top =
    rect.top - frameRect.top +
    rect.height * 0.52 + "px";
}

/* CLICK */

function clickMouse(callback){

    mouse.classList.add("click");

    mouse.style.transform =
    "scale(.76)";

    setTimeout(()=>{
        mouse.style.transform =
        "scale(1)";
    },80);

    setTimeout(()=>{

        mouse.classList.remove("click");

        if(callback) callback();

    },160);
}

/* OPEN FILE */

setTimeout(()=>{

    mouse.style.opacity = "1";

    moveMouseTo(pyFile);

    setTimeout(()=>{

        clickMouse(()=>{

            pyFile.classList.add("active");

            setTimeout(openEditor,220);

        });

    },650);

},1500);

/* OPEN EDITOR */

function openEditor(){

    files.style.display = "none";

    mouse.style.opacity = "0";

    editor.classList.add("show");

    ultraFastCode();
}

/* FAST CODE */

const code = [

`<span class="comment"># Python Shop Program</span>`,

`<span class="keyword">products</span> = [<span class="string">"Keyboard"</span>, <span class="string">"Mouse"</span>, <span class="string">"Monitor"</span>]`,

`<span class="variable">cart</span> = []`,

`<span class="keyword">def</span> <span class="func">add_to_cart</span>(item):`,

`    cart.append(item)`,

`add_to_cart(<span class="string">"Keyboard"</span>)`,

`print(<span class="string">"Items:"</span>, cart)`,

`print(<span class="string">"Checkout Successful"</span>)`

];

function ultraFastCode(){

    code.forEach((line,index)=>{

        setTimeout(()=>{

            const row =
            document.createElement("div");

            row.className = "line";

            row.innerHTML = `
                <div class="num">
                    ${index + 1}
                </div>

                <div>${line}</div>
            `;

            codeBox.appendChild(row);

        }, index * 38);

    });

    setTimeout(showRunScreen,520);
}

/* RUN SCREEN */

function showRunScreen(){

    editor.style.display = "none";

    outputScreen.classList.add("show");

    mouse.style.opacity = "1";

    setTimeout(()=>{

        moveMouseTo(runBtn);

        setTimeout(()=>{

            clickMouse(()=>{

                runBtn.classList.add("press");

                setTimeout(showOutput,120);

            });

        },500);

    },200);
}

/* OUTPUT */

function showOutput(){

    terminal.classList.add("show");

    termBody.innerHTML = `

> python shop.py

Loading products...
Creating shopping cart...

Items: ['Keyboard']

Checkout Successful

Program executed successfully

`;

    setTimeout(()=>{

        termBody.classList.add("show");

    },80);

    setTimeout(showChannel,1800);
}

/* CHANNEL */

function showChannel(){

    outputScreen.style.display = "none";

    channel.classList.add("show");

    setTimeout(()=>{

        moveMouseTo(subscribeBtn);

        setTimeout(()=>{

            clickMouse(()=>{

                subscribeBtn.classList.add("press");

                thank.classList.add("show");

            });

        },700);

    },600);
}

</script>

</body>
</html>
