<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

/* BACKGROUND */

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(130px);
    z-index:0;
}

body::before{
    width:360px;
    height:360px;
    background:#38bdf8;
    top:-140px;
    left:-120px;
    opacity:.18;
}

body::after{
    width:340px;
    height:340px;
    background:#8b5cf6;
    right:-120px;
    bottom:-120px;
    opacity:.16;
}

/* FRAME */

.frame{
    width:390px;
    height:690px;
    background:#0f172a;
    border-radius:34px;
    overflow:hidden;
    position:relative;
    border:1px solid #1e293b;
    box-shadow:
    0 0 80px rgba(0,0,0,.75),
    inset 0 0 35px rgba(255,255,255,.03);
}

/* GLOW */

.glow1,
.glow2{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
}

.glow1{
    width:180px;
    height:180px;
    background:#2563eb;
    top:170px;
    left:40px;
    opacity:.35;
    animation:pulse 5s ease-in-out infinite;
}

.glow2{
    width:180px;
    height:180px;
    background:#7c3aed;
    bottom:100px;
    right:40px;
    opacity:.28;
    animation:pulse 5s ease-in-out infinite;
    animation-delay:2s;
}

@keyframes pulse{
    50%{
        transform:scale(1.15);
        opacity:.55;
    }
}

/* HEADER */

.header{
    position:absolute;
    top:28px;
    left:20px;
    right:20px;
    text-align:center;
    z-index:5;
    animation:fadeDown 1s ease forwards;
}

.mainTitle{
    font-size:38px;
    font-weight:900;
    line-height:1.05;
    color:white;
    letter-spacing:-1.8px;
    text-shadow:0 0 25px rgba(255,255,255,.1);
}

.mainTitle span:nth-child(1){
    color:#7dd3fc;
}

.mainTitle span:nth-child(2){
    color:#c084fc;
}

.subTitle{
    margin-top:12px;
    color:#94a3b8;
    font-size:13px;
    letter-spacing:.4px;
}

/* TEAMS */

.teams{
    position:absolute;
    top:170px;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    z-index:4;
}

.team{
    width:145px;
    height:205px;
    background:rgba(15,23,42,.92);
    border:1px solid #1e293b;
    border-radius:30px;
    backdrop-filter:blur(14px);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
    animation:floatCard 4s ease-in-out infinite;
}

.team.right{
    animation-delay:2s;
}

@keyframes floatCard{
    50%{
        transform:translateY(-10px);
    }
}

.team::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.07),
        transparent
    );
    transform:translateX(-160%);
    animation:shine 4s linear infinite;
}

@keyframes shine{
    to{
        transform:translateX(250%);
    }
}

.logo{
    width:88px;
    height:88px;
    object-fit:contain;
    filter:
    drop-shadow(0 0 18px rgba(255,255,255,.18));
    animation:logoFloat 3s ease-in-out infinite;
}

@keyframes logoFloat{
    50%{
        transform:translateY(-5px) scale(1.03);
    }
}

.teamName{
    margin-top:18px;
    font-size:16px;
    font-weight:800;
    text-align:center;
    color:white;
    line-height:1.25;
}

/* VS */

.vs{
    font-size:30px;
    font-weight:900;
    color:white;
    text-shadow:0 0 20px rgba(255,255,255,.25);
    animation:vsPulse 2s ease-in-out infinite;
}

@keyframes vsPulse{
    50%{
        transform:scale(1.12);
    }
}

/* TIME */

.timeBox{
    position:absolute;
    left:24px;
    right:24px;
    top:420px;
    height:95px;
    border-radius:28px;
    background:rgba(17,24,39,.95);
    border:1px solid #243244;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:5;
    animation:fadeUp 1s ease forwards;
}

.timeTitle{
    color:#94a3b8;
    font-size:12px;
    letter-spacing:.5px;
}

.time{
    margin-top:8px;
    font-size:34px;
    font-weight:900;
    letter-spacing:-1px;
    background:linear-gradient(90deg,#7dd3fc,#c084fc,#f472b6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.uk{
    margin-top:4px;
    color:#cbd5e1;
    font-size:12px;
}

/* PREDICTION */

.predict{
    position:absolute;
    left:24px;
    right:24px;
    bottom:26px;
    height:120px;
    border-radius:30px;
    background:
    linear-gradient(
        135deg,
        rgba(37,99,235,.18),
        rgba(168,85,247,.18)
    );
    border:1px solid rgba(99,102,241,.3);
    backdrop-filter:blur(14px);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:5;
    overflow:hidden;
    animation:fadeUp 1.2s ease forwards;
}

.predict::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.08),
        transparent
    );
    transform:translateX(-180%);
    animation:shine 5s linear infinite;
}

.predictTitle{
    color:#cbd5e1;
    font-size:12px;
    letter-spacing:.5px;
}

.predictText{
    margin-top:10px;
    font-size:29px;
    font-weight:900;
    color:#7dd3fc;
    text-shadow:0 0 25px rgba(125,211,252,.35);
    animation:textFloat 3s ease-in-out infinite;
}

@keyframes textFloat{
    50%{
        transform:translateY(-4px);
    }
}

/* PLAYERS */

.players{
    position:absolute;
    top:535px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
    padding:0 24px;
    z-index:5;
}

.player{
    padding:8px 14px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
    color:white;
    animation:playerFloat 3s ease-in-out infinite;
}

.player:nth-child(1){
    background:#0ea5e9;
}

.player:nth-child(2){
    background:#8b5cf6;
}

.player:nth-child(3){
    background:#ec4899;
}

.player:nth-child(4){
    background:#14b8a6;
}

.player:nth-child(5){
    background:#f97316;
}

.player:nth-child(6){
    background:#3b82f6;
}

.player:nth-child(7){
    background:#a855f7;
}

@keyframes playerFloat{
    50%{
        transform:translateY(-4px);
    }
}

/* ANIMATIONS */

@keyframes fadeDown{
    from{
        opacity:0;
        transform:translateY(-20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="frame">

    <div class="glow1"></div>
    <div class="glow2"></div>

    <!-- HEADER -->

    <div class="header">

        <div class="mainTitle">
            <span>MAN CITY</span><br>
            VS<br>
            <span>CRYSTAL PALACE</span>
        </div>

        <div class="subTitle">
            Tonight • UK Time • Premier League Clash
        </div>

    </div>

    <!-- TEAMS -->

    <div class="teams">

        <!-- MAN CITY -->

        <div class="team">

            <img
                class="logo"
                src="https://upload.wikimedia.org/wikipedia/en/e/eb/Manchester_City_FC_badge.svg"
            >

            <div class="teamName">
                Manchester<br>City
            </div>

        </div>

        <!-- VS -->

        <div class="vs">
            VS
        </div>

        <!-- PALACE -->

        <div class="team right">

            <img
                class="logo"
                src="https://upload.wikimedia.org/wikipedia/en/a/a2/Crystal_Palace_FC_logo_%282022%29.svg"
            >

            <div class="teamName">
                Crystal<br>Palace
            </div>

        </div>

    </div>

    <!-- TIME -->

    <div class="timeBox">

        <div class="timeTitle">
            MATCH STARTS
        </div>

        <div class="time">
            7:00 PM
        </div>

        <div class="uk">
            United Kingdom Time
        </div>

    </div>

    <!-- PLAYERS -->

    <div class="players">

        <div class="player">
            Haaland
        </div>

        <div class="player">
            De Bruyne
        </div>

        <div class="player">
            Foden
        </div>

        <div class="player">
            Rodri
        </div>

        <div class="player">
            Bernardo Silva
        </div>

        <div class="player">
            Grealish
        </div>

        <div class="player">
            Doku
        </div>

    </div>

    <!-- PREDICTION -->

    <div class="predict">

        <div class="predictTitle">
            MATCH PREDICTION
        </div>

        <div class="predictText">
            Man City Will Win 💙
        </div>

    </div>

</div>

</body>
</html>
