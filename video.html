<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Countdown Timer Python Video</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1020;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter;
}

/* FRAME */
.frame{
    width:390px;
    height:690px;
    background:#111827;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    border:2px solid #1e293b;
}

/* TOP */
.top{
    height:60px;
    background:#0f172a;
    border-bottom:1px solid #1e293b;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:700;
}

/* EDITOR (FIXED — NO GROW) */
.editor{
    height:630px;
    padding:16px;
    font-family:'Fira Code', monospace;
    font-size:14px;
    color:white;
    overflow:hidden;
}

/* LINE */
.line{
    display:flex;
}

.num{
    width:28px;
    color:#64748b;
    text-align:right;
    margin-right:10px;
}

/* COLORS */
.kw{ color:#ff79c6; }
.fn{ color:#50fa7b; }
.str{ color:#f1fa8c; }
.cm{ color:#6272a4; }

/* CURSOR */
.cursor{
    width:8px;
    height:15px;
    background:white;
    display:inline-block;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

/* RUN FLASH (ONLY MOMENTARY) */
.runFlash{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#22c55e;
    color:white;
    padding:14px 26px;
    border-radius:14px;
    font-weight:700;
    opacity:0;
    pointer-events:none;
}

.runFlash.show{
    animation:pop .4s ease;
}

@keyframes pop{
    0%{opacity:0; transform:translate(-50%,-50%) scale(.6);}
    50%{opacity:1;}
    100%{opacity:0; transform:translate(-50%,-50%) scale(1);}
}

/* TERMINAL (FIXED FULL AREA) */
.terminal{
    background:#020617;
    border:1px solid #1e293b;
    border-radius:10px;
    padding:12px;
    height:520px;        /* FIXED */
    overflow:hidden;     /* NO EXPAND */
    display:flex;
    flex-direction:column;
}

/* HEADER LINE */
.prompt{
    color:#34d399;
    font-size:13px;
    margin-bottom:6px;
}

/* LOG */
.log{
    font-size:13px;
    color:#a5f3fc;
    margin-bottom:3px;
    opacity:0;
    animation:show .05s forwards;
}

@keyframes show{
    to{opacity:1;}
}

/* BIG TIMER */
.timer{
    margin-top:20px;
    font-size:44px;
    font-weight:800;
    text-align:center;
    color:#fbbf24;
}

/* LABEL */
.label{
    text-align:center;
    margin-top:8px;
    color:#94a3b8;
    font-size:13px;
}

/* CENTER */
.center{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

</style>
</head>

<body>

<div class="frame">

    <div class="top">Python Countdown Timer</div>

    <div class="editor" id="editor"></div>

    <!-- RUN FLASH ONLY -->
    <div class="runFlash" id="runFlash">Running...</div>

</div>

<script>

const editor = document.getElementById("editor");
const runFlash = document.getElementById("runFlash");

/* =========================
   SCENE 1 - CODE
========================= */

const code = [
`<span class="kw">import</span> time`,
``,
`<span class="kw">def</span> <span class="fn">countdown</span>(n):`,
`    <span class="kw">while</span> n > 0:`,
`        <span class="fn">print</span>(n)`,
`        time.sleep(1)`,
`        n -= 1`,
``,
`countdown(5)`
];

let i = 0;

setTimeout(typeCode, 1500);

function typeCode(){

    if(i >= code.length){
        setTimeout(scene2, 700);
        return;
    }

    const row = document.createElement("div");
    row.className = "line";

    const num = document.createElement("div");
    num.className = "num";
    num.innerText = i + 1;

    const text = document.createElement("div");

    let html = code[i];
    let j = 0;

    function type(){

        if(j <= html.length){

            text.innerHTML =
            html.substring(0,j) + '<span class="cursor"></span>';

            j++;
            setTimeout(type, 8);

        }else{
            text.innerHTML = html;
            i++;
            setTimeout(typeCode, 70);
        }
    }

    row.appendChild(num);
    row.appendChild(text);
    editor.appendChild(row);

    type();
}

/* =========================
   SCENE 2 - RUN FLASH ONLY
========================= */

function scene2(){

    runFlash.classList.add("show");

    setTimeout(() => {
        scene3();
    }, 400);
}

/* =========================
   SCENE 3 - TERMINAL
========================= */

function scene3(){

    editor.innerHTML = "";

    const term = document.createElement("div");
    term.className = "terminal";

    const prompt = document.createElement("div");
    prompt.className = "prompt";
    prompt.innerText = "$ python countdown.py";

    term.appendChild(prompt);

    const logs = document.createElement("div");

    const center = document.createElement("div");
    center.className = "center";

    const timer = document.createElement("div");
    timer.className = "timer";

    const label = document.createElement("div");
    label.className = "label";
    label.innerText = "Counting down...";

    center.appendChild(timer);
    center.appendChild(label);

    term.appendChild(logs);
    term.appendChild(center);

    editor.appendChild(term);

    let n = 5;

    function tick(){

        if(n < 0){
            label.innerText = "Completed";
            timer.innerText = "DONE";
            return;
        }

        timer.innerText = n;

        const log = document.createElement("div");
        log.className = "log";
        log.innerText = "Executing: " + n;

        logs.appendChild(log);

        n--;

        setTimeout(tick, 800);
    }

    tick();
}

</script>

</body>
</html>
