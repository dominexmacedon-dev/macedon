<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#030712;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

/* PREMIUM BG */

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    z-index:0;
}

body::before{
    width:340px;
    height:340px;
    background:#2563eb;
    top:-120px;
    left:-120px;
    opacity:.14;
}

body::after{
    width:320px;
    height:320px;
    background:#7c3aed;
    right:-120px;
    bottom:-120px;
    opacity:.14;
}

/* FRAME */

.frame{
    width:390px;
    height:690px;
    background:#0f172a;
    border-radius:34px;
    overflow:hidden;
    position:relative;
    border:1px solid #1e293b;
    box-shadow:
    0 0 60px rgba(0,0,0,.7),
    inset 0 0 30px rgba(255,255,255,.03);
}

/* FILES */

.files{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:18px;
}

.file{
    width:285px;
    height:72px;
    border-radius:22px;
    background:#111827;
    border:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 22px;
    color:white;
    font-weight:600;
    opacity:0;
    transform:translateY(16px);
    transition:.45s ease;
    position:relative;
    overflow:hidden;
}

.file.show{
    opacity:1;
    transform:translateY(0);
}

.file::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.08),
        transparent
    );
    transform:translateX(-120%);
}

.file.show::before{
    animation:shine 1.2s linear;
}

@keyframes shine{
    to{
        transform:translateX(250%);
    }
}

.file.active{
    border-color:#4f46e5;
    background:#1e1b4b;
    box-shadow:
    0 0 30px rgba(79,70,229,.35);
}

.icon{
    width:18px;
    height:18px;
    border-radius:5px;
    margin-right:16px;
}

.py{
    background:linear-gradient(135deg,#38bdf8,#facc15);
}

.txt{
    background:#64748b;
}

.json{
    background:#22c55e;
}

/* MOUSE */

.mouse{
    position:absolute;
    width:24px;
    height:24px;
    background:white;
    clip-path:polygon(
        0 0,
        0 100%,
        30% 72%,
        48% 100%,
        58% 92%,
        40% 60%,
        100% 60%
    );
    z-index:100;
    opacity:0;
    pointer-events:none;
    transition:
    left .75s cubic-bezier(.2,.9,.2,1),
    top .75s cubic-bezier(.2,.9,.2,1),
    transform .12s ease,
    opacity .3s ease;
    filter:drop-shadow(0 0 10px rgba(255,255,255,.5));
}

/* EDITOR */

.editor{
    position:absolute;
    inset:0;
    background:#0b1220;
    display:none;
    flex-direction:column;
}

.editor.show{
    display:flex;
}

/* TOPBAR */

.topbar{
    height:56px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 18px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    margin-right:6px;
}

.red{background:#ef4444;}
.yellow{background:#facc15;}
.green{background:#22c55e;}

.filename{
    margin-left:12px;
    color:#e2e8f0;
    font-size:14px;
    font-weight:600;
}

/* CODE */

.code{
    flex:1;
    padding:18px;
    overflow:hidden;
    font-family:'Fira Code', monospace;
    font-size:12px;
    line-height:1.9;
    color:white;
}

.line{
    display:flex;
    opacity:0;
    transform:translateY(5px);
    animation:lineIn .18s ease forwards;
}

@keyframes lineIn{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.num{
    width:34px;
    color:#475569;
    text-align:right;
    margin-right:14px;
    user-select:none;
}

.keyword{
    color:#c084fc;
}

.variable{
    color:#38bdf8;
}

.string{
    color:#facc15;
}

.func{
    color:#4ade80;
}

.comment{
    color:#64748b;
}

/* RUN SCREEN */

.runScreen{
    position:absolute;
    inset:0;
    background:#0f172a;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:26px;
}

.runScreen.show{
    display:flex;
}

.runBtn{
    width:200px;
    height:70px;
    border:none;
    border-radius:22px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    font-size:21px;
    font-weight:700;
    box-shadow:
    0 0 30px rgba(79,70,229,.35);
    transition:.12s ease;
}

.runBtn.press{
    transform:scale(.92);
}

/* TERMINAL */

.terminal{
    width:325px;
    height:220px;
    background:#020617;
    border:1px solid #1e293b;
    border-radius:22px;
    overflow:hidden;
    display:none;
    flex-direction:column;
}

.terminal.show{
    display:flex;
}

.terminalTop{
    height:40px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 14px;
}

.termBody{
    flex:1;
    padding:18px;
    font-family:'Fira Code', monospace;
    font-size:13px;
    line-height:1.9;
    white-space:pre-line;
    overflow:hidden;
}

.outputLine{
    opacity:0;
    transform:translateY(6px);
    animation:outputIn .2s ease forwards;
    font-weight:500;
}

@keyframes outputIn{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* COLORS */

.c1{color:#ff6b6b;}
.c2{color:#ffd166;}
.c3{color:#06d6a0;}
.c4{color:#4cc9f0;}
.c5{color:#c77dff;}
.c6{color:#f72585;}

/* FOLLOW CARD */

.followCard{
    position:absolute;
    inset:0;
    background:#0b1220;
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition:.5s ease;
}

.followCard.show{
    opacity:1;
    pointer-events:auto;
}

.followBox{
    width:320px;
    background:rgba(17,24,39,.98);
    border:1px solid #334155;
    border-radius:28px;
    padding:22px;
    display:flex;
    flex-direction:column;
    align-items:center;
    transform:translateY(20px);
    animation:cardIn .45s ease forwards;
}

@keyframes cardIn{
    to{
        transform:translateY(0);
    }
}

.profile{
    width:86px;
    height:86px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #334155;
    margin-bottom:18px;
}

.name{
    color:white;
    font-size:22px;
    font-weight:800;
}

.username{
    color:#94a3b8;
    font-size:14px;
    margin-top:6px;
}

.followText{
    color:#cbd5e1;
    font-size:13px;
    text-align:center;
    margin-top:18px;
    line-height:1.7;
}

.followBtn{
    width:180px;
    height:52px;
    border:none;
    border-radius:16px;
    margin-top:22px;
    background:linear-gradient(135deg,#ec4899,#8b5cf6);
    color:white;
    font-size:16px;
    font-weight:700;
    transition:.12s ease;
}

.followBtn.followed{
    background:#27272a;
}

</style>
</head>

<body>

<div class="frame">

    <!-- FILES -->

    <div class="files" id="files">

        <div class="file" id="txtFile">
            <div class="icon txt"></div>
            feelings.txt
        </div>

        <div class="file" id="jsonFile">
            <div class="icon json"></div>
            emotions.json
        </div>

        <div class="file" id="pyFile">
            <div class="icon py"></div>
            love.py
        </div>

    </div>

    <!-- MOUSE -->

    <div class="mouse" id="mouse"></div>

    <!-- EDITOR -->

    <div class="editor" id="editor">

        <div class="topbar">

            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>

            <div class="filename">
                love.py
            </div>

        </div>

        <div class="code" id="code"></div>

    </div>

    <!-- RUN -->

    <div class="runScreen" id="runScreen">

        <button class="runBtn" id="runBtn">
            Run Program
        </button>

        <div class="terminal" id="terminal">

            <div class="terminalTop">

                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>

            </div>

            <div class="termBody" id="termBody"></div>

        </div>

    </div>

    <!-- FOLLOW -->

    <div class="followCard" id="followCard">

        <div class="followBox">

            <img
                src="dominex-macedon.png"
                class="profile"
            >

            <div class="name">
                Dominex Macedon
            </div>

            <div class="username">
                @dominexmacedon
            </div>

            <div class="followText">
                Enjoyed this coding animation?<br>
                Follow the TikTok account for more premium coding videos.
            </div>

            <button class="followBtn" id="followBtn">
                Follow Account
            </button>

        </div>

    </div>

</div>

<script>

/* ELEMENTS */

const txtFile = document.getElementById("txtFile");
const jsonFile = document.getElementById("jsonFile");
const pyFile = document.getElementById("pyFile");

const mouse = document.getElementById("mouse");

const files = document.getElementById("files");

const editor = document.getElementById("editor");

const codeBox = document.getElementById("code");

const runScreen = document.getElementById("runScreen");

const runBtn = document.getElementById("runBtn");

const terminal = document.getElementById("terminal");

const termBody = document.getElementById("termBody");

const followCard =
document.getElementById("followCard");

const followBtn =
document.getElementById("followBtn");

/* FILES */

setTimeout(()=>{
    txtFile.classList.add("show");
},300);

setTimeout(()=>{
    jsonFile.classList.add("show");
},650);

setTimeout(()=>{
    pyFile.classList.add("show");
},1000);

/* MOUSE */

function moveMouseTo(element,x,y){

    const rect = element.getBoundingClientRect();

    const frameRect =
    document.querySelector(".frame")
    .getBoundingClientRect();

    mouse.style.left =
    (rect.left - frameRect.left + x) + "px";

    mouse.style.top =
    (rect.top - frameRect.top + y) + "px";
}

/* CLICK */

function clickMouse(callback){

    mouse.style.transform = "scale(.78)";

    setTimeout(()=>{

        mouse.style.transform = "scale(1)";

        if(callback) callback();

    },130);
}

/* OPEN FILE */

setTimeout(()=>{

    mouse.style.opacity = "1";

    moveMouseTo(pyFile,118,36);

    setTimeout(()=>{

        clickMouse(()=>{

            pyFile.classList.add("active");

            setTimeout(openEditor,350);

        });

    },850);

},2100);

/* OPEN EDITOR */

function openEditor(){

    files.style.display = "none";

    editor.classList.add("show");

    mouse.style.opacity = "0";

    typeCode();
}

/* PROFESSIONAL TYPING */

const code = [

`<span class="comment"># Love Program</span>`,

`<span class="variable">message</span> = <span class="string">"I love her so much"</span>`,

`<span class="variable">colors</span> = [`,
`    <span class="string">"red"</span>,`,
`    <span class="string">"yellow"</span>,`,
`    <span class="string">"cyan"</span>,`,
`    <span class="string">"green"</span>,`,
`    <span class="string">"purple"</span>`,
`]`,

`<span class="keyword">for</span> color <span class="keyword">in</span> colors:`,

`    print(color, message)`,

`print(<span class="string">"Completed Successfully"</span>)`

];

function typeCode(){

    code.forEach((line,index)=>{

        setTimeout(()=>{

            const row =
            document.createElement("div");

            row.className = "line";

            row.innerHTML = `
                <div class="num">${index + 1}</div>
                <div>${line}</div>
            `;

            codeBox.appendChild(row);

            codeBox.scrollTop =
            codeBox.scrollHeight;

        }, index * 140);

    });

    setTimeout(showRunScreen,2400);
}

/* RUN */

function showRunScreen(){

    editor.style.display = "none";

    runScreen.classList.add("show");

    mouse.style.opacity = "1";

    setTimeout(()=>{

        moveMouseTo(runBtn,100,35);

        setTimeout(()=>{

            clickMouse(()=>{

                runBtn.classList.add("press");

                setTimeout(showOutput,260);

            });

        },850);

    },250);
}

/* OUTPUT */

function addOutput(text,className){

    const line =
    document.createElement("div");

    line.className =
    "outputLine " + className;

    line.innerText = text;

    termBody.appendChild(line);
}

function showOutput(){

    terminal.classList.add("show");

    const outputs = [

        [" > python love.py ",""],
        ["",""],

        ["I love her so much","c1"],
        ["I love her so much","c2"],
        ["I love her so much","c3"],
        ["I love her so much","c4"],
        ["I love her so much","c5"],
        ["I love her so much","c6"],

        ["",""],

        ["Completed Successfully","c3"]

    ];

    outputs.forEach((item,index)=>{

        setTimeout(()=>{

            addOutput(item[0], item[1]);

        }, index * 300);

    });

    setTimeout(showFollowCard,4200);
}

/* FOLLOW */

function showFollowCard(){

    runScreen.style.opacity = "0";

    setTimeout(()=>{

        runScreen.style.display = "none";

        followCard.classList.add("show");

        setTimeout(()=>{

            moveMouseTo(followBtn,90,28);

            setTimeout(()=>{

                clickMouse(()=>{

                    followBtn.innerText =
                    "Following";

                    followBtn.classList
                    .add("followed");

                });

            },900);

        },600);

    },450);
}

</script>

</body>
</html>
