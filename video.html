<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator HTML Coding Video</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#08111f;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

/* =========================
   FRAME
========================= */

.frame{
    width:390px;
    height:690px;
    background:#0b1220;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    border:1px solid #1e293b;

    /* IMPORTANT:
       Avoid heavy blur for phone recording */
    box-shadow:
    0 0 25px rgba(0,0,0,.55);
}

/* =========================
   INTRO
========================= */

.intro{
    position:absolute;
    inset:0;
    z-index:100;
    background:
    linear-gradient(135deg,#020617,#0f172a,#111827);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    animation:introHide 1s ease forwards;
    animation-delay:3s;
}

.intro h1{
    color:white;
    font-size:32px;
    font-weight:800;
    margin-bottom:12px;
}

.intro p{
    color:#94a3b8;
    font-size:14px;
    letter-spacing:.4px;
}

@keyframes introHide{
    to{
        opacity:0;
        visibility:hidden;
    }
}

/* =========================
   MAIN
========================= */

.main{
    width:100%;
    height:100%;
    position:relative;
    padding:18px;
}

/* =========================
   FILES
========================= */

.files{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    gap:18px;
}

.file{
    width:270px;
    height:72px;

    background:#111827;

    border:1px solid #243041;
    border-radius:18px;

    display:flex;
    align-items:center;

    padding:0 20px;

    color:white;
    font-weight:600;
    font-size:15px;

    transform:translateY(40px) scale(.8);
    opacity:0;

    position:relative;
    overflow:hidden;
}

/* SHINE EFFECT */

.file::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:120%;
    height:100%;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.08),
        transparent
    );
}

.file.show{
    animation:fileShow .7s ease forwards;
}

.file.show::before{
    animation:shine 1.1s linear;
}

@keyframes shine{
    to{
        left:180%;
    }
}

@keyframes fileShow{
    to{
        transform:translateY(0) scale(1);
        opacity:1;
    }
}

/* ACTIVE FILE */

.file.active{
    border-color:#2563eb;
    background:#172554;
}

/* ICONS */

.icon{
    width:16px;
    height:16px;
    border-radius:4px;
    margin-right:16px;
}

.htmlIcon{
    background:#f97316;
}

.cssIcon{
    background:#38bdf8;
}

.jsIcon{
    background:#facc15;
}

/* =========================
   MOUSE
========================= */

.mouse{
    position:absolute;
    width:24px;
    height:24px;

    background:white;

    clip-path:polygon(
        0 0,
        0 100%,
        30% 72%,
        48% 100%,
        58% 92%,
        40% 60%,
        100% 60%
    );

    z-index:200;
    opacity:0;
}

/* =========================
   EDITOR
========================= */

.editor{
    position:absolute;
    inset:0;

    background:#0b1220;

    display:none;
    flex-direction:column;
}

.editor.show{
    display:flex;
}

/* TAB */

.tab{
    height:54px;

    background:#111827;

    border-bottom:1px solid #1e293b;

    display:flex;
    align-items:center;

    padding:0 18px;

    color:#e2e8f0;
    font-size:14px;
    font-weight:600;
}

.tabDot{
    width:10px;
    height:10px;

    border-radius:50%;

    background:#f97316;

    margin-right:12px;
}

/* =========================
   CODE AREA
========================= */

.code{
    flex:1;

    padding:16px;

    overflow:hidden;

    font-family:'Fira Code', monospace;

    font-size:11px;

    line-height:1.75;

    color:white;
}

/* CODE LINE */

.line{
    display:flex;
}

.num{
    width:34px;

    color:#475569;

    text-align:right;

    margin-right:14px;

    user-select:none;
}

/* COLORS */

.tag{
    color:#ff79c6;
}

.attr{
    color:#8be9fd;
}

.value{
    color:#f1fa8c;
}

.text{
    color:#e2e8f0;
}

.comment{
    color:#6272a4;
}

/* CURSOR */

.cursor{
    width:7px;
    height:13px;

    background:white;

    display:inline-block;

    margin-left:2px;

    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* =========================
   THOUGHT BOX
========================= */

.thought{
    position:absolute;

    left:18px;
    bottom:18px;

    width:350px;

    background:#111827;

    border:1px solid #334155;

    border-radius:16px;

    padding:14px;

    color:#cbd5e1;

    font-size:12px;

    line-height:1.7;

    opacity:0;

    transform:translateY(25px);

    transition:.45s;
}

.thought.show{
    opacity:1;
    transform:translateY(0);
}

</style>
</head>

<body>

<div class="frame">

    <!-- INTRO -->

    <div class="intro">

        <h1>Calculator</h1>

        <p>by Dominex Macedon</p>

    </div>

    <!-- MAIN -->

    <div class="main">

        <!-- FILES -->

        <div class="files" id="files">

            <div class="file" id="htmlFile">

                <div class="icon htmlIcon"></div>

                calculator.html

            </div>

            <div class="file" id="cssFile">

                <div class="icon cssIcon"></div>

                calculator.css

            </div>

            <div class="file" id="jsFile">

                <div class="icon jsIcon"></div>

                calculator.js

            </div>

        </div>

        <!-- MOUSE -->

        <div class="mouse" id="mouse"></div>

        <!-- EDITOR -->

        <div class="editor" id="editor">

            <div class="tab">

                <div class="tabDot"></div>

                calculator.html

            </div>

            <div class="code" id="code"></div>

        </div>

        <!-- THOUGHT -->

        <div class="thought" id="thought"></div>

    </div>

</div>

<script>

/* =========================
   ELEMENTS
========================= */

const htmlFile = document.getElementById("htmlFile");
const cssFile = document.getElementById("cssFile");
const jsFile = document.getElementById("jsFile");

const files = document.getElementById("files");

const editor = document.getElementById("editor");
const codeBox = document.getElementById("code");

const mouse = document.getElementById("mouse");

const thought = document.getElementById("thought");

/* =========================
   FILE APPEAR
========================= */

setTimeout(() => {
    htmlFile.classList.add("show");
},3400);

setTimeout(() => {
    cssFile.classList.add("show");
},3800);

setTimeout(() => {
    jsFile.classList.add("show");
},4200);

/* =========================
   CLICK HTML FILE
========================= */

setTimeout(() => {

    mouse.style.opacity = "1";

    mouse.style.left = "110px";
    mouse.style.top = "310px";

    mouse.style.transition = "1s ease";

    setTimeout(() => {

        mouse.style.left = "145px";
        mouse.style.top = "270px";

        setTimeout(() => {

            htmlFile.classList.add("active");

            openEditor();

        },900);

    },300);

},5200);

/* =========================
   OPEN EDITOR
========================= */

function openEditor(){

    showThought(
        "Creating the complete HTML structure and linking CSS and JavaScript files."
    );

    setTimeout(() => {

        files.style.display = "none";

        mouse.style.opacity = "0";

        editor.classList.add("show");

        startTyping();

    },700);
}

/* =========================
   COMPLETE HTML CODE
========================= */

const code = [

`<span class="comment">&lt;!DOCTYPE html&gt;</span>`,
`<span class="tag">&lt;html</span> <span class="attr">lang</span>=<span class="value">"en"</span><span class="tag">&gt;</span>`,
``,
`<span class="tag">&lt;head&gt;</span>`,
`   <span class="tag">&lt;meta</span> <span class="attr">charset</span>=<span class="value">"UTF-8"</span><span class="tag">&gt;</span>`,
``,
`   <span class="tag">&lt;meta</span>`,
`      <span class="attr">name</span>=<span class="value">"viewport"</span>`,
`      <span class="attr">content</span>=<span class="value">"width=device-width, initial-scale=1.0"</span><span class="tag">&gt;</span>`,
``,
`   <span class="tag">&lt;title&gt;</span><span class="text">Calculator</span><span class="tag">&lt;/title&gt;</span>`,
``,
`   <span class="comment">&lt;!-- CSS File --&gt;</span>`,
`   <span class="tag">&lt;link</span>`,
`      <span class="attr">rel</span>=<span class="value">"stylesheet"</span>`,
`      <span class="attr">href</span>=<span class="value">"calculator.css"</span><span class="tag">&gt;</span>`,
``,
`<span class="tag">&lt;/head&gt;</span>`,
``,
`<span class="tag">&lt;body&gt;</span>`,
``,
`   <span class="comment">&lt;!-- Calculator Container --&gt;</span>`,
`   <span class="tag">&lt;div</span> <span class="attr">class</span>=<span class="value">"calculator"</span><span class="tag">&gt;</span>`,
``,
`      <span class="comment">&lt;!-- Screen --&gt;</span>`,
`      <span class="tag">&lt;div</span> <span class="attr">class</span>=<span class="value">"screen"</span><span class="tag">&gt;</span>`,
`         <span class="text">0</span>`,
`      <span class="tag">&lt;/div&gt;</span>`,
``,
`      <span class="comment">&lt;!-- Buttons --&gt;</span>`,
`      <span class="tag">&lt;div</span> <span class="attr">class</span>=<span class="value">"buttons"</span><span class="tag">&gt;</span>`,
``,
`         <span class="tag">&lt;button&gt;</span><span class="text">7</span><span class="tag">&lt;/button&gt;</span>`,
`         <span class="tag">&lt;button&gt;</span><span class="text">8</span><span class="tag">&lt;/button&gt;</span>`,
`         <span class="tag">&lt;button&gt;</span><span class="text">9</span><span class="tag">&lt;/button&gt;</span>`,
`         <span class="tag">&lt;button&gt;</span><span class="text">+</span><span class="tag">&lt;/button&gt;</span>`,
``,
`         <span class="tag">&lt;button&gt;</span><span class="text">4</span><span class="tag">&lt;/button&gt;</span>`,
`         <span class="tag">&lt;button&gt;</span><span class="text">5</span><span class="tag">&lt;/button&gt;</span>`,
`         <span class="tag">&lt;button&gt;</span><span class="text">6</span><span class="tag">&lt;/button&gt;</span>`,
`         <span class="tag">&lt;button&gt;</span><span class="text">-</span><span class="tag">&lt;/button&gt;</span>`,
``,
`         <span class="tag">&lt;button&gt;</span><span class="text">1</span><span class="tag">&lt;/button&gt;</span>`,
`         <span class="tag">&lt;button&gt;</span><span class="text">2</span><span class="tag">&lt;/button&gt;</span>`,
`         <span class="tag">&lt;button&gt;</span><span class="text">3</span><span class="tag">&lt;/button&gt;</span>`,
`         <span class="tag">&lt;button&gt;</span><span class="text">×</span><span class="tag">&lt;/button&gt;</span>`,
``,
`         <span class="tag">&lt;button&gt;</span><span class="text">0</span><span class="tag">&lt;/button&gt;</span>`,
`         <span class="tag">&lt;button&gt;</span><span class="text">.</span><span class="tag">&lt;/button&gt;</span>`,
`         <span class="tag">&lt;button&gt;</span><span class="text">=</span><span class="tag">&lt;/button&gt;</span>`,
`         <span class="tag">&lt;button&gt;</span><span class="text">÷</span><span class="tag">&lt;/button&gt;</span>`,
``,
`      <span class="tag">&lt;/div&gt;</span>`,
``,
`   <span class="tag">&lt;/div&gt;</span>`,
``,
`   <span class="comment">&lt;!-- JavaScript File --&gt;</span>`,
`   <span class="tag">&lt;script</span> <span class="attr">src</span>=<span class="value">"calculator.js"</span><span class="tag">&gt;&lt;/script&gt;</span>`,
``,
`<span class="tag">&lt;/body&gt;</span>`,
``,
`<span class="tag">&lt;/html&gt;</span>`

];

let lineIndex = 0;

/* =========================
   TYPE CODE
========================= */

function startTyping(){

    typeLine();
}

function typeLine(){

    if(lineIndex >= code.length){

        showThought(
            "calculator.html completed successfully. Next video will create the calculator design using CSS."
        );

        return;
    }

    const row = document.createElement("div");

    row.className = "line";

    const num = document.createElement("div");

    num.className = "num";

    num.innerText = lineIndex + 1;

    const text = document.createElement("div");

    let html = code[lineIndex];

    let i = 0;

    function typeChar(){

        if(i <= html.length){

            text.innerHTML =
            html.substring(0,i) +
            '<span class="cursor"></span>';

            i++;

            setTimeout(typeChar,2);

        }else{

            text.innerHTML = html;

            lineIndex++;

            codeBox.scrollTop = codeBox.scrollHeight;

            setTimeout(typeLine,15);
        }
    }

    row.appendChild(num);

    row.appendChild(text);

    codeBox.appendChild(row);

    typeChar();
}

/* =========================
   THOUGHT BOX
========================= */

function showThought(text){

    thought.innerHTML = text;

    thought.classList.add("show");

    setTimeout(() => {

        thought.classList.remove("show");

    },2800);
}

</script>

</body>
</html>
