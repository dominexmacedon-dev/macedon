<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Python Coding Animation</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

/* BACKGROUND */

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    z-index:0;
}

body::before{
    width:340px;
    height:340px;
    background:#2563eb;
    top:-140px;
    left:-140px;
    opacity:.16;
}

body::after{
    width:320px;
    height:320px;
    background:#7c3aed;
    right:-140px;
    bottom:-140px;
    opacity:.16;
}

/* FRAME */

.frame{
    width:390px;
    height:690px;
    background:#0f172a;
    border-radius:34px;
    overflow:hidden;
    position:relative;
    border:1px solid #1e293b;
    box-shadow:
    0 0 80px rgba(0,0,0,.7),
    inset 0 0 30px rgba(255,255,255,.02);
}

/* FILES */

.files{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:18px;
    z-index:5;
}

.file{
    width:280px;
    height:72px;
    border-radius:22px;
    background:#111827;
    border:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 22px;
    color:white;
    font-weight:600;
    position:relative;
    overflow:hidden;
    opacity:0;
    transform:translateY(20px) scale(.94);
    transition:
    transform .45s ease,
    opacity .45s ease,
    border-color .3s ease,
    box-shadow .3s ease;
}

.file.show{
    opacity:1;
    transform:translateY(0) scale(1);
}

.file::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.08),
        transparent
    );
    transform:translateX(-130%);
}

.file.show::before{
    animation:shine 1.2s linear;
}

@keyframes shine{
    to{
        transform:translateX(250%);
    }
}

.file.active{
    border-color:#6366f1;
    background:#1d1b4b;
    box-shadow:
    0 0 40px rgba(99,102,241,.35);
}

.icon{
    width:18px;
    height:18px;
    border-radius:5px;
    margin-right:16px;
}

.txt{
    background:#64748b;
}

.json{
    background:#22c55e;
}

.py{
    background:linear-gradient(135deg,#38bdf8,#facc15);
}

/* MOUSE */

.mouse{
    position:absolute;
    width:24px;
    height:24px;
    background:white;
    clip-path:polygon(
        0 0,
        0 100%,
        30% 72%,
        48% 100%,
        58% 92%,
        40% 60%,
        100% 60%
    );
    z-index:100;
    opacity:0;
    pointer-events:none;
    transform-origin:top left;
    transition:
    left .75s cubic-bezier(.22,1,.36,1),
    top .75s cubic-bezier(.22,1,.36,1),
    transform .15s ease,
    opacity .3s ease;
    filter:
    drop-shadow(0 0 8px rgba(255,255,255,.5))
    drop-shadow(0 0 18px rgba(255,255,255,.25));
}

.mouse::after{
    content:"";
    position:absolute;
    width:36px;
    height:36px;
    border:2px solid rgba(255,255,255,.35);
    border-radius:50%;
    left:-8px;
    top:-8px;
    opacity:0;
}

.mouse.click::after{
    animation:ripple .45s ease;
}

@keyframes ripple{
    0%{
        transform:scale(.5);
        opacity:1;
    }
    100%{
        transform:scale(1.6);
        opacity:0;
    }
}

/* EDITOR */

.editor{
    position:absolute;
    inset:0;
    background:#0b1220;
    display:none;
    flex-direction:column;
}

.editor.show{
    display:flex;
}

/* TOPBAR */

.topbar{
    height:56px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 18px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    margin-right:6px;
}

.red{background:#ef4444;}
.yellow{background:#facc15;}
.green{background:#22c55e;}

.filename{
    margin-left:12px;
    color:#e2e8f0;
    font-size:14px;
    font-weight:600;
}

/* CODE */

.code{
    flex:1;
    padding:18px;
    overflow:hidden;
    font-family:'Fira Code', monospace;
    font-size:12px;
    line-height:1.8;
    color:white;
}

.line{
    display:flex;
    opacity:0;
    transform:translateY(6px);
    animation:lineShow .18s ease forwards;
}

@keyframes lineShow{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.num{
    width:34px;
    color:#475569;
    text-align:right;
    margin-right:14px;
    user-select:none;
}

.codeText{
    white-space:pre;
}

/* COLORS */

.keyword{
    color:#c084fc;
}

.func{
    color:#4ade80;
}

.string{
    color:#facc15;
}

.comment{
    color:#64748b;
}

.variable{
    color:#38bdf8;
}

.number{
    color:#fb7185;
}

.operator{
    color:#e2e8f0;
}

/* RUN SCREEN */

.runScreen{
    position:absolute;
    inset:0;
    background:#0f172a;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:24px;
}

.runScreen.show{
    display:flex;
}

.runBtn{
    width:190px;
    height:70px;
    border:none;
    border-radius:22px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    font-size:21px;
    font-weight:700;
    letter-spacing:.4px;
    box-shadow:
    0 0 40px rgba(99,102,241,.4);
    transition:transform .12s ease;
}

.runBtn.press{
    transform:scale(.92);
}

/* TERMINAL */

.terminal{
    width:320px;
    height:200px;
    background:#020617;
    border-radius:22px;
    border:1px solid #1e293b;
    overflow:hidden;
    display:none;
    flex-direction:column;
    box-shadow:
    0 0 30px rgba(0,0,0,.45);
}

.terminal.show{
    display:flex;
}

.terminalTop{
    height:40px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 14px;
}

.termBody{
    flex:1;
    padding:16px;
    font-family:'Fira Code', monospace;
    color:#4ade80;
    font-size:13px;
    line-height:1.7;
    white-space:pre-line;
}

.output{
    opacity:0;
    transform:translateY(4px);
    animation:output .12s linear forwards;
}

@keyframes output{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* THOUGHT */

.thought{
    position:absolute;
    left:18px;
    bottom:18px;
    width:352px;
    background:rgba(17,24,39,.95);
    border:1px solid #334155;
    border-radius:18px;
    padding:13px;
    color:#cbd5e1;
    font-size:12px;
    line-height:1.6;
    opacity:0;
    transform:translateY(20px);
    transition:.35s ease;
    z-index:120;
    backdrop-filter:blur(10px);
}

.thought.show{
    opacity:1;
    transform:translateY(0);
}

</style>
</head>

<body>

<div class="frame">

    <!-- FILES -->

    <div class="files" id="files">

        <div class="file" id="txtFile">
            <div class="icon txt"></div>
            readme.txt
        </div>

        <div class="file" id="jsonFile">
            <div class="icon json"></div>
            config.json
        </div>

        <div class="file" id="pyFile">
            <div class="icon py"></div>
            calculator.py
        </div>

    </div>

    <!-- MOUSE -->

    <div class="mouse" id="mouse"></div>

    <!-- EDITOR -->

    <div class="editor" id="editor">

        <div class="topbar">

            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>

            <div class="filename">
                calculator.py
            </div>

        </div>

        <div class="code" id="code"></div>

    </div>

    <!-- RUN -->

    <div class="runScreen" id="runScreen">

        <button class="runBtn" id="runBtn">
            Run Python
        </button>

        <div class="terminal" id="terminal">

            <div class="terminalTop">

                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>

            </div>

            <div class="termBody" id="termBody"></div>

        </div>

    </div>

    <!-- THOUGHT -->

    <div class="thought" id="thought"></div>

</div>

<script>

/* ELEMENTS */

const txtFile = document.getElementById("txtFile");
const jsonFile = document.getElementById("jsonFile");
const pyFile = document.getElementById("pyFile");

const files = document.getElementById("files");

const mouse = document.getElementById("mouse");

const editor = document.getElementById("editor");

const codeBox = document.getElementById("code");

const thought = document.getElementById("thought");

const runScreen = document.getElementById("runScreen");

const runBtn = document.getElementById("runBtn");

const terminal = document.getElementById("terminal");

const termBody = document.getElementById("termBody");

const frame = document.querySelector(".frame");

/* FILE APPEAR */

setTimeout(()=>{
    txtFile.classList.add("show");
},250);

setTimeout(()=>{
    jsonFile.classList.add("show");
},500);

setTimeout(()=>{
    pyFile.classList.add("show");
},750);

/* MOUSE POSITION */

function moveMouseTo(element){

    const rect = element.getBoundingClientRect();

    const frameRect = frame.getBoundingClientRect();

    const x =
    rect.left - frameRect.left + rect.width * 0.52;

    const y =
    rect.top - frameRect.top + rect.height * 0.52;

    mouse.style.left = x + "px";
    mouse.style.top = y + "px";
}

/* CLICK EFFECT */

function clickMouse(callback){

    mouse.classList.add("click");

    mouse.style.transform = "scale(.78)";

    setTimeout(()=>{

        mouse.style.transform = "scale(1)";

    },90);

    setTimeout(()=>{

        mouse.classList.remove("click");

        if(callback) callback();

    },180);
}

/* OPEN FILE */

setTimeout(()=>{

    mouse.style.opacity = "1";

    moveMouseTo(pyFile);

    setTimeout(()=>{

        clickMouse(()=>{

            pyFile.classList.add("active");

            setTimeout(openEditor,220);

        });

    },700);

},1700);

/* OPEN EDITOR */

function openEditor(){

    showThought(
        "Building optimized Python calculator logic..."
    );

    setTimeout(()=>{

        files.style.display = "none";

        mouse.style.opacity = "0";

        editor.classList.add("show");

        ultraFastCode();

    },420);
}

/* FAST CODE */

const code = [

`<span class="comment"># Premium Python Calculator</span>`,

`<span class="keyword">def</span> <span class="func">multiply</span>(a, b):`,
`    <span class="keyword">return</span> a <span class="operator">*</span> b`,

``,

`<span class="variable">result</span> <span class="operator">=</span> multiply(<span class="number">7</span>, <span class="number">8</span>)`,

`print(<span class="string">"Result:"</span>, result)`

];

function ultraFastCode(){

    code.forEach((line, index)=>{

        setTimeout(()=>{

            const row = document.createElement("div");

            row.className = "line";

            row.innerHTML = `
                <div class="num">${index + 1}</div>
                <div class="codeText">${line}</div>
            `;

            codeBox.appendChild(row);

        }, index * 45);

    });

    setTimeout(()=>{

        showThought(
            "Compilation complete. Executing program..."
        );

        setTimeout(showRunScreen,450);

    },420);
}

/* RUN SCREEN */

function showRunScreen(){

    editor.style.display = "none";

    runScreen.classList.add("show");

    mouse.style.opacity = "1";

    setTimeout(()=>{

        moveMouseTo(runBtn);

        setTimeout(()=>{

            clickMouse(()=>{

                runBtn.classList.add("press");

                setTimeout(showOutput,120);

            });

        },500);

    },150);
}

/* OUTPUT */

function showOutput(){

    terminal.classList.add("show");

    const outputs = [

`> python calculator.py
Running optimized script...

Result: 56

Program executed successfully`

    ];

    outputs.forEach((text, index)=>{

        setTimeout(()=>{

            const line =
            document.createElement("div");

            line.className = "output";

            line.innerText = text;

            termBody.appendChild(line);

        }, index * 40);

    });
}

/* THOUGHT */

function showThought(text){

    thought.innerHTML = text;

    thought.classList.add("show");

    setTimeout(()=>{

        thought.classList.remove("show");

    },1800);
}

</script>

</body>
</html>
