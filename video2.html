<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator JS Video</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050b16;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

/* FRAME */

.frame{
    width:390px;
    height:690px;
    background:#0f172a;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    border:1px solid #1e293b;
    box-shadow:0 0 70px rgba(0,0,0,.75);
}

/* FILES */

.files{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:16px;
}

.file{
    width:260px;
    height:70px;
    background:#111827;
    border:1px solid #1e293b;
    border-radius:18px;
    display:flex;
    align-items:center;
    padding:0 18px;
    color:white;
    font-weight:600;
    opacity:0;
    transform:scale(.8);
    transition:.4s;
    position:relative;
    overflow:hidden;
}

.file.show{
    opacity:1;
    transform:scale(1);
}

.file.active{
    border-color:#facc15;
    background:#3a3200;
    box-shadow:0 0 30px rgba(250,204,21,.25);
}

.icon{
    width:14px;
    height:14px;
    border-radius:3px;
    margin-right:14px;
}

.html{ background:#f97316; }
.css{ background:#38bdf8; }
.js{ background:#facc15; }

/* SHINE */

.file::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.1),
        transparent
    );
}

.file.active::after{
    animation:shine 1s linear;
}

@keyframes shine{
    to{
        left:100%;
    }
}

/* MOUSE */

.mouse{
    position:absolute;
    width:22px;
    height:22px;
    background:white;
    clip-path:polygon(0 0,0 100%,30% 70%,50% 100%,60% 90%,40% 60%,100% 60%);
    opacity:0;
    transition:1s ease;
    z-index:90;
}

/* EDITOR */

.editor{
    position:absolute;
    inset:0;
    background:#0b1220;
    display:none;
    flex-direction:column;
}

.editor.show{
    display:flex;
}

/* TOP */

.top{
    height:54px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 16px;
    color:#e2e8f0;
    font-weight:600;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#facc15;
    margin-right:10px;
}

/* CODE */

.code{
    flex:1;
    padding:16px;
    overflow:hidden;
    font-family:'Fira Code', monospace;
    font-size:11.7px;
    color:white;
    line-height:1.7;
}

.line{
    display:flex;
}

.num{
    width:30px;
    color:#475569;
    margin-right:12px;
    user-select:none;
}

/* COLORS */

.keyword{ color:#c084fc; }
.func{ color:#4ade80; }
.string{ color:#facc15; }
.comment{ color:#64748b; }
.var{ color:#38bdf8; }

/* CURSOR */

.cursor{
    width:8px;
    height:14px;
    background:white;
    display:inline-block;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* THOUGHT */

.thought{
    position:absolute;
    left:18px;
    bottom:18px;
    width:350px;
    background:#111827;
    border:1px solid #334155;
    border-radius:16px;
    padding:12px;
    color:#cbd5e1;
    font-size:12px;
    line-height:1.6;
    opacity:0;
    transform:translateY(20px);
    transition:.4s;
    z-index:100;
}

.thought.show{
    opacity:1;
    transform:translateY(0);
}

/* RUN SCENE */

.runScene{
    position:absolute;
    inset:0;
    background:#0f172a;
    display:none;
    justify-content:center;
    align-items:center;
}

.runScene.show{
    display:flex;
}

.runBtn{
    background:#22c55e;
    color:white;
    border:none;
    padding:16px 34px;
    border-radius:16px;
    font-size:18px;
    font-weight:700;
    transition:.2s;
}

.runBtn.press{
    transform:scale(.9);
}

/* CALCULATOR */

.calcWrap{
    position:absolute;
    inset:0;
    background:#0f172a;
    display:none;
    justify-content:center;
    align-items:center;
}

.calcWrap.show{
    display:flex;
}

.calculator{
    width:300px;
    background:#111827;
    border-radius:24px;
    padding:18px;
    box-shadow:0 0 50px rgba(0,0,0,.6);
}

.screen{
    height:90px;
    background:#020617;
    border-radius:16px;
    margin-bottom:18px;
    display:flex;
    justify-content:flex-end;
    align-items:flex-end;
    padding:16px;
    color:white;
    font-size:34px;
    font-weight:700;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

.btn{
    height:58px;
    border-radius:14px;
    background:#1e293b;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:20px;
    font-weight:700;
    transition:.15s;
}

.orange{
    background:#f97316;
}

.green{
    background:#22c55e;
}

.btn.press{
    transform:scale(.88);
}

</style>
</head>

<body>

<div class="frame">

    <!-- FILES -->

    <div class="files" id="files">

        <div class="file" id="htmlFile">
            <div class="icon html"></div>
            calculator.html
        </div>

        <div class="file" id="cssFile">
            <div class="icon css"></div>
            calculator.css
        </div>

        <div class="file" id="jsFile">
            <div class="icon js"></div>
            calculator.js
        </div>

    </div>

    <!-- MOUSE -->

    <div class="mouse" id="mouse"></div>

    <!-- EDITOR -->

    <div class="editor" id="editor">

        <div class="top">
            <div class="dot"></div>
            calculator.js
        </div>

        <div class="code" id="code"></div>

    </div>

    <!-- RUN -->

    <div class="runScene" id="runScene">

        <button class="runBtn" id="runBtn">
            Run
        </button>

    </div>

    <!-- CALCULATOR -->

    <div class="calcWrap" id="calcWrap">

        <div class="calculator">

            <div class="screen" id="screen"></div>

            <div class="buttons">

                <div class="btn">7</div>
                <div class="btn">8</div>
                <div class="btn">9</div>
                <div class="btn orange">+</div>

                <div class="btn">4</div>
                <div class="btn">5</div>
                <div class="btn">6</div>
                <div class="btn orange">-</div>

                <div class="btn">1</div>
                <div class="btn">2</div>
                <div class="btn">3</div>
                <div class="btn orange">×</div>

                <div class="btn">0</div>
                <div class="btn green">=</div>
                <div class="btn">.</div>
                <div class="btn orange">÷</div>

            </div>

        </div>

    </div>

    <!-- THOUGHT -->

    <div class="thought" id="thought"></div>

</div>

<script>

const htmlFile = document.getElementById("htmlFile");
const cssFile = document.getElementById("cssFile");
const jsFile = document.getElementById("jsFile");

const mouse = document.getElementById("mouse");

const editor = document.getElementById("editor");
const codeBox = document.getElementById("code");

const thought = document.getElementById("thought");

const runScene = document.getElementById("runScene");
const runBtn = document.getElementById("runBtn");

const calcWrap = document.getElementById("calcWrap");

/* FILE SHOW */

setTimeout(()=> htmlFile.classList.add("show"),600);
setTimeout(()=> cssFile.classList.add("show"),1000);
setTimeout(()=> jsFile.classList.add("show"),1400);

/* =========================
   CLICK JS FILE
========================= */

setTimeout(() => {

    mouse.style.opacity = "1";

    mouse.style.left = "100px";
    mouse.style.top = "290px";

    mouse.style.transition = "1s ease";

    setTimeout(() => {

        /* MOVE TO JS FILE */

        mouse.style.left = "145px";
        mouse.style.top = "410px";

        setTimeout(() => {

            /* CLICK EFFECT */

            jsFile.classList.add("active");

            mouse.style.transform = "scale(.82)";

            setTimeout(() => {

                mouse.style.transform = "scale(1)";

                openEditor();

            },180);

        },900);

    },300);

},2300);
function openEditor(){

    files.style.display = "none";

    editor.classList.add("show");

    showThought(
        "Now adding JavaScript functions to make calculator interactive."
    );

    setTimeout(typeCode,900);
}

/* JS CODE */

const code = [

`<span class="comment">// Calculator Logic</span>`,

`<span class="keyword">const</span> screen = document.getElementById(<span class="string">"screen"</span>);`,

`<span class="keyword">function</span> <span class="func">press</span>(value){`,
`   screen.innerText += value;`,
`}`,

`<span class="keyword">function</span> <span class="func">clearScreen</span>(){`,
`   screen.innerText = "";`,
`}`,

`<span class="keyword">function</span> <span class="func">calculate</span>(){`,
`   <span class="keyword">try</span>{`,
`      screen.innerText = eval(screen.innerText);`,
`   }`,
`   <span class="keyword">catch</span>{`,
`      screen.innerText = "Error";`,
`   }`,
`}`

];

let lineIndex = 0;

/* TYPE */

function typeCode(){

    if(lineIndex >= code.length){

        showThought(
            "JavaScript completed. Running the calculator project now."
        );

        setTimeout(showRunScene,2200);

        return;
    }

    const row = document.createElement("div");

    row.className = "line";

    const num = document.createElement("div");

    num.className = "num";

    num.innerText = lineIndex + 1;

    const text = document.createElement("div");

    let html = code[lineIndex];

    let i = 0;

    function typeChar(){

        if(i <= html.length){

            text.innerHTML =
            html.substring(0,i) +
            '<span class="cursor"></span>';

            i++;

            setTimeout(typeChar,4);

        }else{

            text.innerHTML = html;

            lineIndex++;

            setTimeout(typeCode,40);
        }
    }

    row.appendChild(num);
    row.appendChild(text);

    codeBox.appendChild(row);

    typeChar();
}

/* RUN */

function showRunScene(){

    editor.style.display = "none";

    runScene.classList.add("show");

    mouse.style.opacity = 1;

    mouse.style.left = "140px";
    mouse.style.top = "430px";

    setTimeout(()=>{

        mouse.style.left = "195px";
        mouse.style.top = "335px";

        setTimeout(()=>{

            runBtn.classList.add("press");

            setTimeout(showCalculator,500);

        },800);

    },500);
}

/* SHOW CALCULATOR */

function showCalculator(){

    runScene.style.display = "none";

    calcWrap.classList.add("show");

    autoTest();
}

/* AUTO TEST */

function autoTest(){

    const screen = document.getElementById("screen");

    const buttons =
    document.querySelectorAll(".btn");

    const sequence = [

        ["7","7"],
        ["+","7+"],
        ["3","7+3"],
        ["=","10"]

    ];

    let i = 0;

    function clickNext(){

        if(i >= sequence.length) return;

        const [key,result] = sequence[i];

        buttons.forEach(btn=>{

            if(btn.innerText === key){

                btn.classList.add("press");

                setTimeout(()=>{
                    btn.classList.remove("press");
                },180);
            }
        });

        screen.innerText = result;

        i++;

        setTimeout(clickNext,700);
    }

    clickNext();
}

/* THOUGHT */

function showThought(text){

    thought.innerHTML = text;

    thought.classList.add("show");

    setTimeout(()=>{

        thought.classList.remove("show");

    },2800);
}

</script>

</body>
</html>
