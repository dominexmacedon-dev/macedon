<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator JS Video</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050b16;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

/* FRAME */

.frame{
    width:390px;
    height:690px;
    background:#0f172a;
    border-radius:30px;
    overflow:hidden;
    position:relative;
    border:1px solid #1e293b;
    box-shadow:
    0 0 60px rgba(0,0,0,.7),
    inset 0 0 40px rgba(255,255,255,.02);
}

/* MAIN */

.main{
    width:100%;
    height:100%;
    padding:20px;
    position:relative;
}

/* FILES */

.files{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:18px;
}

.file{
    width:260px;
    height:70px;
    border-radius:18px;
    background:#111827;
    border:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 22px;
    color:white;
    font-weight:600;
    transform:scale(.7);
    opacity:0;
    position:relative;
    overflow:hidden;
}

.file::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.08),
        transparent
    );
    transform:translateX(-100%);
}

.file.show{
    animation:fileShow .7s ease forwards;
}

.file.show::before{
    animation:shine 1.2s linear;
}

@keyframes shine{
    to{
        transform:translateX(250%);
    }
}

@keyframes fileShow{
    to{
        transform:scale(1);
        opacity:1;
    }
}

.file.active{
    border-color:#facc15;
    background:#3a3200;
    box-shadow:0 0 35px rgba(250,204,21,.3);
}

.icon{
    width:16px;
    height:16px;
    border-radius:4px;
    margin-right:16px;
}

.htmlIcon{
    background:#f97316;
}

.cssIcon{
    background:#38bdf8;
}

.jsIcon{
    background:#facc15;
}

/* MOUSE */

.mouse{
    position:absolute;
    width:24px;
    height:24px;
    background:white;
    clip-path:polygon(0 0,0 100%,30% 72%,48% 100%,58% 92%,40% 60%,100% 60%);
    z-index:60;
    opacity:0;
}

/* EDITOR */

.editor{
    position:absolute;
    inset:0;
    background:#0b1220;
    display:none;
    flex-direction:column;
}

.editor.show{
    display:flex;
}

/* TAB */

.tab{
    height:56px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 20px;
    color:#e2e8f0;
    font-size:14px;
    font-weight:600;
}

.tabDot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#facc15;
    margin-right:12px;
}

/* CODE AREA */

.code{
    flex:1;
    padding:18px;
    overflow:hidden;
    font-family:'Fira Code', monospace;
    font-size:11.5px;
    color:white;
    line-height:1.75;
}

.line{
    display:flex;
}

.num{
    width:34px;
    color:#475569;
    text-align:right;
    margin-right:14px;
    user-select:none;
}

/* COLORS */

.keyword{
    color:#c084fc;
}

.func{
    color:#4ade80;
}

.string{
    color:#facc15;
}

.comment{
    color:#6272a4;
}

.var{
    color:#38bdf8;
}

/* CURSOR */

.cursor{
    width:8px;
    height:14px;
    background:white;
    display:inline-block;
    margin-left:2px;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* THOUGHT */

.thought{
    position:absolute;
    left:20px;
    bottom:18px;
    width:350px;
    background:#111827;
    border:1px solid #334155;
    border-radius:18px;
    padding:14px;
    color:#cbd5e1;
    font-size:12px;
    line-height:1.7;
    opacity:0;
    transform:translateY(25px);
    transition:.5s;
    z-index:90;
}

.thought.show{
    opacity:1;
    transform:translateY(0);
}

/* RUN */

.runScene{
    position:absolute;
    inset:0;
    background:#0f172a;
    display:none;
    justify-content:center;
    align-items:center;
}

.runScene.show{
    display:flex;
}

.runBtn{
    width:170px;
    height:70px;
    border:none;
    border-radius:20px;
    background:#22c55e;
    color:white;
    font-size:22px;
    font-weight:700;
    box-shadow:0 0 30px rgba(34,197,94,.4);
    transition:.2s;
}

.runBtn.press{
    transform:scale(.9);
}

/* CALCULATOR */

.calcWrap{
    position:absolute;
    inset:0;
    background:#0f172a;
    display:none;
    justify-content:center;
    align-items:center;
}

.calcWrap.show{
    display:flex;
}

.calculator{
    width:300px;
    background:#111827;
    border-radius:24px;
    padding:18px;
    box-shadow:0 0 40px rgba(0,0,0,.6);
}

.screen{
    height:90px;
    background:#020617;
    border-radius:16px;
    margin-bottom:18px;
    display:flex;
    justify-content:flex-end;
    align-items:flex-end;
    padding:16px;
    color:white;
    font-size:34px;
    font-weight:700;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

.btn{
    height:58px;
    border-radius:14px;
    background:#1e293b;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:20px;
    font-weight:700;
    transition:.15s;
}

.orange{
    background:#f97316;
}

.green{
    background:#22c55e;
}

.btn.press{
    transform:scale(.88);
}

</style>
</head>

<body>

<div class="frame">

    <div class="main">

        <!-- FILES -->

        <div class="files" id="files">

            <div class="file" id="htmlFile">
                <div class="icon htmlIcon"></div>
                calculator.html
            </div>

            <div class="file" id="cssFile">
                <div class="icon cssIcon"></div>
                calculator.css
            </div>

            <div class="file" id="jsFile">
                <div class="icon jsIcon"></div>
                calculator.js
            </div>

        </div>

        <!-- MOUSE -->

        <div class="mouse" id="mouse"></div>

        <!-- EDITOR -->

        <div class="editor" id="editor">

            <div class="tab">

                <div class="tabDot"></div>

                calculator.js

            </div>

            <div class="code" id="code"></div>

        </div>

        <!-- RUN -->

        <div class="runScene" id="runScene">

            <button class="runBtn" id="runBtn">
                Run Project
            </button>

        </div>

        <!-- CALCULATOR -->

        <div class="calcWrap" id="calcWrap">

            <div class="calculator">

                <div class="screen" id="screen">0</div>

                <div class="buttons">

                    <div class="btn">7</div>
                    <div class="btn">8</div>
                    <div class="btn">9</div>
                    <div class="btn orange">+</div>

                    <div class="btn">4</div>
                    <div class="btn">5</div>
                    <div class="btn">6</div>
                    <div class="btn orange">-</div>

                    <div class="btn">1</div>
                    <div class="btn">2</div>
                    <div class="btn">3</div>
                    <div class="btn orange">×</div>

                    <div class="btn">0</div>
                    <div class="btn green">=</div>
                    <div class="btn">.</div>
                    <div class="btn orange">÷</div>

                </div>

            </div>

        </div>

        <!-- THOUGHT -->

        <div class="thought" id="thought"></div>

    </div>

</div>

<script>

const htmlFile = document.getElementById("htmlFile");
const cssFile = document.getElementById("cssFile");
const jsFile = document.getElementById("jsFile");

const editor = document.getElementById("editor");
const codeBox = document.getElementById("code");

const mouse = document.getElementById("mouse");

const thought = document.getElementById("thought");

const runScene = document.getElementById("runScene");
const runBtn = document.getElementById("runBtn");

const calcWrap = document.getElementById("calcWrap");

/* FILES APPEAR */

setTimeout(() => {
    htmlFile.classList.add("show");
},300);

setTimeout(() => {
    cssFile.classList.add("show");
},700);

setTimeout(() => {
    jsFile.classList.add("show");
},1100);

/* CLICK JS FILE */

setTimeout(() => {

    mouse.style.opacity = "1";

    mouse.style.left = "100px";
    mouse.style.top = "290px";

    mouse.style.transition = "1s ease";

    setTimeout(() => {

        mouse.style.left = "145px";
        mouse.style.top = "405px";

        setTimeout(() => {

            jsFile.classList.add("active");

            mouse.style.transform = "scale(.82)";

            setTimeout(() => {

                mouse.style.transform = "scale(1)";

                openEditor();

            },180);

        },900);

    },300);

},2300);

/* OPEN EDITOR */

function openEditor(){

    showThought(
        "Now adding JavaScript functionality for calculator interactions."
    );

    setTimeout(() => {

        document.getElementById("files").style.display = "none";

        mouse.style.opacity = "0";

        editor.classList.add("show");

        startTyping();

    },700);
}

/* JS CODE */

const code = [

`<span class="comment">// SELECT SCREEN</span>`,
`<span class="keyword">const</span> screen = document.getElementById(<span class="string">"screen"</span>);`,
``,
`<span class="comment">// DISPLAY VALUE</span>`,
`<span class="keyword">function</span> <span class="func">press</span>(value){`,
`   screen.innerText += value;`,
`}`,
``,
`<span class="comment">// CLEAR SCREEN</span>`,
`<span class="keyword">function</span> <span class="func">clearScreen</span>(){`,
`   screen.innerText = <span class="string">""</span>;`,
`}`,
``,
`<span class="comment">// CALCULATE RESULT</span>`,
`<span class="keyword">function</span> <span class="func">calculate</span>(){`,
`   <span class="keyword">try</span>{`,
`      screen.innerText = eval(screen.innerText);`,
`   }`,
`   <span class="keyword">catch</span>{`,
`      screen.innerText = <span class="string">"Error"</span>;`,
`   }`,
`}`

];

let lineIndex = 0;

/* TYPE CODE */

function startTyping(){

    typeLine();
}

function typeLine(){

    if(lineIndex >= code.length){

        showThought(
            "calculator.js completed successfully. Running project now."
        );

        setTimeout(showRunScene,2200);

        return;
    }

    const row = document.createElement("div");

    row.className = "line";

    const num = document.createElement("div");

    num.className = "num";

    num.innerText = lineIndex + 1;

    const text = document.createElement("div");

    let html = code[lineIndex];

    let i = 0;

    function typeChar(){

        if(i <= html.length){

            text.innerHTML =
            html.substring(0,i) +
            '<span class="cursor"></span>';

            i++;

            setTimeout(typeChar,2);

        }else{

            text.innerHTML = html;

            lineIndex++;

            codeBox.scrollTop = codeBox.scrollHeight;

            setTimeout(typeLine,18);
        }
    }

    row.appendChild(num);

    row.appendChild(text);

    codeBox.appendChild(row);

    typeChar();
}

/* SHOW RUN */

function showRunScene(){

    editor.style.display = "none";

    runScene.classList.add("show");

    mouse.style.opacity = "1";

    mouse.style.left = "120px";
    mouse.style.top = "500px";

    setTimeout(() => {

        mouse.style.left = "185px";
        mouse.style.top = "330px";

        setTimeout(() => {

            runBtn.classList.add("press");

            mouse.style.transform = "scale(.82)";

            setTimeout(() => {

                mouse.style.transform = "scale(1)";

                showCalculator();

            },250);

        },900);

    },300);
}

/* SHOW CALCULATOR */

function showCalculator(){

    runScene.style.display = "none";

    calcWrap.classList.add("show");

    autoTest();
}

/* AUTO TEST */

function autoTest(){

    const screen = document.getElementById("screen");

    const buttons =
    document.querySelectorAll(".btn");

    const sequence = [

        ["7","7"],
        ["+","7+"],
        ["3","7+3"],
        ["=","10"]

    ];

    let i = 0;

    function clickNext(){

        if(i >= sequence.length) return;

        const [key,result] = sequence[i];

        buttons.forEach(btn=>{

            if(btn.innerText === key){

                btn.classList.add("press");

                setTimeout(() => {

                    btn.classList.remove("press");

                },180);
            }
        });

        screen.innerText = result;

        i++;

        setTimeout(clickNext,700);
    }

    clickNext();
}

/* THOUGHT */

function showThought(text){

    thought.innerHTML = text;

    thought.classList.add("show");

    setTimeout(() => {

        thought.classList.remove("show");

    },2800);
}

</script>

</body>
</html>
