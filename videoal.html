<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape Morph Engine</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#020617;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

.frame{
    width:430px;
    height:800px;
    position:relative;
    background:#0f172a;
    border-radius:28px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.08);
}

canvas{
    position:absolute;
    inset:0;
}

/* HUD */
.hud{
    position:absolute;
    top:16px;
    left:16px;
    right:16px;
    display:flex;
    justify-content:space-between;
    z-index:10;
}

.box{
    padding:10px 12px;
    border-radius:14px;
    background:rgba(255,255,255,.06);
    color:white;
    font-weight:800;
    font-size:12px;
    backdrop-filter:blur(10px);
}

/* EQUATION */
.eq{
    position:absolute;
    bottom:16px;
    left:16px;
    right:16px;

    padding:14px;
    border-radius:18px;

    background:rgba(2,6,23,.75);
    border:1px solid rgba(255,255,255,.08);

    color:#7dd3fc;
    font-weight:800;
    font-size:14px;

    text-shadow:0 0 18px rgba(125,211,252,.7);
}

.glow{
    color:#38bdf8;
    text-shadow:0 0 12px #38bdf8, 0 0 28px #2563eb;
}

</style>
</head>

<body>

<div class="frame">

<canvas id="c" width="430" height="800"></canvas>

<div class="hud">
    <div class="box" id="state">MORPH</div>
    <div class="box" id="progress">0%</div>
</div>

<div class="eq" id="eq">
Equation: <span class="glow">y = mx + b</span>
</div>

</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let t = 0;

/* BASE POINT SETS (same resolution for morphing) */
const N = 80;

/* LINE */
function shapeLine(){
    let arr = [];
    for(let i=0;i<N;i++){
        let x = 100 + (i/(N-1))*230;
        let y = 400;
        arr.push({x,y});
    }
    return arr;
}

/* CIRCLE */
function shapeCircle(){
    let arr = [];
    let cx = 215, cy = 400, r = 110;

    for(let i=0;i<N;i++){
        let a = (i/N)*Math.PI*2;
        arr.push({
            x: cx + Math.cos(a)*r,
            y: cy + Math.sin(a)*r
        });
    }
    return arr;
}

/* RECT */
function shapeRect(){
    let arr = [];
    let x=120,y=300,w=190,h=200;

    let edges = [
        [x,y],
        [x+w,y],
        [x+w,y+h],
        [x,y+h]
    ];

    for(let i=0;i<N;i++){
        let p = edges[Math.floor((i/(N-1))*4)];
        arr.push({x:p[0],y:p[1]});
    }
    return arr;
}

/* TRIANGLE */
function shapeTriangle(){
    let arr = [];
    let pts = [
        {x:215,y:280},
        {x:120,y:500},
        {x:310,y:500}
    ];

    for(let i=0;i<N;i++){
        let p = pts[Math.floor((i/(N-1))*3)];
        arr.push({x:p.x,y:p.y});
    }
    return arr;
}

/* INTERPOLATION */
function lerp(a,b,t){
    return a + (b-a)*t;
}

/* MORPH SETS */
let shapes = [
    shapeLine(),
    shapeCircle(),
    shapeRect(),
    shapeTriangle()
];

let mode = 0;

/* DRAW */
function draw(points){

    ctx.clearRect(0,0,430,800);

    ctx.strokeStyle="#38bdf8";
    ctx.lineWidth=3;
    ctx.shadowColor="#38bdf8";
    ctx.shadowBlur=25;

    ctx.beginPath();

    ctx.moveTo(points[0].x, points[0].y);

    for(let i=1;i<points.length;i++){
        ctx.lineTo(points[i].x, points[i].y);
    }

    ctx.closePath();
    ctx.stroke();

    ctx.shadowBlur=0;
}

/* ANIMATE */
function animate(){

    let phase = t % 200 / 200;

    let s1 = shapes[mode];
    let s2 = shapes[(mode+1)%shapes.length];

    let mixed = [];

    for(let i=0;i<N;i++){
        mixed.push({
            x: lerp(s1[i].x, s2[i].x, phase),
            y: lerp(s1[i].y, s2[i].y, phase)
        });
    }

    draw(mixed);

    document.getElementById("progress").innerText =
    Math.floor(phase*100) + "%";

    /* EQUATIONS */
    let eqs = [
        "y = mx + b (LINE)",
        "x² + y² = r² (CIRCLE)",
        "A = w × h (RECTANGLE)",
        "A = 1/2 × b × h (TRIANGLE)"
    ];

    document.getElementById("eq").innerHTML =
    `Equation: <span class="glow">${eqs[mode]}</span>`;

    t += 2;

    if(t % 200 === 0){
        mode = (mode + 1) % shapes.length;
    }

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
