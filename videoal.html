<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Programming Animation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top,#312e81,#020617 60%);

    font-family:'Poppins',sans-serif;
}

/* VIDEO FRAME */

.video-frame{
    position:relative;
    width:430px;
    height:760px;

    overflow:hidden;
    border-radius:40px;

    background:
    linear-gradient(180deg,#020617,#0f172a,#020617);

    border:2px solid rgba(255,255,255,0.08);

    box-shadow:
    0 0 40px rgba(0,255,255,0.15),
    0 0 120px rgba(168,85,247,0.2),
    inset 0 0 50px rgba(255,255,255,0.03);
}

/* GRID */

.grid{
    position:absolute;
    inset:0;

    background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);

    background-size:40px 40px;

    animation:gridMove 20s linear infinite;
}

@keyframes gridMove{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(40px);
    }
}

/* GLOW */

.glow1{
    position:absolute;

    width:350px;
    height:350px;

    border-radius:50%;

    background:
    radial-gradient(circle, rgba(0,255,255,0.18), transparent 70%);

    top:-100px;
    left:-100px;

    filter:blur(20px);

    animation:float1 8s ease-in-out infinite;
}

.glow2{
    position:absolute;

    width:320px;
    height:320px;

    border-radius:50%;

    background:
    radial-gradient(circle, rgba(168,85,247,0.22), transparent 70%);

    bottom:-100px;
    right:-100px;

    filter:blur(25px);

    animation:float2 10s ease-in-out infinite;
}

@keyframes float1{
    0%,100%{
        transform:translate(0,0);
    }

    50%{
        transform:translate(40px,50px);
    }
}

@keyframes float2{
    0%,100%{
        transform:translate(0,0);
    }

    50%{
        transform:translate(-50px,-30px);
    }
}

/* CONTENT */

.content{
    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:40px;

    color:white;
    text-align:center;
}

/* SCENES */

.scene{
    position:absolute;

    opacity:0;

    transform:
    translateY(40px)
    scale(.94);
}

/* TITLES */

.title{
    font-size:48px;
    font-weight:800;

    line-height:1.1;
    letter-spacing:-2px;

    text-shadow:
    0 0 15px rgba(255,255,255,.2),
    0 0 35px rgba(0,255,255,.2);
}

.subtitle{
    font-size:34px;
    font-weight:700;

    color:#d8b4fe;

    text-shadow:
    0 0 12px #a855f7,
    0 0 40px #9333ea;
}

/* EDITOR */

.editor{
    position:relative;

    width:340px;

    padding:24px;

    border-radius:24px;

    background:
    rgba(15,23,42,.75);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(10px);

    box-shadow:
    0 0 40px rgba(0,255,255,.1),
    inset 0 0 20px rgba(255,255,255,.03);
}

.editor::before{
    content:'';

    position:absolute;
    inset:0;

    border-radius:24px;

    background:
    linear-gradient(
        135deg,
        rgba(0,255,255,.06),
        rgba(168,85,247,.05)
    );

    pointer-events:none;
}

.editor-top{
    display:flex;
    gap:8px;

    margin-bottom:22px;
}

.dot{
    width:12px;
    height:12px;

    border-radius:50%;
}

.red{
    background:#ff5f57;
}

.yellow{
    background:#febb2e;
}

.green{
    background:#28c840;
}

/* CODE */

.code{
    font-family:'Fira Code', monospace;

    color:#7df9ff;

    font-size:24px;
    font-weight:600;

    text-shadow:
    0 0 10px #00ffff,
    0 0 30px #00ffff;

    white-space:nowrap;
    overflow:hidden;

    border-right:3px solid #00ffff;

    width:0;

    animation:
    typing 2.5s steps(30,end) forwards,
    blink .8s infinite;
}

@keyframes typing{
    from{
        width:0;
    }

    to{
        width:100%;
    }
}

@keyframes blink{
    50%{
        border-color:transparent;
    }
}

/* RUN AREA */

.run-area{
    position:relative;

    height:95px;

    margin-top:30px;
}

/* RUN BUTTON */

.run-btn{
    position:absolute;

    left:50%;

    transform:translateX(-50%);

    display:flex;
    align-items:center;
    gap:12px;

    padding:15px 38px;

    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        #06b6d4,
        #8b5cf6
    );

    color:white;

    font-weight:700;
    font-size:20px;

    box-shadow:
    0 0 20px rgba(0,255,255,.4),
    0 0 50px rgba(168,85,247,.4);

    animation:buttonPulse 2s infinite;
}

.run-btn i{
    font-size:22px;

    filter:
    drop-shadow(0 0 10px rgba(255,255,255,.8));
}

@keyframes buttonPulse{

    0%,100%{
        transform:
        translateX(-50%)
        scale(1);
    }

    50%{
        transform:
        translateX(-50%)
        scale(1.08);
    }
}

/* MOUSE */

.mouse{
    position:absolute;

    width:36px;
    height:36px;

    border-radius:50%;

    background:white;

    box-shadow:
    0 0 15px white,
    0 0 30px #00ffff;

    animation:mouseMove 3s ease forwards;
}

.mouse::after{
    content:'';

    position:absolute;
    inset:8px;

    border-radius:50%;

    background:#0f172a;
}

@keyframes mouseMove{

    0%{
        top:-40px;
        left:20px;
        opacity:0;
    }

    10%{
        opacity:1;
    }

    70%{
        top:28px;
        left:148px;
    }

    82%{
        transform:scale(.7);
    }

    100%{
        top:28px;
        left:148px;

        transform:scale(1);
    }
}

/* RESULT */

.result{
    margin-top:28px;

    font-size:64px;
    font-weight:800;

    opacity:0;

    animation:
    resultPop 1s forwards;

    animation-delay:3s;

    text-shadow:
    0 0 15px #ffffff,
    0 0 35px #00ffff,
    0 0 80px #00ffff,
    0 0 140px #a855f7;
}

.purple{
    color:#d8b4fe;
}

.greenText{
    color:#86efac;
}

@keyframes resultPop{

    0%{
        opacity:0;

        transform:
        scale(.4)
        rotate(-10deg);

        filter:blur(12px);
    }

    60%{
        transform:
        scale(1.15)
        rotate(4deg);
    }

    100%{
        opacity:1;

        transform:
        scale(1)
        rotate(0deg);

        filter:blur(0px);
    }
}

/* FOOTER */

.footer{
    position:absolute;

    bottom:50px;
    width:100%;

    text-align:center;

    color:rgba(255,255,255,.6);

    letter-spacing:1px;

    font-size:15px;
}

/* FADE */

.fadeIn{
    animation:fadeIn 2s forwards;
}

.fadeOut{
    animation:fadeOut 1.8s forwards;
}

@keyframes fadeIn{

    from{
        opacity:0;

        transform:
        translateY(40px)
        scale(.94);

        filter:blur(10px);
    }

    to{
        opacity:1;

        transform:
        translateY(0)
        scale(1);

        filter:blur(0px);
    }
}

@keyframes fadeOut{

    from{
        opacity:1;

        transform:
        translateY(0)
        scale(1);

        filter:blur(0px);
    }

    to{
        opacity:0;

        transform:
        translateY(-20px)
        scale(.95);

        filter:blur(12px);
    }
}

</style>
</head>

<body>

<div class="video-frame">

    <div class="grid"></div>

    <div class="glow1"></div>
    <div class="glow2"></div>

    <div class="content">

        <!-- SCENE 1 -->

        <div id="scene1" class="scene">

            <div class="title">
                What is<br>
                Programming?
            </div>

        </div>

        <!-- SCENE 2 -->

        <div id="scene2" class="scene">

            <div class="subtitle">
                This is Javascript.
            </div>

        </div>

        <!-- SCENE 3 -->

        <div id="scene3" class="scene">

            <div class="editor">

                <div class="editor-top">
                    <div class="dot red"></div>
                    <div class="dot yellow"></div>
                    <div class="dot green"></div>
                </div>

                <div class="code">
                    let x = 5;
                </div>

                <div class="run-area">

                    <div class="mouse"></div>

                    <div class="run-btn">
                        <i class="fa-solid fa-play"></i>
                        RUN
                    </div>

                </div>

                <div class="result">
                    5
                </div>

            </div>

        </div>

        <!-- SCENE 4 -->

        <div id="scene4" class="scene">

            <div class="editor">

                <div class="editor-top">
                    <div class="dot red"></div>
                    <div class="dot yellow"></div>
                    <div class="dot green"></div>
                </div>

                <div class="code">
                    let x = 5 + 5;
                </div>

                <div class="run-area">

                    <div class="mouse"></div>

                    <div class="run-btn">
                        <i class="fa-solid fa-play"></i>
                        RUN
                    </div>

                </div>

                <div class="result purple">
                    10
                </div>

            </div>

        </div>

        <!-- SCENE 5 -->

        <div id="scene5" class="scene">

            <div class="editor">

                <div class="editor-top">
                    <div class="dot red"></div>
                    <div class="dot yellow"></div>
                    <div class="dot green"></div>
                </div>

                <div class="code">
                    let x = 5 + 5 + 20;
                </div>

                <div class="run-area">

                    <div class="mouse"></div>

                    <div class="run-btn">
                        <i class="fa-solid fa-play"></i>
                        RUN
                    </div>

                </div>

                <div class="result greenText">
                    30
                </div>

            </div>

        </div>

        <!-- SCENE 6 -->

        <div id="scene6" class="scene">

            <div class="title">
                This is<br>
                Programming....
            </div>

        </div>

    </div>

    <div class="footer">
        Animated by Dominex Macedon
    </div>

</div>

<script>

const scenes = [

    { id:"scene1", show:0, hide:3500 },

    { id:"scene2", show:4200, hide:7200 },

    { id:"scene3", show:7800, hide:14500 },

    { id:"scene4", show:15100, hide:21800 },

    { id:"scene5", show:22400, hide:29100 },

    { id:"scene6", show:29800, hide:999999 }

];

scenes.forEach(scene => {

    const el = document.getElementById(scene.id);

    setTimeout(() => {

        el.classList.add("fadeIn");

    }, scene.show);

    setTimeout(() => {

        el.classList.remove("fadeIn");
        el.classList.add("fadeOut");

    }, scene.hide);

});

</script>

</body>
</html>
