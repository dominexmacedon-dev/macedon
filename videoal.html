<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominex Macedon Pixel Drive</title>

<style>
body{
    margin:0;
    background:#020617;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Inter,sans-serif;
    overflow:hidden;
}

.frame{
    width:420px;
    height:800px;
    position:relative;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 0 80px rgba(0,0,0,.7);
    border:1px solid rgba(255,255,255,.08);
}

/* CANVAS */
canvas{
    background:#000;
    display:block;
}

/* HUD */
.hud{
    position:absolute;
    top:15px;
    left:15px;
    right:15px;
    display:flex;
    justify-content:space-between;
    color:white;
    font-size:12px;
    font-weight:700;
    text-shadow:0 0 10px black;
}

.box{
    background:rgba(255,255,255,.06);
    padding:8px 10px;
    border-radius:12px;
    backdrop-filter:blur(10px);
}

/* SPEED */
.speed{
    position:absolute;
    bottom:15px;
    left:15px;
    color:#7dd3fc;
    font-weight:900;
    font-size:20px;
    text-shadow:0 0 20px rgba(125,211,252,.7);
}

/* WIN LOSE */
.overlay{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,.7);
    color:white;
    font-size:30px;
    font-weight:900;
    opacity:0;
    transition:.6s;
    pointer-events:none;
}

.overlay.show{
    opacity:1;
}

.sub{
    font-size:14px;
    margin-top:10px;
    color:#7dd3fc;
}
</style>
</head>

<body>

<div class="frame">

<canvas id="game" width="420" height="800"></canvas>

<div class="hud">
    <div class="box" id="time">TIME: 0s</div>
    <div class="box" id="distance">KM: 0</div>
</div>

<div class="speed" id="speed">0 km/h</div>

<div class="overlay" id="overlay">
    <div id="result">WIN</div>
    <div class="sub">If you want to create such games, follow me for more tutorials</div>
</div>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let roadW = 200;
let centerX = 210;

let car = {
    x:210,
    y:650,
    w:30,
    h:50
};

let speed = 0;
let distance = 0;
let time = 0;

let obstacles = [];
let running = true;

/* DRAW ROAD */
function drawRoad(){

    ctx.fillStyle="#050814";
    ctx.fillRect(0,0,420,800);

    ctx.strokeStyle="white";
    ctx.lineWidth=4;
    ctx.setLineDash([30,20]);

    ctx.beginPath();
    ctx.moveTo(centerX-roadW/2,0);
    ctx.lineTo(centerX-roadW/2,800);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(centerX+roadW/2,0);
    ctx.lineTo(centerX+roadW/2,800);
    ctx.stroke();

    ctx.setLineDash([]);
}

/* DRAW CAR */
function drawCar(){

    ctx.fillStyle="#38bdf8";

    ctx.fillRect(car.x,car.y,car.w,car.h);

    ctx.shadowColor="#38bdf8";
    ctx.shadowBlur=20;

    ctx.fillRect(car.x,car.y,car.w,car.h);

    ctx.shadowBlur=0;
}

/* OBSTACLE */
function spawnObstacle(){

    obstacles.push({
        x: centerX + (Math.random()*160 - 80),
        y: -50,
        w: 30,
        h: 30
    });
}

function drawObstacles(){

    ctx.fillStyle="#ef4444";

    for(let i=0;i<obstacles.length;i++){

        let o = obstacles[i];

        o.y += speed/10;

        ctx.fillRect(o.x,o.y,o.w,o.h);

        if(
            o.y + o.h > car.y &&
            o.x < car.x + car.w &&
            o.x + o.w > car.x
        ){
            endGame(false);
        }

        if(o.y > 820){
            obstacles.splice(i,1);
            i--;
        }
    }
}

/* UPDATE */
function update(){

    if(!running) return;

    speed += 0.05;
    if(speed > 140) speed = 140;

    distance += speed/100;
    time += 0.016;

    car.x += Math.sin(time*2)*1.2;

    ctx.clearRect(0,0,420,800);

    drawRoad();
    drawObstacles();
    drawCar();

    document.getElementById("speed").innerText =
    Math.floor(speed) + " km/h";

    document.getElementById("distance").innerText =
    "KM: " + distance.toFixed(2);

    document.getElementById("time").innerText =
    "TIME: " + Math.floor(time) + "s";

    if(distance > 5){
        endGame(true);
    }

    requestAnimationFrame(update);
}

/* END GAME */
function endGame(win){

    running = false;

    document.getElementById("overlay").classList.add("show");

    document.getElementById("result").innerText =
    win ? "YOU WIN" : "YOU LOSE";
}

/* AUTO SPAWN */
setInterval(()=>{
    if(running) spawnObstacle();
},800);

/* START */
update();

</script>

</body>
</html>
