<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape Morph Lab</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#020617;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

.frame{
    width:430px;
    height:800px;
    position:relative;
    background:#0f172a;
    border-radius:28px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.08);
}

/* CANVAS */
canvas{
    position:absolute;
    inset:0;
}

/* HUD */
.hud{
    position:absolute;
    top:18px;
    left:18px;
    right:18px;
    display:flex;
    justify-content:space-between;
    z-index:10;
}

.box{
    padding:10px 12px;
    border-radius:14px;
    background:rgba(255,255,255,.06);
    color:white;
    font-weight:800;
    font-size:12px;
    backdrop-filter:blur(10px);
}

/* EQUATION */
.eq{
    position:absolute;
    bottom:18px;
    left:18px;
    right:18px;
    padding:14px;

    background:rgba(2,6,23,.75);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;

    color:#7dd3fc;
    font-weight:800;
    font-size:14px;

    text-shadow:0 0 18px rgba(125,211,252,.7);
}

.glow{
    color:#38bdf8;
    text-shadow:0 0 12px #38bdf8, 0 0 28px #2563eb;
}

</style>
</head>

<body>

<div class="frame">

<canvas id="c" width="430" height="800"></canvas>

<div class="hud">
    <div class="box" id="state">LINE</div>
    <div class="box" id="color">BLUE</div>
</div>

<div class="eq" id="eq">
Equation: <span class="glow">y = mx + b</span>
</div>

</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let t = 0;
let mode = 0;

/* COLOR SET */
const colors = [
    "#38bdf8", // line
    "#a78bfa", // circle
    "#4ade80", // rectangle
    "#fbbf24", // triangle
    "#ef4444"  // polygon
];

/* DRAW HELPERS */
function clear(){
    ctx.clearRect(0,0,430,800);
}

/* LINE */
function drawLine(){
    ctx.strokeStyle = colors[0];
    ctx.lineWidth = 4;
    ctx.shadowColor = colors[0];
    ctx.shadowBlur = 20;

    ctx.beginPath();
    ctx.moveTo(100,400);
    ctx.lineTo(330,400);
    ctx.stroke();

    ctx.shadowBlur = 0;
}

/* CIRCLE */
function drawCircle(){
    let r = 90;

    ctx.strokeStyle = colors[1];
    ctx.lineWidth = 4;
    ctx.shadowColor = colors[1];
    ctx.shadowBlur = 25;

    ctx.beginPath();
    ctx.arc(215,400,r,0,Math.PI*2);
    ctx.stroke();

    ctx.shadowBlur = 0;
}

/* RECT */
function drawRect(){
    ctx.strokeStyle = colors[2];
    ctx.lineWidth = 4;
    ctx.shadowColor = colors[2];
    ctx.shadowBlur = 25;

    ctx.strokeRect(130,320,170,160);

    ctx.shadowBlur = 0;
}

/* TRIANGLE */
function drawTriangle(){
    ctx.strokeStyle = colors[3];
    ctx.lineWidth = 4;
    ctx.shadowColor = colors[3];
    ctx.shadowBlur = 25;

    ctx.beginPath();
    ctx.moveTo(215,300);
    ctx.lineTo(130,480);
    ctx.lineTo(300,480);
    ctx.closePath();
    ctx.stroke();

    ctx.shadowBlur = 0;
}

/* POLYGON */
function drawPolygon(){
    ctx.strokeStyle = colors[4];
    ctx.lineWidth = 4;
    ctx.shadowColor = colors[4];
    ctx.shadowBlur = 25;

    ctx.beginPath();

    let cx = 215, cy = 400, r = 90;

    for(let i=0;i<6;i++){
        let a = (Math.PI*2/6)*i;
        let x = cx + Math.cos(a)*r;
        let y = cy + Math.sin(a)*r;

        if(i==0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    }

    ctx.closePath();
    ctx.stroke();

    ctx.shadowBlur = 0;
}

/* EQUATIONS */
const eqs = [
    "y = mx + b (LINE)",
    "x² + y² = r² (CIRCLE)",
    "A = w × h (RECTANGLE)",
    "A = 1/2 × b × h (TRIANGLE)",
    "A = (n × s²) / (4tan(π/n)) (POLYGON)"
];

/* STATE TEXT */
const states = [
    "LINE",
    "CIRCLE",
    "RECTANGLE",
    "TRIANGLE",
    "POLYGON"
];

/* ANIMATION LOOP */
function animate(){

    clear();

    /* snap transitions */
    if(t < 60) mode = 0;
    else if(t < 120) mode = 1;
    else if(t < 180) mode = 2;
    else if(t < 240) mode = 3;
    else mode = 4;

    /* draw current shape */
    if(mode === 0) drawLine();
    if(mode === 1) drawCircle();
    if(mode === 2) drawRect();
    if(mode === 3) drawTriangle();
    if(mode === 4) drawPolygon();

    /* UI update */
    document.getElementById("state").innerText = states[mode];
    document.getElementById("color").innerText = states[mode];

    document.getElementById("eq").innerHTML =
    `Equation: <span class="glow">${eqs[mode]}</span>`;

    t += 2;

    if(t > 300) t = 0;

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
