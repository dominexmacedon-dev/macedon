<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#030712;
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Inter,sans-serif;
}

/* BACKGROUND */

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
}

body::before{
    width:320px;
    height:320px;
    background:#2563eb;
    top:-120px;
    left:-120px;
    opacity:.18;
}

body::after{
    width:320px;
    height:320px;
    background:#7c3aed;
    right:-120px;
    bottom:-120px;
    opacity:.16;
}

/* FRAME */

.frame{
    width:390px;
    height:780px;

    background:#0f172a;

    border-radius:34px;

    overflow:hidden;

    position:relative;

    border:1px solid rgba(255,255,255,.06);

    box-shadow:
    0 0 70px rgba(0,0,0,.7),
    inset 0 0 30px rgba(255,255,255,.03);
}

/* INTRO */

.intro{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    z-index:20;

    transition:1s ease;
}

.intro.hide{
    opacity:0;
    transform:scale(1.08);
}

.logo{
    width:110px;

    filter:
    drop-shadow(0 0 35px rgba(59,130,246,.5));

    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    50%{
        transform:translateY(-10px);
    }
}

.title{
    margin-top:28px;

    color:white;

    font-size:36px;

    font-weight:900;

    line-height:1.1;

    text-align:center;
}

.sub{
    margin-top:18px;

    color:#7dd3fc;

    font-size:15px;

    font-weight:700;

    text-align:center;

    line-height:1.8;
}

/* EDITOR */

.editor{
    position:absolute;
    inset:18px;

    background:rgba(15,23,42,.9);

    border:1px solid rgba(255,255,255,.06);

    border-radius:28px;

    overflow:hidden;

    opacity:0;

    transition:.8s ease;

    z-index:30;
}

.editor.show{
    opacity:1;
}

/* TOPBAR */

.topbar{
    height:52px;

    background:#111827;

    border-bottom:1px solid #1e293b;

    display:flex;
    align-items:center;

    padding:0 16px;
}

.dot{
    width:9px;
    height:9px;
    border-radius:50%;
    margin-right:6px;
}

.red{background:#ef4444;}
.yellow{background:#facc15;}
.green{background:#22c55e;}

.filename{
    margin-left:10px;

    color:#cbd5e1;

    font-size:12px;

    font-weight:700;
}

/* CODE */

.code{
    padding:22px;

    font-family:'Fira Code', monospace;

    font-size:14px;

    line-height:2.2;

    color:white;

    position:relative;
}

.line{
    display:grid;
    grid-template-columns:28px auto;
    align-items:flex-start;

    min-height:34px;
}

.num{
    color:#475569;
}

.text{
    transition:.4s ease;
}

/* COLORS */

.comment{
    color:#64748b;
}

.variable{
    color:#38bdf8;
}

.string{
    color:#facc15;
}

.func{
    color:#4ade80;
}

.keyword{
    color:#c084fc;
}

.orange{
    color:#fb923c;
}

/* GLOW HIGHLIGHT */

.highlightBlue{
    color:#7dd3fc !important;

    font-size:18px;

    font-weight:900;

    text-shadow:
    0 0 12px rgba(125,211,252,.95),
    0 0 28px rgba(59,130,246,.85),
    0 0 55px rgba(59,130,246,.6);

    animation:pulse 1.4s ease-in-out infinite;
}

.highlightGreen{
    color:#86efac !important;

    font-size:18px;

    font-weight:900;

    text-shadow:
    0 0 12px rgba(134,239,172,.95),
    0 0 28px rgba(34,197,94,.85),
    0 0 55px rgba(34,197,94,.6);

    animation:pulse 1.4s ease-in-out infinite;
}

.highlightPurple{
    color:#d8b4fe !important;

    font-size:18px;

    font-weight:900;

    text-shadow:
    0 0 12px rgba(216,180,254,.95),
    0 0 28px rgba(168,85,247,.85),
    0 0 55px rgba(168,85,247,.6);

    animation:pulse 1.4s ease-in-out infinite;
}

.highlightOrange{
    color:#fdba74 !important;

    font-size:18px;

    font-weight:900;

    text-shadow:
    0 0 12px rgba(253,186,116,.95),
    0 0 28px rgba(249,115,22,.85),
    0 0 55px rgba(249,115,22,.6);

    animation:pulse 1.4s ease-in-out infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.08);
    }
}

/* CURSOR */

.cursor{
    width:7px;
    height:15px;

    background:white;

    display:inline-block;

    margin-left:2px;

    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* EXPLAIN */

.explain{
    position:absolute;

    width:220px;

    background:linear-gradient(
        135deg,
        rgba(37,99,235,.24),
        rgba(59,130,246,.1)
    );

    border:1px solid rgba(96,165,250,.16);

    border-radius:20px;

    padding:18px;

    backdrop-filter:blur(12px);

    opacity:0;

    transition:.5s ease;

    z-index:50;
}

.explain.show{
    opacity:1;
}

.explainTitle{
    color:#7dd3fc;

    font-size:11px;

    font-weight:900;

    letter-spacing:1px;
}

.explainText{
    margin-top:10px;

    color:white;

    font-size:13px;

    line-height:1.8;

    font-weight:500;
}

/* FINAL */

.final{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    opacity:0;

    transition:1s ease;

    z-index:100;
}

.final.show{
    opacity:1;
}

.finalTitle{
    color:white;

    font-size:38px;

    font-weight:900;

    text-align:center;

    line-height:1.2;
}

.finalSub{
    margin-top:16px;

    color:#60a5fa;

    font-size:16px;

    font-weight:800;
}

</style>
</head>

<body>

<div class="frame">

    <!-- INTRO -->

    <div class="intro" id="intro">

        <img
            class="logo"
            src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg"
        >

        <div class="title">
            Python Concepts<br>
            Explained Fast
        </div>

        <div class="sub">
            Variables • Functions<br>
            Loops • APIs
        </div>

    </div>

    <!-- EDITOR -->

    <div class="editor" id="editor">

        <div class="topbar">

            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>

            <div class="filename">
                app.py
            </div>

        </div>

        <div class="code" id="code"></div>

        <!-- EXPLAIN -->

        <div class="explain" id="explain">

            <div class="explainTitle">
                EXPLANATION
            </div>

            <div class="explainText" id="explainText"></div>

        </div>

    </div>

    <!-- FINAL -->

    <div class="final" id="final">

        <div class="finalTitle">
            Coding Can Feel<br>
            Cinematic
        </div>

        <div class="finalSub">
            Follow For More Python
        </div>

    </div>

</div>

<script>

/* ELEMENTS */

const intro =
document.getElementById("intro");

const editor =
document.getElementById("editor");

const code =
document.getElementById("code");

const explain =
document.getElementById("explain");

const explainText =
document.getElementById("explainText");

const final =
document.getElementById("final");

/* START */

setTimeout(()=>{

    intro.classList.add("hide");

    setTimeout(()=>{

        editor.classList.add("show");

        startTyping();

    },900);

},2400);

/* CODE LINES */

const lines = [

`<span class="comment"># Python Concepts</span>`,

`<span id="varTarget"><span class="variable">name</span> = <span class="string">"Dominex"</span></span>`,

`<span id="funcTarget"><span class="func">print</span>(<span class="string">"Hello"</span>, name)</span>`,

`<span id="loopTarget"><span class="keyword">for</span> i in range(3):</span>`,

`    print(i)`,

`<span id="apiTarget">response = requests.<span class="orange">get</span>(<span class="string">"api.weather.com"</span>)</span>`

];

let lineIndex = 0;

/* TYPE CODE */

function startTyping(){

    typeLine();
}

function typeLine(){

    if(lineIndex >= lines.length){

        setTimeout(startExplainFlow,900);

        return;
    }

    const row =
    document.createElement("div");

    row.className = "line";

    row.innerHTML = `
        <div class="num">${lineIndex + 1}</div>
        <div class="text"></div>
    `;

    code.appendChild(row);

    const text =
    row.querySelector(".text");

    const html =
    lines[lineIndex];

    let i = 0;

    function type(){

        text.innerHTML =
        html.substring(0,i) +
        '<span class="cursor"></span>';

        i++;

        if(i <= html.length){

            setTimeout(type,7);

        }else{

            text.innerHTML = html;

            lineIndex++;

            setTimeout(typeLine,180);
        }
    }

    type();
}

/* TYPE EXPLAIN */

function typeExplain(text){

    explainText.innerHTML = "";

    let i = 0;

    function write(){

        explainText.innerHTML +=
        text.charAt(i);

        i++;

        if(i < text.length){

            setTimeout(write,18);
        }
    }

    write();
}

/* EXPLANATION FLOW */

function startExplainFlow(){

    showVariable();
}

/* VARIABLE */

function showVariable(){

    const target =
    document.getElementById("varTarget");

    target.classList.add("highlightBlue");

    explain.style.top = "135px";
    explain.style.right = "18px";

    explain.classList.add("show");

    typeExplain(
        "Variables store information inside Python programs."
    );

    setTimeout(()=>{

        explain.classList.remove("show");

        target.classList.remove("highlightBlue");

    },3000);

    setTimeout(showFunction,3600);
}

/* FUNCTION */

function showFunction(){

    const target =
    document.getElementById("funcTarget");

    target.classList.add("highlightGreen");

    explain.style.top = "210px";
    explain.style.right = "18px";

    explain.classList.add("show");

    typeExplain(
        "Functions perform actions and execute reusable code."
    );

    setTimeout(()=>{

        explain.classList.remove("show");

        target.classList.remove("highlightGreen");

    },3000);

    setTimeout(showLoop,3600);
}

/* LOOP */

function showLoop(){

    const target =
    document.getElementById("loopTarget");

    target.classList.add("highlightPurple");

    explain.style.top = "290px";
    explain.style.right = "18px";

    explain.classList.add("show");

    typeExplain(
        "Loops repeat tasks automatically multiple times."
    );

    setTimeout(()=>{

        explain.classList.remove("show");

        target.classList.remove("highlightPurple");

    },3000);

    setTimeout(showAPI,3600);
}

/* API */

function showAPI(){

    const target =
    document.getElementById("apiTarget");

    target.classList.add("highlightOrange");

    explain.style.top = "420px";
    explain.style.right = "18px";

    explain.classList.add("show");

    typeExplain(
        "APIs allow applications to communicate and exchange data."
    );

    setTimeout(()=>{

        explain.classList.remove("show");

        target.classList.remove("highlightOrange");

    },3200);

    setTimeout(showFinal,4200);
}

/* FINAL */

function showFinal(){

    editor.style.opacity = "0";

    setTimeout(()=>{

        final.classList.add("show");

    },1000);
}

</script>

</body>
</html>
