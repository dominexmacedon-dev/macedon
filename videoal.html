<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Fira+Code:wght@400&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background:#050814;
    font-family:Inter,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BACKGROUND GLOW */
body::before,
body::after{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    filter:blur(160px);
    border-radius:50%;
}

body::before{
    background:#22c55e;
    top:-200px;
    left:-200px;
    opacity:.18;
}

body::after{
    background:#3b82f6;
    bottom:-220px;
    right:-220px;
    opacity:.15;
}

/* INTRO */
.intro{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#050814;
    z-index:50;
}

.intro img{
    width:160px;
    filter:drop-shadow(0 0 40px rgba(34,197,94,.7));
    animation:pop 1.8s ease forwards;
}

@keyframes pop{
    from{ transform:scale(.3); opacity:0; }
    to{ transform:scale(1); opacity:1; }
}

.introText{
    margin-top:20px;
    color:#a3ffb5;
    font-size:20px;
    font-weight:900;
    text-shadow:0 0 25px rgba(34,197,94,.6);
}

/* MAIN */
.main{
    display:none;
    width:100%;
    height:100%;
    position:relative;
}

/* PHONE */
.phone{
    position:absolute;
    left:10%;
    top:50%;
    transform:translateY(-50%) rotate(-8deg);
    width:340px;
    height:700px;
    border-radius:40px;
    background:#0b1220;
    border:2px solid #1f2937;
    box-shadow:0 0 90px rgba(0,0,0,.8);
    overflow:hidden;
    animation:floatPhone 5s ease-in-out infinite;
}

@keyframes floatPhone{
    0%{ transform:translateY(-50%) rotate(-8deg); }
    50%{ transform:translateY(-53%) rotate(-3deg); }
    100%{ transform:translateY(-50%) rotate(-8deg); }
}

/* PHONE SCREEN */
.screen{
    position:absolute;
    inset:0;
    padding:20px;
    font-family:'Fira Code', monospace;
    color:#4ade80;
    font-size:12px;
    overflow:hidden;
}

/* SYSTEM LOG */
.log{
    line-height:1.8;
}

/* RIGHT PANEL */
.panel{
    position:absolute;
    right:6%;
    top:50%;
    transform:translateY(-50%);
    width:420px;
    color:white;
}

/* TYPE TEXT */
.typeBox{
    font-size:14px;
    line-height:1.9;
    color:#38bdf8;
    text-shadow:0 0 18px rgba(56,189,248,.4);
    min-height:200px;
}

/* CURSOR */
.cursor{
    display:inline-block;
    width:8px;
    height:14px;
    background:white;
    margin-left:3px;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{ opacity:0; }
}

/* TITLE */
.title{
    font-size:26px;
    font-weight:900;
    color:#22c55e;
    margin-bottom:12px;
    text-shadow:0 0 25px rgba(34,197,94,.6);
}

/* OWNER */
.owner{
    margin-top:30px;
    font-size:18px;
    font-weight:900;
    color:#60a5fa;
    text-shadow:0 0 25px rgba(96,165,250,.7);
}

/* FINAL */
.final{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    background:#050814;
}

.final.show{
    animation:show 1.5s forwards;
}

@keyframes show{
    to{ opacity:1; }
}

.final h1{
    color:#22c55e;
    font-size:42px;
    text-shadow:0 0 30px rgba(34,197,94,.8);
}

.final p{
    color:#60a5fa;
    margin-top:10px;
    font-weight:800;
}

</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d7/Android_robot.svg">
    <div class="introText">ANDROID SYSTEM PRESENTATION</div>
</div>

<!-- MAIN -->
<div class="main" id="main">

    <!-- PHONE -->
    <div class="phone">
        <div class="screen" id="log"></div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="panel">
        <div class="title">Android Boot Architecture</div>
        <div class="typeBox" id="typeBox"></div>
        <div class="owner">Dominex Macedon</div>
    </div>

</div>

<!-- FINAL -->
<div class="final" id="final">
    <h1>ANDROID READY</h1>
    <p>Owned by Dominex Macedon</p>
</div>

<script>

const intro = document.getElementById("intro");
const main = document.getElementById("main");
const log = document.getElementById("log");
const typeBox = document.getElementById("typeBox");
const final = document.getElementById("final");

/* INTRO */
setTimeout(()=>{
    intro.style.opacity="0";
    intro.style.transition="1s ease";
},2500);

setTimeout(()=>{
    intro.style.display="none";
    main.style.display="block";
    start();
},3500);

/* TYPE TEXT (RIGHT SIDE) */
const text =
`Android Boot Process Explanation:

1. Kernel Initialization starts system hardware setup.
2. Hardware Abstraction Layer loads device drivers.
3. System Server starts core services.
4. UI Framework renders system interface.
5. Boot completed successfully.`;

let i=0;

function typeText(){

    typeBox.innerHTML =
    text.substring(0,i) + "<span class='cursor'></span>";

    i++;

    if(i <= text.length){
        setTimeout(typeText,25);
    }
}

function start(){

    /* PHONE LOGS */
    const logs = [
        "Bootloader initialized...",
        "Kernel loading...",
        "Mounting system partition...",
        "Starting system services...",
        "Optimizing applications...",
        "Android runtime started..."
    ];

    logs.forEach((t,idx)=>{
        setTimeout(()=>{
            const div = document.createElement("div");
            div.textContent = "> " + t;
            log.appendChild(div);
        },idx*600);
    });

    /* TYPE EXPLANATION */
    setTimeout(typeText,800);

    /* FINAL SCREEN */
    setTimeout(()=>{
        main.style.display="none";
        final.classList.add("show");
    },7000);
}

</script>

</body>
</html>
