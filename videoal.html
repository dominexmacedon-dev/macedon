<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Programming Feels Like Magic</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Inter,sans-serif;
}

/* BACKGROUND */

.bg{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.orb{
    position:absolute;
    border-radius:50%;
    filter:blur(140px);
    animation:pulse 8s ease-in-out infinite;
}

.orb1{
    width:500px;
    height:500px;
    background:#2563eb;
    top:-200px;
    left:-160px;
    opacity:.2;
}

.orb2{
    width:500px;
    height:500px;
    background:#7c3aed;
    right:-180px;
    bottom:-180px;
    opacity:.18;
}

.orb3{
    width:340px;
    height:340px;
    background:#06b6d4;
    left:45%;
    top:40%;
    opacity:.1;
}

@keyframes pulse{
    50%{
        transform:scale(1.18);
    }
}

/* PARTICLES */

.particles{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.particle{
    position:absolute;
    width:4px;
    height:4px;
    border-radius:50%;
    background:white;
    opacity:.35;
    animation:float linear infinite;
}

@keyframes float{

    from{
        transform:
        translateY(100vh)
        translateX(0px);
    }

    to{
        transform:
        translateY(-120vh)
        translateX(120px);
    }
}

/* FRAME */

.frame{
    width:1180px;
    height:650px;

    background:rgba(15,23,42,.72);

    border:1px solid rgba(255,255,255,.06);

    border-radius:36px;

    overflow:hidden;

    position:relative;

    backdrop-filter:blur(18px);

    box-shadow:
    0 0 120px rgba(0,0,0,.7),
    inset 0 0 40px rgba(255,255,255,.03);

    perspective:2400px;
}

/* CINEMATIC CAMERA */

.camera{
    position:absolute;
    inset:0;

    transform-style:preserve-3d;

    animation:camera 16s cubic-bezier(.65,.05,.36,1) infinite;
}

@keyframes camera{

    0%{
        transform:
        rotateY(-6deg)
        rotateX(1deg)
        translateX(-20px)
        scale(1);
    }

    18%{
        transform:
        rotateY(2deg)
        rotateX(.5deg)
        translateX(8px)
        scale(1.02);
    }

    38%{
        transform:
        rotateY(9deg)
        rotateX(-1deg)
        translateX(28px)
        scale(1.04);
    }

    55%{
        transform:
        rotateY(-3deg)
        rotateX(1deg)
        translateX(-8px)
        scale(1.01);
    }

    76%{
        transform:
        rotateY(-10deg)
        rotateX(2deg)
        translateX(-36px)
        scale(1.05);
    }

    100%{
        transform:
        rotateY(-6deg)
        rotateX(1deg)
        translateX(-20px)
        scale(1);
    }
}

/* HERO */

.hero{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    z-index:30;

    transition:1.2s ease;
}

.hero.hide{
    opacity:0;
    transform:scale(1.15);
    pointer-events:none;
}

.logo{
    width:160px;
    filter:
    drop-shadow(0 0 50px rgba(59,130,246,.55));

    animation:logoFloat 5s ease-in-out infinite;
}

@keyframes logoFloat{
    50%{
        transform:
        translateY(-16px)
        rotate(2deg);
    }
}

.heroTitle{
    margin-top:30px;

    color:white;

    font-size:72px;

    font-weight:900;

    letter-spacing:-2px;

    text-shadow:
    0 0 35px rgba(255,255,255,.14);
}

.heroSub{
    margin-top:16px;

    color:#7dd3fc;

    font-size:22px;

    font-weight:700;

    text-shadow:
    0 0 25px rgba(125,211,252,.3);
}

/* EDITOR */

.editor{
    position:absolute;
    inset:0;

    display:none;
    flex-direction:column;

    z-index:40;
}

.editor.show{
    display:flex;
}

/* TOPBAR */

.topbar{
    height:68px;

    background:rgba(15,23,42,.95);

    border-bottom:1px solid rgba(255,255,255,.06);

    display:flex;
    align-items:center;

    padding:0 24px;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    margin-right:8px;
}

.red{background:#ef4444;}
.yellow{background:#facc15;}
.green{background:#22c55e;}

.file{
    margin-left:16px;

    color:#e2e8f0;

    font-size:14px;

    font-weight:700;
}

/* WORKSPACE */

.workspace{
    flex:1;
    position:relative;
}

/* CODE */

.code{
    position:absolute;

    left:0;
    top:0;

    width:65%;
    height:100%;

    padding:44px;

    font-family:'Fira Code', monospace;

    font-size:20px;

    line-height:2.4;

    color:white;
}

.line{
    display:grid;
    grid-template-columns:60px auto;
    align-items:center;
}

.num{
    color:#475569;
    text-align:right;
    padding-right:22px;
}

.text{
    white-space:pre;
    transition:.5s ease;
}

.comment{
    color:#64748b;
}

.variable{
    color:#38bdf8;
}

.string{
    color:#facc15;
}

.func{
    color:#4ade80;
}

/* GLOW CODE */

.energyBlue{
    color:#7dd3fc !important;

    font-size:30px;

    font-weight:900;

    text-shadow:
    0 0 18px rgba(125,211,252,.95),
    0 0 40px rgba(59,130,246,.95),
    0 0 90px rgba(59,130,246,.7);

    transform:
    scale(1.12)
    translateX(10px);
}

.energyGreen{
    color:#86efac !important;

    font-size:32px;

    font-weight:900;

    text-shadow:
    0 0 20px rgba(134,239,172,.95),
    0 0 45px rgba(34,197,94,.95),
    0 0 90px rgba(34,197,94,.75);

    transform:
    scale(1.14)
    translateX(12px);
}

/* CURSOR */

.cursor{
    width:10px;
    height:22px;
    background:white;
    display:inline-block;
    margin-left:4px;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* MAGIC PANEL */

.magic{
    position:absolute;

    right:36px;
    top:120px;

    width:330px;

    border-radius:32px;

    padding:32px;

    background:linear-gradient(
        135deg,
        rgba(37,99,235,.28),
        rgba(124,58,237,.18)
    );

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(16px);

    box-shadow:
    0 0 50px rgba(59,130,246,.16);

    opacity:0;

    transform:
    translateY(24px)
    scale(.92);

    transition:.6s ease;
}

.magic.show{
    opacity:1;

    transform:
    translateY(0)
    scale(1);
}

.magicTitle{
    color:#7dd3fc;

    font-size:15px;

    font-weight:900;

    letter-spacing:1px;

    margin-bottom:14px;
}

.magicText{
    color:white;

    line-height:1.9;

    font-size:15px;
}

/* SHOCKWAVE */

.shockwave{
    position:absolute;

    width:20px;
    height:20px;

    border-radius:50%;

    border:4px solid rgba(96,165,250,.8);

    left:50%;
    top:50%;

    transform:translate(-50%,-50%) scale(0);

    opacity:0;

    pointer-events:none;
}

.shockwave.active{
    animation:shock 1s ease forwards;
}

@keyframes shock{

    0%{
        transform:
        translate(-50%,-50%)
        scale(0);

        opacity:1;
    }

    100%{
        transform:
        translate(-50%,-50%)
        scale(28);

        opacity:0;
    }
}

/* TERMINAL */

.terminal{
    position:absolute;
    inset:0;

    background:#020617;

    display:none;
    flex-direction:column;

    z-index:60;
}

.terminal.show{
    display:flex;
}

.termGlow{
    position:absolute;
    inset:0;

    background:
    radial-gradient(circle,
    rgba(34,197,94,.25),
    transparent 60%);

    opacity:0;
}

.termGlow.active{
    animation:explode .9s ease forwards;
}

@keyframes explode{

    0%{
        opacity:0;
        transform:scale(.8);
    }

    50%{
        opacity:1;
        transform:scale(1.08);
    }

    100%{
        opacity:.15;
        transform:scale(1.3);
    }
}

.termTop{
    height:68px;

    background:#111827;

    border-bottom:1px solid #1e293b;

    display:flex;
    align-items:center;

    padding:0 24px;
}

.termTitle{
    margin-left:16px;

    color:#cbd5e1;

    font-size:14px;

    font-weight:700;
}

.termBody{
    flex:1;

    padding:38px;

    font-family:'Fira Code', monospace;

    font-size:20px;

    line-height:2.3;

    color:#4ade80;
}

.output{
    opacity:0;
    transform:translateY(10px);
    animation:fade .2s ease forwards;
}

@keyframes fade{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* END */

.ending{
    position:absolute;
    inset:0;

    background:#020617;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    opacity:0;

    pointer-events:none;

    transition:1s ease;

    z-index:80;
}

.ending.show{
    opacity:1;
}

.endTitle{
    color:white;

    font-size:68px;

    font-weight:900;

    letter-spacing:-2px;

    text-shadow:
    0 0 40px rgba(255,255,255,.12);
}

.endSub{
    margin-top:18px;

    color:#60a5fa;

    font-size:24px;

    font-weight:800;

    text-shadow:
    0 0 35px rgba(96,165,250,.45);
}

</style>
</head>

<body>

<div class="bg">

    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

</div>

<div class="particles" id="particles"></div>

<div class="frame">

    <div class="camera">

        <!-- HERO -->

        <div class="hero" id="hero">

            <img
                class="logo"
                src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg"
            >

            <div class="heroTitle">
                Programming Feels Like Magic
            </div>

            <div class="heroSub">
                Every line of code controls reality.
            </div>

        </div>

        <!-- EDITOR -->

        <div class="editor" id="editor">

            <div class="topbar">

                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>

                <div class="file">
                    magic.py
                </div>

            </div>

            <div class="workspace">

                <div class="code" id="code"></div>

                <div class="magic" id="magic">

                    <div class="magicTitle">
                        CODE ENERGY
                    </div>

                    <div class="magicText" id="magicText"></div>

                </div>

            </div>

        </div>

        <!-- SHOCKWAVE -->

        <div class="shockwave" id="shockwave"></div>

        <!-- TERMINAL -->

        <div class="terminal" id="terminal">

            <div class="termGlow" id="termGlow"></div>

            <div class="termTop">

                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>

                <div class="termTitle">
                    Python Terminal
                </div>

            </div>

            <div class="termBody" id="termBody"></div>

        </div>

        <!-- END -->

        <div class="ending" id="ending">

            <div class="endTitle">
                Dominex Macedon
            </div>

            <div class="endSub">
                — Code Is Power —
            </div>

        </div>

    </div>

</div>

<script>

/* PARTICLES */

const particles =
document.getElementById("particles");

for(let i=0;i<90;i++){

    const p =
    document.createElement("div");

    p.className = "particle";

    p.style.left =
    Math.random()*100 + "vw";

    p.style.animationDuration =
    6 + Math.random()*10 + "s";

    p.style.animationDelay =
    Math.random()*5 + "s";

    p.style.opacity =
    Math.random()*.45;

    particles.appendChild(p);
}

/* ELEMENTS */

const hero =
document.getElementById("hero");

const editor =
document.getElementById("editor");

const code =
document.getElementById("code");

const magic =
document.getElementById("magic");

const magicText =
document.getElementById("magicText");

const terminal =
document.getElementById("terminal");

const termBody =
document.getElementById("termBody");

const ending =
document.getElementById("ending");

const shockwave =
document.getElementById("shockwave");

const termGlow =
document.getElementById("termGlow");

/* HERO */

setTimeout(()=>{

    hero.classList.add("hide");

    setTimeout(()=>{

        editor.classList.add("show");

        typeCode();

    },900);

},2600);

/* CODE */

const lines = [

`<span class="comment"># Programming Feels Like Magic</span>`,

`<span id="varLine"><span class="variable">name</span> = <span class="string">"Dominex"</span></span>`,

`<span id="printLine"><span class="func">print</span>(<span class="string">"Hello"</span>, name)</span>`

];

let lineIndex = 0;

function typeCode(){

    if(lineIndex >= lines.length){

        setTimeout(showMagic1,700);

        return;
    }

    const row =
    document.createElement("div");

    row.className = "line";

    row.innerHTML = `
        <div class="num">${lineIndex + 1}</div>
        <div class="text"></div>
    `;

    code.appendChild(row);

    const text =
    row.querySelector(".text");

    const html =
    lines[lineIndex];

    let i = 0;

    function type(){

        text.innerHTML =
        html.substring(0,i) +
        '<span class="cursor"></span>';

        i++;

        if(i <= html.length){

            setTimeout(type,5);

        }else{

            text.innerHTML = html;

            lineIndex++;

            setTimeout(typeCode,180);
        }
    }

    type();
}

/* MAGIC EXPLAIN */

function showMagic1(){

    const varLine =
    document.getElementById("varLine");

    magic.classList.add("show");

    varLine.classList.add("energyBlue");

    typeMagic(
        "Variables store energy inside the program."
    );

    setTimeout(()=>{

        varLine.classList.remove("energyBlue");

    },3200);

    setTimeout(showMagic2,3800);
}

function showMagic2(){

    const printLine =
    document.getElementById("printLine");

    printLine.classList.add("energyGreen");

    shockwave.classList.add("active");

    typeMagic(
        "print() releases the power into reality."
    );

    setTimeout(()=>{

        showTerminal();

    },2600);
}

function typeMagic(text){

    magicText.innerHTML = "";

    let i = 0;

    function write(){

        magicText.innerHTML +=
        text.charAt(i);

        i++;

        if(i < text.length){

            setTimeout(write,22);
        }
    }

    write();
}

/* TERMINAL */

function showTerminal(){

    editor.style.display = "none";

    terminal.classList.add("show");

    termGlow.classList.add("active");

    const outputs = [

        "> python magic.py",

        "",

        "Hello Dominex",

        "",

        "Reality Updated Successfully"

    ];

    outputs.forEach((text,index)=>{

        setTimeout(()=>{

            const line =
            document.createElement("div");

            line.className = "output";

            line.innerText = text;

            termBody.appendChild(line);

        },index * 150);

    });

    /* SCREEN PULSE */

    document.body.animate([

        {
            filter:"brightness(1)"
        },

        {
            filter:"brightness(1.6)"
        },

        {
            filter:"brightness(1)"
        }

    ],{

        duration:700
    });

    setTimeout(showEnding,3500);
}

/* END */

function showEnding(){

    terminal.style.display = "none";

    ending.classList.add("show");
}

</script>

</body>
</html>
