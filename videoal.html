<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Inter,sans-serif;
}

/* BACKGROUND */

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(160px);
}

body::before{
    width:520px;
    height:520px;
    background:#2563eb;
    left:-180px;
    top:-180px;
    opacity:.18;
}

body::after{
    width:520px;
    height:520px;
    background:#7c3aed;
    right:-180px;
    bottom:-180px;
    opacity:.16;
}

/* FRAME */

.frame{
    width:1120px;
    height:640px;
    background:#0f172a;
    border:1px solid rgba(255,255,255,.06);
    border-radius:34px;
    overflow:hidden;
    position:relative;

    box-shadow:
    0 0 100px rgba(0,0,0,.75),
    inset 0 0 30px rgba(255,255,255,.03);
}

/* FLOATING CAMERA */

.camera{
    position:absolute;
    inset:0;
    animation:cameraMove 9s ease-in-out infinite;
    transform-style:preserve-3d;
}

@keyframes cameraMove{

    0%{
        transform:
        perspective(1400px)
        rotateY(-3deg)
        rotateX(1deg)
        scale(1);
    }

    50%{
        transform:
        perspective(1400px)
        rotateY(3deg)
        rotateX(-1deg)
        scale(1.02);
    }

    100%{
        transform:
        perspective(1400px)
        rotateY(-3deg)
        rotateX(1deg)
        scale(1);
    }
}

/* GLOW */

.glow{
    position:absolute;
    border-radius:50%;
    filter:blur(90px);
    opacity:.18;
    animation:pulse 5s ease-in-out infinite;
}

.g1{
    width:260px;
    height:260px;
    background:#2563eb;
    top:20px;
    left:20px;
}

.g2{
    width:260px;
    height:260px;
    background:#7c3aed;
    right:20px;
    bottom:20px;
}

@keyframes pulse{
    50%{
        transform:scale(1.15);
    }
}

/* HERO */

.hero{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:1s ease;
    z-index:20;
}

.hero.hide{
    opacity:0;
    transform:scale(1.1);
    pointer-events:none;
}

.pythonLogo{
    width:140px;
    height:140px;
    object-fit:contain;

    filter:
    drop-shadow(0 0 45px rgba(59,130,246,.45));

    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    50%{
        transform:translateY(-12px);
    }
}

.heroTitle{
    margin-top:26px;
    color:white;
    font-size:60px;
    font-weight:900;
    letter-spacing:-1px;
}

.heroSub{
    margin-top:12px;
    color:#7dd3fc;
    font-size:20px;
    font-weight:700;
}

/* CHAT */

.chatScene{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:30;
}

.chatScene.show{
    display:flex;
}

.chatCard{
    width:470px;
    height:560px;

    background:rgba(15,23,42,.88);

    border:1px solid rgba(255,255,255,.08);

    border-radius:34px;

    backdrop-filter:blur(20px);

    overflow:hidden;

    box-shadow:
    0 0 50px rgba(0,0,0,.45),
    inset 0 0 25px rgba(255,255,255,.03);

    animation:chatFloat 6s ease-in-out infinite;
}

@keyframes chatFloat{

    0%{
        transform:
        translateY(0px)
        rotate(-1deg);
    }

    50%{
        transform:
        translateY(-12px)
        rotate(1deg);
    }

    100%{
        transform:
        translateY(0px)
        rotate(-1deg);
    }
}

/* CHAT HEADER */

.chatTop{
    height:84px;
    border-bottom:1px solid rgba(255,255,255,.06);
    display:flex;
    align-items:center;
    padding:0 22px;
}

.back{
    color:white;
    font-size:28px;
    margin-right:16px;
}

.profile{
    width:52px;
    height:52px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid rgba(255,255,255,.1);
}

.userInfo{
    margin-left:14px;
}

.nameRow{
    display:flex;
    align-items:center;
    gap:7px;
}

.name{
    color:white;
    font-size:16px;
    font-weight:800;
}

.verify{
    width:18px;
    height:18px;
    border-radius:50%;
    background:#3b82f6;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:11px;
    font-weight:900;
}

.active{
    color:#4ade80;
    font-size:13px;
    margin-top:3px;
}

.menu{
    margin-left:auto;
    color:white;
    font-size:28px;
}

/* CHAT BODY */

.chatBody{
    padding:28px 22px;
    display:flex;
    flex-direction:column;
    gap:18px;
}

.message{
    max-width:78%;
    padding:16px 18px;
    border-radius:24px;
    line-height:1.7;
    font-size:15px;
    font-weight:500;
    opacity:0;
    transform:translateY(20px);
    animation:showMessage .5s ease forwards;
}

.bot{
    align-self:flex-start;

    background:linear-gradient(
        135deg,
        rgba(37,99,235,.26),
        rgba(59,130,246,.18)
    );

    border:1px solid rgba(96,165,250,.25);

    color:white;
}

.user{
    align-self:flex-end;

    background:linear-gradient(
        135deg,
        rgba(124,58,237,.26),
        rgba(168,85,247,.18)
    );

    border:1px solid rgba(192,132,252,.25);

    color:white;
}

@keyframes showMessage{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* TYPING */

.typing{
    display:flex;
    align-items:center;
    gap:6px;
    margin-top:6px;
    margin-left:6px;
    opacity:0;
    transition:.4s ease;
}

.typing.show{
    opacity:1;
}

.typing span{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#60a5fa;
    animation:bounce 1s infinite;
}

.typing span:nth-child(2){
    animation-delay:.15s;
}

.typing span:nth-child(3){
    animation-delay:.3s;
}

@keyframes bounce{
    50%{
        transform:translateY(-5px);
        opacity:.5;
    }
}

/* INPUT */

.chatInput{
    position:absolute;
    left:22px;
    right:22px;
    bottom:22px;

    height:64px;

    border-radius:22px;

    background:rgba(255,255,255,.04);

    border:1px solid rgba(255,255,255,.06);

    display:flex;
    align-items:center;

    padding:0 22px;
}

.placeholder{
    color:#64748b;
    font-size:15px;
}

.send{
    margin-left:auto;
    width:46px;
    height:46px;
    border-radius:50%;

    background:#2563eb;

    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:20px;
    font-weight:900;

    opacity:0;
    transform:scale(.7);

    transition:.4s ease;
}

.send.show{
    opacity:1;
    transform:scale(1);
}

/* EDITOR */

.editor{
    position:absolute;
    inset:0;
    background:#0b1220;
    display:none;
    flex-direction:column;
    z-index:40;
}

.editor.show{
    display:flex;
}

/* TOPBAR */

.topbar{
    height:60px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 22px;
}

.dot{
    width:11px;
    height:11px;
    border-radius:50%;
    margin-right:7px;
}

.red{background:#ef4444;}
.yellow{background:#facc15;}
.green{background:#22c55e;}

.filename{
    margin-left:14px;
    color:#e2e8f0;
    font-size:14px;
    font-weight:700;
}

/* WORKSPACE */

.workspace{
    flex:1;
    position:relative;
}

/* CODE */

.code{
    position:absolute;
    left:0;
    top:0;
    width:58%;
    height:100%;
    padding:34px;

    font-family:'Fira Code', monospace;
    font-size:17px;
    line-height:2.2;
    color:white;
}

.line{
    display:grid;
    grid-template-columns:55px auto;
    align-items:center;
    min-height:40px;
}

.num{
    color:#475569;
    text-align:right;
    padding-right:20px;
}

.text{
    white-space:pre;
}

.comment{
    color:#64748b;
}

.variable{
    color:#38bdf8;
}

.string{
    color:#facc15;
}

.func{
    color:#4ade80;
}

/* CURSOR */

.cursor{
    width:9px;
    height:18px;
    background:white;
    display:inline-block;
    margin-left:2px;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* EXPLAIN */

.explain{
    position:absolute;
    width:320px;
    right:30px;
    top:120px;

    padding:28px;

    border-radius:28px;

    background:linear-gradient(
        135deg,
        rgba(37,99,235,.28),
        rgba(59,130,246,.14)
    );

    border:1px solid rgba(96,165,250,.22);

    backdrop-filter:blur(14px);

    opacity:0;
    transform:translateY(20px) scale(.94);

    transition:.5s ease;
}

.explain.show{
    opacity:1;
    transform:translateY(0) scale(1);
}

.explain.hide{
    opacity:0;
    transform:translateY(-20px) scale(.9);
}

.explainTitle{
    color:#7dd3fc;
    font-size:15px;
    font-weight:900;
    margin-bottom:12px;
}

.explainText{
    color:white;
    line-height:1.8;
    font-size:14px;
}

/* TERMINAL */

.terminal{
    position:absolute;
    inset:0;
    background:#020617;
    display:none;
    flex-direction:column;
    z-index:50;
}

.terminal.show{
    display:flex;
}

.termTop{
    height:60px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 22px;
}

.termTitle{
    margin-left:14px;
    color:#cbd5e1;
    font-size:14px;
    font-weight:700;
}

.termBody{
    flex:1;
    padding:32px;
    font-family:'Fira Code', monospace;
    font-size:16px;
    line-height:2.2;
    color:#4ade80;
}

.output{
    opacity:0;
    transform:translateY(6px);
    animation:fade .2s ease forwards;
}

@keyframes fade{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ENDING */

.ending{
    position:absolute;
    inset:0;
    background:#020617;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition:1s ease;
    z-index:100;
}

.ending.show{
    opacity:1;
}

.endTitle{
    color:white;
    font-size:58px;
    font-weight:900;
    letter-spacing:-1px;
}

.endSub{
    margin-top:16px;
    color:#60a5fa;
    font-size:24px;
    font-weight:800;
}

</style>
</head>

<body>

<div class="frame">

    <div class="camera">

        <div class="glow g1"></div>
        <div class="glow g2"></div>

        <!-- HERO -->

        <div class="hero" id="hero">

            <img
                class="pythonLogo"
                src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg"
            >

            <div class="heroTitle">
                Learn Python
            </div>

            <div class="heroSub">
                Premium Python Tutorial
            </div>

        </div>

        <!-- CHAT -->

        <div class="chatScene" id="chatScene">

            <div class="chatCard">

                <div class="chatTop">

                    <div class="back">‹</div>

                    <img
                        class="profile"
                        src="dominex-macedon.png"
                    >

                    <div class="userInfo">

                        <div class="nameRow">

                            <div class="name">
                                Dominex Macedon
                            </div>

                            <div class="verify">
                                ✓
                            </div>

                        </div>

                        <div class="active">
                            Active now
                        </div>

                    </div>

                    <div class="menu">
                        ⋮
                    </div>

                </div>

                <div class="chatBody" id="chatBody">

                </div>

                <div class="typing" id="typing">

                    <span></span>
                    <span></span>
                    <span></span>

                </div>

                <div class="chatInput">

                    <div class="placeholder">
                        Write a message...
                    </div>

                    <div class="send" id="sendBtn">
                        ↑
                    </div>

                </div>

            </div>

        </div>

        <!-- EDITOR -->

        <div class="editor" id="editor">

            <div class="topbar">

                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>

                <div class="filename">
                    app.py
                </div>

            </div>

            <div class="workspace">

                <div class="code" id="code"></div>

                <div class="explain" id="explain">

                    <div class="explainTitle">
                        PYTHON EXPLANATION
                    </div>

                    <div class="explainText" id="explainText"></div>

                </div>

            </div>

        </div>

        <!-- TERMINAL -->

        <div class="terminal" id="terminal">

            <div class="termTop">

                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>

                <div class="termTitle">
                    Python Terminal
                </div>

            </div>

            <div class="termBody" id="termBody"></div>

        </div>

        <!-- END -->

        <div class="ending" id="ending">

            <div class="endTitle">
                Dominex Macedon
            </div>

            <div class="endSub">
                — Python Programmer —
            </div>

        </div>

    </div>

</div>

<script>

/* ELEMENTS */

const hero =
document.getElementById("hero");

const chatScene =
document.getElementById("chatScene");

const chatBody =
document.getElementById("chatBody");

const typing =
document.getElementById("typing");

const sendBtn =
document.getElementById("sendBtn");

const editor =
document.getElementById("editor");

const code =
document.getElementById("code");

const explain =
document.getElementById("explain");

const explainText =
document.getElementById("explainText");

const terminal =
document.getElementById("terminal");

const termBody =
document.getElementById("termBody");

const ending =
document.getElementById("ending");

/* HERO */

setTimeout(()=>{

    hero.classList.add("hide");

    setTimeout(()=>{

        chatScene.classList.add("show");

        startConversation();

    },900);

},2400);

/* CHAT */

const messages = [

{
    type:"user",
    text:"Hey Dominex, can you teach me Python?"
},

{
    type:"bot",
    text:"Absolutely. Python is powerful, elegant, and beginner friendly."
},

{
    type:"bot",
    text:"Let me quickly create a simple Python program for you."
}

];

let msgIndex = 0;

function startConversation(){

    showNextMessage();
}

function showNextMessage(){

    if(msgIndex >= messages.length){

        setTimeout(startEditor,1800);

        return;
    }

    typing.classList.add("show");

    setTimeout(()=>{

        typing.classList.remove("show");

        const msg =
        document.createElement("div");

        msg.className =
        `message ${messages[msgIndex].type}`;

        msg.innerText =
        messages[msgIndex].text;

        chatBody.appendChild(msg);

        sendBtn.classList.add("show");

        msgIndex++;

        setTimeout(showNextMessage,1500);

    },1600);
}

/* EDITOR */

function startEditor(){

    chatScene.style.display = "none";

    editor.classList.add("show");

    typeCode();
}

const lines = [

`<span class="comment"># Simple Python Program</span>`,

`<span><span class="variable">name</span> = <span class="string">"Dominex"</span></span>`,

`<span><span class="func">print</span>(<span class="string">"Hello"</span>, name)</span>`

];

let lineIndex = 0;

function typeCode(){

    if(lineIndex >= lines.length){

        setTimeout(showExplain,600);

        return;
    }

    const row =
    document.createElement("div");

    row.className = "line";

    row.innerHTML = `
        <div class="num">${lineIndex + 1}</div>
        <div class="text"></div>
    `;

    code.appendChild(row);

    const text =
    row.querySelector(".text");

    const html =
    lines[lineIndex];

    let i = 0;

    function type(){

        text.innerHTML =
        html.substring(0,i) +
        '<span class="cursor"></span>';

        i++;

        if(i <= html.length){

            setTimeout(type,5);

        }else{

            text.innerHTML = html;

            lineIndex++;

            setTimeout(typeCode,180);
        }
    }

    type();
}

/* EXPLAIN */

function showExplain(){

    explain.classList.add("show");

    typeExplain(
        "Variables store information and print() displays output directly into the terminal window."
    );

    setTimeout(()=>{

        explain.classList.remove("show");
        explain.classList.add("hide");

    },4200);

    setTimeout(showTerminal,5200);
}

function typeExplain(text){

    explainText.innerHTML = "";

    let i = 0;

    function write(){

        explainText.innerHTML +=
        text.charAt(i);

        i++;

        if(i < text.length){

            setTimeout(write,24);
        }
    }

    write();
}

/* TERMINAL */

function showTerminal(){

    editor.style.display = "none";

    terminal.classList.add("show");

    const outputs = [

        "> python app.py",

        "",

        "Hello Dominex",

        "",

        "Program finished successfully"

    ];

    outputs.forEach((text,index)=>{

        setTimeout(()=>{

            const line =
            document.createElement("div");

            line.className = "output";

            line.innerText = text;

            termBody.appendChild(line);

        },index * 120);

    });

    setTimeout(showEnding,3200);
}

/* ENDING */

function showEnding(){

    terminal.style.display = "none";

    ending.classList.add("show");
}

</script>

</body>
</html>
