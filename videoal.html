<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Solver Cinema</title>

<style>
body{
    margin:0;
    height:100vh;
    background:#020617;
    overflow:hidden;
    font-family:Inter, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* TEXT LAYER */
.screen{
    width:90%;
    max-width:900px;
    color:#cbd5e1;
    font-size:18px;
    line-height:2.2;
    white-space:pre-wrap;
}

/* GLOW COLORS */
.glow{
    color:#38bdf8;
    text-shadow:
    0 0 12px #38bdf8,
    0 0 35px #2563eb;
    font-weight:900;
}

/* STRONG RESULT */
.big{
    color:#7dd3fc;
    font-size:22px;
    font-weight:900;
    text-shadow:
    0 0 20px #38bdf8,
    0 0 40px #2563eb;
}

/* FINAL PULSE */
.final{
    color:#a78bfa;
    font-size:24px;
    font-weight:900;
    text-shadow:
    0 0 20px #a78bfa,
    0 0 50px #7c3aed;
}

/* CURSOR */
.cursor{
    display:inline-block;
    width:10px;
    height:18px;
    background:white;
    margin-left:6px;
    animation:blink .6s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

</style>
</head>

<body>

<div class="screen" id="screen"></div>

<script>

const screen = document.getElementById("screen");

/* FULL FLOW (TOP → BOTTOM LOGIC) */
const lines = [

"PHYSICS PROBLEM:",
"A car starts from rest and accelerates at a constant rate of 3 m/s².",
"Find velocity after 10 seconds.",

"",

"SOLUTION:",
"We use equation of motion:",

"v = u + at",

"Where:",
"u = initial velocity = 0 m/s",
"a = <span class='glow'>3 m/s²</span>",
"t = <span class='glow'>10 s</span>",

"",

"Substitute values:",

"v = 0 + (3 × 10)",

"v = <span class='big'>30 m/s</span>",

"",

"FINAL ANSWER:",
"Velocity = <span class='final'>30 m/s</span>",

"",

"#DominexMacedon"
];

let i = 0;
let char = 0;
let output = "";

/* TYPE EFFECT */
function type(){

    if(i >= lines.length) return;

    let line = lines[i];

    if(char < line.length){

        output += line.charAt(char);

        screen.innerHTML = output + '<span class="cursor"></span>';

        char++;

        setTimeout(type, 16); // smooth but not slow
    }
    else{

        output += "\n";
        i++;
        char = 0;

        setTimeout(type, 180);
    }
}

type();

</script>

</body>
</html>
