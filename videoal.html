<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050814;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

/* BACKGROUND GLOW */
body::before,
body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    filter:blur(140px);
    border-radius:50%;
}

body::before{
    background:#22c55e;
    top:-180px;
    left:-160px;
    opacity:.18;
}

body::after{
    background:#3b82f6;
    bottom:-200px;
    right:-160px;
    opacity:.15;
}

/* PHONE FRAME */
.phone{
    width:360px;
    height:720px;
    background:#0b1220;
    border-radius:40px;
    border:2px solid #1f2937;
    box-shadow:
        0 0 80px rgba(0,0,0,.8),
        inset 0 0 25px rgba(255,255,255,.04);
    position:relative;
    overflow:hidden;
}

/* STATUS BAR */
.status{
    height:28px;
    background:#0a0f1d;
}

/* SCREEN */
.screen{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* ANDROID LOGO */
.logo{
    width:120px;
    height:120px;
    filter:drop-shadow(0 0 25px rgba(34,197,94,.6));
    animation:float 2.5s ease-in-out infinite;
}

@keyframes float{
    50%{ transform:translateY(-8px); }
}

/* TEXT */
.title{
    margin-top:18px;
    font-size:34px;
    font-weight:900;
    color:#a3ffb5;
    text-shadow:0 0 20px rgba(34,197,94,.6);
    letter-spacing:-1px;
}

.subtitle{
    margin-top:8px;
    font-size:13px;
    color:#94a3b8;
}

/* LOADING DOTS */
.loader{
    margin-top:26px;
    display:flex;
    gap:6px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#22c55e;
    animation:bounce 1s infinite ease-in-out;
}

.dot:nth-child(2){ animation-delay:.2s; }
.dot:nth-child(3){ animation-delay:.4s; }

@keyframes bounce{
    50%{ transform:translateY(-6px); opacity:.4; }
}

/* BOOT TEXT */
.boot{
    position:absolute;
    bottom:80px;
    text-align:center;
    font-size:12px;
    color:#38bdf8;
    opacity:.8;
}

/* OWNER TEXT */
.owner{
    position:absolute;
    bottom:30px;
    font-size:14px;
    font-weight:800;
    color:#ffffff;
    text-shadow:0 0 18px rgba(59,130,246,.8);
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px rgba(59,130,246,.6); }
    to{ text-shadow:0 0 25px rgba(34,197,94,.9); }
}

/* FADE */
.fadeOut{
    animation:fadeOut 1.5s forwards;
}

@keyframes fadeOut{
    to{ opacity:0; transform:scale(1.1); }
}

/* BOOT COMPLETED */
.done{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#050814;
    opacity:0;
    pointer-events:none;
}

.done.show{
    animation:showUp 1s forwards;
}

@keyframes showUp{
    to{ opacity:1; }
}

.androidText{
    font-size:42px;
    font-weight:900;
    color:#22c55e;
    text-shadow:0 0 30px rgba(34,197,94,.8);
}

.madeBy{
    margin-top:10px;
    color:#94a3b8;
    font-size:14px;
}

.dominex{
    margin-top:18px;
    font-size:18px;
    font-weight:900;
    color:#60a5fa;
    text-shadow:0 0 25px rgba(96,165,250,.7);
}

</style>
</head>

<body>

<div class="phone">

    <div class="status"></div>

    <!-- BOOT SCREEN -->
    <div class="screen" id="boot">

        <img class="logo"
        src="https://upload.wikimedia.org/wikipedia/commons/d/d7/Android_robot.svg">

        <div class="title">ANDROID</div>

        <div class="subtitle">Starting system services...</div>

        <div class="loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="boot">
            Optimizing apps • Loading kernel • Initializing UI
        </div>

        <div class="owner">
            Dominex Macedon
        </div>

    </div>

    <!-- DONE SCREEN -->
    <div class="done" id="done">

        <div class="androidText">ANDROID READY</div>

        <div class="madeBy">System Boot Complete</div>

        <div class="dominex">Owned by Dominex Macedon</div>

    </div>

</div>

<script>

const boot =
document.getElementById("boot");

const done =
document.getElementById("done");

/* BOOT SEQUENCE */

setTimeout(()=>{

    boot.classList.add("fadeOut");

},4200);

setTimeout(()=>{

    boot.style.display = "none";
    done.classList.add("show");

},5600);

</script>

</body>
</html>
