<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#030712;
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Inter,sans-serif;
}

/* BACKGROUND */

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(140px);
}

body::before{
    width:340px;
    height:340px;
    background:#2563eb;
    top:-120px;
    left:-120px;
    opacity:.18;
}

body::after{
    width:340px;
    height:340px;
    background:#7c3aed;
    right:-120px;
    bottom:-120px;
    opacity:.16;
}

/* FRAME */

.frame{
    width:390px;
    height:780px;

    background:#0f172a;

    border-radius:34px;

    overflow:hidden;

    position:relative;

    border:1px solid rgba(255,255,255,.06);

    box-shadow:
    0 0 70px rgba(0,0,0,.7),
    inset 0 0 30px rgba(255,255,255,.03);
}

/* INTRO */

.intro{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    z-index:10;

    transition:1s ease;
}

.intro.hide{
    opacity:0;
    transform:scale(1.08);
}

.pythonLogo{
    width:110px;

    filter:
    drop-shadow(0 0 35px rgba(59,130,246,.5));

    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    50%{
        transform:translateY(-10px);
    }
}

.title{
    margin-top:28px;

    color:white;

    font-size:36px;

    font-weight:900;

    line-height:1.1;

    text-align:center;

    letter-spacing:-1px;
}

.sub{
    margin-top:16px;

    color:#7dd3fc;

    font-size:15px;

    font-weight:700;

    text-align:center;

    line-height:1.8;
}

/* CARD */

.card{
    position:absolute;

    inset:18px;

    background:rgba(15,23,42,.9);

    border:1px solid rgba(255,255,255,.06);

    border-radius:28px;

    padding:22px;

    opacity:0;

    transition:.8s ease;

    display:flex;
    flex-direction:column;

    backdrop-filter:blur(18px);
}

.card.show{
    opacity:1;
}

/* LABEL */

.label{
    color:#38bdf8;

    font-size:12px;

    font-weight:800;

    letter-spacing:2px;
}

/* TITLE */

.mainTitle{
    margin-top:10px;

    color:white;

    font-size:28px;

    font-weight:900;

    line-height:1.2;

    letter-spacing:-1px;
}

/* CODE WINDOW */

.window{
    margin-top:22px;

    background:#020617;

    border-radius:22px;

    overflow:hidden;

    border:1px solid rgba(255,255,255,.06);
}

.topbar{
    height:48px;

    background:#111827;

    border-bottom:1px solid #1e293b;

    display:flex;
    align-items:center;

    padding:0 16px;
}

.dot{
    width:9px;
    height:9px;
    border-radius:50%;
    margin-right:6px;
}

.red{background:#ef4444;}
.yellow{background:#facc15;}
.green{background:#22c55e;}

.file{
    margin-left:10px;

    color:#cbd5e1;

    font-size:12px;

    font-weight:700;
}

/* CODE */

.code{
    padding:20px;

    min-height:290px;

    font-family:'Fira Code', monospace;

    font-size:14px;

    line-height:2.1;

    color:white;
}

.line{
    display:grid;
    grid-template-columns:28px auto;
    align-items:flex-start;
}

.num{
    color:#475569;
}

.text{
    white-space:pre-wrap;
    word-break:break-word;
}

/* COLORS */

.comment{
    color:#64748b;
}

.variable{
    color:#38bdf8;
}

.string{
    color:#facc15;
}

.func{
    color:#4ade80;
}

.keyword{
    color:#c084fc;
}

.orange{
    color:#fb923c;
}

/* HIGHLIGHT */

.highlight{
    font-size:17px;

    font-weight:900;

    animation:pulse 1.5s ease-in-out infinite;
}

.glowBlue{
    color:#7dd3fc;

    text-shadow:
    0 0 12px rgba(125,211,252,.95),
    0 0 30px rgba(59,130,246,.8),
    0 0 60px rgba(59,130,246,.55);
}

.glowGreen{
    color:#86efac;

    text-shadow:
    0 0 12px rgba(134,239,172,.95),
    0 0 30px rgba(34,197,94,.8),
    0 0 60px rgba(34,197,94,.55);
}

.glowPurple{
    color:#d8b4fe;

    text-shadow:
    0 0 12px rgba(216,180,254,.95),
    0 0 30px rgba(168,85,247,.8),
    0 0 60px rgba(168,85,247,.55);
}

.glowOrange{
    color:#fdba74;

    text-shadow:
    0 0 12px rgba(253,186,116,.95),
    0 0 30px rgba(249,115,22,.8),
    0 0 60px rgba(249,115,22,.55);
}

@keyframes pulse{
    50%{
        transform:scale(1.08);
    }
}

/* CURSOR */

.cursor{
    width:7px;
    height:15px;

    background:white;

    display:inline-block;

    margin-left:2px;

    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* EXPLAIN */

.explain{
    margin-top:22px;

    background:linear-gradient(
        135deg,
        rgba(37,99,235,.2),
        rgba(59,130,246,.08)
    );

    border:1px solid rgba(96,165,250,.15);

    border-radius:20px;

    padding:18px;
}

.explainTitle{
    color:#7dd3fc;

    font-size:12px;

    font-weight:900;

    letter-spacing:1px;
}

.explainText{
    margin-top:12px;

    color:white;

    font-size:14px;

    line-height:1.9;

    font-weight:500;

    min-height:80px;
}

/* FINAL */

.final{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    opacity:0;

    transition:1s ease;

    z-index:30;
}

.final.show{
    opacity:1;
}

.finalTitle{
    color:white;

    font-size:38px;

    font-weight:900;

    text-align:center;

    line-height:1.2;

    letter-spacing:-1px;
}

.finalSub{
    margin-top:16px;

    color:#60a5fa;

    font-size:16px;

    font-weight:800;
}

</style>
</head>

<body>

<div class="frame">

    <!-- INTRO -->

    <div class="intro" id="intro">

        <img
            class="pythonLogo"
            src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg"
        >

        <div class="title">
            Programming Concepts<br>
            Explained Fast
        </div>

        <div class="sub">
            Variables • Functions<br>
            Loops • APIs
        </div>

    </div>

    <!-- MAIN -->

    <div class="card" id="card">

        <div class="label">
            PYTHON BASICS
        </div>

        <div class="mainTitle">
            Learn Core Concepts
        </div>

        <!-- CODE -->

        <div class="window">

            <div class="topbar">

                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>

                <div class="file">
                    app.py
                </div>

            </div>

            <div class="code" id="code"></div>

        </div>

        <!-- EXPLANATION -->

        <div class="explain">

            <div class="explainTitle">
                EXPLANATION
            </div>

            <div class="explainText" id="explain"></div>

        </div>

    </div>

    <!-- FINAL -->

    <div class="final" id="final">

        <div class="finalTitle">
            Coding Can Feel<br>
            Cinematic
        </div>

        <div class="finalSub">
            Follow For More Python
        </div>

    </div>

</div>

<script>

/* ELEMENTS */

const intro =
document.getElementById("intro");

const card =
document.getElementById("card");

const code =
document.getElementById("code");

const explain =
document.getElementById("explain");

const final =
document.getElementById("final");

/* START */

setTimeout(()=>{

    intro.classList.add("hide");

    setTimeout(()=>{

        card.classList.add("show");

        startTyping();

    },900);

},2500);

/* CODE */

const lines = [

`<span class="comment"># Python Concepts</span>`,

`<span class="variable highlight glowBlue">name</span> = <span class="string">"Dominex"</span>`,

`<span class="func highlight glowGreen">print</span>(<span class="string">"Hello"</span>, name)`,

`<span class="keyword highlight glowPurple">for</span> i in range(3):`,

`    <span class="func">print</span>(i)`,

`response = requests.<span class="orange highlight glowOrange">get</span>(<span class="string">"api.weather.com"</span>)`

];

let lineIndex = 0;

function startTyping(){

    typeLine();
}

function typeLine(){

    if(lineIndex >= lines.length){

        setTimeout(showExplain,1000);

        return;
    }

    const row =
    document.createElement("div");

    row.className = "line";

    row.innerHTML = `
        <div class="num">${lineIndex + 1}</div>
        <div class="text"></div>
    `;

    code.appendChild(row);

    const text =
    row.querySelector(".text");

    const html =
    lines[lineIndex];

    let i = 0;

    function type(){

        text.innerHTML =
        html.substring(0,i) +
        '<span class="cursor"></span>';

        i++;

        if(i <= html.length){

            setTimeout(type,7);

        }else{

            text.innerHTML = html;

            lineIndex++;

            setTimeout(typeLine,220);
        }
    }

    type();
}

/* EXPLAIN */

const explainText =

`<span class="glowBlue highlight">Variables</span> store data,
<span class="glowGreen highlight">functions</span> run actions,
<span class="glowPurple highlight">loops</span> repeat tasks,
and APIs connect apps using
<span class="glowOrange highlight">requests.get()</span>.`;

function showExplain(){

    let i = 0;

    function type(){

        explain.innerHTML =
        explainText.substring(0,i) +
        '<span class="cursor"></span>';

        i++;

        if(i <= explainText.length){

            setTimeout(type,8);

        }else{

            explain.innerHTML = explainText;

            setTimeout(showFinal,4500);
        }
    }

    type();
}

/* FINAL */

function showFinal(){

    card.style.opacity = "0";

    setTimeout(()=>{

        final.classList.add("show");

    },1000);
}

</script>

</body>
</html>
