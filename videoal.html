<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#030712;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Inter,sans-serif;
}

/* BACKGROUND */

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(170px);
}

body::before{
    width:520px;
    height:520px;
    background:#2563eb;
    top:-220px;
    left:-220px;
    opacity:.22;
}

body::after{
    width:520px;
    height:520px;
    background:#7c3aed;
    bottom:-220px;
    right:-220px;
    opacity:.2;
}

/* FRAME */

.frame{
    width:1080px;
    height:1920px;
    max-height:95vh;
    aspect-ratio:9/16;

    background:#0f172a;

    border-radius:42px;

    position:relative;

    overflow:hidden;

    border:1px solid rgba(255,255,255,.06);

    box-shadow:
    0 0 120px rgba(0,0,0,.7),
    inset 0 0 40px rgba(255,255,255,.03);

    perspective:2000px;
}

/* CINEMATIC CAMERA */

.camera{
    position:absolute;
    inset:0;

    transform-style:preserve-3d;

    animation:camera 14s cubic-bezier(.65,.05,.36,1) infinite;
}

@keyframes camera{

    0%{
        transform:
        rotateY(-4deg)
        rotateX(1deg)
        scale(1)
        translateX(-10px);
    }

    20%{
        transform:
        rotateY(3deg)
        rotateX(-1deg)
        scale(1.03)
        translateX(12px);
    }

    40%{
        transform:
        rotateY(-7deg)
        rotateX(2deg)
        scale(1.05)
        translateX(-18px);
    }

    60%{
        transform:
        rotateY(6deg)
        rotateX(-2deg)
        scale(1.03)
        translateX(16px);
    }

    80%{
        transform:
        rotateY(-2deg)
        rotateX(.5deg)
        scale(1.01)
        translateX(-4px);
    }

    100%{
        transform:
        rotateY(-4deg)
        rotateX(1deg)
        scale(1)
        translateX(-10px);
    }
}

/* FLOAT GLOW */

.glow{
    position:absolute;
    border-radius:50%;
    filter:blur(100px);
    opacity:.18;
    animation:pulse 6s ease-in-out infinite;
}

.g1{
    width:260px;
    height:260px;
    background:#2563eb;
    top:80px;
    left:60px;
}

.g2{
    width:260px;
    height:260px;
    background:#7c3aed;
    right:60px;
    bottom:120px;
}

@keyframes pulse{
    50%{
        transform:scale(1.15);
    }
}

/* INTRO */

.intro{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    z-index:20;

    transition:1s ease;
}

.intro.hide{
    opacity:0;
    transform:scale(1.15);
    pointer-events:none;
}

.python{
    width:170px;
    filter:
    drop-shadow(0 0 50px rgba(59,130,246,.55));

    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    50%{
        transform:translateY(-16px);
    }
}

.title{
    margin-top:34px;

    color:white;

    font-size:74px;

    font-weight:900;

    line-height:1.1;

    text-align:center;

    letter-spacing:-2px;
}

.sub{
    margin-top:24px;

    color:#7dd3fc;

    font-size:28px;

    font-weight:700;

    text-shadow:
    0 0 25px rgba(125,211,252,.4);
}

/* CONCEPT CARD */

.card{
    position:absolute;

    width:88%;

    left:50%;
    top:50%;

    transform:
    translate(-50%,-50%);

    background:rgba(15,23,42,.84);

    border:1px solid rgba(255,255,255,.08);

    border-radius:40px;

    backdrop-filter:blur(24px);

    padding:50px;

    opacity:0;

    transition:.8s ease;

    box-shadow:
    0 0 70px rgba(0,0,0,.45),
    inset 0 0 30px rgba(255,255,255,.03);

    z-index:30;
}

.card.show{
    opacity:1;
}

.concept{
    color:#38bdf8;

    font-size:22px;

    font-weight:800;

    letter-spacing:2px;
}

.headline{
    margin-top:18px;

    color:white;

    font-size:72px;

    font-weight:900;

    line-height:1.05;

    letter-spacing:-2px;
}

/* CODE WINDOW */

.window{
    margin-top:40px;

    border-radius:28px;

    overflow:hidden;

    border:1px solid rgba(255,255,255,.06);

    background:#020617;
}

.top{
    height:62px;

    background:#111827;

    border-bottom:1px solid #1e293b;

    display:flex;
    align-items:center;

    padding:0 22px;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    margin-right:7px;
}

.red{background:#ef4444;}
.yellow{background:#facc15;}
.green{background:#22c55e;}

.file{
    margin-left:14px;

    color:#cbd5e1;

    font-size:15px;

    font-weight:700;
}

.code{
    padding:34px;

    font-family:'Fira Code', monospace;

    font-size:25px;

    line-height:2;
}

.line{
    display:flex;
    align-items:center;
}

.num{
    width:52px;

    color:#475569;
}

.text{
    color:white;
}

.variable{
    color:#38bdf8;
}

.string{
    color:#facc15;
}

.func{
    color:#4ade80;
}

.keyword{
    color:#c084fc;
}

/* MASSIVE GLOW HIGHLIGHT */

.highlight{
    display:inline-block;

    font-weight:900;

    transform:scale(1.12);

    animation:highlightPulse 1.4s ease-in-out infinite;
}

.blue{
    color:#7dd3fc;

    text-shadow:
    0 0 18px rgba(125,211,252,.95),
    0 0 40px rgba(59,130,246,.95),
    0 0 80px rgba(59,130,246,.75);
}

.green{
    color:#86efac;

    text-shadow:
    0 0 18px rgba(134,239,172,.95),
    0 0 40px rgba(34,197,94,.85),
    0 0 80px rgba(34,197,94,.7);
}

.purple{
    color:#d8b4fe;

    text-shadow:
    0 0 18px rgba(216,180,254,.95),
    0 0 40px rgba(168,85,247,.85),
    0 0 80px rgba(168,85,247,.7);
}

.orange{
    color:#fdba74;

    text-shadow:
    0 0 18px rgba(253,186,116,.95),
    0 0 40px rgba(249,115,22,.85),
    0 0 80px rgba(249,115,22,.7);
}

@keyframes highlightPulse{

    50%{
        transform:scale(1.2);
    }
}

/* EXPLAIN */

.explain{
    margin-top:34px;

    color:#e2e8f0;

    font-size:24px;

    line-height:1.8;

    font-weight:600;
}

/* TERMINAL */

.terminal{
    margin-top:34px;

    background:#020617;

    border-radius:24px;

    padding:28px;

    border:1px solid rgba(255,255,255,.06);

    font-family:'Fira Code', monospace;

    color:#4ade80;

    font-size:22px;

    line-height:2;
}

/* FINAL */

.final{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    opacity:0;

    transition:1s ease;

    z-index:50;
}

.final.show{
    opacity:1;
}

.finalTitle{
    color:white;

    font-size:78px;

    font-weight:900;

    text-align:center;

    line-height:1.1;

    letter-spacing:-2px;

    text-shadow:
    0 0 50px rgba(255,255,255,.12);
}

.finalSub{
    margin-top:30px;

    color:#60a5fa;

    font-size:30px;

    font-weight:800;

    text-shadow:
    0 0 30px rgba(96,165,250,.45);
}

/* TRANSITIONS */

.hide{
    opacity:0 !important;
    transform:
    translate(-50%,-50%)
    scale(1.1) !important;
}

</style>
</head>

<body>

<div class="frame">

    <div class="camera">

        <div class="glow g1"></div>
        <div class="glow g2"></div>

        <!-- INTRO -->

        <div class="intro" id="intro">

            <img
                class="python"
                src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg"
            >

            <div class="title">
                Programming Concepts<br>
                in 15 Seconds
            </div>

            <div class="sub">
                Variables • Functions • Loops • APIs
            </div>

        </div>

        <!-- CARD -->

        <div class="card" id="card">

            <div class="concept" id="conceptLabel">
                VARIABLES
            </div>

            <div class="headline" id="headline">
                Store Data
            </div>

            <div class="window">

                <div class="top">

                    <div class="dot red"></div>
                    <div class="dot yellow"></div>
                    <div class="dot green"></div>

                    <div class="file">
                        app.py
                    </div>

                </div>

                <div class="code" id="codeArea"></div>

            </div>

            <div class="explain" id="explain"></div>

            <div class="terminal" id="terminal"></div>

        </div>

        <!-- FINAL -->

        <div class="final" id="final">

            <div class="finalTitle">
                Coding Should<br>
                Feel Cinematic
            </div>

            <div class="finalSub">
                Follow for more Python Concepts
            </div>

        </div>

    </div>

</div>

<script>

/* ELEMENTS */

const intro =
document.getElementById("intro");

const card =
document.getElementById("card");

const conceptLabel =
document.getElementById("conceptLabel");

const headline =
document.getElementById("headline");

const codeArea =
document.getElementById("codeArea");

const explain =
document.getElementById("explain");

const terminal =
document.getElementById("terminal");

const final =
document.getElementById("final");

/* START */

setTimeout(()=>{

    intro.classList.add("hide");

    setTimeout(()=>{

        card.classList.add("show");

        startVariable();

    },700);

},2400);

/* TYPE EFFECT */

function typeHTML(el,html,speed=14){

    el.innerHTML = "";

    let i = 0;

    function type(){

        el.innerHTML =
        html.substring(0,i);

        i++;

        if(i <= html.length){

            setTimeout(type,speed);
        }
    }

    type();
}

/* VARIABLE */

function startVariable(){

    conceptLabel.innerText =
    "VARIABLES";

    headline.innerHTML =
    "Store <span class='highlight blue'>Data</span>";

    typeHTML(codeArea,`

<div class="line">
    <div class="num">1</div>
    <div class="text">
        <span class="variable highlight blue">name</span>
        =
        <span class="string">"Dominex"</span>
    </div>
</div>

    `);

    typeHTML(
        explain,
        `Variables store information inside your program.`
    );

    typeHTML(
        terminal,
        `name → "Dominex"`
    );

    setTimeout(startFunction,3000);
}

/* FUNCTION */

function startFunction(){

    conceptLabel.innerText =
    "FUNCTIONS";

    headline.innerHTML =
    "Run <span class='highlight green'>Actions</span>";

    typeHTML(codeArea,`

<div class="line">
    <div class="num">1</div>
    <div class="text">
        <span class="func highlight green">print</span>(
        <span class="string">"Hello"</span>)
    </div>
</div>

    `);

    typeHTML(
        explain,
        `Functions perform actions instantly.`
    );

    typeHTML(
        terminal,
        `Hello`
    );

    setTimeout(startLoop,3000);
}

/* LOOP */

function startLoop(){

    conceptLabel.innerText =
    "LOOPS";

    headline.innerHTML =
    "Repeat <span class='highlight purple'>Tasks</span>";

    typeHTML(codeArea,`

<div class="line">
    <div class="num">1</div>
    <div class="text">
        <span class="keyword highlight purple">for</span>
        i in range(3):
    </div>
</div>

<div class="line">
    <div class="num">2</div>
    <div class="text">
        &nbsp;&nbsp;&nbsp;&nbsp;
        print(i)
    </div>
</div>

    `);

    typeHTML(
        explain,
        `Loops repeat code automatically.`
    );

    typeHTML(
        terminal,
        `0<br>1<br>2`
    );

    setTimeout(startAPI,3200);
}

/* API */

function startAPI(){

    conceptLabel.innerText =
    "API";

    headline.innerHTML =
    "Connect <span class='highlight orange'>Systems</span>";

    typeHTML(codeArea,`

<div class="line">
    <div class="num">1</div>
    <div class="text">
        requests.get(
    </div>
</div>

<div class="line">
    <div class="num">2</div>
    <div class="text">
        "api.weather.com")
    </div>
</div>

    `);

    typeHTML(
        explain,
        `APIs allow apps to communicate with each other.`
    );

    typeHTML(
        terminal,
        `Weather Data Received`
    );

    setTimeout(showFinal,3400);
}

/* FINAL */

function showFinal(){

    card.classList.remove("show");

    setTimeout(()=>{

        final.classList.add("show");

    },700);
}

</script>

</body>
</html>
