<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050816;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Inter,sans-serif;
}

/* BACKGROUND GLOW */

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(140px);
}

body::before{
    width:500px;
    height:500px;
    background:#2563eb;
    top:-180px;
    left:-180px;
    opacity:.18;
}

body::after{
    width:500px;
    height:500px;
    background:#7c3aed;
    bottom:-180px;
    right:-180px;
    opacity:.16;
}

/* MAIN FRAME */

.frame{
    width:1000px;
    height:580px;
    background:#0f172a;
    border:1px solid #1e293b;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    box-shadow:
    0 0 80px rgba(0,0,0,.75),
    inset 0 0 30px rgba(255,255,255,.03);
}

/* HERO */

.hero{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
    transition:1s ease;
}

.hero.hide{
    opacity:0;
    transform:scale(1.08);
    pointer-events:none;
}

.pythonLogo{
    width:120px;
    height:120px;
    object-fit:contain;
    filter:
    drop-shadow(0 0 35px rgba(59,130,246,.4));
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    50%{
        transform:translateY(-10px);
    }
}

.heroTitle{
    margin-top:26px;
    font-size:52px;
    font-weight:900;
    color:white;
    letter-spacing:-1px;
    text-shadow:0 0 25px rgba(255,255,255,.08);
}

.heroSub{
    margin-top:12px;
    color:#7dd3fc;
    font-size:18px;
    font-weight:700;
    opacity:.9;
}

/* EDITOR */

.editor{
    position:absolute;
    inset:0;
    background:#0b1220;
    display:none;
    flex-direction:column;
}

.editor.show{
    display:flex;
}

/* TOP BAR */

.topbar{
    height:58px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 20px;
}

.dot{
    width:11px;
    height:11px;
    border-radius:50%;
    margin-right:7px;
}

.red{background:#ef4444;}
.yellow{background:#facc15;}
.green{background:#22c55e;}

.filename{
    margin-left:14px;
    color:#e2e8f0;
    font-size:14px;
    font-weight:700;
}

/* WORKSPACE */

.workspace{
    flex:1;
    position:relative;
}

/* CODE */

.code{
    position:absolute;
    left:0;
    top:0;
    width:60%;
    height:100%;
    padding:28px;
    font-family:'Fira Code', monospace;
    font-size:15px;
    line-height:2.1;
    color:white;
}

.line{
    display:flex;
    min-height:32px;
}

.num{
    width:40px;
    text-align:right;
    margin-right:18px;
    color:#475569;
    user-select:none;
}

.text{
    white-space:pre-wrap;
}

/* COLORS */

.keyword{
    color:#c084fc;
}

.variable{
    color:#38bdf8;
}

.string{
    color:#facc15;
}

.func{
    color:#4ade80;
}

.comment{
    color:#64748b;
}

/* CURSOR */

.cursor{
    width:9px;
    height:18px;
    background:white;
    display:inline-block;
    margin-left:2px;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* EXPLANATION BOX */

.explain{
    position:absolute;
    right:28px;
    width:320px;
    padding:22px;
    border-radius:24px;
    opacity:0;
    transform:translateY(20px) scale(.9);
    transition:.45s ease;
    box-shadow:0 0 35px rgba(0,0,0,.35);
}

.explain.show{
    opacity:1;
    transform:translateY(0) scale(1);
}

.explainTitle{
    font-size:14px;
    font-weight:900;
    letter-spacing:.5px;
    margin-bottom:12px;
}

.explainText{
    color:white;
    line-height:1.8;
    font-size:14px;
}

/* BOX COLORS */

.blue{
    top:90px;
    background:linear-gradient(
        135deg,
        rgba(37,99,235,.25),
        rgba(56,189,248,.18)
    );
    border:1px solid #3b82f6;
}

.blue .explainTitle{
    color:#7dd3fc;
}

.green{
    top:260px;
    background:linear-gradient(
        135deg,
        rgba(34,197,94,.22),
        rgba(74,222,128,.16)
    );
    border:1px solid #22c55e;
}

.green .explainTitle{
    color:#86efac;
}

/* POINTER */

.pointer{
    position:absolute;
    height:3px;
    background:white;
    border-radius:20px;
    opacity:0;
    transition:.4s ease;
    transform-origin:left;
    box-shadow:0 0 20px rgba(255,255,255,.5);
}

.pointer.show{
    opacity:1;
}

.pointer::after{
    content:"";
    position:absolute;
    right:-2px;
    top:-5px;
    border-left:10px solid white;
    border-top:6px solid transparent;
    border-bottom:6px solid transparent;
}

/* TERMINAL */

.terminal{
    position:absolute;
    inset:0;
    background:#020617;
    display:none;
    flex-direction:column;
    z-index:50;
}

.terminal.show{
    display:flex;
}

.termTop{
    height:58px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 20px;
}

.termTitle{
    margin-left:14px;
    color:#cbd5e1;
    font-size:14px;
    font-weight:700;
}

.termBody{
    flex:1;
    padding:28px;
    font-family:'Fira Code', monospace;
    font-size:15px;
    line-height:2.2;
    color:#4ade80;
}

/* OUTPUT */

.output{
    opacity:0;
    transform:translateY(5px);
    animation:fade .12s ease forwards;
}

@keyframes fade{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ENDING */

.ending{
    position:absolute;
    inset:0;
    background:#020617;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition:1s ease;
    z-index:100;
}

.ending.show{
    opacity:1;
    pointer-events:auto;
}

.endTitle{
    font-size:44px;
    font-weight:900;
    color:white;
    letter-spacing:-1px;
    text-shadow:0 0 35px rgba(255,255,255,.12);
}

.endSub{
    margin-top:16px;
    color:#60a5fa;
    font-size:22px;
    font-weight:800;
    text-shadow:0 0 25px rgba(96,165,250,.5);
}

/* FLOATING LIGHTS */

.glow{
    position:absolute;
    width:220px;
    height:220px;
    border-radius:50%;
    filter:blur(90px);
    opacity:.16;
    animation:pulse 4s ease-in-out infinite;
}

.g1{
    background:#2563eb;
    top:40px;
    left:80px;
}

.g2{
    background:#7c3aed;
    bottom:40px;
    right:80px;
}

@keyframes pulse{
    50%{
        transform:scale(1.15);
    }
}

</style>
</head>

<body>

<div class="frame">

    <div class="glow g1"></div>
    <div class="glow g2"></div>

    <!-- HERO -->

    <div class="hero" id="hero">

        <img
            class="pythonLogo"
            src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg"
        >

        <div class="heroTitle">
            Learn Python
        </div>

        <div class="heroSub">
            It is fun ✨
        </div>

    </div>

    <!-- EDITOR -->

    <div class="editor" id="editor">

        <div class="topbar">

            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>

            <div class="filename">
                app.py
            </div>

        </div>

        <div class="workspace">

            <!-- CODE -->

            <div class="code" id="code"></div>

            <!-- EXPLAIN VARIABLE -->

            <div class="explain blue" id="box1">

                <div class="explainTitle">
                    VARIABLE
                </div>

                <div class="explainText" id="text1"></div>

            </div>

            <!-- EXPLAIN PRINT -->

            <div class="explain green" id="box2">

                <div class="explainTitle">
                    print()
                </div>

                <div class="explainText" id="text2"></div>

            </div>

            <!-- POINTERS -->

            <div class="pointer" id="pointer1"></div>
            <div class="pointer" id="pointer2"></div>

        </div>

    </div>

    <!-- TERMINAL -->

    <div class="terminal" id="terminal">

        <div class="termTop">

            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>

            <div class="termTitle">
                Python Terminal
            </div>

        </div>

        <div class="termBody" id="termBody"></div>

    </div>

    <!-- ENDING -->

    <div class="ending" id="ending">

        <div class="endTitle">
            Dominex Macedon
        </div>

        <div class="endSub">
            — Programmer —
        </div>

    </div>

</div>

<script>

/* ELEMENTS */

const hero =
document.getElementById("hero");

const editor =
document.getElementById("editor");

const codeBox =
document.getElementById("code");

const terminal =
document.getElementById("terminal");

const termBody =
document.getElementById("termBody");

const ending =
document.getElementById("ending");

const box1 =
document.getElementById("box1");

const box2 =
document.getElementById("box2");

const text1 =
document.getElementById("text1");

const text2 =
document.getElementById("text2");

const pointer1 =
document.getElementById("pointer1");

const pointer2 =
document.getElementById("pointer2");

/* START */

setTimeout(()=>{

    hero.classList.add("hide");

    setTimeout(()=>{

        editor.classList.add("show");

        startTyping();

    },700);

},2600);

/* CODE */

const lines = [

`<span class="comment"># Simple Python Program</span>`,

`<span id="varLine"><span class="variable">name</span> = <span class="string">"Dominex"</span></span>`,

`<span id="printLine"><span class="func">print</span>(<span class="string">"Hello"</span>, name)</span>`

];

let lineIndex = 0;

function startTyping(){

    typeLine();
}

function typeLine(){

    if(lineIndex >= lines.length){

        setTimeout(showExplanations,600);

        return;
    }

    const row =
    document.createElement("div");

    row.className = "line";

    row.innerHTML = `
        <div class="num">${lineIndex + 1}</div>
        <div class="text"></div>
    `;

    codeBox.appendChild(row);

    const text =
    row.querySelector(".text");

    const html = lines[lineIndex];

    let i = 0;

    function typeChar(){

        text.innerHTML =
        html.substring(0,i) +
        '<span class="cursor"></span>';

        i++;

        if(i <= html.length){

            setTimeout(typeChar,5);

        }else{

            text.innerHTML = html;

            lineIndex++;

            setTimeout(typeLine,120);

        }
    }

    typeChar();
}

/* POINTER */

function drawPointer(pointer,x1,y1,x2,y2){

    const dx = x2 - x1;
    const dy = y2 - y1;

    const length =
    Math.sqrt(dx*dx + dy*dy);

    const angle =
    Math.atan2(dy,dx) * 180 / Math.PI;

    pointer.style.width =
    length + "px";

    pointer.style.left =
    x1 + "px";

    pointer.style.top =
    y1 + "px";

    pointer.style.transform =
    `rotate(${angle}deg)`;

    pointer.classList.add("show");
}

/* TYPE EXPLANATION */

function typeExplain(el,text,speed=25){

    let i = 0;

    function write(){

        el.innerHTML += text.charAt(i);

        i++;

        if(i < text.length){

            setTimeout(write,speed);
        }
    }

    write();
}

/* EXPLANATIONS */

function showExplanations(){

    const varLine =
    document.getElementById("varLine")
    .getBoundingClientRect();

    const printLine =
    document.getElementById("printLine")
    .getBoundingClientRect();

    const editorRect =
    editor.getBoundingClientRect();

    /* VARIABLE */

    box1.classList.add("show");

    drawPointer(
        pointer1,
        670,
        150,
        varLine.left - editorRect.left + 120,
        varLine.top - editorRect.top + 15
    );

    typeExplain(
        text1,
        "This is a variable. Variables store information in Python programs."
    );

    /* PRINT */

    setTimeout(()=>{

        box2.classList.add("show");

        drawPointer(
            pointer2,
            670,
            320,
            printLine.left - editorRect.left + 100,
            printLine.top - editorRect.top + 15
        );

        typeExplain(
            text2,
            "print() displays output instantly inside the terminal."
        );

    },2600);

    /* TERMINAL */

    setTimeout(showTerminal,6200);
}

/* TERMINAL */

function showTerminal(){

    editor.style.display = "none";

    terminal.classList.add("show");

    const outputs = [

        "> python app.py",

        "",

        "Hello Dominex",

        "",

        "Program finished successfully"

    ];

    outputs.forEach((text,index)=>{

        setTimeout(()=>{

            const line =
            document.createElement("div");

            line.className = "output";

            line.innerText = text;

            termBody.appendChild(line);

        },index * 90);

    });

    setTimeout(showEnding,3200);
}

/* END */

function showEnding(){

    terminal.style.display = "none";

    ending.classList.add("show");
}

</script>

</body>
</html>
