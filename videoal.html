<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Solver Typing</title>

<style>
body{
    margin:0;
    height:100vh;
    background:#020617;
    overflow:hidden;
    font-family:Inter, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* MAIN TEXT AREA */
.screen{
    width:90%;
    max-width:900px;
    color:#cbd5e1;
    font-size:18px;
    line-height:2;
    white-space:pre-wrap;
}

/* GLOW EFFECT */
.glow{
    color:#38bdf8;
    text-shadow:
    0 0 10px #38bdf8,
    0 0 30px #2563eb;
    font-weight:800;
}

/* STRONG HIGHLIGHT */
.big{
    color:#7dd3fc;
    font-size:22px;
    font-weight:900;
    text-shadow:0 0 25px #38bdf8;
}

/* CURSOR */
.cursor{
    display:inline-block;
    width:10px;
    background:white;
    margin-left:4px;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

</style>
</head>

<body>

<div class="screen" id="screen"></div>

<script>

const screen = document.getElementById("screen");

/* FULL CONTENT FLOW */
const lines = [

`PHYSICS PROBLEM:`,
`A car starts from rest and accelerates at a constant rate of 3 m/s².`,
`Find velocity after 10 seconds.`,

``,

`SOLUTION:`,
`We use equation of motion:`,

`v = u + at`,

`Where:`,
`u = initial velocity = 0 m/s`,
`a = acceleration = <span class="glow">3 m/s²</span>`,
`t = time = <span class="glow">10 s</span>`,

``,

`Now substitute values:`,

`v = 0 + (3 × 10)`,

`v = <span class="big">30 m/s</span>`,

``,

`FINAL ANSWER:`,
`Velocity = <span class="big glow">30 m/s</span>`,

``,

`#DominexMacedon`
];

let i = 0;
let char = 0;
let current = "";

/* TYPE FUNCTION */
function type(){

    if(i >= lines.length) return;

    let line = lines[i];

    if(char < line.length){

        current += line.charAt(char);
        screen.innerHTML = current + '<span class="cursor"></span>';
        char++;

        setTimeout(type, 18);
    }
    else{
        current += "\n";
        i++;
        char = 0;

        setTimeout(type, 250);
    }
}

type();

</script>

</body>
</html>
