<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#030712;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

/* BACKGROUND */

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
}

body::before{
    width:420px;
    height:420px;
    background:#2563eb;
    top:-160px;
    left:-120px;
    opacity:.16;
}

body::after{
    width:380px;
    height:380px;
    background:#7c3aed;
    bottom:-140px;
    right:-120px;
    opacity:.14;
}

/* FRAME */

.frame{
    width:920px;
    height:520px;
    background:#0f172a;
    border:1px solid #1e293b;
    border-radius:26px;
    overflow:hidden;
    position:relative;
    box-shadow:
    0 0 90px rgba(0,0,0,.7),
    inset 0 0 40px rgba(255,255,255,.03);
}

/* FLOAT */

.float{
    position:absolute;
    font-size:13px;
    font-weight:700;
    color:white;
    opacity:.05;
    animation:float 12s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(50px);
    }
    to{
        transform:translateY(-700px);
    }
}

/* HERO */

.hero{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:5;
    transition:1s ease;
}

.hero.hide{
    opacity:0;
    transform:scale(1.08);
}

.pythonLogo{
    width:120px;
    height:120px;
    object-fit:contain;
    filter:
    drop-shadow(0 0 35px rgba(59,130,246,.35));
    animation:logoFloat 4s ease-in-out infinite;
}

@keyframes logoFloat{
    50%{
        transform:translateY(-8px);
    }
}

.heroTitle{
    margin-top:28px;
    color:white;
    font-size:46px;
    font-weight:900;
    letter-spacing:-1px;
}

.heroSub{
    margin-top:12px;
    color:#94a3b8;
    font-size:15px;
}

/* EDITOR */

.editor{
    position:absolute;
    inset:0;
    background:#0b1220;
    display:none;
    flex-direction:column;
}

.editor.show{
    display:flex;
}

/* TOPBAR */

.topbar{
    height:60px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 22px;
}

.dot{
    width:11px;
    height:11px;
    border-radius:50%;
    margin-right:7px;
}

.red{background:#ef4444;}
.yellow{background:#facc15;}
.green{background:#22c55e;}

.filename{
    margin-left:14px;
    color:#e2e8f0;
    font-size:14px;
    font-weight:700;
}

/* CODE AREA */

.workspace{
    flex:1;
    position:relative;
    display:flex;
}

.code{
    flex:1;
    padding:24px;
    font-family:'Fira Code', monospace;
    font-size:14px;
    line-height:2;
    color:white;
    overflow:hidden;
}

/* CODE */

.line{
    display:flex;
    min-height:28px;
}

.num{
    width:40px;
    text-align:right;
    margin-right:18px;
    color:#475569;
    user-select:none;
}

.text{
    white-space:pre-wrap;
}

/* COLORS */

.keyword{
    color:#c084fc;
}

.variable{
    color:#38bdf8;
}

.string{
    color:#facc15;
}

.number{
    color:#fb7185;
}

.comment{
    color:#64748b;
}

.func{
    color:#4ade80;
}

/* CURSOR */

.cursor{
    width:9px;
    height:18px;
    background:white;
    display:inline-block;
    margin-left:2px;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* TOUR BOX */

.tour{
    position:absolute;
    width:240px;
    background:rgba(15,23,42,.98);
    border:1px solid #334155;
    border-radius:22px;
    padding:18px;
    box-shadow:
    0 0 40px rgba(0,0,0,.45);
    opacity:0;
    transform:translateY(20px);
    transition:.45s ease;
    z-index:20;
}

.tour.show{
    opacity:1;
    transform:translateY(0);
}

.tourTitle{
    font-size:13px;
    font-weight:800;
    letter-spacing:.5px;
    margin-bottom:10px;
}

.tourText{
    color:#cbd5e1;
    font-size:13px;
    line-height:1.7;
}

/* TOUR COLORS */

.blue{
    border-color:#2563eb;
}

.blue .tourTitle{
    color:#60a5fa;
}

.purple{
    border-color:#7c3aed;
}

.purple .tourTitle{
    color:#c084fc;
}

.yellowBox{
    border-color:#facc15;
}

.yellowBox .tourTitle{
    color:#fde047;
}

/* HIGHLIGHT */

.highlight{
    position:absolute;
    border-radius:14px;
    border:2px solid;
    opacity:0;
    transition:.35s ease;
    pointer-events:none;
}

.highlight.show{
    opacity:1;
}

.hl1{
    border-color:#38bdf8;
    box-shadow:0 0 24px rgba(56,189,248,.35);
}

.hl2{
    border-color:#c084fc;
    box-shadow:0 0 24px rgba(192,132,252,.35);
}

.hl3{
    border-color:#facc15;
    box-shadow:0 0 24px rgba(250,204,21,.35);
}

</style>
</head>

<body>

<div class="frame">

    <!-- FLOAT -->

    <div class="float" style="left:40px;bottom:-40px;">
        Python
    </div>

    <div class="float" style="left:300px;bottom:-200px;animation-delay:2s;">
        Variables
    </div>

    <div class="float" style="left:700px;bottom:-120px;animation-delay:4s;">
        Arrays
    </div>

    <div class="float" style="left:500px;bottom:-300px;animation-delay:6s;">
        print()
    </div>

    <!-- HERO -->

    <div class="hero" id="hero">

        <img
            class="pythonLogo"
            src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg"
        >

        <div class="heroTitle">
            Python Basics
        </div>

        <div class="heroSub">
            Variables • Arrays • print()
        </div>

    </div>

    <!-- EDITOR -->

    <div class="editor" id="editor">

        <div class="topbar">

            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>

            <div class="filename">
                tutorial.py
            </div>

        </div>

        <div class="workspace">

            <!-- CODE -->

            <div class="code" id="code"></div>

            <!-- TOURING -->

            <div
                class="tour blue"
                id="tour1"
                style="top:90px;right:24px;"
            >
                <div class="tourTitle">
                    VARIABLE
                </div>

                <div class="tourText">
                    Variables store data values inside Python programs.
                </div>
            </div>

            <div
                class="tour purple"
                id="tour2"
                style="top:210px;right:24px;"
            >
                <div class="tourTitle">
                    ARRAY / LIST
                </div>

                <div class="tourText">
                    Lists keep multiple items together in one variable.
                </div>
            </div>

            <div
                class="tour yellowBox"
                id="tour3"
                style="top:330px;right:24px;"
            >
                <div class="tourTitle">
                    PRINT FUNCTION
                </div>

                <div class="tourText">
                    print() displays output directly in the console.
                </div>
            </div>

            <!-- HIGHLIGHTS -->

            <div
                class="highlight hl1"
                id="hl1"
                style="
                top:86px;
                left:74px;
                width:420px;
                height:40px;
                "
            ></div>

            <div
                class="highlight hl2"
                id="hl2"
                style="
                top:166px;
                left:74px;
                width:520px;
                height:42px;
                "
            ></div>

            <div
                class="highlight hl3"
                id="hl3"
                style="
                top:286px;
                left:74px;
                width:350px;
                height:42px;
                "
            ></div>

        </div>

    </div>

</div>

<script>

/* ELEMENTS */

const hero =
document.getElementById("hero");

const editor =
document.getElementById("editor");

const codeBox =
document.getElementById("code");

const tour1 =
document.getElementById("tour1");

const tour2 =
document.getElementById("tour2");

const tour3 =
document.getElementById("tour3");

const hl1 =
document.getElementById("hl1");

const hl2 =
document.getElementById("hl2");

const hl3 =
document.getElementById("hl3");

/* START */

setTimeout(()=>{

    hero.classList.add("hide");

    setTimeout(()=>{

        editor.classList.add("show");

        startTyping();

    },700);

},2600);

/* CODE */

const lines = [

`<span class="comment"># Python Tutorial</span>`,

`<span class="variable">name</span> = <span class="string">"Dominex"</span>`,

`<span class="variable">numbers</span> = [<span class="number">10</span>, <span class="number">20</span>, <span class="number">30</span>, <span class="number">40</span>]`,

`<span class="keyword">for</span> item <span class="keyword">in</span> numbers:`,

`    <span class="func">print</span>(<span class="string">"Value:"</span>, item)`,

`<span class="func">print</span>(<span class="string">"Welcome"</span>, name)`

];

let lineIndex = 0;

function startTyping(){

    typeLine();
}

function typeLine(){

    if(lineIndex >= lines.length){

        setTimeout(showTours,700);

        return;
    }

    const row =
    document.createElement("div");

    row.className = "line";

    row.innerHTML = `
        <div class="num">${lineIndex + 1}</div>
        <div class="text"></div>
    `;

    codeBox.appendChild(row);

    const text =
    row.querySelector(".text");

    const html = lines[lineIndex];

    let i = 0;

    function typeChar(){

        text.innerHTML =
        html.substring(0,i) +
        '<span class="cursor"></span>';

        i++;

        if(i <= html.length){

            setTimeout(typeChar,5);

        }else{

            text.innerHTML = html;

            lineIndex++;

            setTimeout(typeLine,120);

        }
    }

    typeChar();
}

/* TOUR */

function showTours(){

    hl1.classList.add("show");

    tour1.classList.add("show");

    setTimeout(()=>{

        hl2.classList.add("show");

        tour2.classList.add("show");

    },1700);

    setTimeout(()=>{

        hl3.classList.add("show");

        tour3.classList.add("show");

    },3400);
}

</script>

</body>
</html>
