<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Solver Cinema</title>

<style>
body{
    margin:0;
    height:100vh;
    background:radial-gradient(circle at center, #020617, #000000);
    overflow:hidden;
    font-family:Inter, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* SCENE */
.scene{
    width:90%;
    max-width:900px;
    height:100vh;
    position:relative;
}

/* PROBLEM */
.problem{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:100%;
    color:#38bdf8;
    font-size:24px;
    font-weight:900;
    text-shadow:0 0 25px #38bdf8;
    transition:all 1.6s cubic-bezier(0.22, 1, 0.36, 1);
    letter-spacing:0.5px;
}

/* MOVED PROBLEM (still visible) */
.problem.top{
    top:8%;
    font-size:18px;
    color:#60a5fa;
    opacity:0.9;
    text-shadow:0 0 18px #2563eb;
}

/* SOLUTION AREA */
.solution{
    position:absolute;
    top:22%;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    text-align:center;
    color:#cbd5e1;
    font-size:18px;
    line-height:2;
    max-height:65vh;
    overflow:hidden;
}

/* LINE ANIMATION (premium “thinking reveal”) */
.line{
    opacity:0;
    transform:translateY(14px) scale(0.98);
    filter:blur(4px);
    animation:reveal 0.9s ease forwards;
}

@keyframes reveal{
    to{
        opacity:1;
        transform:translateY(0) scale(1);
        filter:blur(0);
    }
}

/* COLORS */
.glow{
    color:#38bdf8;
    text-shadow:0 0 12px #38bdf8;
    font-weight:700;
}

.big{
    color:#7dd3fc;
    font-size:22px;
    font-weight:900;
    text-shadow:0 0 30px #38bdf8;
}

.final{
    color:#a78bfa;
    font-size:26px;
    font-weight:900;
    text-shadow:0 0 40px #7c3aed;
}

/* THINKING DOTS */
.think{
    display:inline-block;
    color:#64748b;
    font-style:italic;
}

.dots::after{
    content:"";
    animation:dots 1.2s infinite;
}

@keyframes dots{
    0%{content:""}
    33%{content:"."}
    66%{content:".."}
    100%{content:"..."}
}

/* FOOTER */
.credit{
    position:absolute;
    bottom:16px;
    width:100%;
    text-align:center;
    font-size:12px;
    color:#64748b;
    letter-spacing:1.5px;
    animation:fade 3s ease-in-out infinite;
}

@keyframes fade{
    0%,100%{opacity:0.4}
    50%{opacity:1}
}

/* CURSOR */
.cursor{
    display:inline-block;
    width:10px;
    height:18px;
    background:white;
    margin-left:6px;
    animation:blink .6s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

</style>
</head>

<body>

<div class="scene">

    <div class="problem" id="problem"></div>
    <div class="solution" id="solution"></div>

    <div class="credit">Animated by Dominex Macedon</div>

</div>

<script>

const problemEl = document.getElementById("problem");
const solutionEl = document.getElementById("solution");

/* PROBLEM */
const problemText =
`PHYSICS PROBLEM:
A car starts from rest and accelerates at 3 m/s².
Find velocity after 10 seconds.`;

/* SOLUTION FLOW */
const solutionLines = [
"SOLUTION:",
"<span class='think'>Analyzing motion</span><span class='dots'></span>",
"",
"We use equation of motion:",
"<span class='glow'>v = u + at</span>",
"",
"<span class='think'>Substituting values</span><span class='dots'></span>",
"u = 0 m/s",
"a = <span class='glow'>3 m/s²</span>",
"t = <span class='glow'>10 s</span>",
"",
"<span class='think'>Computing result</span><span class='dots'></span>",
"v = 0 + (3 × 10)",
"",
"<span class='big'>Processing final value...</span>",
"",
"<span class='final'>Velocity = 30 m/s</span>"
];

let i = 0;
let char = 0;
let sol = 0;

/* TYPE PROBLEM */
function typeProblem(){

    if(char < problemText.length){
        problemEl.innerHTML =
            problemText.substring(0, char+1) + '<span class="cursor"></span>';

        char++;
        setTimeout(typeProblem, 26);
    }
    else{
        problemEl.innerHTML = problemText;

        setTimeout(() => {
            problemEl.classList.add("top");
            startSolution();
        }, 1000);
    }
}

/* PREMIUM SOLUTION ENGINE */
function startSolution(){

    function addStep(){

        if(sol >= solutionLines.length) return;

        const div = document.createElement("div");
        div.className = "line";
        div.innerHTML = solutionLines[sol];

        solutionEl.appendChild(div);

        sol++;

        // natural “thinking delay”
        const delay = 380 + Math.random() * 320;

        setTimeout(addStep, delay);
    }

    setTimeout(addStep, 600);
}

typeProblem();

</script>

</body>
</html>
