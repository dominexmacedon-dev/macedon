<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050814;
    font-family:Inter,sans-serif;
}

/* BACKGROUND GLOW */
body::before,
body::after{
    content:"";
    position:absolute;
    width:520px;
    height:520px;
    filter:blur(150px);
    border-radius:50%;
}

body::before{
    background:#22c55e;
    top:-180px;
    left:-180px;
    opacity:.18;
}

body::after{
    background:#3b82f6;
    bottom:-200px;
    right:-200px;
    opacity:.16;
}

/* ===== INTRO ===== */

.intro{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#050814;
    z-index:50;
}

.androidLogo{
    width:180px;
    height:180px;
    filter:drop-shadow(0 0 40px rgba(34,197,94,.7));
    animation:zoomIn 2s ease forwards;
}

@keyframes zoomIn{
    from{ transform:scale(0.3); opacity:0; }
    to{ transform:scale(1); opacity:1; }
}

.introText{
    margin-top:20px;
    font-size:22px;
    color:#a3ffb5;
    font-weight:800;
    text-shadow:0 0 20px rgba(34,197,94,.6);
    animation:fadeIn 2s ease forwards;
}

@keyframes fadeIn{
    from{ opacity:0; }
    to{ opacity:1; }
}

/* ===== MAIN FRAME ===== */

.main{
    position:absolute;
    inset:0;
    display:none;
}

/* FLOATING TEXT */
.floatText{
    position:absolute;
    color:#38bdf8;
    font-size:13px;
    opacity:.18;
    font-weight:700;
    animation:floatUp 10s linear infinite;
}

@keyframes floatUp{
    from{ transform:translateY(80px); }
    to{ transform:translateY(-800px); }
}

/* PHONE */
.phone{
    width:360px;
    height:720px;
    background:#0b1220;
    border-radius:40px;
    border:2px solid #1f2937;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) rotate(-10deg) scale(.6);
    box-shadow:0 0 90px rgba(0,0,0,.8);
    overflow:hidden;
    animation:flyIn 3s ease forwards, floatMove 6s ease-in-out infinite;
}

@keyframes flyIn{
    to{
        transform:translate(-50%,-50%) rotate(0deg) scale(1);
    }
}

@keyframes floatMove{
    0%{ transform:translate(-50%,-50%) rotate(0deg); }
    50%{ transform:translate(-48%,-52%) rotate(2deg); }
    100%{ transform:translate(-50%,-50%) rotate(0deg); }
}

/* SCREEN */
.screen{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* BOOT TEXT */
.bootText{
    color:#22c55e;
    font-size:26px;
    font-weight:900;
    text-shadow:0 0 25px rgba(34,197,94,.7);
}

/* SYSTEM TEXT INSIDE PHONE */
.sys{
    position:absolute;
    bottom:60px;
    font-size:11px;
    color:#38bdf8;
    opacity:.8;
    text-align:center;
    width:100%;
}

/* OWNER */
.owner{
    position:absolute;
    bottom:20px;
    font-size:14px;
    font-weight:900;
    color:#60a5fa;
    text-shadow:0 0 20px rgba(96,165,250,.8);
}

/* ===== FINAL ===== */

.final{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
}

.final.show{
    animation:show 1.5s forwards;
}

@keyframes show{
    to{ opacity:1; }
}

.finalText{
    font-size:42px;
    font-weight:900;
    color:#22c55e;
    text-shadow:0 0 35px rgba(34,197,94,.8);
}

.dom{
    margin-top:10px;
    font-size:18px;
    font-weight:800;
    color:#60a5fa;
    text-shadow:0 0 25px rgba(96,165,250,.7);
}

</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">

    <img class="androidLogo"
    src="https://upload.wikimedia.org/wikipedia/commons/d/d7/Android_robot.svg">

    <div class="introText">ANDROID SYSTEM INITIALIZING</div>

</div>

<!-- MAIN -->
<div class="main" id="main">

    <!-- floating system text -->
    <div class="floatText" style="left:60px;bottom:-50px;">Kernel Boot</div>
    <div class="floatText" style="left:300px;bottom:-200px;animation-delay:2s;">UI Engine</div>
    <div class="floatText" style="left:700px;bottom:-100px;animation-delay:4s;">System Services</div>

    <!-- PHONE -->
    <div class="phone" id="phone">

        <div class="screen">

            <div class="bootText">ANDROID BOOTING...</div>

            <div class="sys">
                Loading system modules<br>
                Initializing hardware layer<br>
                Optimizing performance
            </div>

            <div class="owner">Dominex Macedon</div>

        </div>

    </div>

    <!-- FINAL -->
    <div class="final" id="final">

        <div class="finalText">ANDROID READY</div>
        <div class="dom">Owned by Dominex Macedon</div>

    </div>

</div>

<script>

const intro =
document.getElementById("intro");

const main =
document.getElementById("main");

const final =
document.getElementById("final");

/* INTRO -> MAIN */
setTimeout(()=>{

    intro.style.opacity="0";
    intro.style.transition="1s ease";

},2500);

setTimeout(()=>{

    intro.style.display="none";
    main.style.display="block";

},3500);

/* FINAL SCREEN */
setTimeout(()=>{

    final.classList.add("show");

},8500);

</script>

</body>
</html>
