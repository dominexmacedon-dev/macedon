<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Inter,sans-serif;
}

/* BACKGROUND */

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(160px);
}

body::before{
    width:480px;
    height:480px;
    background:#2563eb;
    top:-200px;
    left:-200px;
    opacity:.2;
}

body::after{
    width:480px;
    height:480px;
    background:#7c3aed;
    right:-200px;
    bottom:-200px;
    opacity:.18;
}

/* FRAME */

.frame{
    width:430px;
    height:860px;

    background:#0f172a;

    border-radius:42px;

    overflow:hidden;

    position:relative;

    border:1px solid rgba(255,255,255,.06);

    box-shadow:
    0 0 80px rgba(0,0,0,.7),
    inset 0 0 30px rgba(255,255,255,.03);
}

/* GLOW */

.glow{
    position:absolute;
    border-radius:50%;
    filter:blur(90px);
    opacity:.18;
}

.g1{
    width:220px;
    height:220px;
    background:#2563eb;
    top:30px;
    left:-40px;
}

.g2{
    width:220px;
    height:220px;
    background:#7c3aed;
    right:-40px;
    bottom:30px;
}

/* INTRO */

.intro{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    z-index:20;

    transition:1s ease;
}

.intro.hide{
    opacity:0;
    transform:scale(1.08);
}

.pythonLogo{
    width:120px;

    filter:
    drop-shadow(0 0 35px rgba(59,130,246,.55));

    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    50%{
        transform:translateY(-10px);
    }
}

.title{
    margin-top:30px;

    color:white;

    font-size:42px;

    font-weight:900;

    line-height:1.1;

    text-align:center;

    letter-spacing:-1px;
}

.sub{
    margin-top:18px;

    color:#7dd3fc;

    font-size:17px;

    font-weight:700;

    text-align:center;

    line-height:1.7;
}

/* MAIN CARD */

.card{
    position:absolute;

    inset:22px;

    background:rgba(15,23,42,.84);

    border:1px solid rgba(255,255,255,.06);

    border-radius:30px;

    backdrop-filter:blur(18px);

    padding:26px;

    opacity:0;

    transition:.8s ease;

    display:flex;
    flex-direction:column;

    z-index:30;
}

.card.show{
    opacity:1;
}

/* LABEL */

.label{
    color:#38bdf8;

    font-size:13px;

    font-weight:800;

    letter-spacing:2px;
}

/* HEADLINE */

.headline{
    margin-top:14px;

    color:white;

    font-size:34px;

    font-weight:900;

    line-height:1.15;

    letter-spacing:-1px;

    min-height:82px;
}

/* GLOW WORD */

.glowWord{
    display:inline-block;

    font-weight:900;

    animation:glowPulse 1.5s ease-in-out infinite;
}

.blue{
    color:#7dd3fc;

    text-shadow:
    0 0 12px rgba(125,211,252,.9),
    0 0 28px rgba(59,130,246,.8),
    0 0 60px rgba(59,130,246,.55);
}

.green{
    color:#86efac;

    text-shadow:
    0 0 12px rgba(134,239,172,.9),
    0 0 28px rgba(34,197,94,.8),
    0 0 60px rgba(34,197,94,.55);
}

.purple{
    color:#d8b4fe;

    text-shadow:
    0 0 12px rgba(216,180,254,.9),
    0 0 28px rgba(168,85,247,.8),
    0 0 60px rgba(168,85,247,.55);
}

.orange{
    color:#fdba74;

    text-shadow:
    0 0 12px rgba(253,186,116,.9),
    0 0 28px rgba(249,115,22,.8),
    0 0 60px rgba(249,115,22,.55);
}

@keyframes glowPulse{
    50%{
        transform:scale(1.06);
    }
}

/* CODE WINDOW */

.window{
    margin-top:24px;

    border-radius:22px;

    overflow:hidden;

    border:1px solid rgba(255,255,255,.06);

    background:#020617;
}

/* TOPBAR */

.topbar{
    height:52px;

    background:#111827;

    border-bottom:1px solid #1e293b;

    display:flex;
    align-items:center;

    padding:0 18px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    margin-right:6px;
}

.red{background:#ef4444;}
.yellow{background:#facc15;}
.greenDot{background:#22c55e;}

.file{
    margin-left:10px;

    color:#cbd5e1;

    font-size:13px;

    font-weight:700;
}

/* CODE */

.code{
    padding:22px;

    min-height:180px;

    font-family:'Fira Code', monospace;

    font-size:16px;

    line-height:2;

    color:white;
}

.line{
    display:grid;
    grid-template-columns:34px auto;
    align-items:flex-start;
}

.num{
    color:#475569;
}

.text{
    white-space:pre-wrap;
    word-break:break-word;
}

.comment{
    color:#64748b;
}

.variable{
    color:#38bdf8;
}

.string{
    color:#facc15;
}

.func{
    color:#4ade80;
}

.keyword{
    color:#c084fc;
}

/* GLOW CODE */

.highlight{
    font-weight:900;

    animation:codePulse 1.4s ease-in-out infinite;
}

@keyframes codePulse{
    50%{
        filter:brightness(1.3);
    }
}

/* CURSOR */

.cursor{
    width:8px;
    height:17px;
    background:white;
    display:inline-block;
    margin-left:2px;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* EXPLANATION */

.explainBox{
    margin-top:24px;

    background:linear-gradient(
        135deg,
        rgba(37,99,235,.2),
        rgba(59,130,246,.08)
    );

    border:1px solid rgba(96,165,250,.16);

    border-radius:22px;

    padding:20px;

    min-height:130px;
}

.explainTitle{
    color:#7dd3fc;

    font-size:13px;

    font-weight:900;

    letter-spacing:1px;
}

.explainText{
    margin-top:12px;

    color:white;

    font-size:15px;

    line-height:1.9;

    font-weight:500;
}

/* TERMINAL */

.terminal{
    margin-top:20px;

    background:#020617;

    border-radius:20px;

    border:1px solid rgba(255,255,255,.06);

    padding:18px;

    min-height:110px;

    font-family:'Fira Code', monospace;

    color:#4ade80;

    font-size:15px;

    line-height:2;
}

/* FINAL */

.final{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    opacity:0;

    transition:1s ease;

    z-index:60;
}

.final.show{
    opacity:1;
}

.finalTitle{
    color:white;

    font-size:44px;

    font-weight:900;

    text-align:center;

    line-height:1.2;

    letter-spacing:-1px;

    text-shadow:
    0 0 35px rgba(255,255,255,.12);
}

.finalSub{
    margin-top:20px;

    color:#60a5fa;

    font-size:18px;

    font-weight:800;

    text-shadow:
    0 0 20px rgba(96,165,250,.45);
}

</style>
</head>

<body>

<div class="frame">

    <div class="glow g1"></div>
    <div class="glow g2"></div>

    <!-- INTRO -->

    <div class="intro" id="intro">

        <img
            class="pythonLogo"
            src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg"
        >

        <div class="title">
            Programming Concepts<br>
            in 15 Seconds
        </div>

        <div class="sub">
            Variables • Functions<br>
            Loops • APIs
        </div>

    </div>

    <!-- MAIN -->

    <div class="card" id="card">

        <div class="label" id="label">
            VARIABLES
        </div>

        <div class="headline" id="headline">
            Store Data
        </div>

        <!-- CODE -->

        <div class="window">

            <div class="topbar">

                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot greenDot"></div>

                <div class="file">
                    app.py
                </div>

            </div>

            <div class="code" id="code"></div>

        </div>

        <!-- EXPLANATION -->

        <div class="explainBox">

            <div class="explainTitle">
                EXPLANATION
            </div>

            <div class="explainText" id="explain"></div>

        </div>

        <!-- TERMINAL -->

        <div class="terminal" id="terminal"></div>

    </div>

    <!-- FINAL -->

    <div class="final" id="final">

        <div class="finalTitle">
            Coding Should<br>
            Feel Cinematic
        </div>

        <div class="finalSub">
            Follow For More Python Concepts
        </div>

    </div>

</div>

<script>

/* ELEMENTS */

const intro =
document.getElementById("intro");

const card =
document.getElementById("card");

const label =
document.getElementById("label");

const headline =
document.getElementById("headline");

const code =
document.getElementById("code");

const explain =
document.getElementById("explain");

const terminal =
document.getElementById("terminal");

const final =
document.getElementById("final");

/* START */

setTimeout(()=>{

    intro.classList.add("hide");

    setTimeout(()=>{

        card.classList.add("show");

        variableScene();

    },900);

},2800);

/* TYPE TEXT */

function typeText(el,text,speed=25){

    el.innerHTML = "";

    let i = 0;

    function write(){

        el.innerHTML =
        text.substring(0,i) +
        '<span class="cursor"></span>';

        i++;

        if(i <= text.length){

            setTimeout(write,speed);

        }else{

            el.innerHTML = text;
        }
    }

    write();
}

/* TYPE CODE */

function typeCode(lines){

    code.innerHTML = "";

    let lineIndex = 0;

    function addLine(){

        if(lineIndex >= lines.length){
            return;
        }

        const row =
        document.createElement("div");

        row.className = "line";

        row.innerHTML = `
            <div class="num">${lineIndex + 1}</div>
            <div class="text"></div>
        `;

        code.appendChild(row);

        const text =
        row.querySelector(".text");

        const html =
        lines[lineIndex];

        let i = 0;

        function type(){

            text.innerHTML =
            html.substring(0,i) +
            '<span class="cursor"></span>';

            i++;

            if(i <= html.length){

                setTimeout(type,8);

            }else{

                text.innerHTML = html;

                lineIndex++;

                setTimeout(addLine,220);
            }
        }

        type();
    }

    addLine();
}

/* VARIABLE */

function variableScene(){

    label.innerText = "VARIABLE";

    headline.innerHTML =
    `Store <span class="glowWord blue">Data</span>`;

    typeCode([

`<span class="variable highlight blue">name</span> = <span class="string">"Dominex"</span>`

    ]);

    typeText(
        explain,
        "Variables store information inside your Python program."
    );

    typeText(
        terminal,
        'name → "Dominex"',
        30
    );

    setTimeout(functionScene,5200);
}

/* FUNCTION */

function functionScene(){

    label.innerText = "FUNCTION";

    headline.innerHTML =
    `Run <span class="glowWord green">Actions</span>`;

    typeCode([

`<span class="func highlight green">print</span>(<span class="string">"Hello"</span>)`

    ]);

    typeText(
        explain,
        "Functions execute actions and help organize your code."
    );

    typeText(
        terminal,
        "Hello",
        35
    );

    setTimeout(loopScene,5200);
}

/* LOOP */

function loopScene(){

    label.innerText = "LOOP";

    headline.innerHTML =
    `Repeat <span class="glowWord purple">Tasks</span>`;

    typeCode([

`<span class="keyword highlight purple">for</span> i in range(3):`,
`    print(i)`

    ]);

    typeText(
        explain,
        "Loops automatically repeat code multiple times."
    );

    typeText(
        terminal,
        "0\n1\n2",
        40
    );

    setTimeout(apiScene,5600);
}

/* API */

function apiScene(){

    label.innerText = "API";

    headline.innerHTML =
    `Connect <span class="glowWord orange">Systems</span>`;

    typeCode([

`response = requests.get(`,
`"api.weather.com")`

    ]);

    typeText(
        explain,
        "APIs allow applications to communicate and share data."
    );

    typeText(
        terminal,
        "Weather Data Received",
        35
    );

    setTimeout(showFinal,6200);
}

/* FINAL */

function showFinal(){

    card.style.opacity = "0";

    setTimeout(()=>{

        final.classList.add("show");

    },1000);
}

</script>

</body>
</html>
