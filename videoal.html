<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background:#050816;
    font-family:Inter,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BACKGROUND GLOW */
body::before,
body::after{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    border-radius:50%;
    filter:blur(160px);
}

body::before{
    background:#3b82f6;
    top:-200px;
    left:-200px;
    opacity:.18;
}

body::after{
    background:#22c55e;
    bottom:-200px;
    right:-200px;
    opacity:.15;
}

/* MAIN BOARD */
.board{
    width:900px;
    height:420px;
    background:rgba(15,23,42,.85);
    border:1px solid #1e293b;
    border-radius:26px;
    box-shadow:0 0 80px rgba(0,0,0,.6);
    position:relative;
    overflow:hidden;
}

/* CENTER EQUATION AREA */
.eqBox{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* EQUATION TEXT */
.eq{
    font-size:34px;
    font-weight:900;
    color:#7dd3fc;
    text-shadow:0 0 25px rgba(125,211,252,.7);
    opacity:0;
    transform:scale(.7);
    transition:1s ease;
}

.eq.show{
    opacity:1;
    transform:scale(1);
}

/* LINE DRAW EFFECT */
.line{
    position:absolute;
    height:3px;
    background:linear-gradient(90deg,#38bdf8,#22c55e);
    width:0;
    box-shadow:0 0 20px rgba(56,189,248,.6);
    border-radius:10px;
}

/* step animation */
.draw{
    animation:draw 1s ease forwards;
}

@keyframes draw{
    from{ width:0; }
    to{ width:300px; }
}

/* SUB TEXT */
.sub{
    margin-top:18px;
    font-size:14px;
    color:#94a3b8;
    opacity:0;
    transition:1s ease;
}

.sub.show{
    opacity:1;
}

/* TITLE */
.title{
    position:absolute;
    top:26px;
    width:100%;
    text-align:center;
    font-size:18px;
    font-weight:800;
    color:#60a5fa;
    text-shadow:0 0 20px rgba(96,165,250,.5);
    opacity:0;
    animation:fadeIn 1.5s forwards;
}

@keyframes fadeIn{
    to{ opacity:1; }
}

/* OWNER */
.owner{
    position:absolute;
    bottom:24px;
    width:100%;
    text-align:center;
    font-size:16px;
    font-weight:900;
    color:#86efac;
    text-shadow:0 0 25px rgba(134,239,172,.6);
    opacity:0;
    animation:fadeIn 1.5s forwards;
    animation-delay:6s;
}

</style>
</head>

<body>

<div class="board">

    <div class="title">MATHEMATICAL TRANSFORMATION ENGINE</div>

    <div class="eqBox">

        <div class="eq" id="eq">x + x + x + x</div>
        <div class="sub" id="sub">Starting Expression</div>

        <div class="line" id="line1" style="top:180px; left:300px;"></div>
        <div class="line" id="line2" style="top:180px; left:300px;"></div>

    </div>

    <div class="owner">Dominex Macedon</div>

</div>

<script>

const eq = document.getElementById("eq");
const sub = document.getElementById("sub");

const line1 = document.getElementById("line1");
const line2 = document.getElementById("line2");

/* START */
setTimeout(()=>{

    eq.classList.add("show");
    sub.classList.add("show");

},500);

/* STEP 1 → DRAW LINE */
setTimeout(()=>{

    line1.classList.add("draw");

},1800);

/* TRANSFORM */
setTimeout(()=>{

    eq.innerText = "4x";
    sub.innerText = "Simplified Expression";

},3200);

/* STEP 2 LINE */
setTimeout(()=>{

    line2.classList.add("draw");

},4200);

/* FINAL TRANSFORM */
setTimeout(()=>{

    eq.innerText = "x² derivative → 2x";
    sub.innerText = "Advanced Transformation";

},5600);

</script>

</body>
</html>
