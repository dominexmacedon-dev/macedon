<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Programming Feels Like Magic</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Inter,sans-serif;
}

/* SCREEN RECORDING SAFE AREA */

.recordFrame{
    width:1280px;
    height:720px;

    position:relative;

    overflow:hidden;

    border-radius:34px;

    background:#020617;

    box-shadow:
    0 0 120px rgba(0,0,0,.8);
}

/* BACKGROUND */

.bg{
    position:absolute;
    inset:0;
}

.orb{
    position:absolute;
    border-radius:50%;
    filter:blur(160px);
    animation:pulse 8s ease-in-out infinite;
}

.orb1{
    width:520px;
    height:520px;
    background:#2563eb;
    left:-180px;
    top:-180px;
    opacity:.22;
}

.orb2{
    width:520px;
    height:520px;
    background:#7c3aed;
    right:-180px;
    bottom:-180px;
    opacity:.2;
}

.orb3{
    width:380px;
    height:380px;
    background:#06b6d4;
    left:38%;
    top:22%;
    opacity:.12;
}

@keyframes pulse{
    50%{
        transform:scale(1.18);
    }
}

/* PARTICLES */

.particles{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.particle{
    position:absolute;
    width:4px;
    height:4px;
    border-radius:50%;
    background:white;
    opacity:.3;
    animation:float linear infinite;
}

@keyframes float{

    from{
        transform:
        translateY(100vh)
        translateX(0px);
    }

    to{
        transform:
        translateY(-120vh)
        translateX(80px);
    }
}

/* MAIN FRAME */

.frame{
    position:absolute;

    inset:38px;

    background:rgba(15,23,42,.72);

    border:1px solid rgba(255,255,255,.06);

    border-radius:30px;

    overflow:hidden;

    backdrop-filter:blur(18px);

    box-shadow:
    0 0 80px rgba(0,0,0,.55),
    inset 0 0 30px rgba(255,255,255,.03);
}

/* HERO */

.hero{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    z-index:30;

    transition:1.2s ease;
}

.hero.hide{
    opacity:0;
    transform:scale(1.12);
    pointer-events:none;
}

.logo{
    width:145px;

    filter:
    drop-shadow(0 0 45px rgba(59,130,246,.5));

    animation:floatLogo 4s ease-in-out infinite;
}

@keyframes floatLogo{
    50%{
        transform:translateY(-12px);
    }
}

.heroTitle{
    margin-top:28px;

    color:white;

    font-size:58px;

    font-weight:900;

    letter-spacing:-1px;

    text-shadow:
    0 0 30px rgba(255,255,255,.12);
}

.heroSub{
    margin-top:14px;

    color:#7dd3fc;

    font-size:18px;

    font-weight:700;

    text-shadow:
    0 0 25px rgba(125,211,252,.3);
}

/* EDITOR */

.editor{
    position:absolute;
    inset:0;

    display:none;
    flex-direction:column;

    z-index:40;
}

.editor.show{
    display:flex;
}

/* TOPBAR */

.topbar{
    height:64px;

    background:#111827;

    border-bottom:1px solid rgba(255,255,255,.06);

    display:flex;
    align-items:center;

    padding:0 22px;
}

.dot{
    width:11px;
    height:11px;
    border-radius:50%;
    margin-right:7px;
}

.red{background:#ef4444;}
.yellow{background:#facc15;}
.green{background:#22c55e;}

.file{
    margin-left:14px;

    color:#e2e8f0;

    font-size:14px;

    font-weight:700;
}

/* WORKSPACE */

.workspace{
    flex:1;
    position:relative;
}

/* CODE */

.code{
    position:absolute;

    left:0;
    top:0;

    width:62%;
    height:100%;

    padding:38px;

    font-family:'Fira Code', monospace;

    font-size:18px;

    line-height:2.2;

    color:white;
}

.line{
    display:grid;
    grid-template-columns:55px auto;
    align-items:center;
}

.num{
    color:#475569;
    text-align:right;
    padding-right:20px;
}

.text{
    white-space:pre;
    transition:.45s ease;
}

.comment{
    color:#64748b;
}

.variable{
    color:#38bdf8;
}

.string{
    color:#facc15;
}

.func{
    color:#4ade80;
}

/* MAGIC HIGHLIGHT */

.magicBlue{
    color:#7dd3fc !important;

    font-weight:900;

    text-shadow:
    0 0 14px rgba(125,211,252,.9),
    0 0 30px rgba(59,130,246,.7),
    0 0 60px rgba(59,130,246,.55);

    transform:scale(1.04);
}

.magicGreen{
    color:#86efac !important;

    font-weight:900;

    text-shadow:
    0 0 14px rgba(134,239,172,.9),
    0 0 30px rgba(34,197,94,.7),
    0 0 60px rgba(34,197,94,.55);

    transform:scale(1.04);
}

/* CURSOR */

.cursor{
    width:9px;
    height:18px;
    background:white;
    display:inline-block;
    margin-left:2px;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* EXPLAIN BOX */

.explain{
    position:absolute;

    right:34px;
    top:115px;

    width:330px;

    padding:28px;

    border-radius:28px;

    background:linear-gradient(
        135deg,
        rgba(37,99,235,.22),
        rgba(124,58,237,.14)
    );

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(16px);

    box-shadow:
    0 0 40px rgba(59,130,246,.14);

    opacity:0;

    transform:
    translateY(24px)
    scale(.92);

    transition:.6s ease;
}

.explain.show{
    opacity:1;

    transform:
    translateY(0)
    scale(1);
}

.explain.hide{
    opacity:0;

    transform:
    translateY(-22px)
    scale(.88);
}

.explainTitle{
    font-size:14px;

    font-weight:900;

    letter-spacing:1px;

    margin-bottom:16px;

    background:linear-gradient(
        90deg,
        #7dd3fc,
        #c084fc,
        #4ade80
    );

    background-size:300%;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:gradient 4s linear infinite;
}

@keyframes gradient{

    0%{
        background-position:0%;
    }

    100%{
        background-position:300%;
    }
}

.explainText{
    font-size:15px;

    line-height:1.9;

    font-weight:700;

    background:linear-gradient(
        90deg,
        #7dd3fc,
        #ffffff,
        #c084fc,
        #4ade80
    );

    background-size:400%;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:textFlow 5s linear infinite;
}

@keyframes textFlow{

    0%{
        background-position:0%;
    }

    100%{
        background-position:400%;
    }
}

/* SHOCKWAVE */

.shockwave{
    position:absolute;

    width:20px;
    height:20px;

    border-radius:50%;

    border:4px solid rgba(96,165,250,.85);

    left:50%;
    top:50%;

    transform:translate(-50%,-50%) scale(0);

    opacity:0;
}

.shockwave.active{
    animation:shock 1s ease forwards;
}

@keyframes shock{

    0%{
        transform:
        translate(-50%,-50%)
        scale(0);

        opacity:1;
    }

    100%{
        transform:
        translate(-50%,-50%)
        scale(28);

        opacity:0;
    }
}

/* TERMINAL */

.terminal{
    position:absolute;
    inset:0;

    background:#020617;

    display:none;
    flex-direction:column;

    z-index:60;
}

.terminal.show{
    display:flex;
}

.termGlow{
    position:absolute;
    inset:0;

    background:
    radial-gradient(circle,
    rgba(34,197,94,.28),
    transparent 65%);

    opacity:0;
}

.termGlow.active{
    animation:explode .9s ease forwards;
}

@keyframes explode{

    0%{
        opacity:0;
        transform:scale(.8);
    }

    50%{
        opacity:1;
        transform:scale(1.08);
    }

    100%{
        opacity:.16;
        transform:scale(1.3);
    }
}

.termTop{
    height:64px;

    background:#111827;

    border-bottom:1px solid #1e293b;

    display:flex;
    align-items:center;

    padding:0 22px;
}

.termTitle{
    margin-left:14px;

    color:#cbd5e1;

    font-size:14px;

    font-weight:700;
}

.termBody{
    flex:1;

    padding:36px;

    font-family:'Fira Code', monospace;

    font-size:18px;

    line-height:2.2;

    color:#4ade80;
}

.output{
    opacity:0;
    transform:translateY(8px);
    animation:fade .2s ease forwards;
}

@keyframes fade{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ENDING */

.ending{
    position:absolute;
    inset:0;

    background:#020617;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    opacity:0;

    pointer-events:none;

    transition:1s ease;

    z-index:80;
}

.ending.show{
    opacity:1;
}

.endTitle{
    color:white;

    font-size:58px;

    font-weight:900;

    letter-spacing:-1px;

    text-shadow:
    0 0 35px rgba(255,255,255,.12);
}

.endSub{
    margin-top:14px;

    color:#60a5fa;

    font-size:22px;

    font-weight:800;

    text-shadow:
    0 0 30px rgba(96,165,250,.45);
}

</style>
</head>

<body>

<div class="recordFrame">

    <div class="bg">

        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>

    </div>

    <div class="particles" id="particles"></div>

    <div class="frame">

        <!-- HERO -->

        <div class="hero" id="hero">

            <img
                class="logo"
                src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg"
            >

            <div class="heroTitle">
                Programming Feels Like Magic
            </div>

            <div class="heroSub">
                Every line of code controls reality.
            </div>

        </div>

        <!-- EDITOR -->

        <div class="editor" id="editor">

            <div class="topbar">

                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>

                <div class="file">
                    magic.py
                </div>

            </div>

            <div class="workspace">

                <div class="code" id="code"></div>

                <div class="explain" id="explain">

                    <div class="explainTitle">
                        CODE ENERGY
                    </div>

                    <div class="explainText" id="explainText"></div>

                </div>

            </div>

        </div>

        <!-- SHOCKWAVE -->

        <div class="shockwave" id="shockwave"></div>

        <!-- TERMINAL -->

        <div class="terminal" id="terminal">

            <div class="termGlow" id="termGlow"></div>

            <div class="termTop">

                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>

                <div class="termTitle">
                    Python Terminal
                </div>

            </div>

            <div class="termBody" id="termBody"></div>

        </div>

        <!-- END -->

        <div class="ending" id="ending">

            <div class="endTitle">
                Dominex Macedon
            </div>

            <div class="endSub">
                — Code Is Power —
            </div>

        </div>

    </div>

</div>

<script>

/* PARTICLES */

const particles =
document.getElementById("particles");

for(let i=0;i<90;i++){

    const p =
    document.createElement("div");

    p.className = "particle";

    p.style.left =
    Math.random()*100 + "%";

    p.style.animationDuration =
    7 + Math.random()*8 + "s";

    p.style.animationDelay =
    Math.random()*5 + "s";

    particles.appendChild(p);
}

/* ELEMENTS */

const hero =
document.getElementById("hero");

const editor =
document.getElementById("editor");

const code =
document.getElementById("code");

const explain =
document.getElementById("explain");

const explainText =
document.getElementById("explainText");

const terminal =
document.getElementById("terminal");

const termBody =
document.getElementById("termBody");

const ending =
document.getElementById("ending");

const shockwave =
document.getElementById("shockwave");

const termGlow =
document.getElementById("termGlow");

/* HERO */

setTimeout(()=>{

    hero.classList.add("hide");

    setTimeout(()=>{

        editor.classList.add("show");

        typeCode();

    },900);

},2400);

/* CODE */

const lines = [

`<span class="comment"># Programming Feels Like Magic</span>`,

`<span id="varLine"><span class="variable">name</span> = <span class="string">"Dominex"</span></span>`,

`<span id="printLine"><span class="func">print</span>(<span class="string">"Hello"</span>, name)</span>`

];

let lineIndex = 0;

function typeCode(){

    if(lineIndex >= lines.length){

        setTimeout(showExplain1,700);

        return;
    }

    const row =
    document.createElement("div");

    row.className = "line";

    row.innerHTML = `
        <div class="num">${lineIndex + 1}</div>
        <div class="text"></div>
    `;

    code.appendChild(row);

    const text =
    row.querySelector(".text");

    const html =
    lines[lineIndex];

    let i = 0;

    function type(){

        text.innerHTML =
        html.substring(0,i) +
        '<span class="cursor"></span>';

        i++;

        if(i <= html.length){

            setTimeout(type,5);

        }else{

            text.innerHTML = html;

            lineIndex++;

            setTimeout(typeCode,160);
        }
    }

    type();
}

/* EXPLANATIONS */

function showExplain1(){

    const varLine =
    document.getElementById("varLine");

    varLine.classList.add("magicBlue");

    explain.classList.add("show");

    typeExplain(
        "Variables store glowing energy inside the program."
    );

    setTimeout(()=>{

        explain.classList.remove("show");
        explain.classList.add("hide");

        varLine.classList.remove("magicBlue");

    },3200);

    setTimeout(showExplain2,3900);
}

function showExplain2(){

    const printLine =
    document.getElementById("printLine");

    explain.classList.remove("hide");

    printLine.classList.add("magicGreen");

    explain.classList.add("show");

    shockwave.classList.add("active");

    typeExplain(
        "print() releases the power into reality."
    );

    setTimeout(()=>{

        explain.classList.remove("show");

        printLine.classList.remove("magicGreen");

    },3200);

    setTimeout(showTerminal,4000);
}

function typeExplain(text){

    explainText.innerHTML = "";

    let i = 0;

    function write(){

        explainText.innerHTML +=
        text.charAt(i);

        i++;

        if(i < text.length){

            setTimeout(write,18);
        }
    }

    write();
}

/* TERMINAL */

function showTerminal(){

    editor.style.display = "none";

    terminal.classList.add("show");

    termGlow.classList.add("active");

    const outputs = [

        "> python magic.py",

        "",

        "Hello Dominex",

        "",

        "Reality Updated Successfully"

    ];

    outputs.forEach((text,index)=>{

        setTimeout(()=>{

            const line =
            document.createElement("div");

            line.className = "output";

            line.innerText = text;

            termBody.appendChild(line);

        },index * 140);

    });

    document.body.animate([

        {
            filter:"brightness(1)"
        },

        {
            filter:"brightness(1.6)"
        },

        {
            filter:"brightness(1)"
        }

    ],{

        duration:700
    });

    setTimeout(showEnding,3500);
}

/* END */

function showEnding(){

    terminal.style.display = "none";

    ending.classList.add("show");
}

</script>

</body>
</html>
