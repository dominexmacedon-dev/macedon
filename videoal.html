<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculus Visual Lab</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#020617;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

.frame{
    width:430px;
    height:800px;
    position:relative;
    background:#0f172a;
    border-radius:28px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.08);
}

/* CANVAS */
canvas{
    position:absolute;
    inset:0;
}

/* HUD */
.hud{
    position:absolute;
    top:16px;
    left:16px;
    right:16px;
    display:flex;
    justify-content:space-between;
    z-index:10;
}

.box{
    padding:10px 12px;
    border-radius:14px;
    background:rgba(255,255,255,.06);
    color:white;
    font-weight:900;
    font-size:12px;
    backdrop-filter:blur(10px);
}

/* FORMULA */
.formula{
    position:absolute;
    bottom:110px;
    left:18px;
    right:18px;

    padding:14px;
    border-radius:18px;

    background:rgba(2,6,23,.75);
    border:1px solid rgba(255,255,255,.08);

    color:#7dd3fc;
    font-weight:900;
    font-size:14px;

    text-shadow:0 0 18px rgba(125,211,252,.7);

    transition:.3s;
}

.glow{
    color:#38bdf8;
    text-shadow:0 0 12px #38bdf8, 0 0 30px #2563eb;
    font-size:18px;
}

/* EXPLANATION */
.explain{
    position:absolute;
    bottom:18px;
    left:18px;
    right:18px;

    padding:16px;
    border-radius:18px;

    background:rgba(15,23,42,.9);
    border:1px solid rgba(255,255,255,.08);

    color:white;
    font-size:13px;
    font-weight:700;

    opacity:0;
    transform:translateY(10px) scale(.95);

    transition:.4s;
}

.explain.show{
    opacity:1;
    transform:translateY(0) scale(1.05);
}

.big{
    color:#7dd3fc;
    font-size:16px;
    font-weight:900;
    text-shadow:0 0 12px #38bdf8;
}

/* END */
.end{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:rgba(2,6,23,.95);

    opacity:0;
    transition:1s;
}

.end.show{
    opacity:1;
}

.end h1{
    color:white;
    font-size:34px;
    font-weight:900;
    text-align:center;
}

.end h2{
    color:#7dd3fc;
    margin-top:12px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="frame">

<canvas id="c" width="430" height="800"></canvas>

<div class="hud">
    <div class="box" id="state">FUNCTION</div>
    <div class="box" id="mode">f(x)</div>
</div>

<div class="formula" id="formula">
f(x) = x²
</div>

<div class="explain" id="explain"></div>

<div class="end" id="end">
    <h1>#DominexMacedon</h1>
    <h2>Calculus Visual Cinema</h2>
</div>

</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let t = 0;
let mode = 0;

/* FUNCTION */
function f(x){
    return Math.pow(x-2,2)/10 + 200;
}

/* DRAW GRAPH */
function drawGraph(){

    ctx.strokeStyle="#38bdf8";
    ctx.lineWidth=3;
    ctx.shadowColor="#38bdf8";
    ctx.shadowBlur=15;

    ctx.beginPath();

    for(let x=0;x<430;x+=2){
        let y = f(x);
        if(x===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    }

    ctx.stroke();
    ctx.shadowBlur=0;
}

/* DERIVATIVE TANGENT */
function drawTangent(){

    let x = 200;
    let y = f(x);

    let slope = (f(x+5)-f(x))/5;

    ctx.strokeStyle="#a78bfa";
    ctx.lineWidth=3;

    ctx.beginPath();
    ctx.moveTo(x-60, y - slope*60);
    ctx.lineTo(x+60, y + slope*60);
    ctx.stroke();
}

/* INTEGRAL AREA */
function drawArea(){

    ctx.fillStyle="rgba(56,189,248,.2)";

    ctx.beginPath();

    for(let x=120;x<300;x+=2){
        let y = f(x);
        ctx.lineTo(x,y);
    }

    ctx.lineTo(300,600);
    ctx.lineTo(120,600);

    ctx.closePath();
    ctx.fill();
}

/* EXPLANATION */
function explain(text, big){

    const el = document.getElementById("explain");

    el.innerHTML = text;

    if(big){
        el.classList.add("show");
    }else{
        el.classList.remove("show");
    }
}

/* LOOP */
function animate(){

    ctx.clearRect(0,0,430,800);

    drawGraph();

    if(t < 120){
        mode=0;
        document.getElementById("formula").innerHTML =
        `f(x) = <span class="glow">x²</span>`;

        explain("This is a function graph showing curve behavior",false);
    }

    else if(t < 240){
        mode=1;
        drawTangent();

        document.getElementById("formula").innerHTML =
        `Derivative: <span class="glow">f'(x)</span>`;

        explain("<span class='big'>Slope changes instantly at every point</span>",true);
    }

    else if(t < 360){
        mode=2;
        drawArea();

        document.getElementById("formula").innerHTML =
        `Integral: <span class="glow">∫ f(x) dx</span>`;

        explain("<span class='big'>Area under curve represents accumulation</span>",true);
    }

    else{
        document.getElementById("end").classList.add("show");
    }

    t++;

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
