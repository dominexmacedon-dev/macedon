<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Starlight Programming Language</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: radial-gradient(circle at top, #070913, #04050a);
  color: #e6ecff;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  overflow: hidden;
}

/* ================= SCENE SYSTEM ================= */

.scene {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  opacity: 0;
  transform: scale(1.08);
  transition: all 1.4s cubic-bezier(.2,.8,.2,1);
  pointer-events: none;
}

.scene.active {
  opacity: 1;
  transform: scale(1);
}

/* ================= INTRO ================= */

.logo {
  width: 130px;
  height: 130px;
  background: url("starlight.png") center/contain no-repeat;
  filter: drop-shadow(0 0 25px rgba(120,90,255,0.8));
  animation: float 3.5s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-14px); }
}

.title {
  font-size: 44px;
  margin-top: 18px;
  color: #c8b8ff;
  text-shadow: 0 0 20px rgba(120,90,255,0.7);
  letter-spacing: 1px;
}

.sub {
  margin-top: 10px;
  color: #a3b0d9;
  font-size: 14px;
}

.badge {
  margin-top: 16px;
  padding: 8px 14px;
  border: 1px solid rgba(140,120,255,0.4);
  border-radius: 20px;
  background: rgba(120,90,255,0.08);
  box-shadow: 0 0 25px rgba(120,90,255,0.15);
  font-size: 13px;
}

/* ================= CODE ================= */

.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 24px;
  width: 760px;
  box-shadow: 0 0 70px rgba(120,90,255,0.12);
  animation: pop 1s ease;
}

@keyframes pop {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

pre {
  font-size: 16px;
  line-height: 1.7;
  white-space: pre;
}

/* REAL syntax highlight only */
.keyword { color: #a78bfa; }
.string { color: #ffd580; }
.func { color: #4de1ff; }
.comment { color: #6b7280; }

.highlight {
  background: rgba(77,225,255,0.07);
  border-left: 2px solid #4de1ff;
  padding-left: 6px;
}

/* ================= TERMINAL ================= */

.terminal {
  width: 760px;
  height: 280px;
  background: #05070c;
  border: 1px solid rgba(0,255,170,0.3);
  border-radius: 12px;
  padding: 15px;
  color: #7CFFB2;
  box-shadow: 0 0 60px rgba(0,255,170,0.12);
  font-family: monospace;
  overflow: hidden;
}

.line {
  opacity: 0;
  transform: translateY(8px);
  animation: appear 0.25s forwards;
}

@keyframes appear {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.cursor {
  display: inline-block;
  width: 8px;
  height: 14px;
  background: #7CFFB2;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

</style>
</head>

<body>

<!-- ================= SCENE 1 (INTRO) ================= -->
<div class="scene active" id="s1">
  <div class="logo"></div>
  <div class="title">Starlight Programming Language</div>
  <div class="sub">A lightweight execution language built on Node.js runtime</div>
  <div class="badge">starlight-cli • npm</div>
  <div class="sub">Created by Dominex Macedon</div>
</div>

<!-- ================= SCENE 2 (CODE) ================= -->
<div class="scene" id="s2">
  <div class="card">
<pre id="code">
<span class="comment">// program.sl</span>

<span class="keyword">let</span> name = <span class="string">"Dominex"</span>
<span class="keyword">let</span> greeting = <span class="string">"Hello "</span> + name

<span class="func">sldeploy</span>(greeting)
</pre>
  </div>
</div>

<!-- ================= SCENE 3 (EXECUTION) ================= -->
<div class="scene" id="s3">
  <div class="terminal">
    <div>> starlight program.sl</div>
    <br/>
    <div id="out"></div>
    <span class="cursor"></span>
  </div>
</div>

<script>

/* ================= SCENE SWITCH ================= */

function show(a, b, delay){
  setTimeout(() => {
    document.getElementById(a).classList.remove("active");
    document.getElementById(b).classList.add("active");
  }, delay);
}

show("s1","s2", 3500);
show("s2","s3", 7500);

/* ================= EXECUTION ================= */

setTimeout(() => {
  const out = document.getElementById("out");

  const lines = [
    "Hello Dominex"
  ];

  let i = 0;

  function print(){
    if(i >= lines.length) return;

    const div = document.createElement("div");
    div.className = "line";
    div.textContent = lines[i];

    out.appendChild(div);
    i++;

    setTimeout(print, 500);
  }

  print();
}, 9000);

</script>

</body>
</html>
