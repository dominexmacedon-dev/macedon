<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#030712;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

/* BACKGROUND */

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
}

body::before{
    width:420px;
    height:420px;
    background:#2563eb;
    top:-160px;
    left:-120px;
    opacity:.15;
}

body::after{
    width:400px;
    height:400px;
    background:#7c3aed;
    bottom:-160px;
    right:-120px;
    opacity:.14;
}

/* FRAME */

.frame{
    width:980px;
    height:560px;
    background:#0f172a;
    border-radius:24px;
    border:1px solid #1e293b;
    overflow:hidden;
    position:relative;
    box-shadow:
    0 0 90px rgba(0,0,0,.75),
    inset 0 0 40px rgba(255,255,255,.03);
}

/* FLOAT TEXT */

.float{
    position:absolute;
    color:white;
    opacity:.05;
    font-size:14px;
    font-weight:700;
    animation:float 12s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(50px);
    }
    to{
        transform:translateY(-700px);
    }
}

/* HERO */

.hero{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
    transition:1s ease;
}

.hero.hide{
    opacity:0;
    transform:scale(1.08);
    pointer-events:none;
}

.pythonLogo{
    width:130px;
    height:130px;
    object-fit:contain;
    filter:
    drop-shadow(0 0 40px rgba(59,130,246,.35));
    animation:logoFloat 4s ease-in-out infinite;
}

@keyframes logoFloat{
    50%{
        transform:translateY(-10px);
    }
}

.heroTitle{
    margin-top:28px;
    color:white;
    font-size:48px;
    font-weight:900;
    letter-spacing:-1px;
}

.heroSub{
    margin-top:12px;
    color:#94a3b8;
    font-size:15px;
}

/* EDITOR */

.editor{
    position:absolute;
    inset:0;
    background:#0b1220;
    display:none;
    flex-direction:column;
}

.editor.show{
    display:flex;
}

/* TOPBAR */

.topbar{
    height:60px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 20px;
}

.dot{
    width:11px;
    height:11px;
    border-radius:50%;
    margin-right:7px;
}

.red{background:#ef4444;}
.yellow{background:#facc15;}
.green{background:#22c55e;}

.filename{
    margin-left:14px;
    color:#e2e8f0;
    font-size:14px;
    font-weight:700;
}

/* WORKSPACE */

.workspace{
    flex:1;
    position:relative;
}

/* CODE */

.code{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    padding:24px;
    font-family:'Fira Code', monospace;
    font-size:15px;
    line-height:2;
    color:white;
}

.line{
    display:flex;
    min-height:30px;
}

.num{
    width:40px;
    text-align:right;
    margin-right:18px;
    color:#475569;
    user-select:none;
}

.text{
    white-space:pre-wrap;
}

/* COLORS */

.keyword{
    color:#c084fc;
}

.variable{
    color:#38bdf8;
}

.string{
    color:#facc15;
}

.number{
    color:#fb7185;
}

.func{
    color:#4ade80;
}

.comment{
    color:#64748b;
}

/* CURSOR */

.cursor{
    width:9px;
    height:18px;
    background:white;
    display:inline-block;
    margin-left:2px;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* POINTER */

.pointer{
    position:absolute;
    width:0;
    height:0;
    border-left:14px solid transparent;
    border-right:14px solid transparent;
    border-bottom:24px solid white;
    transform:rotate(-45deg);
    filter:drop-shadow(0 0 10px rgba(255,255,255,.5));
    z-index:50;
    opacity:0;
    transition:.5s ease;
}

/* TOUR BOX */

.tour{
    position:absolute;
    width:260px;
    background:rgba(15,23,42,.98);
    border-radius:22px;
    padding:18px;
    box-shadow:
    0 0 40px rgba(0,0,0,.45);
    opacity:0;
    transform:scale(.9);
    transition:.4s ease;
    z-index:40;
}

.tour.show{
    opacity:1;
    transform:scale(1);
}

.tourTitle{
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
    letter-spacing:.5px;
}

.tourText{
    color:#cbd5e1;
    font-size:13px;
    line-height:1.7;
}

/* COLORS */

.blue{
    border:1px solid #2563eb;
}

.blue .tourTitle{
    color:#60a5fa;
}

.purple{
    border:1px solid #7c3aed;
}

.purple .tourTitle{
    color:#c084fc;
}

.yellowBox{
    border:1px solid #facc15;
}

.yellowBox .tourTitle{
    color:#fde047;
}

/* HIGHLIGHT */

.highlight{
    position:absolute;
    border-radius:14px;
    opacity:0;
    transition:.35s ease;
    pointer-events:none;
}

.highlight.show{
    opacity:1;
}

.hl1{
    border:2px solid #38bdf8;
    box-shadow:0 0 30px rgba(56,189,248,.35);
}

.hl2{
    border:2px solid #c084fc;
    box-shadow:0 0 30px rgba(192,132,252,.35);
}

.hl3{
    border:2px solid #facc15;
    box-shadow:0 0 30px rgba(250,204,21,.35);
}

/* CONSOLE */

.console{
    position:absolute;
    inset:0;
    background:#020617;
    display:none;
    flex-direction:column;
    z-index:100;
}

.console.show{
    display:flex;
}

.consoleTop{
    height:58px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 20px;
}

.consoleTitle{
    margin-left:14px;
    color:#cbd5e1;
    font-size:14px;
    font-weight:700;
}

.consoleBody{
    flex:1;
    padding:26px;
    font-family:'Fira Code', monospace;
    font-size:15px;
    line-height:2.1;
    color:#4ade80;
    overflow:hidden;
}

.output{
    opacity:0;
    transform:translateY(5px);
    animation:out .12s ease forwards;
}

@keyframes out{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="frame">

    <!-- FLOAT -->

    <div class="float" style="left:60px;bottom:-40px;">
        Python
    </div>

    <div class="float" style="left:300px;bottom:-160px;animation-delay:2s;">
        Variables
    </div>

    <div class="float" style="left:720px;bottom:-120px;animation-delay:4s;">
        Lists
    </div>

    <div class="float" style="left:520px;bottom:-300px;animation-delay:6s;">
        print()
    </div>

    <!-- HERO -->

    <div class="hero" id="hero">

        <img
            class="pythonLogo"
            src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg"
        >

        <div class="heroTitle">
            Python Touring
        </div>

        <div class="heroSub">
            Variables • Arrays • print()
        </div>

    </div>

    <!-- EDITOR -->

    <div class="editor" id="editor">

        <div class="topbar">

            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>

            <div class="filename">
                tutorial.py
            </div>

        </div>

        <div class="workspace">

            <div class="code" id="code"></div>

            <!-- POINTER -->

            <div class="pointer" id="pointer"></div>

            <!-- TOUR 1 -->

            <div
                class="tour blue"
                id="tour1"
                style="
                top:90px;
                right:24px;
                "
            >

                <div class="tourTitle">
                    VARIABLE
                </div>

                <div class="tourText">
                    Variables store values like text,
                    numbers, or objects.
                </div>

            </div>

            <!-- TOUR 2 -->

            <div
                class="tour purple"
                id="tour2"
                style="
                top:190px;
                right:24px;
                "
            >

                <div class="tourTitle">
                    ARRAY / LIST
                </div>

                <div class="tourText">
                    Lists can keep multiple values
                    inside one variable.
                </div>

            </div>

            <!-- TOUR 3 -->

            <div
                class="tour yellowBox"
                id="tour3"
                style="
                top:310px;
                right:24px;
                "
            >

                <div class="tourTitle">
                    print()
                </div>

                <div class="tourText">
                    print() shows output directly
                    inside the console.
                </div>

            </div>

            <!-- HIGHLIGHTS -->

            <div
                class="highlight hl1"
                id="hl1"
                style="
                top:88px;
                left:74px;
                width:340px;
                height:38px;
                "
            ></div>

            <div
                class="highlight hl2"
                id="hl2"
                style="
                top:148px;
                left:74px;
                width:540px;
                height:38px;
                "
            ></div>

            <div
                class="highlight hl3"
                id="hl3"
                style="
                top:268px;
                left:74px;
                width:390px;
                height:38px;
                "
            ></div>

        </div>

    </div>

    <!-- CONSOLE -->

    <div class="console" id="console">

        <div class="consoleTop">

            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>

            <div class="consoleTitle">
                Python Console
            </div>

        </div>

        <div class="consoleBody" id="consoleBody"></div>

    </div>

</div>

<script>

/* ELEMENTS */

const hero =
document.getElementById("hero");

const editor =
document.getElementById("editor");

const codeBox =
document.getElementById("code");

const pointer =
document.getElementById("pointer");

const tour1 =
document.getElementById("tour1");

const tour2 =
document.getElementById("tour2");

const tour3 =
document.getElementById("tour3");

const hl1 =
document.getElementById("hl1");

const hl2 =
document.getElementById("hl2");

const hl3 =
document.getElementById("hl3");

const consoleBox =
document.getElementById("console");

const consoleBody =
document.getElementById("consoleBody");

/* START */

setTimeout(()=>{

    hero.classList.add("hide");

    setTimeout(()=>{

        editor.classList.add("show");

        startTyping();

    },700);

},2400);

/* CODE */

const lines = [

`<span class="comment"># Python Tutorial</span>`,

`<span class="variable">name</span> = <span class="string">"Dominex"</span>`,

`<span class="variable">numbers</span> = [<span class="number">10</span>, <span class="number">20</span>, <span class="number">30</span>, <span class="number">40</span>]`,

`<span class="keyword">for</span> item <span class="keyword">in</span> numbers:`,

`    <span class="func">print</span>(<span class="string">"Value:"</span>, item)`,

`<span class="func">print</span>(<span class="string">"Welcome"</span>, name)`

];

let lineIndex = 0;

function startTyping(){

    typeLine();
}

function typeLine(){

    if(lineIndex >= lines.length){

        setTimeout(startTour,500);

        return;
    }

    const row =
    document.createElement("div");

    row.className = "line";

    row.innerHTML = `
        <div class="num">${lineIndex + 1}</div>
        <div class="text"></div>
    `;

    codeBox.appendChild(row);

    const text =
    row.querySelector(".text");

    const html = lines[lineIndex];

    let i = 0;

    function typeChar(){

        text.innerHTML =
        html.substring(0,i) +
        '<span class="cursor"></span>';

        i++;

        if(i <= html.length){

            setTimeout(typeChar,4);

        }else{

            text.innerHTML = html;

            lineIndex++;

            setTimeout(typeLine,90);

        }
    }

    typeChar();
}

/* TOURING */

function startTour(){

    /* VARIABLE */

    pointer.style.opacity = "1";
    pointer.style.left = "430px";
    pointer.style.top = "110px";

    hl1.classList.add("show");
    tour1.classList.add("show");

    setTimeout(()=>{

        hl1.classList.remove("show");
        tour1.classList.remove("show");

        /* ARRAY */

        pointer.style.left = "620px";
        pointer.style.top = "170px";

        hl2.classList.add("show");
        tour2.classList.add("show");

    },2200);

    setTimeout(()=>{

        hl2.classList.remove("show");
        tour2.classList.remove("show");

        /* PRINT */

        pointer.style.left = "470px";
        pointer.style.top = "290px";

        hl3.classList.add("show");
        tour3.classList.add("show");

    },4400);

    setTimeout(()=>{

        pointer.style.opacity = "0";

        hl3.classList.remove("show");
        tour3.classList.remove("show");

        showConsole();

    },6700);
}

/* CONSOLE */

function showConsole(){

    editor.style.display = "none";

    consoleBox.classList.add("show");

    const outputs = [

        "> python tutorial.py",

        "",

        "Value: 10",

        "Value: 20",

        "Value: 30",

        "Value: 40",

        "",

        "Welcome Dominex",

        "",

        "Program finished successfully"

    ];

    outputs.forEach((text,index)=>{

        setTimeout(()=>{

            const line =
            document.createElement("div");

            line.className = "output";

            line.innerText = text;

            consoleBody.appendChild(line);

        },index * 80);

    });
}

</script>

</body>
</html>
