<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Cinema Flow</title>

<style>
body{
    margin:0;
    height:100vh;
    background:#020617;
    overflow:hidden;
    font-family:Inter, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* MAIN SCREEN */
.screen{
    width:90%;
    max-width:900px;
    position:relative;
    color:#cbd5e1;
    font-size:18px;
    line-height:2.2;
}

/* PROBLEM BLOCK */
.problem{
    position:absolute;
    left:0;
    right:0;

    text-align:center;
    top:40%;

    color:#38bdf8;
    font-weight:900;
    font-size:20px;

    text-shadow:
    0 0 12px #38bdf8,
    0 0 30px #2563eb;

    transition:all 1.2s ease;
}

/* MOVE UP STATE */
.problem.up{
    top:10%;
    font-size:16px;
    text-align:left;
    color:#7dd3fc;
}

/* SOLUTION */
.solution{
    position:absolute;
    top:25%;
    left:0;
    right:0;

    opacity:0;
    transform:translateY(20px);

    transition:1s ease;

    color:#cbd5e1;
    font-weight:700;
}

/* SHOW SOLUTION */
.solution.show{
    opacity:1;
    transform:translateY(0);
}

/* GLOW COLORS */
.glow{
    color:#38bdf8;
    text-shadow:
    0 0 12px #38bdf8,
    0 0 30px #2563eb;
    font-weight:900;
}

.big{
    color:#7dd3fc;
    font-size:22px;
    font-weight:900;
    text-shadow:0 0 25px #38bdf8;
}

.final{
    color:#a78bfa;
    font-size:24px;
    font-weight:900;
    text-shadow:0 0 35px #7c3aed;
}

/* CURSOR */
.cursor{
    display:inline-block;
    width:10px;
    height:18px;
    background:white;
    margin-left:6px;
    animation:blink .6s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

</style>
</head>

<body>

<div class="screen">

    <div class="problem" id="problem"></div>

    <div class="solution" id="solution"></div>

</div>

<script>

const problemEl = document.getElementById("problem");
const solutionEl = document.getElementById("solution");

/* PROBLEM TEXT */
const problemText =
"A car starts from rest and accelerates at 3 m/s². Find velocity after 10 seconds.";

/* SOLUTION STEPS */
const steps = [
"SOLUTION:",
"We use equation of motion:",
"v = u + at",

"Where:",
"u = initial velocity = 0 m/s",
"a = <span class='glow'>3 m/s²</span>",
"t = <span class='glow'>10 s</span>",

"Substitute values:",
"v = 0 + (3 × 10)",

"v = <span class='big'>30 m/s</span>",

"FINAL ANSWER:",
"Velocity = <span class='final'>30 m/s</span>"
];

/* TYPE PROBLEM CENTER */
let i = 0;

function typeProblem(){

    if(i < problemText.length){

        problemEl.innerHTML += problemText[i];

        i++;

        setTimeout(typeProblem, 18);
    }
    else{

        setTimeout(moveUp, 600);
    }
}

/* MOVE PROBLEM UP */
function moveUp(){

    problemEl.classList.add("up");

    setTimeout(showSolution, 900);
}

/* SHOW SOLUTION */
let j = 0;

function showSolution(){

    solutionEl.classList.add("show");

    typeSolution();
}

/* TYPE SOLUTION */
function typeSolution(){

    if(j >= steps.length) return;

    let line = document.createElement("div");
    line.innerHTML = steps[j];

    solutionEl.appendChild(line);

    j++;

    setTimeout(typeSolution, 650);
}

/* START */
typeProblem();

</script>

</body>
</html>
