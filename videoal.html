<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Solver Cinema</title>

<style>
body{
    margin:0;
    height:100vh;
    background:#020617;
    overflow:hidden;
    font-family:Inter, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* MAIN CONTAINER */
.scene{
    width:90%;
    max-width:900px;
    position:relative;
    height:100vh;
}

/* PROBLEM BLOCK (CENTER → TOP) */
.problem{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:#38bdf8;
    font-size:22px;
    font-weight:900;
    text-shadow:0 0 20px #38bdf8;
    transition:all 1.2s ease;
    width:100%;
}

/* after move */
.problem.top{
    top:12%;
    transform:translate(-50%,0);
    font-size:18px;
    color:#60a5fa;
    text-shadow:0 0 15px #2563eb;
}

/* SOLUTION BLOCK */
.solution{
    position:absolute;
    top:28%;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    text-align:center;
    opacity:0;
    transition:opacity 1s ease;
    color:#cbd5e1;
    line-height:2;
    font-size:18px;
}

/* reveal solution */
.solution.show{
    opacity:1;
}

/* highlight styles */
.glow{
    color:#38bdf8;
    text-shadow:0 0 10px #38bdf8;
    font-weight:700;
}

.big{
    color:#7dd3fc;
    font-size:22px;
    font-weight:900;
    text-shadow:0 0 25px #38bdf8;
}

.final{
    color:#a78bfa;
    font-size:24px;
    font-weight:900;
    text-shadow:0 0 30px #7c3aed;
}

/* cursor */
.cursor{
    display:inline-block;
    width:10px;
    height:18px;
    background:white;
    margin-left:6px;
    animation:blink .6s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

</style>
</head>

<body>

<div class="scene">

    <!-- PROBLEM -->
    <div class="problem" id="problem"></div>

    <!-- SOLUTION -->
    <div class="solution" id="solution"></div>

</div>

<script>

const problemEl = document.getElementById("problem");
const solutionEl = document.getElementById("solution");

/* TEXT */
const problemText =
`PHYSICS PROBLEM:
A car starts from rest and accelerates at 3 m/s².
Find velocity after 10 seconds.`;

/* SOLUTION LINES */
const solutionLines = [
"SOLUTION:",
"We use equation of motion:",
"<span class='glow'>v = u + at</span>",
"",
"Where:",
"u = 0 m/s",
"a = <span class='glow'>3 m/s²</span>",
"t = <span class='glow'>10 s</span>",
"",
"Substitute:",
"v = 0 + (3 × 10)",
"v = <span class='big'>30 m/s</span>",
"",
"FINAL ANSWER:",
"<span class='final'>Velocity = 30 m/s</span>"
];

let i = 0;
let char = 0;
let solutionIndex = 0;

/* TYPE PROBLEM FIRST */
function typeProblem(){

    if(char < problemText.length){
        problemEl.innerHTML = problemText.substring(0, char+1) + '<span class="cursor"></span>';
        char++;
        setTimeout(typeProblem, 20);
    } else {
        problemEl.innerHTML = problemText;

        // MOVE PROBLEM UP
        setTimeout(() => {
            problemEl.classList.add("top");
            startSolution();
        }, 800);
    }
}

/* TYPE SOLUTION */
function startSolution(){

    solutionEl.classList.add("show");

    function typeSolution(){

        if(solutionIndex >= solutionLines.length) return;

        solutionEl.innerHTML += solutionLines[solutionIndex] + "<br>";
        solutionIndex++;

        setTimeout(typeSolution, 200);
    }

    typeSolution();
}

typeProblem();

</script>

</body>
</html>
