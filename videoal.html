<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rectangle Lab Animation</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#020617;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

/* FRAME */
.frame{
    width:420px;
    height:780px;
    background:#0f172a;
    border-radius:28px;
    position:relative;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.08);
}

/* CANVAS */
canvas{
    position:absolute;
    inset:0;
}

/* HUD */
.hud{
    position:absolute;
    top:18px;
    left:18px;
    right:18px;
    display:flex;
    justify-content:space-between;
    z-index:10;
}

.box{
    padding:10px 12px;
    border-radius:14px;
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(10px);
    color:white;
    font-size:12px;
    font-weight:800;
    text-shadow:0 0 10px black;
}

/* CALC PANEL */
.panel{
    position:absolute;
    bottom:18px;
    left:18px;
    right:18px;

    background:rgba(2,6,23,.7);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;

    padding:14px;
    color:#7dd3fc;

    font-size:13px;
    font-weight:700;

    backdrop-filter:blur(12px);
    text-shadow:0 0 12px rgba(125,211,252,.6);
}

.glow{
    color:#38bdf8;
    text-shadow:
    0 0 10px #38bdf8,
    0 0 25px #2563eb;
}

/* LABELS */
.label{
    position:absolute;
    color:white;
    font-size:12px;
    font-weight:900;
    padding:4px 8px;
    border-radius:10px;
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.1);
    text-shadow:0 0 12px rgba(255,255,255,.4);
}

</style>
</head>

<body>

<div class="frame">

<canvas id="c" width="420" height="780"></canvas>

<div class="hud">
    <div class="box" id="coords">X:0 Y:0</div>
    <div class="box" id="state">DRAWING</div>
</div>

<div class="panel" id="panel">
    Area: <span class="glow" id="area">0</span> |
    Perimeter: <span class="glow" id="peri">0</span> |
    Diagonal: <span class="glow" id="diag">0</span>
</div>

</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let w = 0, h = 0;

let rect = {
    x:80,
    y:200,
    w:260,
    h:220
};

/* LIVE CALCS */
function calc(){
    let area = rect.w * rect.h;
    let peri = 2 * (rect.w + rect.h);
    let diag = Math.sqrt(rect.w*rect.w + rect.h*rect.h);

    document.getElementById("area").innerText = area;
    document.getElementById("peri").innerText = peri;
    document.getElementById("diag").innerText = diag.toFixed(2);
}

/* DRAW RECT */
function draw(){

    ctx.clearRect(0,0,420,780);

    /* glow effect */
    ctx.shadowColor = "#38bdf8";
    ctx.shadowBlur = 25;

    ctx.strokeStyle = "#38bdf8";
    ctx.lineWidth = 3;

    ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);

    ctx.shadowBlur = 0;

    /* corners */
    drawPoint(rect.x, rect.y, "X");
    drawPoint(rect.x+rect.w, rect.y, "Y");
    drawPoint(rect.x+rect.w, rect.y+rect.h, "Z");
    drawPoint(rect.x, rect.y+rect.h, "W");

    /* labels */
    label("X", rect.x, rect.y);
    label("Y", rect.x+rect.w, rect.y);
    label("Z", rect.x+rect.w, rect.y+rect.h);
    label("W", rect.x, rect.y+rect.h);
}

/* POINT */
function drawPoint(x,y){
    ctx.fillStyle="#7dd3fc";
    ctx.beginPath();
    ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fill();
}

/* LABEL DOM */
function label(text,x,y){

    let el = document.getElementById("lab_"+text);

    if(!el){
        el = document.createElement("div");
        el.className = "label";
        el.id = "lab_"+text;
        el.innerText = text;
        document.body.appendChild(el);
    }

    el.style.left = (x+10) + "px";
    el.style.top = (y+10) + "px";
}

/* SNAP ANIMATION */
let phase = 0;

function animate(){

    if(phase === 0){

        rect.w += 2;
        if(rect.w > 300) phase = 1;
    }

    else if(phase === 1){

        rect.h += 2;
        if(rect.h > 260) phase = 2;
    }

    else if(phase === 2){

        rect.x += (210 - rect.x) * 0.2;
        rect.y += (220 - rect.y) * 0.2;
    }

    calc();
    draw();

    requestAnimationFrame(animate);
}

animate();

/* LIVE COORD */
document.addEventListener("mousemove",(e)=>{

    document.getElementById("coords").innerText =
    "X:" + e.clientX + " Y:" + e.clientY;

});

</script>

</body>
</html>
