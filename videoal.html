<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

/* BG */

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(140px);
}

body::before{
    width:420px;
    height:420px;
    background:#2563eb;
    top:-150px;
    left:-120px;
    opacity:.15;
}

body::after{
    width:420px;
    height:420px;
    background:#7c3aed;
    right:-140px;
    bottom:-150px;
    opacity:.14;
}

/* FRAME */

.frame{
    width:1000px;
    height:580px;
    background:#0f172a;
    border-radius:24px;
    overflow:hidden;
    position:relative;
    border:1px solid #1e293b;
    box-shadow:
    0 0 80px rgba(0,0,0,.7),
    inset 0 0 30px rgba(255,255,255,.03);
}

/* HERO */

.hero{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
    transition:1s ease;
}

.hero.hide{
    opacity:0;
    transform:scale(1.08);
}

.logo{
    width:130px;
    height:130px;
    object-fit:contain;
    filter:
    drop-shadow(0 0 35px rgba(59,130,246,.35));
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    50%{
        transform:translateY(-10px);
    }
}

.heroTitle{
    margin-top:26px;
    color:white;
    font-size:52px;
    font-weight:900;
}

.heroSub{
    margin-top:10px;
    color:#94a3b8;
    font-size:15px;
}

/* EDITOR */

.editor{
    position:absolute;
    inset:0;
    background:#0b1220;
    display:none;
    flex-direction:column;
}

.editor.show{
    display:flex;
}

/* TOPBAR */

.topbar{
    height:58px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 20px;
}

.dot{
    width:11px;
    height:11px;
    border-radius:50%;
    margin-right:7px;
}

.red{background:#ef4444;}
.yellow{background:#facc15;}
.green{background:#22c55e;}

.filename{
    margin-left:14px;
    color:#e2e8f0;
    font-size:14px;
    font-weight:700;
}

/* CODE */

.code{
    flex:1;
    padding:24px;
    font-family:'Fira Code', monospace;
    font-size:15px;
    line-height:2;
    color:white;
    position:relative;
}

.line{
    display:flex;
    min-height:30px;
}

.num{
    width:40px;
    text-align:right;
    margin-right:18px;
    color:#475569;
    user-select:none;
}

.text{
    position:relative;
}

/* COLORS */

.keyword{
    color:#c084fc;
}

.variable{
    color:#38bdf8;
}

.string{
    color:#facc15;
}

.number{
    color:#fb7185;
}

.func{
    color:#4ade80;
}

.comment{
    color:#64748b;
}

/* CURSOR */

.cursor{
    width:9px;
    height:18px;
    background:white;
    display:inline-block;
    margin-left:2px;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* TOUR TAG */

.tag{
    position:absolute;
    padding:12px 18px;
    border-radius:16px;
    color:white;
    font-size:13px;
    font-weight:700;
    z-index:30;
    opacity:0;
    transform:scale(.8);
    transition:.4s ease;
    backdrop-filter:blur(10px);
}

.tag.show{
    opacity:1;
    transform:scale(1);
}

.blueTag{
    background:rgba(37,99,235,.18);
    border:1px solid #2563eb;
    box-shadow:0 0 25px rgba(37,99,235,.25);
}

.purpleTag{
    background:rgba(124,58,237,.18);
    border:1px solid #7c3aed;
    box-shadow:0 0 25px rgba(124,58,237,.25);
}

.yellowTag{
    background:rgba(250,204,21,.12);
    border:1px solid #facc15;
    box-shadow:0 0 25px rgba(250,204,21,.2);
}

/* ARROW */

.arrow{
    position:absolute;
    width:120px;
    height:2px;
    background:white;
    transform-origin:left;
    opacity:0;
    transition:.4s ease;
    z-index:25;
}

.arrow.show{
    opacity:1;
}

.arrow::after{
    content:"";
    position:absolute;
    right:-2px;
    top:-5px;
    border-left:10px solid white;
    border-top:6px solid transparent;
    border-bottom:6px solid transparent;
}

/* CONSOLE */

.console{
    position:absolute;
    inset:0;
    background:#020617;
    display:none;
    flex-direction:column;
    z-index:100;
}

.console.show{
    display:flex;
}

.consoleTop{
    height:58px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 20px;
}

.consoleTitle{
    margin-left:14px;
    color:#cbd5e1;
    font-size:14px;
    font-weight:700;
}

.consoleBody{
    flex:1;
    padding:26px;
    font-family:'Fira Code', monospace;
    font-size:15px;
    line-height:2.1;
    color:#4ade80;
}

.output{
    opacity:0;
    transform:translateY(5px);
    animation:fade .12s ease forwards;
}

@keyframes fade{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="frame">

    <!-- HERO -->

    <div class="hero" id="hero">

        <img
            class="logo"
            src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg"
        >

        <div class="heroTitle">
            Python Touring
        </div>

        <div class="heroSub">
            Variables • Lists • print()
        </div>

    </div>

    <!-- EDITOR -->

    <div class="editor" id="editor">

        <div class="topbar">

            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>

            <div class="filename">
                tutorial.py
            </div>

        </div>

        <div class="code" id="code">

            <!-- TAGS -->

            <div
                class="tag blueTag"
                id="tag1"
                style="top:90px;right:40px;"
            >
                VARIABLE
            </div>

            <div
                class="tag purpleTag"
                id="tag2"
                style="top:190px;right:40px;"
            >
                ARRAY / LIST
            </div>

            <div
                class="tag yellowTag"
                id="tag3"
                style="top:290px;right:40px;"
            >
                print()
            </div>

            <!-- ARROWS -->

            <div class="arrow" id="arrow1"></div>
            <div class="arrow" id="arrow2"></div>
            <div class="arrow" id="arrow3"></div>

        </div>

    </div>

    <!-- CONSOLE -->

    <div class="console" id="console">

        <div class="consoleTop">

            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>

            <div class="consoleTitle">
                Python Console
            </div>

        </div>

        <div class="consoleBody" id="consoleBody"></div>

    </div>

</div>

<script>

/* ELEMENTS */

const hero =
document.getElementById("hero");

const editor =
document.getElementById("editor");

const codeBox =
document.getElementById("code");

const consoleBox =
document.getElementById("console");

const consoleBody =
document.getElementById("consoleBody");

/* TAGS */

const tag1 =
document.getElementById("tag1");

const tag2 =
document.getElementById("tag2");

const tag3 =
document.getElementById("tag3");

const arrow1 =
document.getElementById("arrow1");

const arrow2 =
document.getElementById("arrow2");

const arrow3 =
document.getElementById("arrow3");

/* START */

setTimeout(()=>{

    hero.classList.add("hide");

    setTimeout(()=>{

        editor.classList.add("show");

        startTyping();

    },700);

},2200);

/* CODE */

const lines = [

`<span class="comment"># Python Tutorial</span>`,

`<span id="variableLine"><span class="variable">name</span> = <span class="string">"Dominex"</span></span>`,

`<span id="arrayLine"><span class="variable">numbers</span> = [<span class="number">10</span>, <span class="number">20</span>, <span class="number">30</span>]</span>`,

`<span class="keyword">for</span> item <span class="keyword">in</span> numbers:`,

`    <span id="printLine"><span class="func">print</span>(<span class="string">"Value:"</span>, item)</span>`

];

let lineIndex = 0;

function startTyping(){

    typeLine();
}

function typeLine(){

    if(lineIndex >= lines.length){

        setTimeout(startTour,400);

        return;
    }

    const row =
    document.createElement("div");

    row.className = "line";

    row.innerHTML = `
        <div class="num">${lineIndex + 1}</div>
        <div class="text"></div>
    `;

    codeBox.appendChild(row);

    const text =
    row.querySelector(".text");

    const html = lines[lineIndex];

    let i = 0;

    function typeChar(){

        text.innerHTML =
        html.substring(0,i) +
        '<span class="cursor"></span>';

        i++;

        if(i <= html.length){

            setTimeout(typeChar,4);

        }else{

            text.innerHTML = html;

            lineIndex++;

            setTimeout(typeLine,90);

        }
    }

    typeChar();
}

/* EXACT POINTING */

function connectArrow(
    arrow,
    fromX,
    fromY,
    toX,
    toY
){

    const dx = toX - fromX;
    const dy = toY - fromY;

    const length =
    Math.sqrt(dx*dx + dy*dy);

    const angle =
    Math.atan2(dy,dx) * 180 / Math.PI;

    arrow.style.width =
    length + "px";

    arrow.style.left =
    fromX + "px";

    arrow.style.top =
    fromY + "px";

    arrow.style.transform =
    `rotate(${angle}deg)`;

    arrow.classList.add("show");
}

/* TOUR */

function startTour(){

    const variable =
    document.getElementById("variableLine");

    const array =
    document.getElementById("arrayLine");

    const printLine =
    document.getElementById("printLine");

    const codeRect =
    codeBox.getBoundingClientRect();

    /* VARIABLE */

    const v =
    variable.getBoundingClientRect();

    tag1.classList.add("show");

    connectArrow(
        arrow1,
        760,
        120,
        v.left - codeRect.left + 120,
        v.top - codeRect.top + 15
    );

    /* ARRAY */

    setTimeout(()=>{

        const a =
        array.getBoundingClientRect();

        tag2.classList.add("show");

        connectArrow(
            arrow2,
            760,
            220,
            a.left - codeRect.left + 220,
            a.top - codeRect.top + 15
        );

    },1800);

    /* PRINT */

    setTimeout(()=>{

        const p =
        printLine.getBoundingClientRect();

        tag3.classList.add("show");

        connectArrow(
            arrow3,
            760,
            320,
            p.left - codeRect.left + 120,
            p.top - codeRect.top + 15
        );

    },3600);

    /* CONSOLE */

    setTimeout(()=>{

        editor.style.display = "none";

        consoleBox.classList.add("show");

        showConsole();

    },5600);
}

/* CONSOLE */

function showConsole(){

    const outputs = [

        "> python tutorial.py",

        "",

        "Value: 10",

        "Value: 20",

        "Value: 30",

        "",

        "Program finished successfully"

    ];

    outputs.forEach((text,index)=>{

        setTimeout(()=>{

            const line =
            document.createElement("div");

            line.className = "output";

            line.innerText = text;

            consoleBody.appendChild(line);

        },index * 80);

    });
}

</script>

</body>
</html>
