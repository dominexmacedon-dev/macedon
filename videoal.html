<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background:#040712;
    font-family:Inter,sans-serif;
}

/* SOFT PREMIUM GLOW BACKGROUND */
body::before,
body::after{
    content:"";
    position:absolute;
    width:700px;
    height:700px;
    border-radius:50%;
    filter:blur(180px);
}

body::before{
    background:#3b82f6;
    top:-260px;
    left:-240px;
    opacity:.20;
}

body::after{
    background:#22c55e;
    bottom:-260px;
    right:-240px;
    opacity:.16;
}

/* CANVAS */
.canvas{
    position:absolute;
    inset:0;
    overflow:hidden;
}

/* FLOATING MATH PARTICLES */
.m{
    position:absolute;
    color:#7dd3fc;
    font-size:18px;
    font-weight:900;
    opacity:0;
    text-shadow:0 0 22px rgba(125,211,252,.9);
    animation:rise 5.5s linear forwards;
    will-change: transform, opacity;
}

@keyframes rise{
    0%{
        transform:translateY(0) scale(.2);
        opacity:0;
    }
    15%{
        opacity:1;
    }
    100%{
        transform:translateY(-260px) scale(1.6);
        opacity:0;
    }
}

/* EXPLOSION FORMULAS */
.formula{
    position:absolute;
    color:#86efac;
    font-size:24px;
    font-weight:900;
    text-shadow:0 0 28px rgba(34,197,94,.9);
    opacity:0;
    transform:scale(.2);
    animation:expand 2.4s ease forwards;
    will-change: transform, opacity;
}

@keyframes expand{
    0%{
        transform:scale(.2);
        opacity:0;
    }
    40%{
        opacity:1;
    }
    100%{
        transform:scale(1.8);
        opacity:0;
    }
}

/* CENTER TITLE */
.center{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    pointer-events:none;
}

.title{
    font-size:38px;
    font-weight:900;
    color:#4ade80;
    text-shadow:0 0 40px rgba(74,222,128,.6);
    opacity:0;
    animation:showTitle 2s forwards;
    animation-delay:5.8s;
}

.sub{
    margin-top:12px;
    font-size:14px;
    color:#38bdf8;
    opacity:0;
    animation:fade 2s forwards;
    animation-delay:6.2s;
}

@keyframes showTitle{
    to{
        opacity:1;
        transform:scale(1.08);
    }
}

@keyframes fade{
    to{ opacity:1; }
}

/* OWNER BRAND */
.owner{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
    font-size:18px;
    font-weight:900;
    color:#93c5fd;
    text-shadow:0 0 30px rgba(147,197,253,.8);
    opacity:0;
    animation:fade 2s forwards;
    animation-delay:7s;
}

/* subtle glow waves */
.wave{
    position:absolute;
    width:300px;
    height:300px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.08);
    animation:wave 6s infinite;
    opacity:.3;
}

@keyframes wave{
    0%{ transform:scale(.3); opacity:.3; }
    100%{ transform:scale(2.5); opacity:0; }
}

</style>
</head>

<body>

<div class="canvas" id="canvas"></div>

<div class="center">
    <div class="title">MATHEMATICAL UNIVERSE</div>
    <div class="sub">Numbers • Equations • Infinite Motion</div>
</div>

<div class="owner">Dominex Macedon</div>

<script>

const canvas = document.getElementById("canvas");

const symbols = [
"1","2","3","4","5","6","7","8","9","0",
"x","y","z","+","-","×","÷","=",
"π","√","∞","∑","∫"
];

const formulas = [
"x = y + z",
"E = mc²",
"a² + b² = c²",
"π ≈ 3.14159",
"∞ → ∞",
"f(x) = x² + 2x + 1"
];

/* FLOATING SYMBOLS */
function createMath(){

    const el = document.createElement("div");
    el.className = "m";
    el.innerText = symbols[Math.floor(Math.random()*symbols.length)];

    el.style.left = Math.random()*window.innerWidth + "px";
    el.style.top = window.innerHeight + "px";
    el.style.fontSize = (14 + Math.random()*28) + "px";

    canvas.appendChild(el);

    setTimeout(()=> el.remove(),5500);
}

/* FORMULA BURSTS */
function createFormula(){

    const el = document.createElement("div");
    el.className = "formula";
    el.innerText = formulas[Math.floor(Math.random()*formulas.length)];

    el.style.left = Math.random()*window.innerWidth + "px";
    el.style.top = Math.random()*window.innerHeight + "px";

    canvas.appendChild(el);

    setTimeout(()=> el.remove(),2400);
}

/* BACKGROUND WAVES */
function createWave(){

    const w = document.createElement("div");
    w.className = "wave";

    w.style.left = Math.random()*window.innerWidth + "px";
    w.style.top = Math.random()*window.innerHeight + "px";

    canvas.appendChild(w);

    setTimeout(()=> w.remove(),6000);
}

/* LOOPS */
setInterval(createMath,90);
setInterval(createFormula,800);
setInterval(createWave,1200);

</script>

</body>
</html>
