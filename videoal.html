<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>video.html</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Inter,sans-serif;
}

/* BACKGROUND */

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(170px);
}

body::before{
    width:560px;
    height:560px;
    background:#2563eb;
    left:-220px;
    top:-220px;
    opacity:.2;
}

body::after{
    width:560px;
    height:560px;
    background:#7c3aed;
    right:-220px;
    bottom:-220px;
    opacity:.18;
}

/* FRAME */

.frame{
    width:1120px;
    height:640px;

    background:#0f172a;

    border:1px solid rgba(255,255,255,.06);

    border-radius:34px;

    overflow:hidden;

    position:relative;

    box-shadow:
    0 0 100px rgba(0,0,0,.75),
    inset 0 0 40px rgba(255,255,255,.03);

    perspective:2000px;
}

/* CINEMATIC CAMERA */

.camera{
    position:absolute;
    inset:0;

    transform-style:preserve-3d;

    animation:cinematic 14s cubic-bezier(.65,.05,.36,1) infinite;
}

@keyframes cinematic{

    0%{
        transform:
        rotateY(-5deg)
        rotateX(1deg)
        translateX(-14px)
        translateY(0px)
        scale(1);
    }

    15%{
        transform:
        rotateY(-2deg)
        rotateX(.5deg)
        translateX(6px)
        translateY(-4px)
        scale(1.015);
    }

    28%{
        transform:
        rotateY(5deg)
        rotateX(-1deg)
        translateX(22px)
        translateY(6px)
        scale(1.03);
    }

    40%{
        transform:
        rotateY(1deg)
        rotateX(0deg)
        translateX(0px)
        translateY(-3px)
        scale(1.01);
    }

    58%{
        transform:
        rotateY(-7deg)
        rotateX(1.5deg)
        translateX(-26px)
        translateY(10px)
        scale(1.04);
    }

    70%{
        transform:
        rotateY(4deg)
        rotateX(-1deg)
        translateX(16px)
        translateY(-8px)
        scale(1.02);
    }

    85%{
        transform:
        rotateY(-1deg)
        rotateX(.3deg)
        translateX(-4px)
        translateY(0px)
        scale(1.01);
    }

    100%{
        transform:
        rotateY(-5deg)
        rotateX(1deg)
        translateX(-14px)
        translateY(0px)
        scale(1);
    }
}

/* GLOW */

.glow{
    position:absolute;
    border-radius:50%;
    filter:blur(100px);
    opacity:.18;
    animation:pulse 6s ease-in-out infinite;
}

.g1{
    width:280px;
    height:280px;
    background:#2563eb;
    top:20px;
    left:20px;
}

.g2{
    width:280px;
    height:280px;
    background:#7c3aed;
    right:20px;
    bottom:20px;
}

@keyframes pulse{
    50%{
        transform:scale(1.18);
    }
}

/* HERO */

.hero{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:20;
    transition:1s ease;
}

.hero.hide{
    opacity:0;
    transform:scale(1.12);
    pointer-events:none;
}

.pythonLogo{
    width:145px;
    height:145px;
    object-fit:contain;

    filter:
    drop-shadow(0 0 45px rgba(59,130,246,.5));

    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    50%{
        transform:translateY(-14px);
    }
}

.heroTitle{
    margin-top:28px;
    color:white;
    font-size:64px;
    font-weight:900;
    letter-spacing:-1px;
}

.heroSub{
    margin-top:14px;
    color:#7dd3fc;
    font-size:20px;
    font-weight:700;
}

/* CHAT */

.chatScene{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:30;
}

.chatScene.show{
    display:flex;
}

.chatCard{
    width:480px;
    height:565px;

    background:rgba(15,23,42,.88);

    border:1px solid rgba(255,255,255,.08);

    border-radius:36px;

    overflow:hidden;

    backdrop-filter:blur(24px);

    box-shadow:
    0 0 60px rgba(0,0,0,.45),
    inset 0 0 30px rgba(255,255,255,.03);

    transform-style:preserve-3d;

    animation:flipFloat 10s cubic-bezier(.65,.05,.36,1) infinite;
}

@keyframes flipFloat{

    0%{
        transform:
        rotateY(-8deg)
        rotateX(2deg)
        translateX(-20px)
        translateY(0px);
    }

    18%{
        transform:
        rotateY(-2deg)
        rotateX(1deg)
        translateX(10px)
        translateY(-6px);
    }

    34%{
        transform:
        rotateY(9deg)
        rotateX(-2deg)
        translateX(26px)
        translateY(8px);
    }

    50%{
        transform:
        rotateY(2deg)
        rotateX(0deg)
        translateX(0px)
        translateY(-4px);
    }

    68%{
        transform:
        rotateY(-10deg)
        rotateX(2deg)
        translateX(-30px)
        translateY(10px);
    }

    84%{
        transform:
        rotateY(5deg)
        rotateX(-1deg)
        translateX(14px)
        translateY(-6px);
    }

    100%{
        transform:
        rotateY(-8deg)
        rotateX(2deg)
        translateX(-20px)
        translateY(0px);
    }
}

/* CHAT TOP */

.chatTop{
    height:84px;
    border-bottom:1px solid rgba(255,255,255,.06);

    display:flex;
    align-items:center;

    padding:0 22px;
}

.back{
    color:white;
    font-size:28px;
    margin-right:16px;
}

.profile{
    width:52px;
    height:52px;
    border-radius:50%;
    object-fit:cover;
}

.userInfo{
    margin-left:14px;
}

.nameRow{
    display:flex;
    align-items:center;
    gap:7px;
}

.name{
    color:white;
    font-size:16px;
    font-weight:800;
}

.verify{
    width:18px;
    height:18px;
    border-radius:50%;
    background:#3b82f6;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:11px;
    font-weight:900;
}

.active{
    color:#4ade80;
    font-size:13px;
    margin-top:3px;
}

.menu{
    margin-left:auto;
    color:white;
    font-size:28px;
}

/* CHAT BODY */

.chatBody{
    padding:28px 22px;
    display:flex;
    flex-direction:column;
    gap:18px;
}

/* MESSAGE */

.message{
    max-width:78%;

    padding:16px 18px;

    border-radius:24px;

    line-height:1.7;

    font-size:15px;

    font-weight:500;

    opacity:0;

    transform:translateY(20px);

    animation:showMessage .5s ease forwards;
}

.user{
    align-self:flex-end;

    background:linear-gradient(
        135deg,
        rgba(124,58,237,.3),
        rgba(168,85,247,.18)
    );

    border:1px solid rgba(192,132,252,.22);

    color:white;
}

.bot{
    align-self:flex-start;

    background:linear-gradient(
        135deg,
        rgba(37,99,235,.28),
        rgba(59,130,246,.18)
    );

    border:1px solid rgba(96,165,250,.22);

    color:white;
}

@keyframes showMessage{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* INPUT */

.chatInput{
    position:absolute;

    left:22px;
    right:22px;
    bottom:22px;

    height:64px;

    border-radius:22px;

    background:rgba(255,255,255,.04);

    border:1px solid rgba(255,255,255,.06);

    display:flex;
    align-items:center;

    padding:0 22px;
}

.inputText{
    color:white;
    font-size:15px;
}

.inputCursor{
    width:8px;
    height:18px;
    background:#60a5fa;
    display:inline-block;
    margin-left:4px;
    animation:blink .7s infinite;
}

.send{
    margin-left:auto;

    width:46px;
    height:46px;

    border-radius:50%;

    background:#2563eb;

    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:20px;
    font-weight:900;

    opacity:0;

    transform:scale(.7);

    transition:.4s ease;
}

.send.show{
    opacity:1;
    transform:scale(1);
}

/* EDITOR */

.editor{
    position:absolute;
    inset:0;

    background:#0b1220;

    display:none;
    flex-direction:column;

    z-index:40;
}

.editor.show{
    display:flex;
}

/* TOPBAR */

.topbar{
    height:60px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 22px;
}

.dot{
    width:11px;
    height:11px;
    border-radius:50%;
    margin-right:7px;
}

.red{background:#ef4444;}
.yellow{background:#facc15;}
.green{background:#22c55e;}

.filename{
    margin-left:14px;
    color:#e2e8f0;
    font-size:14px;
    font-weight:700;
}

/* CODE */

.workspace{
    flex:1;
    position:relative;
}

.code{
    position:absolute;
    left:0;
    top:0;

    width:58%;
    height:100%;

    padding:34px;

    font-family:'Fira Code', monospace;

    font-size:17px;
    line-height:2.2;

    color:white;
}

.line{
    display:grid;
    grid-template-columns:55px auto;
    align-items:center;
    min-height:40px;
}

.num{
    color:#475569;
    text-align:right;
    padding-right:20px;
}

.text{
    white-space:pre;
}

.comment{
    color:#64748b;
}

.variable{
    color:#38bdf8;
}

.string{
    color:#facc15;
}

.func{
    color:#4ade80;
}

/* STAND OUT GLOW */

.highlightBlue{
    color:#7dd3fc !important;

    font-size:22px;

    font-weight:900;

    text-shadow:
    0 0 20px rgba(125,211,252,.95),
    0 0 40px rgba(59,130,246,.9),
    0 0 80px rgba(59,130,246,.6);

    transform:scale(1.08);
}

.highlightGreen{
    color:#86efac !important;

    font-size:22px;

    font-weight:900;

    text-shadow:
    0 0 20px rgba(134,239,172,.95),
    0 0 40px rgba(34,197,94,.8),
    0 0 80px rgba(34,197,94,.55);

    transform:scale(1.08);
}

/* CURSOR */

.cursor{
    width:9px;
    height:18px;
    background:white;
    display:inline-block;
    margin-left:2px;
    animation:blink .7s infinite;
}

/* EXPLAIN */

.explain{
    position:absolute;

    width:330px;

    right:30px;
    top:110px;

    padding:28px;

    border-radius:28px;

    background:linear-gradient(
        135deg,
        rgba(37,99,235,.28),
        rgba(59,130,246,.16)
    );

    border:1px solid rgba(96,165,250,.22);

    backdrop-filter:blur(14px);

    opacity:0;

    transform:translateY(20px) scale(.94);

    transition:.5s ease;
}

.explain.show{
    opacity:1;
    transform:translateY(0) scale(1);
}

.explain.hide{
    opacity:0;
    transform:translateY(-20px) scale(.9);
}

.explainTitle{
    color:#7dd3fc;
    font-size:15px;
    font-weight:900;
    margin-bottom:12px;
}

.explainText{
    color:white;
    line-height:1.8;
    font-size:14px;
}

/* TERMINAL */

.terminal{
    position:absolute;
    inset:0;
    background:#020617;
    display:none;
    flex-direction:column;
    z-index:50;
}

.terminal.show{
    display:flex;
}

.termTop{
    height:60px;
    background:#111827;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 22px;
}

.termTitle{
    margin-left:14px;
    color:#cbd5e1;
    font-size:14px;
    font-weight:700;
}

.termBody{
    flex:1;
    padding:32px;
    font-family:'Fira Code', monospace;
    font-size:16px;
    line-height:2.2;
    color:#4ade80;
}

.output{
    opacity:0;
    transform:translateY(6px);
    animation:fade .2s ease forwards;
}

@keyframes fade{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ENDING */

.ending{
    position:absolute;
    inset:0;

    background:#020617;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    opacity:0;

    pointer-events:none;

    transition:1s ease;

    z-index:100;
}

.ending.show{
    opacity:1;
}

.endTitle{
    color:white;
    font-size:60px;
    font-weight:900;
    letter-spacing:-1px;

    text-shadow:
    0 0 40px rgba(255,255,255,.12);
}

.endSub{
    margin-top:16px;

    color:#60a5fa;

    font-size:24px;

    font-weight:800;

    text-shadow:
    0 0 30px rgba(96,165,250,.45);
}

</style>
</head>

<body>

<div class="frame">

    <div class="camera">

        <div class="glow g1"></div>
        <div class="glow g2"></div>

        <!-- HERO -->

        <div class="hero" id="hero">

            <img
                class="pythonLogo"
                src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg"
            >

            <div class="heroTitle">
                Learn Python
            </div>

            <div class="heroSub">
                Premium Python Tutorial
            </div>

        </div>

        <!-- CHAT -->

        <div class="chatScene" id="chatScene">

            <div class="chatCard">

                <div class="chatTop">

                    <div class="back">‹</div>

                    <img
                        class="profile"
                        src="dominex-macedon.png"
                    >

                    <div class="userInfo">

                        <div class="nameRow">

                            <div class="name">
                                Dominex Macedon
                            </div>

                            <div class="verify">
                                ✓
                            </div>

                        </div>

                        <div class="active">
                            Active now
                        </div>

                    </div>

                    <div class="menu">
                        ⋮
                    </div>

                </div>

                <div class="chatBody" id="chatBody"></div>

                <div class="chatInput">

                    <div class="inputText" id="inputText"></div>

                    <div class="send" id="sendBtn">
                        ↑
                    </div>

                </div>

            </div>

        </div>

        <!-- EDITOR -->

        <div class="editor" id="editor">

            <div class="topbar">

                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>

                <div class="filename">
                    app.py
                </div>

            </div>

            <div class="workspace">

                <div class="code" id="code"></div>

                <div class="explain" id="explain">

                    <div class="explainTitle">
                        PYTHON EXPLANATION
                    </div>

                    <div class="explainText" id="explainText"></div>

                </div>

            </div>

        </div>

        <!-- TERMINAL -->

        <div class="terminal" id="terminal">

            <div class="termTop">

                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>

                <div class="termTitle">
                    Python Terminal
                </div>

            </div>

            <div class="termBody" id="termBody"></div>

        </div>

        <!-- END -->

        <div class="ending" id="ending">

            <div class="endTitle">
                Dominex Macedon
            </div>

            <div class="endSub">
                — Python Programmer —
            </div>

        </div>

    </div>

</div>

<script>

/* ELEMENTS */

const hero =
document.getElementById("hero");

const chatScene =
document.getElementById("chatScene");

const chatBody =
document.getElementById("chatBody");

const inputText =
document.getElementById("inputText");

const sendBtn =
document.getElementById("sendBtn");

const editor =
document.getElementById("editor");

const code =
document.getElementById("code");

const explain =
document.getElementById("explain");

const explainText =
document.getElementById("explainText");

const terminal =
document.getElementById("terminal");

const termBody =
document.getElementById("termBody");

const ending =
document.getElementById("ending");

/* HERO */

setTimeout(()=>{

    hero.classList.add("hide");

    setTimeout(()=>{

        chatScene.classList.add("show");

        startTypingMessage();

    },900);

},2400);

/* CHAT MESSAGE TYPING */

const userMessage =
"Hey Dominex, can you teach me Python?";

let typeIndex = 0;

function startTypingMessage(){

    function type(){

        inputText.innerHTML =
        userMessage.substring(0,typeIndex) +
        '<span class="inputCursor"></span>';

        typeIndex++;

        if(typeIndex <= userMessage.length){

            if(typeIndex > 3){
                sendBtn.classList.add("show");
            }

            setTimeout(type,42);

        }else{

            setTimeout(sendUserMessage,700);
        }
    }

    type();
}

/* SEND MESSAGE */

function sendUserMessage(){

    inputText.innerHTML = "";

    const msg =
    document.createElement("div");

    msg.className =
    "message user";

    msg.innerText =
    userMessage;

    chatBody.appendChild(msg);

    setTimeout(showBot1,1200);
}

/* BOT MESSAGES */

function showBot1(){

    const msg =
    document.createElement("div");

    msg.className =
    "message bot";

    msg.innerText =
    "Absolutely. Python is powerful, elegant, and beginner friendly.";

    chatBody.appendChild(msg);

    setTimeout(showBot2,1700);
}

function showBot2(){

    const msg =
    document.createElement("div");

    msg.className =
    "message bot";

    msg.innerText =
    "Let me quickly create a Python program for you.";

    chatBody.appendChild(msg);

    setTimeout(startEditor,2200);
}

/* EDITOR */

function startEditor(){

    chatScene.style.display = "none";

    editor.classList.add("show");

    typeCode();
}

const lines = [

`<span class="comment"># Simple Python Program</span>`,

`<span id="varTarget"><span class="variable">name</span> = <span class="string">"Dominex"</span></span>`,

`<span id="printTarget"><span class="func">print</span>(<span class="string">"Hello"</span>, name)</span>`

];

let lineIndex = 0;

function typeCode(){

    if(lineIndex >= lines.length){

        setTimeout(showExplain1,700);

        return;
    }

    const row =
    document.createElement("div");

    row.className = "line";

    row.innerHTML = `
        <div class="num">${lineIndex + 1}</div>
        <div class="text"></div>
    `;

    code.appendChild(row);

    const text =
    row.querySelector(".text");

    const html =
    lines[lineIndex];

    let i = 0;

    function type(){

        text.innerHTML =
        html.substring(0,i) +
        '<span class="cursor"></span>';

        i++;

        if(i <= html.length){

            setTimeout(type,5);

        }else{

            text.innerHTML = html;

            lineIndex++;

            setTimeout(typeCode,180);
        }
    }

    type();
}

/* EXPLANATION */

function showExplain1(){

    const target =
    document.getElementById("varTarget");

    target.classList.add("highlightBlue");

    explain.classList.add("show");

    typeExplain(
        "Variables store information inside Python programs."
    );

    setTimeout(()=>{

        explain.classList.remove("show");
        explain.classList.add("hide");

        target.classList.remove("highlightBlue");

    },3200);

    setTimeout(showExplain2,3800);
}

function showExplain2(){

    const target =
    document.getElementById("printTarget");

    explain.classList.remove("hide");

    target.classList.add("highlightGreen");

    explain.classList.add("show");

    typeExplain(
        "print() instantly displays output into the terminal."
    );

    setTimeout(()=>{

        explain.classList.remove("show");

        target.classList.remove("highlightGreen");

    },3200);

    setTimeout(showTerminal,4200);
}

function typeExplain(text){

    explainText.innerHTML = "";

    let i = 0;

    function write(){

        explainText.innerHTML +=
        text.charAt(i);

        i++;

        if(i < text.length){

            setTimeout(write,22);
        }
    }

    write();
}

/* TERMINAL */

function showTerminal(){

    editor.style.display = "none";

    terminal.classList.add("show");

    const outputs = [

        "> python app.py",

        "",

        "Hello Dominex",

        "",

        "Program finished successfully"

    ];

    outputs.forEach((text,index)=>{

        setTimeout(()=>{

            const line =
            document.createElement("div");

            line.className = "output";

            line.innerText = text;

            termBody.appendChild(line);

        },index * 120);

    });

    setTimeout(showEnding,3200);
}

/* END */

function showEnding(){

    terminal.style.display = "none";

    ending.classList.add("show");
}

</script>

</body>
</html>
