<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Starlight Programming Language</title>

<style>

/* =========================================================
   RESET + BASE
========================================================= */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: radial-gradient(circle at top, #070812, #04050a);
  color: #e6e9ff;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  overflow: hidden;
}

/* =========================================================
   FRAME GLOW BORDER
========================================================= */

body::before {
  content: "";
  position: fixed;
  inset: 0;
  border: 1px solid rgba(124, 92, 255, 0.15);
  box-shadow:
    inset 0 0 80px rgba(124,92,255,0.08),
    0 0 120px rgba(0,229,255,0.05);
  pointer-events: none;
}

/* =========================================================
   SCENES
========================================================= */

.scene {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;

  opacity: 0;
  transform: scale(1.05);
  transition: all 1.4s cubic-bezier(.2,.9,.2,1);
  pointer-events: none;
}

.scene.active {
  opacity: 1;
  transform: scale(1);
}

/* =========================================================
   SCENE 1 — INTRO
========================================================= */

.logo {
  width: 120px;
  height: 120px;
  background: url("starlight.png") center/contain no-repeat;
  filter: drop-shadow(0 0 25px rgba(124,92,255,.6));
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-14px); }
}

.title {
  font-size: 42px;
  margin-top: 18px;
  text-align: center;
  text-shadow: 0 0 25px rgba(124,92,255,.4);
}

.subtitle {
  margin-top: 10px;
  color: #9aa4c7;
  font-size: 14px;
}

.meta {
  margin-top: 16px;
  color: #6cf0ff;
  font-size: 13px;
  opacity: 0.9;
}

/* =========================================================
   SCENE 2 — CODE EDITOR
========================================================= */

.editor {
  width: 85%;
  height: 75%;
  border-radius: 14px;

  background: linear-gradient(180deg, #0a0c14, #07080f);
  border: 1px solid rgba(255,255,255,0.06);

  box-shadow:
    0 0 80px rgba(0,229,255,0.08),
    0 0 120px rgba(124,92,255,0.08);

  padding: 28px;
  overflow: hidden;
}

/* CODE BLOCK */
pre {
  font-size: 16px;
  line-height: 1.9;
  white-space: pre-wrap;
}

/* SYNTAX COLORS */
.keyword {
  color: #b48cff;
  text-shadow: 0 0 12px rgba(180,140,255,0.4);
}

.function {
  color: #6cf0ff;
  text-shadow: 0 0 12px rgba(108,240,255,0.4);
}

.string {
  color: #ffd479;
  text-shadow: 0 0 10px rgba(255,212,121,0.3);
}

.ident {
  color: #c7d2ff;
}

.cursor {
  display: inline-block;
  width: 8px;
  height: 18px;
  background: #6cf0ff;
  animation: blink .8s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* =========================================================
   SCENE 3 — EXECUTION TERMINAL
========================================================= */

.terminal {
  width: 80%;
  height: 70%;
  background: #000;
  border-radius: 12px;

  border: 1px solid rgba(0,255,170,0.3);

  box-shadow:
    0 0 60px rgba(0,255,170,0.12),
    inset 0 0 40px rgba(0,255,170,0.05);

  padding: 20px;
  overflow: hidden;
}

.term-line {
  color: #1aff9a;
  opacity: 0;
  transform: translateY(6px);
  animation: appear .25s forwards;
}

@keyframes appear {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.term-header {
  color: #7c8799;
  margin-bottom: 12px;
  font-size: 13px;
}

</style>
</head>

<body>

<!-- =========================================================
     SCENE 1
========================================================= -->
<div class="scene active" id="s1">

  <div class="logo"></div>

  <div class="title">Starlight Programming Language</div>
  <div class="subtitle">Node.js-powered execution runtime</div>
  <div class="meta">starlight-cli • npm package • Dominex Macedon</div>

</div>

<!-- =========================================================
     SCENE 2
========================================================= -->
<div class="scene" id="s2">

  <div class="editor">
<pre id="code"></pre>
  </div>

</div>

<!-- =========================================================
     SCENE 3
========================================================= -->
<div class="scene" id="s3">

  <div class="terminal">
    <div class="term-header">starlight program.sl</div>
    <div id="term"></div>
  </div>

</div>

<script>

/* =========================================================
   SCENE SWITCH
========================================================= */

const scenes = ["s1","s2","s3"];

function show(i){
  scenes.forEach(id => document.getElementById(id).classList.remove("active"));
  document.getElementById(scenes[i]).classList.add("active");
}

setTimeout(()=>show(1), 3500);
setTimeout(()=>{ show(2); typeCode(); }, 7000);
setTimeout(()=>{ show(3); run(); }, 13000);

/* =========================================================
   CODE (FULL VISIBLE)
========================================================= */

const lines = [
`let name = "Dominex Macedon"`,
`let greeting = "Hello " + name`,
``,
`sldeploy(greeting)`
];

let line = 0;
let char = 0;

const codeEl = document.getElementById("code");

function highlight(code){
  return code
    .replace(/let/g, `<span class="keyword">let</span>`)
    .replace(/sldeploy/g, `<span class="function">sldeploy</span>`)
    .replace(/"([^"]*)"/g, `<span class="string">"$1"</span>`)
    .replace(/\bname\b/g, `<span class="ident">name</span>`)
    .replace(/\bgreeting\b/g, `<span class="ident">greeting</span>`);
}

function typeCode(){

  if(line >= lines.length) return;

  let current = lines[line];

  if(char <= current.length){

    const visible =
      lines.slice(0,line).join("\n") +
      "\n" +
      current.slice(0,char) +
      "<span class='cursor'></span>";

    codeEl.innerHTML = highlight(visible);
    char++;

    setTimeout(typeCode, 30);

  } else {
    line++;
    char = 0;
    setTimeout(typeCode, 250);
  }
}

/* =========================================================
   EXECUTION (PURE OUTPUT ONLY)
========================================================= */

function run(){

  const term = document.getElementById("term");

  const output = [
    "$ starlight program.sl",
    "",
    "Hello Dominex Macedon"
  ];

  let i = 0;

  function next(){
    if(i >= output.length) return;

    const div = document.createElement("div");
    div.className = "term-line";
    div.textContent = output[i];

    term.appendChild(div);
    i++;

    setTimeout(next, 500);
  }

  next();
}

</script>

</body>
</html>
