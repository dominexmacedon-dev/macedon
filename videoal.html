<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Solver Cinema</title>

<style>
body{
    margin:0;
    height:100vh;
    background:#020617;
    overflow:hidden;
    font-family:Inter, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* SCENE */
.scene{
    width:90%;
    max-width:900px;
    height:100vh;
    position:relative;
}

/* PROBLEM */
.problem{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:100%;
    color:#38bdf8;
    font-size:22px;
    font-weight:900;
    text-shadow:0 0 20px #38bdf8;
    transition:all 1.4s cubic-bezier(0.22, 1, 0.36, 1);
}

/* MOVE UP */
.problem.top{
    top:10%;
    font-size:18px;
    color:#60a5fa;
    text-shadow:0 0 15px #2563eb;
}

/* SOLUTION BOX (kept inside view) */
.solution{
    position:absolute;
    top:22%;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    text-align:center;
    color:#cbd5e1;
    line-height:1.9;
    font-size:18px;

    max-height:65vh;
    overflow:hidden;
}

/* LINE FADE IN (thinking effect) */
.line{
    opacity:0;
    transform:translateY(10px);
    animation:appear 0.9s ease forwards;
}

@keyframes appear{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* COLORS */
.glow{
    color:#38bdf8;
    text-shadow:0 0 10px #38bdf8;
    font-weight:700;
}

.big{
    color:#7dd3fc;
    font-size:22px;
    font-weight:900;
    text-shadow:0 0 25px #38bdf8;
}

.final{
    color:#a78bfa;
    font-size:24px;
    font-weight:900;
    text-shadow:0 0 35px #7c3aed;
}

/* FOOTER */
.credit{
    position:absolute;
    bottom:18px;
    width:100%;
    text-align:center;
    color:#64748b;
    font-size:12px;
    letter-spacing:1px;
    animation:breath 3s ease-in-out infinite;
}

@keyframes breath{
    0%,100%{opacity:0.5}
    50%{opacity:1}
}

/* CURSOR */
.cursor{
    display:inline-block;
    width:10px;
    height:18px;
    background:white;
    margin-left:6px;
    animation:blink .6s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

</style>
</head>

<body>

<div class="scene">

    <div class="problem" id="problem"></div>

    <div class="solution" id="solution"></div>

    <div class="credit">Animated by Dominex Macedon</div>

</div>

<script>

const problemEl = document.getElementById("problem");
const solutionEl = document.getElementById("solution");

/* PROBLEM */
const problemText =
`PHYSICS PROBLEM:
A car starts from rest and accelerates at 3 m/s².
Find velocity after 10 seconds.`;

/* SOLUTION */
const solutionLines = [
"SOLUTION:",
"We use equation of motion:",
"<span class='glow'>v = u + at</span>",
"",
"Where:",
"u = 0 m/s",
"a = <span class='glow'>3 m/s²</span>",
"t = <span class='glow'>10 s</span>",
"",
"Now the system thinks...",
"",
"v = 0 + (3 × 10)",
"",
"<span class='big'>Computing velocity...</span>",
"",
"<span class='final'>FINAL: 30 m/s</span>"
];

let char = 0;
let solIndex = 0;

/* TYPE PROBLEM */
function typeProblem(){

    if(char < problemText.length){
        problemEl.innerHTML =
            problemText.substring(0, char+1) + '<span class="cursor"></span>';

        char++;
        setTimeout(typeProblem, 28);
    }
    else{
        problemEl.innerHTML = problemText;

        setTimeout(() => {
            problemEl.classList.add("top");
            startSolution();
        }, 900);
    }
}

/* SLOW THINKING TYPE EFFECT */
function startSolution(){

    function addLine(){

        if(solIndex >= solutionLines.length) return;

        const line = document.createElement("div");
        line.className = "line";
        line.innerHTML = solutionLines[solIndex];

        solutionEl.appendChild(line);

        solIndex++;

        // variable delay = “thinking effect”
        const delay = 420 + Math.random() * 250;

        setTimeout(addLine, delay);
    }

    setTimeout(addLine, 400);
}

typeProblem();

</script>

</body>
</html>
